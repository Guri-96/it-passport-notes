<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学習ログ｜ITパスポート</title>
<style>
:root{
  color-scheme: light;
  --ink:#2b3a42; --red:#b73a2e; --red-soft:#fbeeec; --blue:#3a6ea5;
  --paper:#fdfbf3; --grid:rgba(125,160,195,.22); --card:#fffefa;
  --line:#d9d2bf; --green:#3c7a4e; --gold:#8a6d3b;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{
  font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
  color:var(--ink); background-color:var(--paper);
  background-image:linear-gradient(var(--grid) 1px, transparent 1px),linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size:22px 22px; line-height:1.9; font-size:16px;
}
.wrap{max-width:680px;margin:0 auto;padding:18px 16px 80px;}
header.top{text-align:center;padding:18px 10px 14px;margin-bottom:18px;border-bottom:3px double var(--line);}
h1.title{font-family:"Hiragino Mincho ProN","Yu Mincho","MS Mincho",serif;font-size:30px;letter-spacing:.18em;}
.subtitle{font-size:13px;color:#7a7261;letter-spacing:.25em;margin-top:2px;}
.backlink{display:inline-block;margin-bottom:14px;font-size:14px;color:var(--blue);text-decoration:none;border-bottom:1px dashed var(--blue);}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;box-shadow:0 2px 6px rgba(90,80,50,.08);margin-bottom:20px;overflow:hidden;}
.card-h{padding:12px 18px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#faf6e9,#f5efdd);font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:18px;font-weight:700;letter-spacing:.08em;display:flex;align-items:center;justify-content:space-between;}
.card-h .sheetlink{font-size:12px;font-weight:400;color:var(--blue);text-decoration:none;border-bottom:1px dashed var(--blue);letter-spacing:0;}
.pane{padding:18px 18px 22px;}
.field{margin-bottom:16px;}
.field>label{display:block;font-size:13px;color:#6b6253;letter-spacing:.06em;margin-bottom:6px;font-weight:700;}
.field .hint{font-weight:400;color:#a89e84;font-size:11.5px;}
.row2{display:flex;gap:12px;}
.row2>div{flex:1 1 0;}
input[type=text],input[type=date],input[type=number],select,textarea{
  width:100%;font-family:inherit;font-size:15.5px;color:var(--ink);
  background:#fff;border:1.5px solid #c9c0a8;border-radius:8px;padding:10px 12px;line-height:1.6;
}
textarea{resize:vertical;min-height:64px;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(58,110,165,.12);}
.weekbox{display:flex;align-items:center;gap:8px;}
.weekbox input{max-width:90px;text-align:center;font-weight:700;}
.weekbox .auto{font-size:11.5px;color:#a89e84;}
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chip{border:1.5px solid #c9c0a8;background:#fff;border-radius:18px;padding:7px 16px;font-size:14px;font-family:inherit;cursor:pointer;color:var(--ink);transition:all .12s;}
.chip:hover{background:#faf5e6;}
.chip.on{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:700;}
.lv{display:flex;gap:10px;}
.lv button{flex:1 1 0;border:1.5px solid #c9c0a8;background:#fff;border-radius:8px;padding:10px 0;font-size:20px;font-family:inherit;cursor:pointer;transition:all .12s;}
.lv button .lvt{display:block;font-size:11px;color:#8a8268;letter-spacing:.05em;}
.lv button:hover{background:#faf5e6;}
.lv button.on{border-color:var(--green);background:#eef7f0;box-shadow:0 0 0 3px rgba(60,122,78,.10);}
.lv button.on .lvt{color:var(--green);}
.timebox{display:flex;align-items:center;gap:10px;}
.timebox input{max-width:120px;}
.timebox .unit{font-size:14px;color:#8a8268;}
.save{display:block;width:100%;border:none;cursor:pointer;font-family:inherit;font-size:16px;font-weight:700;padding:14px;border-radius:8px;background:var(--red);color:#fff;box-shadow:0 3px 0 #8e2c22;transition:transform .08s;letter-spacing:.1em;}
.save:active{transform:translateY(3px);box-shadow:none;}
.stat-row{display:flex;text-align:center;}
.stat{flex:1 1 0;padding:14px 6px;border-right:1px dashed #e3dcc8;}
.stat:last-child{border-right:none;}
.stat .num{font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:30px;font-weight:700;color:var(--red);line-height:1.2;}
.stat .num small{font-size:14px;}
.stat .lab{font-size:11.5px;color:#8a8268;letter-spacing:.05em;}
.loglist{}
.logitem{display:flex;gap:10px;padding:12px 18px;border-bottom:1px dashed #e3dcc8;align-items:flex-start;}
.logitem:last-child{border-bottom:none;}
.logitem .ld{flex:0 0 auto;width:46px;text-align:center;}
.logitem .ld .d{font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:16px;font-weight:700;color:var(--ink);}
.logitem .ld .w{font-size:10.5px;color:#a89e84;}
.logitem .lbody{flex:1 1 auto;min-width:0;}
.logitem .lmeta{font-size:12.5px;color:#8a8268;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.tag{display:inline-block;font-size:11px;color:#fff;border-radius:4px;padding:1px 8px;}
.lv-mark{font-weight:700;}
.lv-mark.o{color:var(--green);} .lv-mark.t{color:var(--gold);} .lv-mark.x{color:var(--red);}
.logitem .lrange{font-size:14.5px;color:var(--ink);margin:1px 0;word-break:break-word;}
.logitem .lmemo{font-size:13px;color:#7a7261;word-break:break-word;}
.logitem .del{flex:0 0 auto;background:none;border:none;color:#c9b8a0;font-size:18px;cursor:pointer;line-height:1;padding:2px 4px;}
.logitem .del:hover{color:var(--red);}
.empty{padding:26px 18px;text-align:center;color:#8a8268;font-size:14px;}
.note{font-size:12px;color:#a89e84;padding:10px 18px 0;line-height:1.8;}
footer{margin-top:28px;text-align:center;font-size:12px;color:#a89e84;}
#toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:rgba(43,58,66,.95);color:#fff;padding:11px 22px;border-radius:8px;font-size:14px;opacity:0;pointer-events:none;transition:all .25s;max-width:90%;z-index:50;text-align:center;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media (max-width:480px){ body{font-size:15px;} h1.title{font-size:24px;} .pane{padding:16px 14px 20px;} .stat .num{font-size:26px;} }
</style>
</head>
<body>
<div class="wrap">
  <a class="backlink" href="index.html">‹ ホームに戻る</a>
  <header class="top">
    <h1 class="title">学習ログ</h1>
    <div class="subtitle">ITパスポート ── 毎日の記録</div>
  </header>

  <!-- 今日の記録フォーム -->
  <div class="card">
    <div class="card-h">今日の記録
      <a class="sheetlink" id="sheetLink" href="#" target="_blank" rel="noopener">▶ シートを開く</a>
    </div>
    <div class="pane">
      <div class="row2">
        <div class="field">
          <label for="f-date">日付</label>
          <input type="date" id="f-date">
        </div>
        <div class="field">
          <label for="f-week">週 <span class="hint">自動</span></label>
          <div class="weekbox"><input type="text" id="f-week" placeholder="W2"><span class="auto" id="weekauto"></span></div>
        </div>
      </div>

      <div class="field">
        <label>分野</label>
        <div class="chips" id="fieldChips">
          <button type="button" class="chip" data-field="準備">準備</button>
          <button type="button" class="chip" data-field="ストラテジ">ストラテジ</button>
          <button type="button" class="chip" data-field="マネジメント">マネジメント</button>
          <button type="button" class="chip" data-field="テクノロジ">テクノロジ</button>
          <button type="button" class="chip" data-field="復習・過去問">復習・過去問</button>
          <button type="button" class="chip" data-field="その他">その他</button>
        </div>
      </div>

      <div class="field">
        <label for="f-range">学習した範囲 <span class="hint">（任意）</span></label>
        <input type="text" id="f-range" placeholder="例：経営戦略（SWOT・PPM）／演習道場 10問模試">
      </div>

      <div class="row2">
        <div class="field">
          <label>時間</label>
          <div class="timebox"><input type="number" id="f-hours" min="0" step="0.5" placeholder="1.0"><span class="unit">時間</span></div>
          <div class="chips" style="margin-top:8px;">
            <button type="button" class="chip" data-add="0.5">+0.5</button>
            <button type="button" class="chip" data-add="1">+1</button>
            <button type="button" class="chip" data-set="0">クリア</button>
          </div>
        </div>
        <div class="field">
          <label>理解度</label>
          <div class="lv" id="lvBtns">
            <button type="button" data-lv="○">○<span class="lvt">バッチリ</span></button>
            <button type="button" data-lv="△">△<span class="lvt">あいまい</span></button>
            <button type="button" data-lv="×">×<span class="lvt">むずかしい</span></button>
          </div>
        </div>
      </div>

      <div class="field">
        <label for="f-memo">気づき・メモ <span class="hint">（任意）</span></label>
        <textarea id="f-memo" placeholder="例：セキュリティの公開鍵がまだ不安。明日もう一度。"></textarea>
      </div>

      <button class="save" id="saveBtn">記録する</button>
      <div class="note">記録はスプレッドシートの「毎日記録」シートに入り、同時にこのブラウザにも控えが残ります（下の一覧・連続日数はブラウザの控えから表示しています）。</div>
    </div>
  </div>

  <!-- 今週のまとめ -->
  <div class="card">
    <div class="card-h">今週のまとめ <span style="font-size:12px;font-weight:400;color:#a89e84;letter-spacing:0;" id="weekLabel"></span></div>
    <div class="stat-row">
      <div class="stat"><div class="num" id="stStreak">0<small>日</small></div><div class="lab">連続記録</div></div>
      <div class="stat"><div class="num" id="stDays">0<small>日</small></div><div class="lab">今週の記録日数</div></div>
      <div class="stat"><div class="num" id="stHours">0<small>h</small></div><div class="lab">今週の合計時間</div></div>
    </div>
  </div>

  <!-- 記録一覧 -->
  <div class="card">
    <div class="card-h">最近の記録</div>
    <div class="loglist" id="logList"><div class="empty">まだ記録がありません。最初の1件を上から記録してみましょう。</div></div>
  </div>

  <footer>学習ログ ─ 続けた朱印が、合格への一歩</footer>
</div>
<div id="toast"></div>

<script>
"use strict";
/* ===== 設定 ===== */
/* 演習道場・各ノートと同じGASエンドポイント（テスト結果の記録先と同一） */
const LOG_ENDPOINT = "https://script.google.com/macros/s/AKfycbyU3cjoEquXGQicR87zm2Jfa8HrUYdO5uT3TVmbj9S952d8uOWHJYe2q-wd7z8cLFfMSQ/exec";
const SHEET_URL    = "https://docs.google.com/spreadsheets/d/1r5VyDjqcR1UyW8H9cRPZrcNXEgAWa_x58QuptvjjLTM/edit";
const LS_KEY       = "ipStudyLog_v1";   /* ブラウザ控え */
const PREF_KEY     = "ipStudyLogPref_v1"; /* 前回の分野を覚える */
const TERM_START   = new Date(2026, 5, 1); /* W1開始＝2026/6/1(月) */

/* ===== 状態 ===== */
let logs = loadJSON(LS_KEY, []);   /* [{iso,date,week,field,range,hours,level,memo,ts}] */
let pick = { field:"", level:"" };

/* ===== ユーティリティ ===== */
const $ = (id)=>document.getElementById(id);
function loadJSON(k,def){ try{ const r=localStorage.getItem(k); return r?JSON.parse(r):def; }catch(e){ return def; } }
function saveJSON(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function pad(n){ return (n<10?"0":"")+n; }
function isoOf(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function mdOf(d){ return (d.getMonth()+1)+"/"+d.getDate(); }
function parseISO(s){ const a=s.split("-"); return new Date(+a[0], +a[1]-1, +a[2]); }
function weekOf(d){ /* 学習スケジュール上の週番号(W1=6/1〜) */
  const a=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const diff=Math.floor((a - TERM_START)/(7*86400000));
  const w=diff+1;
  return w>=1 ? "W"+w : "";
}
function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toast._tm); toast._tm=setTimeout(()=>t.classList.remove("show"),2600); }

/* ===== 送信（演習道場と同じ no-cors POST） ===== */
function sendLog(data){
  try{
    const body=new URLSearchParams();
    for(const k in data) body.append(k, data[k]);
    fetch(LOG_ENDPOINT, { method:"POST", mode:"no-cors", body });
    return true;
  }catch(e){ return false; }
}

/* ===== 集計 ===== */
function currentWeek(){ return weekOf(new Date()); }
function streakCount(){
  const days=new Set(logs.map(e=>e.iso));
  let c=0, d=new Date(); d.setHours(0,0,0,0);
  if(!days.has(isoOf(d))) d.setDate(d.getDate()-1); /* 今日未記録なら昨日から数える */
  while(days.has(isoOf(d))){ c++; d.setDate(d.getDate()-1); }
  return c;
}
function renderStats(){
  const wk=currentWeek();
  $("weekLabel").textContent = wk ? "（"+wk+"）" : "";
  const wlogs=logs.filter(e=>e.week===wk);
  const days=new Set(wlogs.map(e=>e.iso)).size;
  const hours=wlogs.reduce((s,e)=>s+(parseFloat(e.hours)||0),0);
  $("stStreak").innerHTML = streakCount()+'<small>日</small>';
  $("stDays").innerHTML   = days+'<small>日</small>';
  $("stHours").innerHTML  = (Math.round(hours*10)/10)+'<small>h</small>';
}
function renderList(){
  const el=$("logList");
  if(!logs.length){ el.innerHTML='<div class="empty">まだ記録がありません。最初の1件を上から記録してみましょう。</div>'; return; }
  const sorted=logs.slice().sort((a,b)=>(b.ts||0)-(a.ts||0)).slice(0,30);
  const colors={ "準備":"#8a6d3b","ストラテジ":"#b73a2e","マネジメント":"#3a6ea5","テクノロジ":"#3c7a4e","復習・過去問":"#6b6253","その他":"#9a9078" };
  let h="";
  sorted.forEach(e=>{
    const lvc = e.level==="○"?"o":e.level==="△"?"t":e.level==="×"?"x":"";
    h+='<div class="logitem">';
    h+= '<div class="ld"><div class="d">'+esc(e.date||"")+'</div><div class="w">'+esc(e.week||"")+'</div></div>';
    h+= '<div class="lbody">';
    h+=   '<div class="lmeta">';
    if(e.field) h+='<span class="tag" style="background:'+(colors[e.field]||"#9a9078")+'">'+esc(e.field)+'</span>';
    if(e.hours) h+='<span>'+esc(e.hours)+'h</span>';
    if(e.level) h+='<span class="lv-mark '+lvc+'">'+esc(e.level)+'</span>';
    h+=   '</div>';
    if(e.range) h+='<div class="lrange">'+esc(e.range)+'</div>';
    if(e.memo)  h+='<div class="lmemo">'+esc(e.memo)+'</div>';
    h+= '</div>';
    h+= '<button class="del" data-ts="'+e.ts+'" title="この控えを消す">×</button>';
    h+='</div>';
  });
  el.innerHTML=h;
  el.querySelectorAll(".del").forEach(b=>b.onclick=()=>{
    if(!confirm("この記録をブラウザの一覧から消します。\n（スプレッドシート側は消えません）よろしいですか？")) return;
    const ts=Number(b.getAttribute("data-ts"));
    logs=logs.filter(e=>e.ts!==ts); saveJSON(LS_KEY,logs); renderStats(); renderList();
  });
}

/* ===== 入力補助 ===== */
function syncWeekFromDate(){
  const v=$("f-date").value;
  if(!v) return;
  const w=weekOf(parseISO(v));
  $("f-week").value=w;
  $("weekauto").textContent = w ? "" : "(範囲外)";
}
function bindForm(){
  /* 分野チップ */
  $("fieldChips").querySelectorAll(".chip").forEach(c=>c.onclick=()=>{
    pick.field=c.getAttribute("data-field");
    $("fieldChips").querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));
    c.classList.add("on");
    saveJSON(PREF_KEY,{field:pick.field});
  });
  /* 時間チップ */
  document.querySelectorAll("[data-add]").forEach(b=>b.onclick=()=>{
    const cur=parseFloat($("f-hours").value)||0;
    $("f-hours").value = Math.round((cur+parseFloat(b.getAttribute("data-add")))*10)/10;
  });
  document.querySelectorAll("[data-set]").forEach(b=>b.onclick=()=>{ $("f-hours").value=""; });
  /* 理解度 */
  $("lvBtns").querySelectorAll("button").forEach(b=>b.onclick=()=>{
    pick.level=b.getAttribute("data-lv");
    $("lvBtns").querySelectorAll("button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
  });
  /* 日付→週 */
  $("f-date").onchange=syncWeekFromDate;
  /* 保存 */
  $("saveBtn").onclick=save;
}
function save(){
  const date=$("f-date").value;
  if(!date){ toast("日付を入れてください"); return; }
  if(!pick.field){ toast("分野を選んでください"); return; }
  const d=parseISO(date);
  const entry={
    iso:date, date:mdOf(d), week:$("f-week").value||weekOf(d),
    field:pick.field, range:$("f-range").value.trim(),
    hours:($("f-hours").value!==""? (Math.round(parseFloat($("f-hours").value)*10)/10) : ""),
    level:pick.level, memo:$("f-memo").value.trim(), ts:Date.now()
  };
  /* ブラウザ控え */
  logs.push(entry); saveJSON(LS_KEY,logs);
  /* スプレッドシートへ送信 */
  sendLog({ type:"daily", date:entry.date, week:entry.week, field:entry.field,
            range:entry.range, hours:entry.hours, level:entry.level, memo:entry.memo });
  toast("記録しました（シートにも送信）");
  /* 入力欄リセット（日付・週・分野は残す） */
  $("f-range").value=""; $("f-hours").value=""; $("f-memo").value="";
  pick.level=""; $("lvBtns").querySelectorAll("button").forEach(x=>x.classList.remove("on"));
  renderStats(); renderList();
}

/* ===== 起動 ===== */
(function init(){
  $("sheetLink").href=SHEET_URL;
  const today=new Date();
  $("f-date").value=isoOf(today);
  syncWeekFromDate();
  /* 前回の分野を復元 */
  const pref=loadJSON(PREF_KEY,null);
  if(pref&&pref.field){
    const c=$("fieldChips").querySelector('[data-field="'+pref.field+'"]');
    if(c){ pick.field=pref.field; c.classList.add("on"); }
  }
  bindForm(); renderStats(); renderList();
})();
</script>
</body>
</html>
