<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テクノロジ攻略ノート｜ITパスポート</title>
<style>
:root{
  color-scheme: light;
  --ink:#2b3a42;
  --red:#b73a2e;
  --red-soft:#fbeeec;
  --blue:#3a6ea5;
  --paper:#fdfbf3;
  --grid:rgba(125,160,195,.22);
  --card:#fffefa;
  --line:#d9d2bf;
  --green:#3c7a4e;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{
  font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
  color:var(--ink);
  background-color:var(--paper);
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size:22px 22px;
  line-height:1.9;
  font-size:16px;
}
.wrap{max-width:820px;margin:0 auto;padding:18px 16px 80px;}
header.top{
  text-align:center;
  padding:18px 10px 14px;
  margin-bottom:18px;
  border-bottom:3px double var(--line);
}
h1.title{
  font-family:"Hiragino Mincho ProN","Yu Mincho","MS Mincho",serif;
  font-size:30px;
  letter-spacing:.18em;
  color:var(--ink);
}
.subtitle{font-size:13px;color:#7a7261;letter-spacing:.25em;margin-top:2px;}
.progressline{margin-top:10px;font-size:13px;color:#6b6253;}
.bar{height:8px;background:#eee7d6;border-radius:4px;overflow:hidden;max-width:360px;margin:6px auto 0;border:1px solid var(--line);}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,#c8553d,var(--red));width:0%;transition:width .5s;}
.banner{background:#fff4e0;border:1px solid #e0c890;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:10px;
  box-shadow:0 2px 6px rgba(90,80,50,.08);
  margin-bottom:20px;
  overflow:hidden;
}
.card-h{
  padding:12px 18px;
  border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,#faf6e9,#f5efdd);
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.card-h .ch-name{
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
  font-size:19px;font-weight:700;letter-spacing:.08em;
}
.card-h .ch-no{font-size:12px;color:#8a8268;display:block;letter-spacing:.2em;}
.unit-row{
  display:flex;align-items:center;gap:12px;
  padding:13px 18px;
  border-bottom:1px dashed #e3dcc8;
  cursor:pointer;
  transition:background .15s;
  -webkit-tap-highlight-color:rgba(183,58,46,.08);
}
.unit-row:hover{background:#faf5e6;}
.unit-row:last-child{border-bottom:none;}
.unit-no{
  flex:0 0 auto;width:30px;height:30px;border-radius:50%;
  background:#efe8d4;color:#6b6253;font-size:14px;
  display:flex;align-items:center;justify-content:center;font-weight:700;
}
.unit-name{flex:1 1 auto;font-size:15.5px;}
.unit-state{flex:0 0 auto;min-width:48px;text-align:center;}
.arrow{color:#b9b09a;font-size:14px;}
.locked{cursor:default;opacity:.55;}
.locked:hover{background:transparent;}
.soon{font-size:11px;color:#9a9078;border:1px solid #cfc6ad;border-radius:4px;padding:1px 7px;}
.testrow{background:#fbf7ec;}
.stamp{
  display:inline-flex;align-items:center;justify-content:center;
  width:40px;height:40px;border-radius:50%;
  border:2.5px solid rgba(183,58,46,.85);
  color:rgba(183,58,46,.92);
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
  font-weight:700;font-size:17px;
  transform:rotate(-12deg);
  background:radial-gradient(circle at 35% 30%, rgba(183,58,46,.10), rgba(183,58,46,.03));
  box-shadow:inset 0 0 0 1px rgba(183,58,46,.25);
  letter-spacing:0;
  user-select:none;
}
.stamp.big{width:84px;height:84px;font-size:30px;border-width:4px;}
.stamp.anim{animation:stampIn .45s cubic-bezier(.2,1.6,.4,1) both;}
@keyframes stampIn{
  0%{transform:rotate(-12deg) scale(2.4);opacity:0;}
  60%{transform:rotate(-12deg) scale(.92);opacity:1;}
  100%{transform:rotate(-12deg) scale(1);opacity:1;}
}
.btn{
  display:inline-block;border:none;cursor:pointer;
  font-family:inherit;font-size:15px;font-weight:700;
  padding:12px 26px;border-radius:8px;
  background:var(--red);color:#fff;
  box-shadow:0 2px 0 #8e2c22;
  transition:transform .08s, box-shadow .08s;
  -webkit-tap-highlight-color:transparent;
}
.btn:active{transform:translateY(2px);box-shadow:0 0 0 #8e2c22;}
.btn.sub{background:#fff;color:var(--ink);border:1.5px solid #c9c0a8;box-shadow:0 2px 0 #c9c0a8;}
.btn.blue{background:var(--blue);box-shadow:0 2px 0 #2a5078;}
.btn:disabled{opacity:.45;cursor:default;}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:18px 0 6px;}
.backlink{
  display:inline-block;margin-bottom:14px;font-size:14px;color:var(--blue);
  cursor:pointer;text-decoration:none;border-bottom:1px dashed var(--blue);
}
/* ---- 講義 ---- */
.lecture{padding:22px 22px 26px;}
.lec-head{margin-bottom:6px;}
.lec-ch{font-size:12.5px;color:#8a8268;letter-spacing:.15em;}
.lec-title{
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
  font-size:24px;font-weight:700;letter-spacing:.05em;
  border-bottom:3px double var(--line);padding-bottom:8px;margin-bottom:4px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.lec-meta{font-size:12.5px;color:#9a9078;margin-bottom:14px;}
.lecture h3.sec{
  font-size:17.5px;margin:30px 0 10px;
  padding:6px 12px;border-left:5px solid var(--red);
  background:linear-gradient(90deg,#f8f2e2,transparent);
  font-weight:700;letter-spacing:.04em;
}
.lecture p{margin:10px 0;}
.lecture ul,.lecture ol{margin:8px 0 12px 24px;}
.lecture li{margin:5px 0;}
.kw{color:var(--red);font-weight:700;}
.ex{
  background:#f3f7fb;border:1px solid #c9d8e6;border-radius:8px;
  padding:12px 16px;margin:14px 0;font-size:15px;
}
.ex-t{font-weight:700;color:var(--blue);font-size:13.5px;margin-bottom:4px;letter-spacing:.08em;}
.pt{
  background:var(--red-soft);border:1px solid #e3b9b2;border-radius:8px;
  padding:12px 16px;margin:14px 0;font-size:15px;
}
.pt-t{font-weight:700;color:var(--red);font-size:13.5px;margin-bottom:4px;letter-spacing:.08em;}
.why{
  background:#eef5ef;border:1px solid #b5cdb8;border-left:5px solid var(--green);border-radius:8px;
  padding:12px 16px;margin:14px 0;font-size:15px;
}
.why-t{font-weight:700;color:var(--green);font-size:13.5px;margin-bottom:4px;letter-spacing:.08em;}
.tbl{border-collapse:collapse;width:100%;margin:12px 0;font-size:14.5px;background:#fff;}
.tbl th,.tbl td{border:1px solid #cfc6ad;padding:7px 10px;text-align:left;vertical-align:top;}
.tbl th{background:#f5efdd;font-weight:700;white-space:nowrap;}
/* ---- 質問コーナー ---- */
.qa{
  margin-top:34px;padding:16px 18px;
  border:1.5px dashed #b9ab84;border-radius:10px;background:#fbf8ee;
}
.qa-t{font-weight:700;margin-bottom:6px;font-size:15.5px;}
.qa-note{font-size:13px;color:#7a7261;margin-bottom:10px;}
.qa textarea{
  width:100%;min-height:74px;border:1px solid #c9c0a8;border-radius:8px;
  padding:10px;font-family:inherit;font-size:15px;background:#fff;resize:vertical;
}
.qa .btn{margin-top:10px;}
.ai-ans{
  margin-top:14px;padding:12px 16px;background:#fff;border:1px solid #c9d8e6;
  border-radius:8px;font-size:15px;white-space:pre-wrap;
}
.done-area{text-align:center;margin-top:30px;padding-top:18px;border-top:1px solid var(--line);}
.done-stamp-wrap{min-height:96px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;}
.undo{font-size:12.5px;color:#9a9078;cursor:pointer;text-decoration:underline;}
/* ---- テスト ---- */
.test-pane{padding:24px 22px 28px;}
.t-head{font-size:13px;color:#8a8268;letter-spacing:.1em;margin-bottom:4px;}
.t-q{font-size:16.5px;font-weight:700;margin:10px 0 18px;line-height:1.8;}
.choices{display:flex;flex-direction:column;gap:10px;}
.choice{
  text-align:left;background:#fff;border:1.5px solid #c9c0a8;border-radius:8px;
  padding:12px 14px;font-size:15px;font-family:inherit;cursor:pointer;line-height:1.7;
  transition:background .12s,border-color .12s;
}
.choice:hover{background:#faf5e6;}
.choice .cno{font-weight:700;color:var(--blue);margin-right:8px;}
.choice.sel-ok{border-color:var(--green);background:#eef7f0;}
.choice.sel-ng{border-color:var(--red);background:var(--red-soft);}
.choice.reveal{border-color:var(--green);background:#eef7f0;}
.choice:disabled{cursor:default;}
.judge{font-size:20px;font-weight:700;margin:16px 0 6px;}
.judge.ok{color:var(--green);}
.judge.ng{color:var(--red);}
.expl{
  background:#f8f4e8;border:1px solid var(--line);border-radius:8px;
  padding:12px 16px;font-size:14.5px;margin:10px 0 16px;
}
.expl b{color:var(--red);}
.result-box{text-align:center;padding:10px 0;}
.score{font-size:42px;font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-weight:700;margin:8px 0;}
.score small{font-size:18px;}
.rv-tag{display:inline-block;font-size:12px;color:#fff;background:var(--blue);border-radius:4px;padding:2px 8px;margin-left:8px;vertical-align:middle;}
/* ---- toast ---- */
#toast{
  position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
  background:rgba(43,58,66,.95);color:#fff;padding:10px 20px;border-radius:8px;
  font-size:14px;opacity:0;pointer-events:none;transition:all .25s;max-width:90%;
  z-index:50;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
footer{margin-top:30px;text-align:center;font-size:12px;color:#a89e84;}
@media (max-width:480px){
  body{font-size:15px;}
  h1.title{font-size:24px;}
  .lecture{padding:18px 14px 22px;}
  .test-pane{padding:18px 14px 22px;}
}
</style>
</head>

  ]}
];

const LECTURES = {
  u11: `
<p>テクノロジ系の出発点は「コンピュータはなぜ0と1だけで動くのか」。ここが腑に落ちると、この後のすべての単元（データ、通信、暗号）が同じ土台の話だと分かります。計算は手順さえ覚えれば確実に取れる得点源です。</p>

<h3 class="sec">1. 2進数 ── 0と1だけの数の世界</h3>
<p>私たちが使う10進数は0〜9の10種類の数字で数えますが、<span class="kw">2進数</span>は0と1の2種類だけで数えます。1の次は桁が上がって10（イチゼロ）、その次は11、100……という具合です。2進数の1桁が<span class="kw">ビット</span>（bit）、8ビットをまとめたものが<span class="kw">バイト</span>（byte）です。</p>
<div class="why"><div class="why-t">なぜ？ ── コンピュータは2進数を使うのか</div>
電子回路にとって、「電圧が高い／低い」「電流が流れている／いない」という<b>2つの状態の区別は、ノイズが混ざっても安定して判定できる</b>からです。もし10進数を電圧の10段階で表すと、わずかなノイズで「6が7に化ける」誤りが頻発します。ON/OFFの2択なら、多少電圧が揺れても誤読しません。つまり2進数は数学の趣味ではなく、<b>物理的な信頼性の要請</b>なのです。あらゆるデータ（文字も画像も音も）が最終的にビット列になるのは、この土台の上にすべてが築かれているからです。</div>
<p>基数変換（10進数⇔2進数）の手順を押さえましょう。<b>2進数→10進数</b>は、各桁に右から1、2、4、8、16…の重みを掛けて足します。たとえば2進数の1101は、8＋4＋0＋1＝<b>13</b>。<b>10進数→2進数</b>は、2で割って余りを記録する作業を繰り返し、余りを下から読みます（13→1101）。また、2進数は桁が長くなるため、4ビットをひとまとめにした<span class="kw">16進数</span>（0〜9とA〜F）で簡潔に表記する方法も使われます。</p>

<h3 class="sec">2. 情報量の単位 ── KからTまで</h3>
<p>データ量は、バイトに接頭語をつけて表します。<b>K（キロ）→M（メガ）→G（ギガ）→T（テラ）</b>の順に、それぞれ約1,000倍ずつ大きくなります。「ギガが減る」のギガは、データ通信量のGB（ギガバイト）のことですね。時間の単位は逆に小さくなる方向で、<b>ミリ（千分の1）→マイクロ（百万分の1）→ナノ→ピコ</b>と並びます。単位の大小関係の並べ替えは定番問題です。</p>

<h3 class="sec">3. 文字も画像も音も、結局はビット列</h3>
<p>文字は、1文字ごとに番号を割り当てた<span class="kw">文字コード</span>（ASCII、シフトJIS、世界中の文字を統一的に扱う<span class="kw">Unicode</span>など）で数値として表されます。メールやウェブで文字化けが起きるのは、書き手と読み手が想定する文字コードの対応表がずれているからです。</p>
<p>音のような連続した（アナログ）情報をデジタル化する手順は、<b>標本化→量子化→符号化</b>の3ステップです。</p>
<table class="tbl">
<tr><th>手順</th><th>やること</th></tr>
<tr><td><span class="kw">標本化</span>（サンプリング）</td><td>連続した波を、一定の時間間隔で<b>区切って測る</b>。</td></tr>
<tr><td><span class="kw">量子化</span></td><td>測った値を、決められた段階の<b>数値に丸める</b>。</td></tr>
<tr><td><span class="kw">符号化</span></td><td>その数値を<b>2進数のビット列に変換</b>する。</td></tr>
</table>
<div class="why"><div class="why-t">なぜ？ ── デジタル化すると劣化せずコピーできるのか</div>
アナログのコピー（ダビング）は波形そのものを写すため、コピーのたびにノイズが上乗せされて劣化します。デジタルは「0か1か」の列なので、多少ノイズが乗っても<b>「これは0、これは1」と判定し直せば元どおり完全に復元</b>できます。これがデジタルの本質的な強みで、何世代コピーしても音質が落ちない理由です。一方、標本化の間隔が粗すぎると元の波を再現できず（音がこもる）、量子化の段階が粗すぎると滑らかさが失われます。<b>細かくするほど高品質だがデータ量は増える</b>——この品質と容量のトレードオフが、画素数（解像度）や音質設定の話につながります。</div>
<p>画像は色のついた点（<span class="kw">画素</span>、ピクセル）の集まりで表されます。画素が多いほど精細ですが、データ量も増えます。データ量を減らす技術が<span class="kw">圧縮</span>で、完全に元へ戻せる<b>可逆圧縮</b>（ZIPなど）と、人間が気づきにくい情報を捨てて大幅に減らす<b>非可逆圧縮</b>（JPEG、MP3など）があります。</p>

<h3 class="sec">まとめ</h3>
<ul>
<li>2進数は<b>電気的に安定して判定できる</b>から使われる。8ビット＝1<span class="kw">バイト</span>。</li>
<li>基数変換：2進→10進は「重みを掛けて足す」、10進→2進は「2で割って余りを下から読む」。</li>
<li>単位の階段：<b>K→M→G→T</b>（約1,000倍ずつ）。時間は<b>ミリ→マイクロ→ナノ→ピコ</b>。</li>
<li>デジタル化は<b>標本化→量子化→符号化</b>。細かいほど高品質・大容量。圧縮は<b>可逆／非可逆</b>。</li>
</ul>
`,
  u12: `
<p>Pythonを学習中のぐりさんには、なじみのある内容が多い単元です。試験用語と、すでに知っているプログラミングの感覚をつなげていきましょう。探索アルゴリズムの「なぜ速いのか」まで理解すれば、計算問題も怖くありません。</p>

<h3 class="sec">1. アルゴリズム ── 手順を曖昧さなく書く</h3>
<p><span class="kw">アルゴリズム</span>とは、問題を解くための<b>明確な手順</b>のことです。料理のレシピにたとえられますが、コンピュータは行間を読めないので、人間向けレシピの「適量」「いい感じに」が許されません。手順を図で表す<span class="kw">フローチャート</span>では、処理は長方形、<b>条件分岐はひし形</b>、始まりと終わりは丸い記号で描きます。</p>
<p>処理の流れの基本は3つだけです。上から順に実行する<span class="kw">順次</span>、条件によって道が分かれる<span class="kw">選択</span>（if）、同じ処理を繰り返す<span class="kw">繰返し</span>（ループ）。どんな複雑なプログラムも、この3構造の組合せでできています。データを入れる箱が<span class="kw">変数</span>、同じ型の箱を番号つきで並べたものが<span class="kw">配列</span>です。</p>

<h3 class="sec">2. 探索アルゴリズム ── 探し方で速さが桁違いに変わる</h3>
<table class="tbl">
<tr><th>方法</th><th>やり方</th><th>条件</th></tr>
<tr><td><span class="kw">線形探索</span></td><td>先頭から1件ずつ順番に調べる</td><td>並び順は問わない</td></tr>
<tr><td><span class="kw">二分探索</span></td><td>真ん中を見て、目的の値が前半か後半かを判断し、<b>探す範囲を半分に絞る</b>ことを繰り返す</td><td><b>データが整列済み</b>であること</td></tr>
</table>
<div class="why"><div class="why-t">なぜ？ ── 二分探索は劇的に速いのか</div>
紙の辞書で「ね」から始まる言葉を探すとき、1ページ目からめくる人はいません。真ん中を開いて「な行より後ろだ」と判断し、範囲を半分に絞りますよね——それが二分探索です。1回の比較で候補が半分になるので、1,000件のデータでも約10回、<b>100万件でも約20回</b>の比較で見つかります（線形探索なら平均50万回）。データが2倍になっても比較は1回増えるだけ。この「半分に割り続ける」発想は、後の単元の様々な場面で再登場する、情報科学の最重要アイデアの1つです。ただし<b>整列されていないデータには使えない</b>——この前提条件が試験の急所です。</div>
<p>データを大小順に並べ替える処理は<span class="kw">整列</span>（ソート）と呼ばれ、隣同士を比較して入れ替えていくバブルソートなどの方法があります。</p>

<h3 class="sec">3. プログラミング言語とマークアップ言語</h3>
<p>人間が書いたプログラム（ソースコード）は、コンピュータが直接実行できる機械語に翻訳されて動きます。代表的な言語を、性格づけとともに覚えましょう。</p>
<ul>
<li><span class="kw">Python</span>：文法がシンプルで、AI・データ分析の定番。ぐりさんが学習中の言語ですね。</li>
<li><span class="kw">Java</span>：業務システムで広く使われる。特定の機種に依存しにくい。</li>
<li><span class="kw">JavaScript</span>：<b>ウェブブラウザ上で動く</b>言語。ウェブページに動きをつける。Javaとは別物という点が頻出。</li>
<li><span class="kw">C言語</span>：ハードウェアに近い制御が得意。組込みシステムやOSの開発で使われる。</li>
</ul>
<p>一方、<span class="kw">HTML</span>（HyperText Markup Language）は「プログラミング言語」ではなく<span class="kw">マークアップ言語</span>です。文書の構造（見出し、段落、リンク）をタグで指定するもので、計算や条件分岐はしません。ウェブページの見た目を整えるのは<span class="kw">CSS</span>（Cascading Style Sheets）の役割です。データ記述の形式としては、タグで構造を表す<span class="kw">XML</span>（eXtensible Markup Language）や、軽量で読みやすい<span class="kw">JSON</span>（JavaScript Object Notation：ジェイソン）も覚えておきましょう。</p>
<div class="why"><div class="why-t">なぜ？ ── 試験は「擬似言語」で出題されるのか</div>
ITパスポートのプログラミング問題は、特定の言語ではなく<b>擬似言語</b>（日本語まじりの架空の言語）で出題されます。PythonやJavaの文法知識の有無で差がつかないよう、<b>「手順を読んで論理を追う力」だけを測る</b>ためです。つまり対策は文法暗記ではなく、変数の値を1行ずつ追いかける「トレース」の練習。Pythonで書いたじゃんけんプログラムの変数の動きを頭の中で追えたなら、その力がそのまま通用します。</div>

<h3 class="sec">まとめ</h3>
<ul>
<li>制御の3構造：<b>順次・選択・繰返し</b>。フローチャートの<b>ひし形＝条件分岐</b>。</li>
<li><span class="kw">二分探索</span>＝範囲を半分ずつに絞る（高速だが<b>整列済みが前提</b>）。線形探索＝順に調べる。</li>
<li><span class="kw">JavaScript</span>はブラウザで動く言語でJavaとは別物。<span class="kw">HTML</span>はマークアップ言語であってプログラミング言語ではない。</li>
<li>擬似言語問題は文法ではなく<b>トレース力</b>の勝負。</li>
</ul>

  u13: `
<p>この単元はコンピュータの「体のつくり」です。インフラ系エンジニアを目指すぐりさんにとって、サーバのスペック表（CPU・メモリ・ストレージ）を読めることは日常スキルになります。部品の名前と役割を、たとえ話で体に入れましょう。</p>

<h3 class="sec">1. コンピュータの五大装置</h3>
<p>コンピュータの構成要素は伝統的に5つに整理されます。<b>入力装置</b>（キーボード、マウス）、<b>出力装置</b>（ディスプレイ、プリンタ）、<b>記憶装置</b>（メモリ、ディスク）、そして計算を行う<b>演算装置</b>と全体に指示を出す<b>制御装置</b>。演算と制御を担う中心部品が<span class="kw">CPU</span>（Central Processing Unit：中央処理装置）です。</p>
<p>CPUの性能を左右する指標として、動作のテンポを刻む<span class="kw">クロック周波数</span>（GHz、高いほど1秒間の処理ステップが多い）と、頭脳の個数である<span class="kw">コア数</span>（マルチコア＝複数の処理を同時にこなせる）を押さえてください。また、3Dグラフィックスなどの<b>描画処理に特化した</b>プロセッサが<span class="kw">GPU</span>（Graphics Processing Unit）です。大量の単純計算を並列にこなすのが得意なため、近年は<b>AIの学習（ディープラーニング）の計算</b>にも広く使われています（令和7年度に出題）。</p>

<h3 class="sec">2. 記憶の階層 ── 速いほど高くて小さい</h3>
<table class="tbl">
<tr><th>装置</th><th>役割</th><th>特徴</th></tr>
<tr><td><span class="kw">レジスタ</span></td><td>CPU内部の超高速な作業領域</td><td>最速・極小</td></tr>
<tr><td><span class="kw">キャッシュメモリ</span></td><td>CPUと主記憶の<b>速度差を埋める</b>ための高速メモリ</td><td>高速・小容量</td></tr>
<tr><td><span class="kw">主記憶（メインメモリ）</span></td><td>実行中のプログラムとデータを置く作業机</td><td><b>電源を切ると消える（揮発性）</b></td></tr>
<tr><td><span class="kw">補助記憶</span>（SSD・HDD）</td><td>プログラムやファイルの保管庫</td><td>大容量、<b>電源を切っても消えない</b></td></tr>
</table>
<div class="why"><div class="why-t">なぜ？ ── 記憶装置は1種類ではなく「階層」になっているのか</div>
理想は「超高速で超大容量で安いメモリ」ですが、物理的に<b>速さと容量と価格は両立しません</b>。速いメモリは桁違いに高価なのです。そこで、よく使うデータだけを少量の高速メモリ（キャッシュ）に置き、残りは安くて大きい装置に置く——「机の上に今使う本だけ、本棚にその他、倉庫に滅多に使わない物」という配置で、<b>全体として速くて大きい記憶があるかのように見せる</b>のが階層構造の知恵です。「キャッシュメモリの目的＝CPUと主記憶の速度差を埋める」は最頻出の論点です。</div>
<p>補助記憶では、円盤を回す磁気ディスクの<span class="kw">HDD</span>（Hard Disk Drive）と、半導体メモリの<span class="kw">SSD</span>（Solid State Drive）の対比が問われます。SSDは可動部品がないため<b>高速・静音・衝撃に強い</b>のが利点。なおUSBメモリやSDカードも半導体（フラッシュメモリ）の仲間です。</p>

<h3 class="sec">3. ソフトウェア ── OSは「裏方の総監督」</h3>
<p>ソフトウェアは、コンピュータ全体を管理する<span class="kw">OS</span>（Operating System＝基本ソフトウェア：Windows、macOS、Linux、Android、iOS）と、特定の目的のための<span class="kw">アプリケーションソフトウェア</span>（Word、ブラウザなど）に大別されます。OSの仕事は、ハードウェアの管理（メモリの割り当て、周辺機器の制御）、ファイル管理、複数アプリの同時実行の調整（マルチタスク）、利用者の管理などです。</p>
<div class="why"><div class="why-t">なぜ？ ── OSという「仲介役」が必要なのか</div>
もしOSがなければ、アプリの開発者は「このメーカーのこのプリンタに印刷する命令」「このメーカーのメモリの管理」を機種ごとに全部自分で書かねばなりません。OSがハードウェアの違いを吸収して共通の窓口を提供してくれるおかげで、<b>アプリは1回作れば同じOSのどのパソコンでも動く</b>のです。新しい周辺機器をつなぐときに入れる<b>デバイスドライバ</b>は、OSとその機器の間の「通訳」にあたります。</div>
<p>ファイル管理では、フォルダ（ディレクトリ）の階層構造と、ファイルの場所の表し方——根元からの道順をすべて書く<span class="kw">絶対パス</span>と、現在地から見た道順で書く<span class="kw">相対パス</span>——を押さえましょう。住所の「東京都新宿区…」が絶対パス、「ここから2軒隣」が相対パスのイメージです。また、障害や誤操作に備えてデータの複製を取っておく<span class="kw">バックアップ</span>は、補助記憶の故障は「いつか必ず起きる」前提で運用する、という考え方ごと覚えてください。</p>

<h3 class="sec">4. システム構成と信頼性 ── 止まらない仕組みの作り方</h3>
<p>サーバの世界では「故障しても止まらない」工夫が重視されます。令和の本試験で繰り返し出ている論点をまとめます。</p>
<ul>
<li><span class="kw">仮想化（仮想サーバ）</span>：1台の物理サーバの上で、複数の仮想的なサーバを動かす技術。サーバの台数を集約でき、資源の利用効率が上がる（令和4年度に出題）。クラウド（IaaS）の土台でもあります。</li>
<li><span class="kw">RAID</span>（Redundant Arrays of Independent Disks）：複数のハードディスクを組み合わせて、速度や<b>耐障害性</b>を高める技術。同じ内容を2台に書き込むミラーリング（RAID1）では、利用できる容量は半分になる代わりに、1台壊れてもデータが残ります（令和5年度に容量計算が出題）。</li>
<li><span class="kw">稼働率</span>：システムが正常に動いている時間の割合。<b>MTBF（平均故障間隔）÷（MTBF＋MTTR（平均修復時間））</b>で計算します（マネジメント攻略ノート第3章①とつながる論点）。</li>
<li><span class="kw">フールプルーフ</span>：人間は<b>誤操作するもの</b>という前提で、間違った操作をできなくする設計（例：電子レンジは扉を閉めないと動かない、確認ダイアログ）。令和5年度に出題。</li>
<li><span class="kw">フェールセーフ</span>：故障したときに<b>安全側</b>に倒れる設計（例：故障した信号機は赤のまま止まる、石油ストーブは転倒すると消火）。</li>
</ul>
<div class="why"><div class="why-t">なぜ？ ── 「人間が悪い」ではなく「設計が悪い」と考えるのか</div>
フールプルーフの思想は、ヒューマンエラー研究の結論そのものです。注意や訓練でミスを減らすには限界があり、疲労や慌てで誰でも間違える。ならば<b>間違えても事故にならない構造を作るほうが確実</b>です（認知心理学でいうエラーの設計的予防）。フェールセーフも同じ発想を機械側に適用したもので、「故障をなくす」のではなく「故障しても被害を出さない」を目指します。完璧な人間も完璧な機械も存在しない、という前提から出発する——セキュリティの多層防御にも通じる、エンジニアリングの基本哲学です。</div>

<h3 class="sec">5. 知っておきたいソフトウェアの頻出小ネタ</h3>
<ul>
<li><span class="kw">OSS</span>（Open Source Software：オープンソースソフトウェア）：ソースコードが公開され、ライセンスの条件下で<b>誰でも利用・改変・再配布できる</b>ソフトウェア。LinuxやAndroidの基盤が代表例。「無料だが、サポートや品質の保証は基本的にない」「商用利用も可能」という性質が問われます（令和5・7年度に出題）。</li>
<li><span class="kw">仮想記憶</span>：主記憶（メモリ）が足りないとき、補助記憶の一部をメモリの延長として使うOSの仕組み（令和7年度に出題）。</li>
<li>表計算ソフトの<span class="kw">相対参照と絶対参照</span>：数式をコピーすると参照先が自動でずれるのが相対参照（A1）、$をつけて固定するのが絶対参照（$A$1）。「コピーしたら計算が崩れた」を防ぐ知識で、計算問題の定番です。</li>
<li><span class="kw">情報デザインの4原則</span>：近接（関係するものは近くに）・整列（揃える）・反復（同じルールを繰り返す）・対比（重要なものを目立たせる）。資料やUIを見やすくする原則として令和7年度に出題されました。</li>
</ul>

<h3 class="sec">まとめ</h3>
<ul>
<li>CPUの性能＝<span class="kw">クロック周波数</span>×<span class="kw">コア数</span>の掛け算で考える。</li>
<li>記憶は階層：<b>レジスタ→キャッシュ→主記憶（揮発性）→補助記憶（不揮発性）</b>。キャッシュの目的は<b>速度差を埋める</b>こと。</li>
<li><span class="kw">SSD</span>＝高速・衝撃に強い（可動部なし）、<span class="kw">HDD</span>＝安価・大容量。</li>
<li><span class="kw">OS</span>＝ハードの違いを吸収する総監督。機器の通訳が<b>デバイスドライバ</b>。パスは<b>絶対／相対</b>の2通り。</li>
</ul>

  u21: `
<p>ここからはインフラエンジニアの本丸、ネットワークです。以前ネットワーク基礎のクイズアプリで学んだ内容とも重なるはず。この単元では「データはどうやって相手に届くのか」という根本の仕組みを固めます。</p>

<h3 class="sec">1. LANとWAN ── 近くの網と遠くの網</h3>
<p>建物やフロア内などの限られた範囲のネットワークが<span class="kw">LAN</span>（Local Area Network）、電気通信事業者の回線を使って離れた拠点同士を結ぶ広域のネットワークが<span class="kw">WAN</span>（Wide Area Network）です。家の中のWi-Fiや会社のフロア内がLAN、東京本社と大阪支社を結ぶのがWAN、と覚えましょう。LANへの接続には、ケーブルでつなぐ有線LAN（イーサネット）と、電波でつなぐ<span class="kw">無線LAN</span>（Wi-Fi）があります。</p>

<h3 class="sec">2. プロトコル ── 通信の「共通の約束事」</h3>
<p><span class="kw">プロトコル</span>とは、機器同士が通信するための約束事（手順や形式の取り決め）です。インターネットの標準は<span class="kw">TCP/IP</span>（Transmission Control Protocol／Internet Protocol）というプロトコルの集まりで、メーカーもOSも違う機器同士が会話できるのは、全員がこの共通の約束に従っているからです。</p>
<div class="why"><div class="why-t">なぜ？ ── 「約束事」をそこまで重視するのか</div>
通信は、相手がいて初めて成立します。手紙が届くのは「宛名は表に、郵便番号はここに書く」という全員共通のルールがあるからで、書式が人それぞれなら配達できません。ネットワークも同じで、<b>データの包み方・宛先の書き方・受け取り確認の方法</b>がそろって初めて、世界中の機器がつながります。ストラテジ系で学んだ「標準化が互換性を生む」（デファクト／デジュレ標準）の、最も成功した実例がTCP/IPです。</div>

<h3 class="sec">3. 住所のしくみ ── IPアドレスとMACアドレス</h3>
<p>ネットワーク上の機器の住所が<span class="kw">IPアドレス</span>です。ネットワークに参加するときに割り当てられる「論理的な住所」で、接続する場所が変われば変わります。一方、<span class="kw">MACアドレス</span>（Media Access Control）はネットワーク機器に製造時に焼き込まれた「物理的な個体番号」で、原則として一生変わりません。「引っ越しで変わる住所＝IPアドレス、生涯変わらない製造番号＝MACアドレス」という対比で覚えてください。</p>
<p>機器がLANに参加するとき、IPアドレスを自動で割り当ててくれる仕組みが<span class="kw">DHCP</span>（Dynamic Host Configuration Protocol）です。スマホがWi-Fiにつないだ瞬間に通信できるのは、DHCPが裏で住所を配ってくれているからです。</p>
<p>IPアドレスには2つの世代があります。従来の<span class="kw">IPv4</span>は32ビットで約43億個——世界人口にすら足りず、枯渇が問題になりました。そこで作られた<span class="kw">IPv6</span>は<b>128ビット</b>で、事実上無限のアドレスを供給できます（「IPアドレスが128ビットのプロトコル＝IPv6」は令和4年度に出題）。また、IPアドレスのうち「どこまでがネットワークの住所（ネットワーク部）で、どこからが個々の機器の番号（ホスト部）か」の区切りを示すのが<span class="kw">サブネットマスク</span>です（令和5年度に出題）。郵便でいう「市区町村まで」と「番地」の境界線にあたります。</p>

<h3 class="sec">4. パケット交換 ── データは小包で旅をする</h3>
<p>インターネットでは、データを<span class="kw">パケット</span>という小さな単位に分割し、それぞれに宛先をつけて送り出します。パケットは網の目状の経路を運ばれ、受信側で元の順番に組み立て直されます。</p>
<div class="why"><div class="why-t">なぜ？ ── 1本の回線を占有せず、わざわざ分割して送るのか</div>
電話のように2人で回線を占有する方式（回線交換）は、通話中ずっと回線を独り占めするため、無言の時間も帯域がムダになります。パケット交換なら、<b>1本の回線にいろいろな人のパケットを相乗りさせられる</b>ので、回線の利用効率が劇的に上がります。さらに、経路の途中が故障してもパケットは別ルートで迂回できるため、<b>障害に強い</b>。インターネットの祖先が「一部が破壊されても全体は生き残る通信網」を目指して設計されたという経緯が、この方式に刻まれています。</div>

<h3 class="sec">5. ネットワークをつなぐ機器</h3>
<table class="tbl">
<tr><th>機器</th><th>役割</th></tr>
<tr><td><span class="kw">ルータ</span></td><td><b>異なるネットワーク同士を中継</b>し、パケットの最適な経路を選ぶ（経路選択＝ルーティング）。家庭の「Wi-Fiルーター」は家のLANとインターネットの橋渡し役。</td></tr>
<tr><td><span class="kw">ハブ・スイッチ</span></td><td>LANの<b>内部</b>で複数の機器をつなぐ集線装置。</td></tr>
<tr><td><span class="kw">アクセスポイント</span></td><td>無線LANの機器を有線ネットワークにつなぐ基地局。</td></tr>
<tr><td><span class="kw">デフォルトゲートウェイ</span></td><td>LANの外（インターネット側）への「出口」となる機器。通常はルータがその役を担う。</td></tr>
</table>
<p>通信の速さは<span class="kw">bps</span>（1秒あたりに送れるビット数）で表します。「100Mbps」なら1秒に1億ビット。実際の転送時間の計算では、<b>バイトをビットに直す（×8）</b>のを忘れないことが急所です。</p>

<h3 class="sec">まとめ</h3>
<ul>
<li><span class="kw">LAN</span>＝構内、<span class="kw">WAN</span>＝拠点間の広域網。</li>
<li><span class="kw">プロトコル</span>＝通信の共通の約束事。インターネットの標準は<span class="kw">TCP/IP</span>。</li>
<li><span class="kw">IPアドレス</span>＝変わり得る論理住所（<span class="kw">DHCP</span>が自動配布）、<span class="kw">MACアドレス</span>＝変わらない物理番号。</li>
<li><span class="kw">パケット交換</span>＝回線の相乗りで効率的、迂回できて障害に強い。</li>
<li><span class="kw">ルータ</span>＝ネットワーク間の中継と経路選択。速度の単位は<span class="kw">bps</span>（バイト→ビットは×8）。</li>
</ul>
`,
  u22: `
<p>前の単元で「データの届け方」を学んだので、今度はインターネット上の各サービス——ウェブ閲覧、メール——が裏で何をしているかを見ていきます。URLを打ってからページが表示されるまでの数秒に、この単元の用語が総出演します。</p>

<h3 class="sec">1. DNS ── 名前と住所の電話帳</h3>
<p>人間は「www.example.co.jp」のような<span class="kw">ドメイン名</span>でサイトを覚えますが、機械の世界の住所は数字のIPアドレスです。この<b>名前⇔IPアドレスの変換</b>を担う仕組みが<span class="kw">DNS</span>（Domain Name System）です。ブラウザにURLを入力すると、まずDNSへの問い合わせ（名前解決）が行われ、返ってきたIPアドレス宛てに通信が始まります。</p>
<div class="why"><div class="why-t">なぜ？ ── 名前と住所の二本立てになっているのか</div>
数字の羅列は人間が覚えられず、覚えやすい名前は機械の経路選択に向かない——両者の得意が違うからです。さらに二本立てには実用上の利点があります。サーバを引っ越してIPアドレスが変わっても、<b>DNSの対応表を書き換えれば利用者は同じ名前でアクセスし続けられる</b>のです。電話帳（DNS）があるから、友人の電話番号（IP）が変わっても「名前で探せば」つながる、という関係です。「DNS＝ドメイン名とIPアドレスの対応づけ」は、テクノロジ系で最も出題されてきた論点の1つです。</div>

<h3 class="sec">2. ウェブの仕組み ── URLとHTTP</h3>
<p>ウェブページの取得に使うプロトコルが<span class="kw">HTTP</span>（HyperText Transfer Protocol）、それを暗号化したものが<span class="kw">HTTPS</span>（末尾のS＝Secure）です（鍵マークの正体。暗号化の中身は第3章で学びます）。<span class="kw">URL</span>（Uniform Resource Locator）は「どのプロトコルで・どのサーバの・どのファイルへ」を表す住所表記です。ブラウザがHTMLを受け取り、画面に描画する——ここで第1章のHTML（マークアップ言語）がつながります。なお、サーバ側の入口の番号として<span class="kw">ポート番号</span>という概念があり、同じサーバでもウェブ（80番/443番）とメールで窓口を分けています。マンションの「部屋番号」のイメージです。</p>

<h3 class="sec">3. 電子メールの仕組み ── 送るときと受け取るとき</h3>
<table class="tbl">
<tr><th>プロトコル</th><th>役割</th></tr>
<tr><td><span class="kw">SMTP</span>（Simple Mail Transfer Protocol）</td><td>メールの<b>送信</b>・メールサーバ間の転送</td></tr>
<tr><td><span class="kw">POP</span>（Post Office Protocol）</td><td>メールを端末に<b>ダウンロードして</b>受信（基本的にサーバから取り込む）</td></tr>
<tr><td><span class="kw">IMAP</span>（Internet Message Access Protocol）</td><td>メールを<b>サーバに置いたまま</b>閲覧・管理</td></tr>
</table>
<div class="why"><div class="why-t">なぜ？ ── 受信方式が2つ（POPとIMAP）あるのか</div>
昔は1人1台のPCでメールを読むのが普通で、端末に取り込んで管理するPOPで十分でした。ところがPC・スマホ・タブレットと<b>複数端末で同じメールを読む時代</b>になると、POPでは「PCで読んだメールがスマホにない」という分断が起きます。サーバに本体を置いたまま、どの端末からも同じ状態を見るIMAPは、この問題への解答です。GmailをスマホでもPCでも同じように読めるのはIMAP型の仕組みだから。「<b>取り込むPOP、置いたままIMAP</b>」で覚えましょう。</div>
<p>メールの宛先では、<span class="kw">CC</span>（Carbon Copy：宛先全員にアドレスが見える写し）と<span class="kw">BCC</span>（Blind Carbon Copy：<b>他の受信者にアドレスが見えない</b>写し）の違いが頻出です。一斉送信でBCCを使うべき場面でCCを使い、全員のアドレスが流出する——という事故は、個人情報保護（ストラテジ系）ともつながる定番論点です。</p>
<p>そのほかのサービスも一言ずつ。<span class="kw">FTP</span>（File Transfer Protocol）＝サーバとの間でファイルを転送するプロトコル（令和7年度に出題）。<span class="kw">VoIP</span>（Voice over Internet Protocol）＝インターネット上で音声通話を実現する技術で、LINE通話やIP電話の正体（令和5年度に出題）。<span class="kw">RSS</span>＝ウェブサイトの更新情報を配信するための仕組み（令和7年度に出題）。</p>

<h3 class="sec">4. モバイルとIoTの通信</h3>
<ul>
<li><span class="kw">5G</span>：高速大容量・低遅延・多数同時接続が特徴の移動通信規格。</li>
<li><span class="kw">LPWA</span>：低消費電力で広域をカバーする、IoT向けの無線通信。速度は遅いが電池が長持ちし、センサーを何年も置きっぱなしにできる。</li>
<li><span class="kw">Bluetooth</span>：数メートル程度の近距離無線。イヤホンやマウスでおなじみ。</li>
<li><span class="kw">BLE</span>（Bluetooth Low Energy）：Bluetoothに追加された<b>省電力</b>仕様。ボタン電池で長期間動くため、IoTセンサーや忘れ物タグに使われる（令和4・7年度と繰り返し出題）。</li>
<li><span class="kw">テザリング</span>：スマホをルータ代わりにして、PCなどをインターネットへつなぐ機能。</li>
</ul>
<p>用途によって「速さ」「距離」「消費電力」のどれを優先するかが違うため、規格が使い分けられている——という視点で整理すると、初見の規格にも対応できます。</p>

<h3 class="sec">まとめ</h3>
<ul>
<li><span class="kw">DNS</span>＝ドメイン名とIPアドレスの変換（名前解決）。最頻出。</li>
<li>ウェブは<span class="kw">HTTP／HTTPS</span>、入口の番号が<span class="kw">ポート番号</span>。</li>
<li>メールは<b>送信SMTP／取り込むPOP／置いたままIMAP</b>。<span class="kw">BCC</span>は他の受信者にアドレスが見えない。</li>
<li>IoT向けの<span class="kw">LPWA</span>＝低速だが省電力・広域。用途で規格を使い分ける。</li>
</ul>
`,
  u23: `
<p>企業のデータの心臓部、データベースです。Excelの表と何が違うのか？——この問いに答えられるようになるのが本単元のゴール。ストラテジ系で学んだPOSデータやビッグデータも、足元ではここで学ぶ仕組みが支えています。</p>

<h3 class="sec">1. 関係データベース ── 表で持ち、表をつなぐ</h3>
<p>現在主流の<span class="kw">関係データベース</span>は、データを<b>表（テーブル）</b>の形で管理します。表の横1行が1件のデータ（行・レコード）、縦の項目が列（フィールド）です。そして表の中で<b>行を一意に特定できる列</b>を<span class="kw">主キー</span>と呼びます（学籍番号、社員番号など。重複や空欄は許されません）。他の表の主キーを参照する列が<span class="kw">外部キー</span>で、これにより表と表がつながります。</p>
<div class="ex"><div class="ex-t">具体例</div>通販サイトなら「顧客表（主キー：顧客ID）」と「注文表（主キー：注文ID、外部キー：顧客ID）」に分かれ、注文表の顧客IDをたどれば誰の注文かが分かる——この「表を分けて、キーでつなぐ」が関係データベースの基本形です。</div>
<p>データの管理を担うソフトウェアが<span class="kw">DBMS</span>（DataBase Management System：データベース管理システム）で、データの検索や操作には<span class="kw">SQL</span>（Structured Query Language）という言語を使います（検索はSELECT文）。</p>

<h3 class="sec">2. 正規化 ── なぜ表を分けるのか</h3>
<p>1枚の大きな表にすべてを詰め込まず、重複がないよう表を分割・整理することを<span class="kw">正規化</span>といいます。</p>
<div class="why"><div class="why-t">なぜ？ ── Excelのように1枚の表にまとめてはいけないのか</div>
注文のたびに顧客の住所も一緒に記録する「全部入りの表」を想像してください。同じ顧客が10回注文すると、住所が10か所に重複して書かれます。この顧客が引っ越したら？　<b>10か所すべてを直さないと、古い住所と新しい住所が混在する</b>（更新漏れによる矛盾）。正規化して「顧客表」に住所を1か所だけ持てば、修正は1回で済み、矛盾は構造的に起きません。つまり正規化の目的は<b>「重複をなくし、データの矛盾（不整合）を防ぐ」</b>こと。試験でこの目的を問う問題は確実に取りましょう。</div>

<h3 class="sec">3. トランザクション ── 「途中まで」を許さない</h3>
<p>銀行振込は「Aの口座から1万円引く」「Bの口座に1万円足す」という2つの処理の組です。この<b>分割できないひとまとまりの処理</b>を<span class="kw">トランザクション</span>と呼びます。すべて成功したら確定（<span class="kw">コミット</span>）、途中で失敗したら全部を取り消して元に戻す（<span class="kw">ロールバック</span>）——「全部やる」か「全部やらない」かの二択にすることで、「引いたのに足されていない」という最悪の中途半端を防ぎます。</p>
<p>トランザクションが満たすべき性質はまとめて<span class="kw">ACID特性</span>と呼ばれます（原子性＝全部か無か、一貫性、独立性、耐久性。令和4年度に出題）。あわせて、検索を高速化するためにDBMSが使う索引＝<span class="kw">インデックス</span>（本の索引と同じ仕組み。令和7年度に出題）、複数の表をキーで突き合わせて1つにまとめる操作＝<span class="kw">結合</span>、データベースの複製を別サーバに同期しておく<span class="kw">レプリケーション</span>も頻出語です。</p>
<p>また、複数の人が同時に同じデータを更新すると矛盾が起きるため、処理中のデータに鍵をかけて他の更新を待たせる<span class="kw">排他制御</span>（ロック）が行われます。</p>
<div class="why"><div class="why-t">なぜ？ ── 排他制御がないと、何が起きるのか</div>
在庫が1個の商品を、2人が同時に「在庫を読む→1個減らして書き込む」としたとします。2人とも「在庫1」を読んでしまうと、両方が「0」を書き込んで<b>2人に売れたのに在庫はマイナスにならない</b>——売り越し事故の完成です。片方の処理中はもう片方を待たせる（ロックする）ことで、読み→書きの間に割り込ませない。コンサートチケットの座席を選んだ瞬間に「仮押さえ」されるのは、まさにこの仕組みが見えている瞬間です。</div>

<h3 class="sec">4. バックアップと復旧</h3>
<p>データベースは企業の生命線なので、定期的な<span class="kw">バックアップ</span>が欠かせません。すべてを毎回複製する<b>フルバックアップ</b>と、前回からの変更分だけを取る<b>差分・増分バックアップ</b>を組み合わせ、障害時にはバックアップと更新記録（ログ）からデータを復旧します。「バックアップは本体と別の場所に保管する」（同じディスクに置いたら共倒れ）という運用の常識も問われます。</p>

<h3 class="sec">まとめ</h3>
<ul>
<li>関係データベース＝表で管理。行を一意に特定する<span class="kw">主キー</span>、表をつなぐ<span class="kw">外部キー</span>。操作言語は<span class="kw">SQL</span>。</li>
<li><span class="kw">正規化</span>の目的＝<b>重複の排除と矛盾の防止</b>。</li>
<li><span class="kw">トランザクション</span>＝全部やるか全部やらないか。確定＝<span class="kw">コミット</span>、取消し＝<span class="kw">ロールバック</span>。</li>
<li>同時更新の事故は<span class="kw">排他制御</span>（ロック）で防ぐ。バックアップは別の場所に。</li>
</ul>
`,
  u31: `
<p>セキュリティはITパスポートで<b>最も出題数が多い分野</b>です（テクノロジ系の柱であり、ストラテジ系の法律やマネジメント系のリスク管理とも絡みます）。まず敵を知ることから——脅威の全体像をつかみましょう。心理学の知識が直接武器になる「人を狙う攻撃」も登場します。</p>

<h3 class="sec">1. セキュリティの三大要素 ── CIA</h3>
<p>情報セキュリティとは、情報資産の<b>機密性・完全性・可用性</b>（頭文字でCIA）を維持することと定義されます。</p>
<table class="tbl">
<tr><th>要素</th><th>意味</th><th>破られた例</th></tr>
<tr><td><span class="kw">機密性</span>（Confidentiality）</td><td>許可された人だけがアクセスできる</td><td>顧客情報の漏えい</td></tr>
<tr><td><span class="kw">完全性</span>（Integrity）</td><td>情報が正確で、改ざんされていない</td><td>ウェブサイトの改ざん</td></tr>
<tr><td><span class="kw">可用性</span>（Availability）</td><td>使いたいときに使える</td><td>サーバダウンでサービス停止</td></tr>
</table>
<div class="why"><div class="why-t">なぜ？ ── 「漏らさない」だけでは足りないのか</div>
セキュリティ＝秘密を守ること、と思いがちですが、それは機密性の一面だけです。データが書き換えられたら（完全性の喪失）、漏れていなくても信頼できません。システムが止まったら（可用性の喪失）、安全でも役に立ちません。3要素は<b>トレードオフ</b>の関係にもあります。たとえばパスワードを何重にも要求すれば機密性は上がりますが、使いにくくなって可用性が下がる。「どれか1つを最大化」ではなく「3つのバランスを業務に合わせて設計する」のがセキュリティの考え方です。試験では事例文がCIAのどれの侵害かを判定させる問題が頻出です。</div>

<h3 class="sec">2. マルウェア ── 悪意あるソフトウェアの図鑑</h3>
<table class="tbl">
<tr><th>種類</th><th>特徴</th></tr>
<tr><td><span class="kw">ウイルス</span></td><td>他のファイルに寄生して感染を広げる。</td></tr>
<tr><td><span class="kw">ワーム</span></td><td>寄生先を必要とせず、<b>自力でネットワークを介して増殖</b>する。</td></tr>
<tr><td><span class="kw">トロイの木馬</span></td><td>便利なソフトを装って侵入し、裏で悪事を働く（自己増殖はしない）。</td></tr>
<tr><td><span class="kw">ランサムウェア</span></td><td>データを勝手に暗号化し、<b>復元と引き換えに身代金を要求</b>する。近年の企業被害の主役。</td></tr>
<tr><td><span class="kw">スパイウェア</span></td><td>利用者の情報をこっそり収集して外部へ送る。キー入力を盗むキーロガーも仲間。</td></tr>
<tr><td><span class="kw">ボット</span></td><td>感染PCを攻撃者が遠隔操作できるようにする。乗っ取られたPC群（ボットネット）は攻撃の踏み台にされる。</td></tr>
</table>

<h3 class="sec">3. 攻撃の手口 ── 技術を突く攻撃</h3>
<ul>
<li><span class="kw">フィッシング</span>：本物そっくりの偽サイトやメールでID・パスワードを入力させる詐欺。</li>
<li><span class="kw">標的型攻撃</span>：<b>特定の組織を狙い</b>、業務を装った巧妙なメールなどで侵入する攻撃。無差別ではない点が特徴。</li>
<li><span class="kw">DoS攻撃／DDoS攻撃</span>（Denial of Service／Distributed DoS）：大量のアクセスを送りつけてサービスを<b>停止に追い込む</b>（可用性への攻撃）。DDoSは多数の踏み台から一斉に行う。</li>
<li><span class="kw">SQLインジェクション</span>：入力欄に不正な命令文を注入し、<b>データベースを不正操作</b>する。</li>
<li><span class="kw">クロスサイトスクリプティング</span>：脆弱なサイトに悪意あるスクリプトを仕込み、閲覧者のブラウザで実行させる。</li>
<li><span class="kw">ブルートフォース攻撃</span>：パスワードを総当たりで試す。</li>
<li><span class="kw">ゼロデイ攻撃</span>：脆弱性の<b>修正プログラムが提供される前</b>を狙う攻撃。</li>
</ul>

<h3 class="sec">4. 人を狙う攻撃 ── ソーシャルエンジニアリング</h3>
<p>技術を使わず、<b>人間の心理や行動の隙</b>を突いて情報を盗む手口を<span class="kw">ソーシャルエンジニアリング</span>といいます。肩越しに画面をのぞき見る（ショルダーハッキング）、ゴミ箱から書類を漁る（トラッシング）、上司や情報システム部門を装って電話でパスワードを聞き出す、緊急事態を装って判断を急がせる——などが典型です。</p>
<div class="why"><div class="why-t">なぜ？ ── 攻撃者は高度な技術より「人」を狙うのか</div>
暗号を数学的に破るには膨大なコストがかかりますが、<b>人をだましてパスワードを聞き出せれば一瞬</b>だからです。人間には、権威に従いやすい、緊急時に判断が雑になる、親切にされると返したくなる（返報性）といった心理的傾向があり、攻撃者はこれを体系的に悪用します。ぐりさんが学んできた社会心理学の知見は、そのまま攻撃と防御の教科書なのです。だからこそ対策も技術だけでは完結せず、教育・訓練・手順（電話でパスワードを聞かれても絶対に答えない、急かされたら一度立ち止まる）が不可欠になります。</div>
<div class="pt"><div class="pt-t">試験のポイント</div>事例から攻撃名を選ぶ問題が中心。「修正プログラム提供前を狙う＝<b>ゼロデイ</b>」「身代金要求＝<b>ランサムウェア</b>」「特定組織狙いの巧妙メール＝<b>標的型</b>」「のぞき見・なりすまし電話＝<b>ソーシャルエンジニアリング</b>」を反射で答えられるように。</div>

<h3 class="sec">まとめ</h3>
<ul>
<li>セキュリティの定義＝<span class="kw">機密性・完全性・可用性</span>（CIA）の維持。事例がどれの侵害かを判定できるように。</li>
<li>マルウェアの区別：寄生する<span class="kw">ウイルス</span>／自力増殖の<span class="kw">ワーム</span>／偽装侵入の<span class="kw">トロイの木馬</span>／身代金の<span class="kw">ランサムウェア</span>。</li>
<li>攻撃は「技術の隙」（SQLインジェクション、ゼロデイ等）と「人の隙」（<span class="kw">ソーシャルエンジニアリング</span>）の両面から来る。</li>
</ul>
`,
  u32: `
<p>ネットショッピングでカード番号を入力できるのも、鍵マークを信じられるのも、すべてこの単元の技術のおかげです。暗号は「難しそう」の代表格ですが、<b>鍵の渡し方の問題</b>という1本の物語で読むと、驚くほどすっきり理解できます。</p>

<h3 class="sec">1. 共通鍵暗号 ── 速いが、鍵を渡せない</h3>
<p><span class="kw">共通鍵暗号方式</span>は、暗号化と復号に<b>同じ鍵</b>を使う方式です。処理が高速という利点がありますが、致命的な弱点があります。<b>その鍵を相手にどうやって安全に渡すのか？</b>　鍵をメールで送れば盗聴されるかもしれず、暗号化して送ろうにもその鍵がまた必要……という堂々巡り（鍵配送問題）です。さらに、通信相手が増えるごとに相手別の鍵が必要になり、鍵の管理数が爆発します。</p>

<h3 class="sec">2. 公開鍵暗号 ── 「南京錠」の発明</h3>
<p><span class="kw">公開鍵暗号方式</span>は、<b>対になる2つの鍵</b>（公開鍵と秘密鍵）を使います。公開鍵で暗号化したものは、対になる秘密鍵でしか復号できません。</p>
<div class="why"><div class="why-t">なぜ？ ── 鍵を「公開」してしまって安全なのか</div>
公開鍵は<b>「開いた南京錠」</b>だと考えてください。私は開いた南京錠を世界中に配ります（公開鍵の公開）。あなたは荷物を箱に入れ、その南京錠をパチンと閉めて送る（公開鍵で暗号化）。<b>南京錠は誰でも閉められますが、開けられるのは鍵（秘密鍵）を持つ私だけ</b>。閉める道具と開ける道具が別だから、閉める道具は公開してよいのです。これで鍵配送問題は解決しますが、公開鍵暗号は計算が複雑で<b>処理が遅い</b>という弱点があります。そこで実際の通信（HTTPSの<span class="kw">TLS</span>＝Transport Layer Security など）では、<b>最初だけ公開鍵暗号で「共通鍵」を安全に受け渡し、以降の大量データは高速な共通鍵暗号で</b>やり取りする合わせ技（ハイブリッド方式）が使われます。2方式は競合ではなく分業の関係——ここまで理解すると応用問題も解けます。</div>

<h3 class="sec">3. デジタル署名 ── 「本人が書いた・改ざんなし」の証明</h3>
<p>公開鍵のペアは、逆向きに使うと「証明」の道具になります。<b>秘密鍵で署名（暗号化）したものは、対になる公開鍵でしか検証（復号）できない</b>——秘密鍵は本人しか持っていないので、検証に成功すれば「本人が作成した」ことの証拠になります。これが<span class="kw">デジタル署名</span>で、文書の<b>なりすまし防止（本人性）と改ざん検知（完全性）</b>を同時に実現します。改ざん検知には、データから固定長の要約値を作る<span class="kw">ハッシュ関数</span>が使われます（内容が1文字でも変わるとハッシュ値が大きく変わるため、値を比べれば改ざんが分かる）。</p>
<p>ただし、まだ穴があります。「この公開鍵は本当に本人のものか？」——攻撃者が他人になりすまして偽の公開鍵を配っていたら、すべてが崩れます。そこで、信頼できる第三者機関（<span class="kw">認証局：CA</span>＝Certification Authority）が「この公開鍵は確かにこの人・この会社のものです」と<span class="kw">電子証明書</span>を発行して保証します。この信頼の仕組み全体を<span class="kw">PKI</span>（Public Key Infrastructure：公開鍵基盤）と呼びます。ブラウザの鍵マークの裏では、サーバ証明書の検証が毎回行われているのです。なお、秘密鍵の漏えいなどで<b>有効期限前に失効させられた証明書の一覧</b>は<span class="kw">CRL</span>（Certificate Revocation List：証明書失効リスト）に掲載され、検証の際に照合されます（令和7年度に出題）。</p>

<h3 class="sec">4. 認証 ── 「あなたは誰？」を確かめる3つの方法</h3>
<p>本人確認（認証）の要素は3種類に分類されます。</p>
<table class="tbl">
<tr><th>要素</th><th>例</th></tr>
<tr><td><span class="kw">知識</span>（知っている）</td><td>パスワード、PIN、秘密の質問</td></tr>
<tr><td><span class="kw">所有</span>（持っている）</td><td>スマホ（SMSコード）、ICカード、ワンタイムパスワードのトークン</td></tr>
<tr><td><span class="kw">生体</span>（本人である）</td><td>指紋、顔、虹彩、静脈</td></tr>
</table>
<p><b>異なる2要素以上を組み合わせる</b>のが<span class="kw">多要素認証</span>です。パスワード＋SMSコードは「知識＋所有」で多要素。パスワード＋秘密の質問は知識＋知識なので<b>多要素ではない</b>——この判定が定番の出題です。</p>
<div class="why"><div class="why-t">なぜ？ ── パスワードだけでは守れない時代になったのか</div>
パスワード（知識）は、フィッシングで盗まれ、使い回しにより1か所の漏えいが全サービスに波及します（パスワードリスト攻撃）。知識は「コピーされても気づけない」のが弱点なのです。そこに所有（スマホは物理的に1台）や生体（複製が困難）を重ねると、<b>パスワードが盗まれても、もう1つの関門で止められる</b>。違う性質の防壁を重ねるから効果がある——同じ性質を2つ重ねても（パスワード2個）意味が薄い、という理屈です。なお生体認証には、本人を誤って拒否する率（本人拒否率）と他人を誤って受け入れる率（他人受入率）のトレードオフがあり、どちらを重視するかは用途で調整します。心理学の信号検出理論と同じ構造ですね。</div>
<p>関連用語として、1回限りの使い捨てパスワード（<span class="kw">ワンタイムパスワード</span>）、1度のログインで複数サービスを利用できる<span class="kw">シングルサインオン（SSO）</span>も押さえておきましょう。</p>

<h3 class="sec">まとめ</h3>
<ul>
<li><span class="kw">共通鍵</span>＝同じ鍵・高速・鍵配送問題あり。<span class="kw">公開鍵</span>＝南京錠方式・低速。実際は<b>ハイブリッド</b>（TLS）。</li>
<li><span class="kw">デジタル署名</span>＝秘密鍵で署名・公開鍵で検証。<b>本人性＋改ざん検知</b>。公開鍵の本人保証は<span class="kw">認証局（CA）</span>と<span class="kw">電子証明書</span>（PKI）。</li>
<li>認証3要素＝<b>知識・所有・生体</b>。<span class="kw">多要素認証</span>は「異なる要素」の組合せ。</li>
</ul>
`,
  u33: `
<p>技術的な対策をどれだけ並べても、組織としての方針と運用がなければセキュリティは穴だらけになります。この単元は「組織でセキュリティをどう回すか」——ストラテジ系のISMS認証、マネジメント系のリスク対応と直結する、3分野横断のハブです。</p>

<h3 class="sec">1. ISMS ── セキュリティのPDCA</h3>
<p><span class="kw">ISMS</span>（Information Security Management System：情報セキュリティマネジメントシステム）は、組織が情報セキュリティを<b>計画的・継続的に管理する仕組み</b>です（規格はISO/IEC 27001——ストラテジ系の標準化で学びましたね）。一度対策して終わりではなく、計画（Plan）→導入・運用（Do）→点検（Check）→改善（Act）のサイクルを回し続けます。攻撃の手口は進化し続けるので、<b>セキュリティは「状態」ではなく「活動」</b>なのです。</p>

<h3 class="sec">2. リスクアセスメントとリスク対応</h3>
<p>守るべき<span class="kw">情報資産</span>を洗い出し、それを脅かす<span class="kw">脅威</span>と、組織側の弱点である<span class="kw">脆弱性</span>を特定して、リスクの大きさを<b>特定→分析→評価</b>の手順で見積もるのが<span class="kw">リスクアセスメント</span>です。そのうえで対応を選びます。</p>
<table class="tbl">
<tr><th>対応</th><th>意味</th><th>例</th></tr>
<tr><td><span class="kw">リスク回避</span></td><td>リスクの原因となる活動自体をやめる</td><td>個人情報を集めるサービスを廃止する</td></tr>
<tr><td><span class="kw">リスク低減</span></td><td>対策で発生確率や影響を下げる</td><td>暗号化、アクセス制限、教育</td></tr>
<tr><td><span class="kw">リスク移転</span></td><td>第三者に影響を移す</td><td>サイバー保険、外部委託</td></tr>
<tr><td><span class="kw">リスク受容</span></td><td>影響が小さければ受け入れる</td><td>対策費が損失見込みを上回る場合</td></tr>
</table>
<div class="why"><div class="why-t">なぜ？ ── 「リスクをゼロにする」を目標にしないのか</div>
リスクをゼロに近づけるほど、対策コストは急カーブで増えていきます（最後の1％を消すのが一番高い）。しかも利便性が犠牲になり、業務が回らなくなれば本末転倒です。だからISMSの発想は「ゼロ」ではなく、<b>リスクを評価して、組織が受け入れられる水準まで合理的に下げる</b>こと。これはマネジメント系のプロジェクトリスク管理とまったく同じ枠組みで、「リスクの大きさ＝発生確率×影響度」で優先順位をつける点も共通です。1つの考え方が3分野で出題される、試験全体のおいしい交差点です。</div>
<p>また、システムの<b>企画・設計の段階からセキュリティを組み込む</b>考え方を<span class="kw">セキュリティバイデザイン</span>と呼びます（令和5年度に出題）。完成後に対策を後付けするより、安全で安く済む——「手戻りは上流で防ぐほど安い」という開発の原理と同じ理屈です。同様に、企画段階からプライバシー保護を組み込む考え方はプライバシーバイデザインといいます。</p>

<h3 class="sec">3. 情報セキュリティポリシー ── 組織の憲法</h3>
<p>組織のセキュリティ方針を文書化したものが<span class="kw">情報セキュリティポリシー</span>で、一般に3階層で構成されます。</p>
<ul>
<li><span class="kw">基本方針</span>：経営層が示す「なぜ守るのか」の宣言。<b>社外にも公開</b>されることが多い。</li>
<li><span class="kw">対策基準</span>：何を守るかの全社ルール（パスワード規程、持ち出し規程など）。</li>
<li><span class="kw">実施手順</span>：現場ごとの具体的なマニュアル。</li>
</ul>
<p>策定の責任は経営層にあります（ITガバナンスの一部——「セキュリティは情報システム部門だけの仕事」という選択肢は誤りです）。</p>

<h3 class="sec">4. 組織と人の対策</h3>
<ul>
<li><span class="kw">CSIRT</span>（Computer Security Incident Response Team：シーサート）：セキュリティインシデントが発生したときに対応する<b>専門チーム</b>。平時は監視・情報収集、有事は被害拡大の防止と復旧の指揮を執る。</li>
<li><span class="kw">教育・訓練</span>：標的型攻撃メールの訓練（疑似的な攻撃メールを送って対応力を測る）、定期的な研修。</li>
<li><span class="kw">クリアデスク・クリアスクリーン</span>：離席時に書類を放置しない、画面をロックする習慣。</li>
</ul>
<div class="why"><div class="why-t">なぜ？ ── 訓練では「引っかかった人を罰しない」のが鉄則なのか</div>
訓練の目的は犯人探しではなく、組織全体の対応力の向上です。引っかかった人を吊し上げると、本物の攻撃を踏んでしまったとき<b>「怒られるから」と報告を隠すようになり、発見が遅れて被害が拡大します</b>。セキュリティ事故対応で最も重要な資源は「早い報告」であり、それを支えるのは罰の恐怖ではなく心理的安全性——マネジメント系の「悪い報せほど早く」と同じ原理です。組織心理学の知見がセキュリティ運用の設計に直結する好例です。</div>

<h3 class="sec">まとめ</h3>
<ul>
<li><span class="kw">ISMS</span>＝セキュリティのPDCA。一度きりの対策ではなく継続的活動。</li>
<li><span class="kw">リスクアセスメント</span>＝特定→分析→評価。対応は<b>回避・低減・移転・受容</b>（目標はゼロではなく許容水準）。</li>
<li><span class="kw">情報セキュリティポリシー</span>＝基本方針（経営層が策定・公開）／対策基準／実施手順の3階層。</li>
<li>インシデント対応の専門チーム＝<span class="kw">CSIRT</span>。人の対策は訓練と報告しやすい文化。</li>
</ul>
`,
  u34: `
<p>最終単元は、攻撃から守る技術の道具箱です。たくさん出てきますが、どれも「<b>どこで・何を防ぐ道具か</b>」という配置図で覚えると混ざりません。城の防御（堀・門番・見張り・金庫）にたとえながら整理しましょう。</p>

<h3 class="sec">1. 境界を守る ── ファイアウォールとDMZ</h3>
<p><span class="kw">ファイアウォール</span>は、社内ネットワークとインターネットの<b>境界</b>に置かれ、あらかじめ決めたルールに基づいて通信を<b>通す／遮断する</b>関所です。城でいえば堀と門番にあたります。</p>
<p>ここで問題がひとつ。ウェブサーバやメールサーバは<b>外部に公開しなければ意味がない</b>のに、社内ネットワークに置いて公開したら、そこを踏み台に社内へ侵入されかねません。そこで、外部とも内部とも区切られた<b>中間地帯</b>に公開サーバを置きます。これが<span class="kw">DMZ</span>（DeMilitarized Zone：非武装地帯）です。</p>
<div class="why"><div class="why-t">なぜ？ ── DMZという「中間地帯」を作るのか</div>
公開サーバは攻撃に最もさらされる場所なので、「いつか侵害される」前提で考えます。DMZに置いておけば、<b>万一ウェブサーバが乗っ取られても、そこから社内ネットワークへの通信はファイアウォールが遮断する</b>ため、被害をDMZ内で食い止められます。城の例えなら、城門の外に作った「出店エリア」。お客（外部の利用者）はそこまで来られるが、本丸（社内）には入れない。「公開するもの」と「守るもの」を物理的・論理的に分離する——セキュリティ設計の基本思想（多層防御）の代表例です。</div>
<p>境界を守る仲間として、不正侵入を<b>検知して知らせる</b><span class="kw">IDS</span>（Intrusion Detection System）、検知して<b>自動的に遮断まで行う</b><span class="kw">IPS</span>（Intrusion Prevention System）、ウェブアプリケーションへの攻撃（SQLインジェクション等）に特化した<span class="kw">WAF</span>（Web Application Firewall）、社内からのウェブアクセスを代理・管理する<span class="kw">プロキシサーバ</span>も覚えましょう。</p>

<h3 class="sec">2. 端末と中身を守る</h3>
<ul>
<li><span class="kw">ウイルス対策ソフト</span>：既知のマルウェアの特徴（<b>定義ファイル／シグネチャ</b>）と照合して検出する。定義ファイルは<b>常に最新に保つ</b>ことが大前提。未知のマルウェアには、怪しい挙動から検出する（振る舞い検知）方式で対抗。</li>
<li><span class="kw">修正プログラムの適用</span>（パッチ／アップデート）：脆弱性を塞ぐ最重要対策。放置はゼロデイならぬ「既知の穴」への招待状。</li>
<li><span class="kw">暗号化</span>：ノートPCやUSBメモリの紛失・盗難に備え、データ自体を暗号化しておく（盗まれても読めない＝機密性を守る最後の砦）。</li>
<li><span class="kw">アクセス制御</span>：「誰が・何に・どこまで」できるかを設定。必要最小限の権限だけ与える<b>最小権限の原則</b>が基本。</li>
<li><span class="kw">MDM</span>（Mobile Device Management）：業務用スマホ・タブレットを一元管理し、紛失時に遠隔ロック・データ消去できる仕組み。</li>
</ul>

<h3 class="sec">3. 通信と無線LANを守る</h3>
<ul>
<li><span class="kw">VPN</span>（Virtual Private Network）：公衆回線の上に、暗号化された<b>仮想的な専用線（トンネル）</b>を作る技術。テレワークで自宅から社内ネットワークへ安全につなぐ定番手段。</li>
<li>無線LANの暗号化：規格は<span class="kw">WPA2／WPA3</span>（Wi-Fi Protected Access）を使う（古いWEPは解読が容易なため不可）。</li>
<li>公衆Wi-Fiの注意：暗号化されていないフリーWi-Fiでの機密通信は盗聴リスクがある。偽のアクセスポイント（悪魔の双子）にも注意。</li>
</ul>
<div class="why"><div class="why-t">なぜ？ ── VPNを使うと公衆回線でも「専用線並み」になるのか</div>
データはインターネットという公道を通りますが、<b>送信側の入口で暗号化し、受信側の出口で復号する「トンネル」</b>を通すため、途中で盗み見られても中身は読めません。現金輸送車が公道を走っても安全なのは、道路が特別だからではなく車が装甲されているから——VPNはデータの装甲車です。専用線を物理的に敷くより圧倒的に安く、同等の機密性を確保できるため、拠点間接続やテレワークの標準になりました。</div>

<h3 class="sec">4. 物理的対策と運用</h3>
<p>技術だけでなく物理の守りも出題されます。サーバ室の<b>入退室管理</b>（ICカード、生体認証、共連れ防止）、施錠管理、監視カメラ、そして災害に備えた<b>バックアップの遠隔地保管</b>。日々の運用では、利用者IDの管理（退職者のアカウントを直ちに無効化する）、ログの取得と定期的な点検が重要です。「退職した従業員のIDが残っていて不正アクセスされた」は、技術の穴ではなく運用の穴の典型例として頻出です。</p>
<p>インシデント発生後の対応に関わる用語も2つ。<span class="kw">デジタルフォレンジックス</span>は、不正アクセスや情報漏えいが起きた際に、<b>法的な証拠として使えるように</b>機器のデータやログを保全・収集・分析する技術です（フォレンジック＝法医学の。令和7年度に出題）。<span class="kw">耐タンパ性</span>は、ICカードなどの機器を分解・解析して内部の情報を不正に取り出そうとする攻撃への<b>耐性</b>を指します（令和5年度に出題）。</p>

<h3 class="sec">まとめ ── テクノロジ系・完走</h3>
<ul>
<li>境界の守り：<span class="kw">ファイアウォール</span>（関所）、公開サーバは<span class="kw">DMZ</span>（中間地帯）へ。検知の<span class="kw">IDS</span>／遮断まで行う<span class="kw">IPS</span>／ウェブアプリ特化の<span class="kw">WAF</span>。</li>
<li>端末の守り：定義ファイルは最新に、<b>修正プログラムは速やかに適用</b>、データは暗号化、権限は最小限。</li>
<li>通信の守り：<span class="kw">VPN</span>＝暗号化トンネル。無線LANは<span class="kw">WPA2／WPA3</span>。</li>
<li>物理と運用：入退室管理、退職者IDの即時無効化、ログ点検。</li>
</ul>
<p>これでテクノロジ系の全10単元も完走です。3つの攻略ノートを行き来しながら、すべての章の「合格」朱印を集めてください。ここまで仕組みの「なぜ」を積み上げてきたぐりさんなら、本番の応用問題にも対応できる土台ができています。</p>

      a:1,

    { q:"企業内で発生したセキュリティインシデントに対応する専門チームを表す用語はどれか。",

    { q:"外部に公開するウェブサーバの設置場所として、最も適切なものはどれか。",
      c:["社内ネットワークの内部","DMZ","インターネット上に直接（ファイアウォールの外）","データベースサーバと同じ場所"],

    { q:"有効期限よりも前に失効させられたデジタル証明書の一覧を何と呼ぶか。",
      c:["SLA","CRL","DNS","WBS"],

      e:"CRL（証明書失効リスト）には、秘密鍵の漏えいなどで失効した証明書が掲載され、証明書の検証時に照合されます。「CRLに掲載される条件」は令和7年度に出題されました。" }

/* =====================================================
   進捗の保存
===================================================== */
const APP_KEY = "techNote_v1";
let storageOK = true;
function loadP(){
  try{
    const raw = localStorage.getItem(APP_KEY);
    return raw ? JSON.parse(raw) : { done:{}, tests:{} };
  }catch(e){ storageOK = false; return { done:{}, tests:{} }; }
}
function saveP(){
  try{ localStorage.setItem(APP_KEY, JSON.stringify(P)); }
  catch(e){ storageOK = false; }
}
let P = loadP();
if(!P.done) P.done = {};
if(!P.tests) P.tests = {};

/* =====================================================
   ユーティリティ
===================================================== */
const $ = (id)=>document.getElementById(id);
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function shuffle(a){
  const r = a.slice();
  for(let i=r.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [r[i],r[j]]=[r[j],r[i]]; }
  return r;
}
function toast(msg){
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toast._tm);
  toast._tm = setTimeout(()=>t.classList.remove("show"), 2600);
}
function copyText(txt){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(
      ()=>toast("コピーしました。Claudeのチャットに貼り付けて質問してください"),
      ()=>fallbackCopy(txt)
    );
  }else{ fallbackCopy(txt); }
}
function fallbackCopy(txt){
  const ta = document.createElement("textarea");
  ta.value = txt; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); toast("コピーしました。Claudeのチャットに貼り付けて質問してください"); }
  catch(e){ toast("コピーできませんでした。質問文を手動で選択してコピーしてください"); }
  document.body.removeChild(ta);
}
function findUnit(uid){
  for(const ch of CHAPTERS){
    const u = ch.units.find(x=>x.id===uid);
    if(u) return { ...u, ch:ch.id, chName:ch.name };
  }
  return null;
}
function chapterDone(ch){ return ch.units.every(u=>P.done[u.id]); }
function doneCount(){ return CHAPTERS.reduce((n,c)=>n+c.units.filter(u=>P.done[u.id]).length,0); }
const TOTAL_UNITS = CHAPTERS.reduce((n,c)=>n+c.units.length,0);

/* =====================================================
   画面遷移
===================================================== */
let state = { view:"home", unit:null };
let T = null; // テスト進行状態

function go(view, unit){
  state.view = view; state.unit = unit || null;
  render();
  window.scrollTo(0,0);
}

/* =====================================================
   描画
===================================================== */
function render(){
  const app = $("app");
  if(state.view === "home") app.innerHTML = renderHome();
  else if(state.view === "unit") app.innerHTML = renderUnit(state.unit);
  else if(state.view === "test") app.innerHTML = renderTest();
  bindEvents();
}

function renderHome(){
  const dc = doneCount();
  const pct = Math.round(dc / TOTAL_UNITS * 100);
  let h = "";
  h += '<header class="top">';
  h += '<h1 class="title">テクノロジ攻略ノート</h1>';
  h += '<div class="subtitle">ITパスポート試験 ── テクノロジ系</div>';
  h += '<div class="progressline">修了 ' + dc + ' / ' + TOTAL_UNITS + ' 単元（' + pct + '%）</div>';
  h += '<div class="bar"><i style="width:' + pct + '%"></i></div>';
  h += '</header>';
  if(!storageOK){
    h += '<div class="banner">このブラウザでは進捗の自動保存が使えないようです（プライベートモード等）。学習はできますが、閉じると進捗が消える点にご注意ください。</div>';
  }
  for(const ch of CHAPTERS){
    h += '<div class="card">';
    h += '<div class="card-h"><div><span class="ch-no">第' + ch.id + '章</span><span class="ch-name">' + esc(ch.name) + '</span></div>';
    const t = P.tests[ch.id];
    if(t && t.passed) h += '<span class="stamp">合格</span>';
    h += '</div>';
    for(const u of ch.units){
      if(ch.ready){
        h += '<div class="unit-row" data-unit="' + u.id + '">';
        h += '<span class="unit-no">' + u.no + '</span>';
        h += '<span class="unit-name">' + esc(u.title) + '</span>';
        h += '<span class="unit-state">' + (P.done[u.id] ? '<span class="stamp">済</span>' : '<span class="arrow">読む ›</span>') + '</span>';
        h += '</div>';
      }else{
        h += '<div class="unit-row locked">';
        h += '<span class="unit-no">' + u.no + '</span>';
        h += '<span class="unit-name">' + esc(u.title) + '</span>';
        h += '<span class="unit-state"><span class="soon">準備中</span></span>';
        h += '</div>';
      }
    }
    if(ch.ready){
      const best = (P.tests[ch.id] && typeof P.tests[ch.id].best === "number") ? P.tests[ch.id].best : null;
      h += '<div class="unit-row testrow" data-test="' + ch.id + '">';
      h += '<span class="unit-no">試</span>';
      h += '<span class="unit-name"><b>章末テスト</b>（四肢択一・5問／6割で合格）' + (chapterDone(ch) ? '' : '<br><small style="color:#9a9078">全単元の修了前でも挑戦できます</small>') + '</span>';
      h += '<span class="unit-state">' + (best !== null ? '<small>最高 ' + best + '/5</small>' : '<span class="arrow">挑戦 ›</span>') + '</span>';
      h += '</div>';
    }
    h += '</div>';
  }
  return h;
}

function renderUnit(uid){
  const u = findUnit(uid);
  const lec = LECTURES[uid] || "<p>（この単元の講義は準備中です）</p>";
  let h = "";
  h += '<a class="backlink" data-go="home">‹ ホームに戻る</a>';
  h += '<div class="card"><div class="lecture">';
  h += '<div class="lec-head"><div class="lec-ch">第' + u.ch + '章 ' + esc(u.chName) + '</div>';
  h += '<div class="lec-title"><span>' + u.no + ' ' + esc(u.title) + '</span>' + (P.done[uid] ? '<span class="stamp">済</span>' : '') + '</div>';
  h += '<div class="lec-meta">深掘り講義（目安 12〜15分）　<span class="kw">赤太字</span>＝頻出用語／緑の「なぜ？」枠＝理由までわかる解説（800点向け）</div></div>';
  h += lec;
  /* 質問コーナー */
  h += '<div class="qa"><div class="qa-t">この単元について質問する</div>';
  if(window.cowork && window.cowork.askClaude){
    h += '<div class="qa-note">わからないことを入力すると、講師AIがこの場で答えます。</div>';
    h += '<textarea id="qbox" placeholder="例：公開鍵暗号で、なぜ公開しても安全なのかわかりません"></textarea>';
    h += '<div class="btn-row" style="justify-content:flex-start"><button class="btn blue" id="askBtn">講師AIに質問する</button><button class="btn sub" id="copyBtn">質問文をコピー</button></div>';
    h += '<div id="aiAns"></div>';
  }else{
    h += '<div class="qa-note">質問を入力して「コピー」を押し、Claudeのチャットに貼り付けてください。単元名つきの質問文が作られます。</div>';
    h += '<textarea id="qbox" placeholder="例：公開鍵暗号で、なぜ公開しても安全なのかわかりません"></textarea>';
    h += '<div class="btn-row" style="justify-content:flex-start"><button class="btn blue" id="copyBtn">質問文をコピーする</button></div>';
  }
  h += '</div>';
  /* 修了 */
  h += '<div class="done-area">';
  if(P.done[uid]){
    h += '<div class="done-stamp-wrap"><span class="stamp big">済</span></div>';
    h += '<div style="margin-bottom:10px;">この単元は修了済みです。おつかれさまでした。</div>';
    h += '<span class="undo" id="undoBtn">修了を取り消す</span>';
  }else{
    h += '<div class="done-stamp-wrap" id="stampWrap"></div>';
    h += '<button class="btn" id="doneBtn">この単元を修了する</button>';
  }
  h += '</div>';
  h += '</div></div>';
  h += '<div class="btn-row"><button class="btn sub" data-go="home">ホームに戻る</button></div>';
  return h;
}

/* =====================================================
   章末テスト
===================================================== */
function startTest(chId){
  const pool = QUESTIONS[chId];
  if(!pool || !pool.length){ toast("この章のテストは準備中です"); return; }
  const picked = shuffle(pool).slice(0, Math.min(5, pool.length));
  T = {
    ch: chId,
    main: picked,
    idx: 0,
    firstCorrect: 0,
    wrong: [],
    mode: "main",
    phase: "q",
    queue: [],
    lastJudge: null,
    order: null
  };
  prepareOrder(T.main[0]);
  go("test");
}
function prepareOrder(q){
  T.order = shuffle([0,1,2,3]);
}
function currentQ(){
  return T.mode === "main" ? T.main[T.idx] : T.queue[0];
}
function renderTest(){
  if(!T) return renderHome();
  const ch = CHAPTERS.find(c=>c.id===T.ch);
  let h = "";
  h += '<a class="backlink" data-go="home">‹ テストを中断してホームに戻る</a>';
  h += '<div class="card"><div class="test-pane">';

  if(T.phase === "result"){
    const pass = T.firstCorrect >= 3;
    h += '<div class="result-box">';
    h += '<div class="t-head">第' + T.ch + '章 ' + esc(ch.name) + '　章末テスト 結果</div>';
    h += '<div class="score">' + T.firstCorrect + ' <small>/ 5 問正解</small></div>';
    if(pass){
      h += '<div class="done-stamp-wrap"><span class="stamp big anim">合格</span></div>';
      h += '<p>合格ラインの6割を超えました。おめでとうございます。</p>';
    }else{
      h += '<p style="margin:10px 0;">合格ラインは3問（6割）です。間違えた問題を復習して、もう一度挑戦しましょう。</p>';
    }
    if(T.wrong.length){
      h += '<p style="font-size:14px;color:#7a7261;">間違えた ' + T.wrong.length + ' 問は、正解できるまで復習モードで再出題されます。</p>';
      h += '<div class="btn-row"><button class="btn" id="startReview">復習モードへ進む</button><button class="btn sub" data-go="home">ホームに戻る</button></div>';
    }else{
      h += '<div class="btn-row"><button class="btn" id="retryTest">新しい問題で再挑戦</button><button class="btn sub" data-go="home">ホームに戻る</button></div>';
    }
    h += '</div>';
    h += '</div></div>';
    return h;
  }

  if(T.phase === "reviewdone"){
    h += '<div class="result-box">';
    h += '<div class="t-head">復習モード 完了</div>';
    h += '<div class="done-stamp-wrap"><span class="stamp big anim">克服</span></div>';
    h += '<p>間違えた問題をすべて正解できました。この調子です。</p>';
    h += '<div class="btn-row"><button class="btn" id="retryTest">新しい問題で再挑戦</button><button class="btn sub" data-go="home">ホームに戻る</button></div>';
    h += '</div></div></div>';
    return h;
  }

  const q = currentQ();
  const total = T.mode === "main" ? T.main.length : null;
  h += '<div class="t-head">第' + T.ch + '章 ' + esc(ch.name) + '　章末テスト';
  if(T.mode === "main") h += '　第' + (T.idx+1) + '問 / ' + total + '問';
  else h += '<span class="rv-tag">復習モード　残り' + T.queue.length + '問</span>';
  h += '</div>';
  h += '<div class="t-q">' + q.q + '</div>';
  h += '<div class="choices">';
  const judged = (T.phase === "judged");
  for(let pos=0; pos<4; pos++){
    const ci = T.order[pos];
    let cls = "choice";
    if(judged){
      if(ci === q.a) cls += (T.lastJudge && T.lastJudge.pick === ci) ? " sel-ok" : " reveal";
      else if(T.lastJudge && T.lastJudge.pick === ci) cls += " sel-ng";
    }
    h += '<button class="' + cls + '" data-pick="' + ci + '" ' + (judged ? "disabled" : "") + '>';
    h += '<span class="cno">' + ["ア","イ","ウ","エ"][pos] + '</span>' + q.c[ci] + '</button>';
  }
  h += '</div>';
  if(judged){
    const ok = T.lastJudge.ok;
    h += '<div class="judge ' + (ok ? "ok" : "ng") + '">' + (ok ? "○ 正解！" : "× 不正解…") + '</div>';
    h += '<div class="expl"><b>解説：</b>' + q.e + '</div>';
    h += '<div class="btn-row" style="justify-content:flex-start"><button class="btn" id="nextQ">次へ</button></div>';
  }
  h += '</div></div>';
  return h;
}
function pickAnswer(ci){
  if(!T || T.phase !== "q") return;
  const q = currentQ();
  const ok = (ci === q.a);
  T.lastJudge = { pick: ci, ok: ok };
  T.phase = "judged";
  if(T.mode === "main"){
    if(ok) T.firstCorrect++;
    else T.wrong.push(q);
  }
  /* 復習モードでは、キューの操作は「次へ」を押したときに行う */
  render();
}
function nextQ(){
  if(!T) return;
  if(T.mode === "main"){
    T.idx++;
    if(T.idx >= T.main.length){
      /* 1周目終了：成績を保存 */
      const rec = P.tests[T.ch] || { best:0, passed:false, attempts:0 };
      rec.attempts = (rec.attempts||0) + 1;
      rec.best = Math.max(rec.best||0, T.firstCorrect);
      rec.passed = rec.passed || (T.firstCorrect >= 3);
      P.tests[T.ch] = rec;
      saveP();
      T.phase = "result";
      render();
      return;
    }
  }else{
    if(T.lastJudge && T.lastJudge.ok) T.queue.shift();
    else T.queue.push(T.queue.shift());
    if(T.queue.length === 0){
      T.phase = "reviewdone";
      render();
      return;
    }
  }
  T.phase = "q";
  prepareOrder(currentQ());
  render();
}
function startReview(){
  T.mode = "review";
  T.queue = shuffle(T.wrong);
  T.phase = "q";
  prepareOrder(currentQ());
  render();
}

/* =====================================================
   質問コーナー
===================================================== */
function buildQuestionText(uid){
  const u = findUnit(uid);
  const box = $("qbox");
  const txt = box ? box.value.trim() : "";
  if(!txt){ toast("質問を入力してください"); return null; }
  return "【ITパスポート テクノロジ系の質問】\n単元：第" + u.ch + "章" + u.no + "「" + u.title + "」\n質問：" + txt;
}
async function askAI(uid){
  const u = findUnit(uid);
  const box = $("qbox");
  const txt = box ? box.value.trim() : "";
  if(!txt){ toast("質問を入力してください"); return; }
  const ansEl = $("aiAns");
  ansEl.innerHTML = '<div class="ai-ans">講師AIが考えています…</div>';
  try{
    const tmp = document.createElement("div");
    tmp.innerHTML = LECTURES[uid] || "";
    const plain = (tmp.textContent || "").slice(0, 6000);
    const prompt = "あなたはITパスポート試験の講師です。学習者は心理学系の大学院生でIT実務は未経験です。以下の講義内容を踏まえ、質問に日本語で簡潔に（300字程度で）答えてください。可能なら身近な例を1つ添えてください。\n\n単元：" + u.title + "\n質問：" + txt;
    const r = await window.cowork.askClaude(prompt, [plain]);
    const ans = (typeof r === "string") ? r : (r && (r.text || r.content || JSON.stringify(r)));
    ansEl.innerHTML = '<div class="ai-ans"><b style="color:var(--blue)">講師AIの回答</b>\n' + esc(ans) + '</div>';
  }catch(e){
    ansEl.innerHTML = '<div class="ai-ans">うまく回答を取得できませんでした。「質問文をコピー」でチャットに貼り付けて質問してください。</div>';
  }
}

/* =====================================================
   イベント
===================================================== */
function bindEvents(){
  document.querySelectorAll("[data-go='home']").forEach(el=>{
    el.onclick = ()=>go("home");
  });
  document.querySelectorAll("[data-unit]").forEach(el=>{
    el.onclick = ()=>go("unit", el.getAttribute("data-unit"));
  });
  document.querySelectorAll("[data-test]").forEach(el=>{
    el.onclick = ()=>startTest(Number(el.getAttribute("data-test")));
  });
  document.querySelectorAll("[data-pick]").forEach(el=>{
    el.onclick = ()=>pickAnswer(Number(el.getAttribute("data-pick")));
  });
  const nq = $("nextQ"); if(nq) nq.onclick = nextQ;
  const sr = $("startReview"); if(sr) sr.onclick = startReview;
  const rt = $("retryTest"); if(rt) rt.onclick = ()=>startTest(T.ch);
  const db = $("doneBtn");
  if(db) db.onclick = ()=>{
    P.done[state.unit] = true; saveP();
    const w = $("stampWrap");
    if(w){ w.innerHTML = '<span class="stamp big anim">済</span>'; }
    db.style.display = "none";
    setTimeout(()=>render(), 900);
  };
  const ub = $("undoBtn");
  if(ub) ub.onclick = ()=>{ delete P.done[state.unit]; saveP(); render(); };
  const cb = $("copyBtn");
  if(cb) cb.onclick = ()=>{
    const t = buildQuestionText(state.unit);
    if(t) copyText(t);
  };
  const ab = $("askBtn");
  if(ab) ab.onclick = ()=>askAI(state.unit);
}

render();
/* テクノロジ攻略ノート v1.0 - 全3章10単元 深掘り版 */
</script>
