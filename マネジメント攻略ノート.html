<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マネジメント攻略ノート｜ITパスポート</title>
<style>
:root{
  color-scheme: light;
  --ink:#2b3a42;
  --red:#b73a2e;
  --red-soft:#fbeeec;
  --blue:#3a6ea5;
  --paper:#fdfbf3;
  --grid:rgba(125,160,195,.22);
  --card:#fffefa;
  --line:#d9d2bf;
  --green:#3c7a4e;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{
  font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
  color:var(--ink);
  background-color:var(--paper);
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size:22px 22px;
  line-height:1.9;
  font-size:16px;
}
.wrap{max-width:820px;margin:0 auto;padding:18px 16px 80px;}
header.top{
  text-align:center;
  padding:18px 10px 14px;
  margin-bottom:18px;
  border-bottom:3px double var(--line);
}
h1.title{
  font-family:"Hiragino Mincho ProN","Yu Mincho","MS Mincho",serif;
  font-size:30px;
  letter-spacing:.18em;
  color:var(--ink);
}
.subtitle{font-size:13px;color:#7a7261;letter-spacing:.25em;margin-top:2px;}
.progressline{margin-top:10px;font-size:13px;color:#6b6253;}
.bar{height:8px;background:#eee7d6;border-radius:4px;overflow:hidden;max-width:360px;margin:6px auto 0;border:1px solid var(--line);}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,#c8553d,var(--red));width:0%;transition:width .5s;}
.banner{background:#fff4e0;border:1px solid #e0c890;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:10px;
  box-shadow:0 2px 6px rgba(90,80,50,.08);
  margin-bottom:20px;
  overflow:hidden;
}
.card-h{
  padding:12px 18px;
  border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,#faf6e9,#f5efdd);
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.card-h .ch-name{
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
  font-size:19px;font-weight:700;letter-spacing:.08em;
}
.card-h .ch-no{font-size:12px;color:#8a8268;display:block;letter-spacing:.2em;}
.unit-row{
  display:flex;align-items:center;gap:12px;
  padding:13px 18px;
  border-bottom:1px dashed #e3dcc8;
  cursor:pointer;
  transition:background .15s;
  -webkit-tap-highlight-color:rgba(183,58,46,.08);
}
.unit-row:hover{background:#faf5e6;}
.unit-row:last-child{border-bottom:none;}
.unit-no{
  flex:0 0 auto;width:30px;height:30px;border-radius:50%;
  background:#efe8d4;color:#6b6253;font-size:14px;
  display:flex;align-items:center;justify-content:center;font-weight:700;
}
.unit-name{flex:1 1 auto;font-size:15.5px;}
.unit-state{flex:0 0 auto;min-width:48px;text-align:center;}
.arrow{color:#b9b09a;font-size:14px;}
.locked{cursor:default;opacity:.55;}
.locked:hover{background:transparent;}
.soon{font-size:11px;color:#9a9078;border:1px solid #cfc6ad;border-radius:4px;padding:1px 7px;}
.testrow{background:#fbf7ec;}
.stamp{
  display:inline-flex;align-items:center;justify-content:center;
  width:40px;height:40px;border-radius:50%;
  border:2.5px solid rgba(183,58,46,.85);
  color:rgba(183,58,46,.92);
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
  font-weight:700;font-size:17px;
  transform:rotate(-12deg);
  background:radial-gradient(circle at 35% 30%, rgba(183,58,46,.10), rgba(183,58,46,.03));
  box-shadow:inset 0 0 0 1px rgba(183,58,46,.25);
  letter-spacing:0;
  user-select:none;
}
.stamp.big{width:84px;height:84px;font-size:30px;border-width:4px;}
.stamp.anim{animation:stampIn .45s cubic-bezier(.2,1.6,.4,1) both;}
@keyframes stampIn{
  0%{transform:rotate(-12deg) scale(2.4);opacity:0;}
  60%{transform:rotate(-12deg) scale(.92);opacity:1;}
  100%{transform:rotate(-12deg) scale(1);opacity:1;}
}
.btn{
  display:inline-block;border:none;cursor:pointer;
  font-family:inherit;font-size:15px;font-weight:700;
  padding:12px 26px;border-radius:8px;
  background:var(--red);color:#fff;
  box-shadow:0 2px 0 #8e2c22;
  transition:transform .08s, box-shadow .08s;
  -webkit-tap-highlight-color:transparent;
}
.btn:active{transform:translateY(2px);box-shadow:0 0 0 #8e2c22;}
.btn.sub{background:#fff;color:var(--ink);border:1.5px solid #c9c0a8;box-shadow:0 2px 0 #c9c0a8;}
.btn.blue{background:var(--blue);box-shadow:0 2px 0 #2a5078;}
.btn:disabled{opacity:.45;cursor:default;}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:18px 0 6px;}
.backlink{
  display:inline-block;margin-bottom:14px;font-size:14px;color:var(--blue);
  cursor:pointer;text-decoration:none;border-bottom:1px dashed var(--blue);
}
/* ---- 講義 ---- */
.lecture{padding:22px 22px 26px;}
.lec-head{margin-bottom:6px;}
.lec-ch{font-size:12.5px;color:#8a8268;letter-spacing:.15em;}
.lec-title{
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
  font-size:24px;font-weight:700;letter-spacing:.05em;
  border-bottom:3px double var(--line);padding-bottom:8px;margin-bottom:4px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.lec-meta{font-size:12.5px;color:#9a9078;margin-bottom:14px;}
.lecture h3.sec{
  font-size:17.5px;margin:30px 0 10px;
  padding:6px 12px;border-left:5px solid var(--red);
  background:linear-gradient(90deg,#f8f2e2,transparent);
  font-weight:700;letter-spacing:.04em;
}
.lecture p{margin:10px 0;}
.lecture ul,.lecture ol{margin:8px 0 12px 24px;}
.lecture li{margin:5px 0;}
.kw{color:var(--red);font-weight:700;}
.ex{
  background:#f3f7fb;border:1px solid #c9d8e6;border-radius:8px;
  padding:12px 16px;margin:14px 0;font-size:15px;
}
.ex-t{font-weight:700;color:var(--blue);font-size:13.5px;margin-bottom:4px;letter-spacing:.08em;}
.pt{
  background:var(--red-soft);border:1px solid #e3b9b2;border-radius:8px;
  padding:12px 16px;margin:14px 0;font-size:15px;
}
.pt-t{font-weight:700;color:var(--red);font-size:13.5px;margin-bottom:4px;letter-spacing:.08em;}
.why{
  background:#eef5ef;border:1px solid #b5cdb8;border-left:5px solid var(--green);border-radius:8px;
  padding:12px 16px;margin:14px 0;font-size:15px;
}
.why-t{font-weight:700;color:var(--green);font-size:13.5px;margin-bottom:4px;letter-spacing:.08em;}
.tbl{border-collapse:collapse;width:100%;margin:12px 0;font-size:14.5px;background:#fff;}
.tbl th,.tbl td{border:1px solid #cfc6ad;padding:7px 10px;text-align:left;vertical-align:top;}
.tbl th{background:#f5efdd;font-weight:700;white-space:nowrap;}
/* ---- 質問コーナー ---- */
.qa{
  margin-top:34px;padding:16px 18px;
  border:1.5px dashed #b9ab84;border-radius:10px;background:#fbf8ee;
}
.qa-t{font-weight:700;margin-bottom:6px;font-size:15.5px;}
.qa-note{font-size:13px;color:#7a7261;margin-bottom:10px;}
.qa textarea{
  width:100%;min-height:74px;border:1px solid #c9c0a8;border-radius:8px;
  padding:10px;font-family:inherit;font-size:15px;background:#fff;resize:vertical;
}
.qa .btn{margin-top:10px;}
.ai-ans{
  margin-top:14px;padding:12px 16px;background:#fff;border:1px solid #c9d8e6;
  border-radius:8px;font-size:15px;white-space:pre-wrap;
}
.done-area{text-align:center;margin-top:30px;padding-top:18px;border-top:1px solid var(--line);}
.done-stamp-wrap{min-height:96px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;}
.undo{font-size:12.5px;color:#9a9078;cursor:pointer;text-decoration:underline;}
/* ---- テスト ---- */
.test-pane{padding:24px 22px 28px;}
.t-head{font-size:13px;color:#8a8268;letter-spacing:.1em;margin-bottom:4px;}
.t-q{font-size:16.5px;font-weight:700;margin:10px 0 18px;line-height:1.8;}
.choices{display:flex;flex-direction:column;gap:10px;}
.choice{
  text-align:left;background:#fff;border:1.5px solid #c9c0a8;border-radius:8px;
  padding:12px 14px;font-size:15px;font-family:inherit;cursor:pointer;line-height:1.7;
  transition:background .12s,border-color .12s;
}
.choice:hover{background:#faf5e6;}
.choice .cno{font-weight:700;color:var(--blue);margin-right:8px;}
.choice.sel-ok{border-color:var(--green);background:#eef7f0;}
.choice.sel-ng{border-color:var(--red);background:var(--red-soft);}
.choice.reveal{border-color:var(--green);background:#eef7f0;}
.choice:disabled{cursor:default;}
.judge{font-size:20px;font-weight:700;margin:16px 0 6px;}
.judge.ok{color:var(--green);}
.judge.ng{color:var(--red);}
.expl{
  background:#f8f4e8;border:1px solid var(--line);border-radius:8px;
  padding:12px 16px;font-size:14.5px;margin:10px 0 16px;
}
.expl b{color:var(--red);}
.result-box{text-align:center;padding:10px 0;}
.score{font-size:42px;font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-weight:700;margin:8px 0;}
.score small{font-size:18px;}
.rv-tag{display:inline-block;font-size:12px;color:#fff;background:var(--blue);border-radius:4px;padding:2px 8px;margin-left:8px;vertical-align:middle;}
/* ---- toast ---- */
#toast{
  position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
  background:rgba(43,58,66,.95);color:#fff;padding:10px 20px;border-radius:8px;
  font-size:14px;opacity:0;pointer-events:none;transition:all .25s;max-width:90%;
  z-index:50;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
footer{margin-top:30px;text-align:center;font-size:12px;color:#a89e84;}
@media (max-width:480px){
  body{font-size:15px;}
  h1.title{font-size:24px;}
  .lecture{padding:18px 14px 22px;}
  .test-pane{padding:18px 14px 22px;}
}
/* ===== ダークモード（切替対応・初期ダーク） ===== */
:root[data-theme=dark]{
  color-scheme:dark;
  --ink:#e7e1d3; --paper:#1b1f25; --card:#242a31; --line:#3a424d;
  --grid:rgba(130,160,190,.05); --red:#ec7d72; --red-soft:#3a2622;
  --blue:#84b3e6; --green:#85c997;
}
:root[data-theme=dark] .subtitle{color:#a89e84;}
:root[data-theme=dark] .progressline{color:#b4ab95;}
:root[data-theme=dark] .bar{background:#33373f;}
:root[data-theme=dark] .banner{background:#2c2a1c;border-color:#5c5430;color:var(--ink);}
:root[data-theme=dark] .card-h{background:linear-gradient(180deg,#2b323b,#242a31);}
:root[data-theme=dark] .card-h .ch-no{color:#a59c87;}
:root[data-theme=dark] .unit-no{background:#333a44;color:#d2cab7;}
:root[data-theme=dark] .unit-row{border-bottom-color:#343b45;}
:root[data-theme=dark] .unit-row:hover{background:#2b323b;}
:root[data-theme=dark] .arrow{color:#8d8676;}
:root[data-theme=dark] .soon{color:#a89e84;border-color:#4a525c;}
:root[data-theme=dark] .testrow{background:#222831;}
:root[data-theme=dark] .btn.sub{background:#242a31;color:var(--ink);border-color:#4a525c;box-shadow:0 2px 0 #11151a;}
:root[data-theme=dark] .lec-ch{color:#a59c87;}
:root[data-theme=dark] .lec-meta{color:#b0a78f;}
:root[data-theme=dark] .lecture h3.sec{background:linear-gradient(90deg,#322a22,transparent);}
:root[data-theme=dark] .ex{background:#212d38;border-color:#36506b;}
:root[data-theme=dark] .pt{background:var(--red-soft);border-color:#7a4036;}
:root[data-theme=dark] .why{background:#1f2c24;border-color:#3a5a44;}
:root[data-theme=dark] .tbl{background:#222831;}
:root[data-theme=dark] .tbl th,:root[data-theme=dark] .tbl td{border-color:#3f4751;}
:root[data-theme=dark] .tbl th{background:#2c333c;}
:root[data-theme=dark] .qa{background:#23272f;border-color:#5a5238;}
:root[data-theme=dark] .qa-note{color:#a59c87;}
:root[data-theme=dark] .qa textarea{background:#1b1f25;border-color:#4a525c;color:var(--ink);}
:root[data-theme=dark] .ai-ans{background:#222831;border-color:#36506b;}
:root[data-theme=dark] .undo{color:#b0a78f;}
:root[data-theme=dark] .t-head{color:#a59c87;}
:root[data-theme=dark] .choice{background:#242a31;border-color:#4a525c;}
:root[data-theme=dark] .choice:hover{background:#2b323b;}
:root[data-theme=dark] .choice.sel-ok,:root[data-theme=dark] .choice.reveal{background:#203026;border-color:var(--green);}
:root[data-theme=dark] .choice.sel-ng{background:var(--red-soft);border-color:var(--red);}
:root[data-theme=dark] .expl{background:#262219;border-color:var(--line);}
:root[data-theme=dark] footer{color:#8d8676;}
#themeBtn{position:fixed;top:10px;right:10px;z-index:999;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:18px;padding:5px 12px;font-size:12.5px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.18);font-family:inherit;line-height:1.4;}
#themeBtn:active{transform:translateY(1px);}
</style>
</head>

  ]}
];

const LECTURES = {
  u11: `
<p>マネジメント系の最初のテーマは「システムはどんな手順で作られるか」。来年からぐりさんが毎日身を置く世界の地図です。試験対策と新人研修の予習を兼ねて、流れを物語として頭に入れましょう。</p>

<h3 class="sec">1. 開発の全体像 ── 上流から下流へ</h3>
<p>システム開発は、おおむね次の工程で進みます（この一連の流れや用語の共通定義は<span class="kw">共通フレーム（SLCP：Software Life Cycle Process）</span>として標準化されています）。</p>
<p><b>要件定義 → システム設計 → プログラミング → テスト → 受入れ → 運用・保守</b></p>
<table class="tbl">
<tr><th>工程</th><th>やること</th></tr>
<tr><td><span class="kw">要件定義</span></td><td>利用者の要求を整理し、システムが満たすべき機能・性能を明確にする（ストラテジ系の最終単元で学んだ内容）。</td></tr>
<tr><td><span class="kw">システム設計</span></td><td>要件を実現する仕組みを設計する。利用者から見える画面や帳票を決める<b>外部設計</b>と、内部の処理方式を決める<b>内部設計</b>に分かれる。</td></tr>
<tr><td><span class="kw">プログラミング</span></td><td>設計書に従ってコードを書く。</td></tr>
<tr><td><span class="kw">テスト</span></td><td>段階的に検証する（次節で詳述）。</td></tr>
<tr><td><span class="kw">受入れ</span></td><td><b>発注者（利用者側）が</b>、要求どおりかを確認して検収する。</td></tr>
<tr><td><span class="kw">運用・保守</span></td><td>稼働後の監視、障害対応、機能改善。システムの一生の大半はここ。</td></tr>
</table>
<div class="why"><div class="why-t">なぜ？ ── バグは「上流」で見つけるほど安く済むのか</div>
要件定義の誤りに要件定義の段階で気づけば、直すのは文書1枚です。ところが同じ誤りにテスト段階で気づくと、設計書・プログラム・テスト項目のすべてを作り直すことになり、修正コストは数十倍から百倍に膨らむと言われます。稼働後の発覚なら、顧客への影響や信用問題まで加わります。「<b>手戻りは下流ほど高くつく</b>」——この原理が、上流工程のレビューや要件定義の品質がうるさく言われる理由であり、後で学ぶウォーターフォール型が「各工程の完了をきっちり確認してから次へ進む」設計になっている理由でもあります。</div>

<h3 class="sec">2. テストの階層 ── 小さく確かめ、大きく確かめる</h3>
<div style="margin:16px auto;padding:14px 12px 10px;background:var(--card);border:1px solid var(--line);border-radius:10px;">
<svg viewBox="0 0 560 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="テストの階層。単体・結合・システム・受入の順に範囲を広げる" style="width:100%;height:auto;max-width:520px;display:block;margin:0 auto;color:var(--ink);font-family:'Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',sans-serif;">
<defs><marker id="tlA" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#5a8fc7"/></marker></defs>
<text x="280" y="22" text-anchor="middle" font-size="16" font-weight="700" fill="currentColor">テストの階層 ── 範囲を小さく→大きく</text>
<rect x="18" y="64" width="124" height="68" rx="8" fill="rgba(58,110,165,.13)" stroke="currentColor" stroke-opacity="0.25"/>
<text x="80" y="92" text-anchor="middle" font-size="12.5" font-weight="700" fill="currentColor">単体テスト</text>
<text x="80" y="112" text-anchor="middle" font-size="10" fill="currentColor" fill-opacity="0.72">部品ごと</text>
<rect x="156" y="64" width="124" height="68" rx="8" fill="rgba(58,110,165,.13)" stroke="currentColor" stroke-opacity="0.25"/>
<text x="218" y="92" text-anchor="middle" font-size="12.5" font-weight="700" fill="currentColor">結合テスト</text>
<text x="218" y="112" text-anchor="middle" font-size="10" fill="currentColor" fill-opacity="0.72">つないで連携</text>
<rect x="294" y="64" width="124" height="68" rx="8" fill="rgba(60,122,78,.13)" stroke="currentColor" stroke-opacity="0.25"/>
<text x="356" y="92" text-anchor="middle" font-size="12" font-weight="700" fill="currentColor">システムテスト</text>
<text x="356" y="112" text-anchor="middle" font-size="10" fill="currentColor" fill-opacity="0.72">全体を本番想定</text>
<rect x="432" y="64" width="124" height="68" rx="8" fill="rgba(60,122,78,.13)" stroke="currentColor" stroke-opacity="0.25"/>
<text x="494" y="92" text-anchor="middle" font-size="12.5" font-weight="700" fill="currentColor">受入テスト</text>
<text x="494" y="112" text-anchor="middle" font-size="10" fill="currentColor" fill-opacity="0.72">利用者が確認</text>
<line x1="142" y1="98" x2="155" y2="98" stroke="#5a8fc7" stroke-width="2" marker-end="url(#tlA)"/>
<line x1="280" y1="98" x2="293" y2="98" stroke="#5a8fc7" stroke-width="2" marker-end="url(#tlA)"/>
<line x1="418" y1="98" x2="431" y2="98" stroke="#5a8fc7" stroke-width="2" marker-end="url(#tlA)"/>
<text x="280" y="166" text-anchor="middle" font-size="11" fill="currentColor" fill-opacity="0.7">確認する範囲：小さい部品 → だんだん全体・利用者へ</text>
</svg>
<div style="text-align:center;font-size:12px;color:var(--ink);opacity:.72;margin-top:8px;line-height:1.6;">図：小さい単位から、単体→結合→システム→受入と範囲を広げて確かめる。</div>
</div>
<p>テストは一発勝負ではなく、部品から全体へと段階的に行います。</p>
<table class="tbl">
<tr><th>段階</th><th>確認すること</th></tr>
<tr><td><span class="kw">単体テスト</span></td><td>モジュール（部品）単位で正しく動くか。</td></tr>
<tr><td><span class="kw">結合テスト</span></td><td>モジュールを<b>つないだとき</b>、データの受け渡しが正しいか。</td></tr>
<tr><td><span class="kw">システムテスト</span></td><td>システム全体として、性能や負荷も含め要件を満たすか（開発者側の総仕上げ）。</td></tr>
<tr><td><span class="kw">受入れテスト</span></td><td><b>発注者・利用者側が</b>実際の業務の観点で最終確認する。</td></tr>
</table>
<div class="why"><div class="why-t">なぜ？ ── 最初から全体を一気にテストしてはいけないのか</div>
全体テストでエラーが出たとき、原因が部品Aなのか、部品Bなのか、つなぎ方なのかを切り分けるのは大変です。先に部品単体の正しさを保証しておけば、結合テストで出る不具合は「つなぎ目」に絞り込める——<b>段階を踏むのは、原因の探索範囲を狭めるため</b>です。実験で交絡変数を統制してから本実験に進む発想と同じですね。あわせて、プログラムを修正したときに<b>「直した箇所以外が壊れていないか」を確認し直す<span class="kw">回帰テスト</span>（リグレッションテスト）</b>も頻出です。修正は思わぬ場所に副作用を起こすからです。</div>
<p>テストの設計方法では、内部構造を見ずに入力と出力だけで確認する<span class="kw">ブラックボックステスト</span>と、内部のロジックの通り道に着目する<span class="kw">ホワイトボックステスト</span>の対比を押さえてください。</p>

<h3 class="sec">3. 見積り ── 開発の値段はどう決まる？</h3>
<p>開発規模・工数の見積り手法として、試験では<span class="kw">ファンクションポイント法（FP法：Function Point）</span>が最頻出です。これは<b>画面・帳票・ファイルなどの機能の数と複雑さ</b>からシステムの規模を見積もる方法。ほかに、過去の類似プロジェクトを基にする類推見積り、プログラムの行数で見積もるLOC法（Lines Of Code：プログラムステップ法）があります。</p>
<div class="why"><div class="why-t">なぜ？ ── 行数ではなく「機能の数」で見積もるのか</div>
プログラムの行数は、使う言語や書く人の癖で大きく変わるうえ、<b>コードを書き始める前には分かりません</b>。一方「画面が何枚、帳票が何種類」は要件定義の段階で数えられ、発注者にも意味が通じます。つまりFP法の本質は、<b>開発の早い段階で、利用者に見える価値の単位で測る</b>こと。「言語に依存しない」「外部から見た機能に基づく」という特徴が選択肢の正解キーワードになります。</div>

<h3 class="sec">4. 保守 ── 完成してからが本番</h3>
<p>システムは納品して終わりではありません。障害の修正、法改正への対応、機能の追加・改善といった<span class="kw">ソフトウェア保守</span>が、システムの寿命が尽きるまで続きます。ソフトウェアのライフサイクル全体で見ると、開発よりも運用・保守の期間と費用のほうが大きいのが普通です。ストラテジ系で学んだTCO（総所有費用）の考え方が、ここにつながります。</p>

<h3 class="sec">まとめ</h3>
<ul>
<li>流れ：<b>要件定義→設計（外部・内部）→プログラミング→テスト→受入れ→運用保守</b>。共通の物差しが<span class="kw">共通フレーム</span>。</li>
<li>手戻りは下流ほど高い。テストは<b>単体→結合→システム→受入れ</b>と段階的に。<span class="kw">受入れテストは発注者側</span>が実施。</li>
<li>修正後は<span class="kw">回帰テスト</span>。設計法は<span class="kw">ブラックボックス</span>（入出力）／<span class="kw">ホワイトボックス</span>（内部構造）。</li>
<li>見積りの代表は<span class="kw">FP法</span>＝機能の数と複雑さで測る（言語に依存しない）。</li>
</ul>

<p><span class="kw">アジャイル開発</span>は、<b>短い期間（1〜4週間程度）の反復</b>で「動くソフトウェア」を少しずつ作り、リリースを重ねながら育てていく開発スタイルの総称です。アジャイルソフトウェア開発宣言では、プロセスや文書よりも<b>個人と対話</b>を、包括的なドキュメントよりも<b>動くソフトウェア</b>を、契約交渉よりも<b>顧客との協調</b>を、計画に従うことよりも<b>変化への対応</b>を重視するとされています。</p>
<div class="why"><div class="why-t">なぜ？ ── アジャイルは仕様変更を「歓迎」できるのか</div>
ウォーターフォールでは仕様変更＝積み上げた成果物の破壊なのでコストが膨大です。アジャイルは<b>そもそも「要件は最初には分からない」ことを前提</b>に設計されています。短い反復ごとに動くものを顧客に見せてフィードバックをもらうので、認識のズレは数週間単位で修正され、傷が浅いうちに直せる。優先順位の高い機能から作るため、途中で計画が変わっても「すでに価値のある部分は完成している」状態を保てます。つまりアジャイルの本質は「速く作る」ことではなく、<b>学びながら作ることで不確実性に対応する</b>ことです。ストラテジ系で学んだリーンスタートアップ（小さく試して早く学ぶ）と同じ思想が、開発プロセスに現れた形と言えます。</div>
<p>アジャイルの代表的な実践方法を2つ押さえましょう。</p>
<table class="tbl">
<tr><th>手法</th><th>キーワード</th></tr>
<tr><td><span class="kw">スクラム</span></td><td>開発を<span class="kw">スプリント</span>と呼ぶ固定期間の反復で回す。毎日の短い<b>デイリースクラム</b>（朝会）で状況を共有し、スプリントの終わりに成果のレビューと<b>ふりかえり</b>を行う。</td></tr>
<tr><td><span class="kw">XP</span>（エクストリームプログラミング）</td><td>2人1組でコードを書く<span class="kw">ペアプログラミング</span>、テストを先に書く<span class="kw">テスト駆動開発</span>、外部から見た動作を変えずに内部構造を改善する<span class="kw">リファクタリング</span>などの技術的実践を重視。</td></tr>
</table>
<div class="ex"><div class="ex-t">具体例</div>スマホアプリが毎週のようにアップデートされるのはアジャイル開発の現れです。一方、銀行の勘定系システムや航空管制のような「絶対に止まれない・要件が固い」システムでは、今もウォーターフォール型の堅い管理が選ばれます。<b>どちらが優れているかではなく、不確実性の大きさで使い分ける</b>のが正解です。</div>

<h3 class="sec">3. DevOpsとその他の手法</h3>
<ul>
<li><span class="kw">DevOps</span>：開発（Development）と運用（Operations）が壁を作らず<b>連携・協力</b>し、ツールによる自動化も活用して、リリースのサイクルを速く安全に回す考え方。従来は「新機能を出したい開発」と「安定稼働を守りたい運用」が対立しがちでした。その壁を壊すのがDevOpsです。</li>
<li><span class="kw">リバースエンジニアリング</span>：既存のソフトウェアを解析して、設計情報や仕様を<b>逆に取り出す</b>こと。ドキュメントが失われた古いシステムの分析などに使われます。</li>
<li><span class="kw">モックアップ</span>：画面の見た目を確認するための模型。プロトタイプの簡易版として要件のすり合わせに使います。</li>
</ul>

<h3 class="sec">まとめ</h3>
<ul>
<li><span class="kw">ウォーターフォール</span>＝工程を順に、後戻りしない。管理しやすいが<b>動くものが最後まで見えず、変更に弱い</b>。</li>
<li><span class="kw">プロトタイピング</span>＝試作品で早期に認識合わせ。<span class="kw">スパイラル</span>＝分割して繰り返す。</li>

<li><span class="kw">DevOps</span>＝開発と運用の協調＋自動化。</li>
</ul>

<p>「プロジェクト」という言葉は日常でも使いますが、試験では厳密な意味があります。この単元では、プロジェクトとは何かから始めて、計画づくりの中心道具であるWBSとスケジュール管理（ガントチャート・クリティカルパス）まで進みます。計算問題も出ますが、考え方さえつかめば確実な得点源です。</p>

<h3 class="sec">1. プロジェクトとは ── 「いつもの仕事」との違い</h3>
<p><span class="kw">プロジェクト</span>とは、独自の成果物やサービスを生み出すために実施される、<b>始まりと終わりが定められた（有期性）</b>、<b>一度限りの（独自性）</b>活動です。毎日繰り返される経理処理や店舗運営のような<b>定常業務</b>と対比されます。「期限が来れば解散する」「同じものは二つとない」がプロジェクトの本質です。</p>
<p>プロジェクトを成功に導く管理活動が<span class="kw">プロジェクトマネジメント</span>で、知識体系として<span class="kw">PMBOK</span>（Project Management Body of Knowledge）が国際的に参照されています。管理対象は、スコープ・スケジュール・コスト・品質・資源・コミュニケーション・リスク・調達・ステークホルダーなど多岐にわたり、特に<b>品質（Quality）・コスト（Cost）・納期（Delivery）のバランス（QCD）</b>が中心テーマです。</p>
<div class="why"><div class="why-t">なぜ？ ── QCDは「バランス」と言われるのか（3つは綱引きする）</div>
品質を上げるには時間とお金がかかり、納期を縮めれば人を増やしてコストが上がるか、品質が犠牲になります。3つを同時に最大化することは原理的にできません。だからプロジェクトマネジメントの仕事は「全部がんばる」ことではなく、<b>関係者と合意した優先順位に基づいてトレードオフを管理する</b>ことになります。なお、納期に遅れそうだから人を倍に増やせば速くなる——とは限らない点も重要です。新しい人への説明や連絡の手間が増えるため、<b>遅れているプロジェクトへの安易な人員追加はかえって遅らせる</b>ことがある、という有名な経験則（ブルックスの法則）があります。</div>

<h3 class="sec">2. WBS ── 大きな仕事は、割らないと測れない</h3>

<p><span class="kw">WBS</span>（Work Breakdown Structure）は、プロジェクトの全作業を<b>階層的に分解した図</b>です。「システム開発」を「設計」「製造」「テスト」に分け、「設計」をさらに「画面設計」「DB設計」へ……と、見積りや担当割り当てができる大きさ（ワークパッケージ）まで砕いていきます。</p>
<div class="why"><div class="why-t">なぜ？ ── まず「分解」から始めるのか</div>
「システム開発に何か月かかる？」には誰も正確に答えられませんが、「ログイン画面の設計に何日かかる？」なら経験から見積もれます。<b>人間は大きすぎる仕事を直接見積もれない</b>ので、測れるサイズまで割るのです。さらにWBSには（1）作業の<b>漏れを防ぐ</b>（全体を構造的に洗い出すから抜けに気づける）、（2）<b>責任を割り当てる単位</b>になる、（3）進捗を測る物差しになる、という効果があります。卒論を「章ごと・節ごとのタスク」に割ると急に進み始める、あの感覚の組織版です。スケジュールもコストも品質計画も、すべてWBSを土台に作られる——「<b>計画の出発点はWBS</b>」と覚えてください。</div>

<h3 class="sec">3. スケジュール管理 ── ガントチャートとクリティカルパス</h3>

</div>
<p>スケジュールの代表的な道具を2つ押さえます。</p>
<table class="tbl">
<tr><th>図</th><th>得意なこと</th></tr>
<tr><td><span class="kw">ガントチャート</span></td><td>縦に作業項目、横に時間を取り、作業の<b>期間と進捗</b>を棒で表す。直感的で進捗確認に強いが、作業同士の依存関係は読み取りにくい。</td></tr>
<tr><td><span class="kw">アローダイアグラム</span>（PERT図）</td><td>作業の<b>順序関係・依存関係</b>を矢印の網で表す。「どの作業が終わらないと次に進めないか」が分かり、クリティカルパスを求められる。</td></tr>
</table>
<p><span class="kw">クリティカルパス</span>とは、開始から完了までの経路のうち<b>所要時間が最も長い経路</b>のこと。この経路上の作業には余裕（フロート）が一切なく、<b>1日の遅れがそのままプロジェクト全体の遅れになります</b>。</p>
<div class="ex"><div class="ex-t">具体例で計算</div>カレー作りで考えます。「米を研いで炊く（40分）」と「野菜を切って煮込む（30分）」は並行ででき、最後に「盛り付け（5分）」が両方の完了を待つとします。完成までの最短時間は、長いほうの経路 40分＋5分＝<b>45分</b>。クリティカルパスは「炊飯→盛り付け」の経路です。煮込みは10分遅れても全体に影響しません（フロート10分）が、炊飯が5分遅れたら完成も5分遅れます。試験の計算問題も、<b>各経路の合計を出して最長を選ぶ</b>だけです。</div>
<div class="why"><div class="why-t">なぜ？ ── 「最長の経路」こそが管理の主役なのか</div>
プロジェクトの完了時刻は、いちばん遅い経路が決めます。だから納期を守りたければ、数ある作業のうち<b>クリティカルパス上の作業を重点的に監視・支援する</b>のが最も効率的です（限られた管理資源の集中——ストラテジ系のABC分析と同じ発想）。逆に、納期を縮めたいときも、クリティカルパス上の作業を短縮しない限り全体は1日も縮みません。「どこを急がせれば意味があるか」を教えてくれるのがこの分析の価値です。</div>
<p>そのほか、プロジェクトの重要な節目（中間レビュー、リリース判定など）を<span class="kw">マイルストーン</span>と呼びます。</p>

<h3 class="sec">まとめ</h3>
<ul>
<li>プロジェクト＝<b>有期性・独自性</b>のある活動（定常業務との対比が頻出）。</li>
<li>管理の中心は<b>QCDのトレードオフ</b>。安易な増員は逆効果のことも（ブルックスの法則）。</li>
<li><span class="kw">WBS</span>＝作業の階層分解。見積り・漏れ防止・責任割当ての土台。</li>
<li><span class="kw">ガントチャート</span>＝期間と進捗、<span class="kw">アローダイアグラム</span>＝依存関係。<span class="kw">クリティカルパス</span>＝最長経路で、ここの遅れ＝全体の遅れ。</li>
</ul>

  u22: `
<p>計画（WBSとスケジュール）ができたら、次は実行中の管理です。この単元では、品質・コスト・リスク・変更・コミュニケーションという、プロジェクトを「炎上させないための管理」を学びます。試験ではリスク対応の4分類が最頻出です。</p>

<h3 class="sec">1. 品質マネジメント ── 欠陥は早く・体系的に見つける</h3>
<p>品質を確保する基本は、成果物を複数の目で点検する<span class="kw">レビュー</span>です。設計書を検討する<b>デザインレビュー</b>、コードを点検する<b>コードレビュー</b>など、各工程の出口で行います。前単元で学んだ「手戻りは下流ほど高い」の実践です。</p>
<p>テスト工程では、発見したバグの件数を時間軸で追跡します。テストを進めるにつれてバグの累積発見数の伸びが緩やかになっていけば、品質が安定してきたと判断できます（信頼度成長曲線）。「バグがもう出ないから品質が良い」とは限らず、<b>テストが不十分なだけ</b>の可能性もある——数字の解釈には注意が必要です。</p>

<h3 class="sec">2. コストマネジメント ── 予算と実績の突き合わせ</h3>
<p>WBSを基に見積もった予算に対して、実際の支出と作業の進み具合を突き合わせて管理します。重要なのは「使った金額」だけでは進捗を判断できないことです。予算の半分を使っていても、作業が3割しか進んでいなければ赤信号。<b>「いくら使ったか」と「どれだけ出来上がったか」を別々に測って比べる</b>のがコスト管理の基本発想です（この考え方を体系化したものがEVM（Earned Value Management）＝出来高管理と呼ばれます）。</p>
<p>工数の単位<span class="kw">人月</span>（にんげつ）の計算も定番です。1人月＝1人が1か月働く作業量。「20人月の作業を5か月で終えるには 20÷5＝4人必要」「6人で3か月かかる作業は 6×3＝18人月」のように、<b>人数×期間＝工数</b>の掛け算・割り算だけで解けます（令和4・5年度に出題）。ただし前単元で学んだとおり、人を倍にすれば期間が半分になるとは限らない（ブルックスの法則）という落とし穴も合わせて意識しておきましょう。</p>

<h3 class="sec">3. リスクマネジメント ── 起きる前に手を打つ</h3>
<p><span class="kw">リスクマネジメント</span>は、<b>リスクの特定 → 分析・評価（発生確率×影響度で優先順位づけ） → 対応 → 監視</b>というプロセスで進めます。試験のヤマは対応策の4分類です。</p>
<table class="tbl">
<tr><th>対応</th><th>意味</th><th>例</th></tr>
<tr><td><span class="kw">回避</span></td><td>リスクの<b>原因そのものを取り除く</b>。計画を変えてリスクに近づかない。</td><td>実績のない新技術の採用をやめる</td></tr>
<tr><td><span class="kw">軽減（低減）</span></td><td>発生確率や影響度を<b>下げる</b>。</td><td>テストを増やす、要員を教育する</td></tr>
<tr><td><span class="kw">転嫁（移転）</span></td><td>リスクの影響を<b>第三者に移す</b>。</td><td><b>保険に入る</b>、難しい部分を専門会社に委託する</td></tr>
<tr><td><span class="kw">受容</span></td><td>あえて<b>何もせず受け入れる</b>（対策費に見合わない小さなリスク）。</td><td>発生時の予備費だけ確保しておく</td></tr>
</table>
<div class="why"><div class="why-t">なぜ？ ── 4つも対応がある（全部「軽減」ではだめな）のか</div>
リスク対策にはコストがかかるからです。発生確率も影響も大きいリスクは原因ごと断つ（回避）価値がありますが、めったに起きない小さなリスクまで対策していたら、対策費でプロジェクトが赤字になります。そこで「<b>発生確率×影響度</b>」の大きさに応じて、かけるコストを変える——大きいものは回避・軽減、自分で抱えきれない巨大損失は保険で転嫁、小さいものは受容、という資源配分の考え方なのです。試験では「保険をかける＝転嫁」「中止して別の方法にする＝回避」の対応づけが定番。なお、リスクには「為替が有利に動く」のような<b>好機（プラスのリスク）</b>も含める、という出題もあります。</div>

<h3 class="sec">4. スコープと変更の管理 ── 「ちょっとした追加」が一番怖い</h3>
<p><span class="kw">スコープ</span>とは、プロジェクトで作る成果物と作業の<b>範囲</b>のことです。実行中に「ついでにこの機能も」「ボタン1個だけだから」と小さな追加が積み重なり、気づけば納期も予算も崩壊する——この現象は<b>スコープクリープ</b>と呼ばれ、炎上の典型原因です。</p>
<div class="why"><div class="why-t">なぜ？ ── 小さな追加要望を「その場の善意」で受けてはいけないのか</div>
1つひとつの追加は数日の作業でも、QCDは綱引きの関係なので、<b>どこかの工数が増えれば必ず納期・コスト・品質のどれかが押されます</b>。しかも口約束の追加は計画に記録されないため、遅れの原因が後から見えなくなり、責任の所在も曖昧になります。だからプロジェクトでは<b>変更管理</b>の手続き——変更要求を文書で受け、影響（納期・費用）を評価し、関係者の承認を得てから計画に反映する——を必ず通します。「変更を拒否する」のではなく「<b>変更を見える化して合意の上で取り込む</b>」のがポイントです。エンジニアになったとき、善意の「いいですよ」が自分のチームを苦しめることがある、と覚えておいてください。</div>

<h3 class="sec">5. コミュニケーションマネジメント</h3>
<p>進捗報告の会議体、報告書の形式、情報共有のルールを定めて運用します。実務上の鉄則は<b>「悪い報せほど早く」</b>。問題は隠すほど対応の選択肢が減り、傷が深くなります。メンバーが悪い報告をためらわない雰囲気（心理的安全性）を作ることも、マネジメントの一部です——これもぐりさんの専門領域が活きる話ですね。</p>

<h3 class="sec">まとめ</h3>
<ul>
<li>品質は<span class="kw">レビュー</span>で上流から確保。バグ件数の推移で品質の安定を見る。</li>
<li>コストは「使った額」と「出来上がった量」を<b>別々に測って比較</b>。</li>
<li>リスク対応4分類：<b>回避（原因を断つ）／軽減（確率・影響を下げる）／転嫁（保険・委託）／受容（あえて何もしない）</b>。</li>
<li><span class="kw">スコープ</span>＝成果物と作業の範囲。安易な追加（スコープクリープ）は変更管理の手続きで統制する。</li>
</ul>

<p><span class="kw">ITサービスマネジメント</span>とは、ITを「システム（モノ）」ではなく「サービス」として捉え、利用者に安定した品質で提供し続けるための管理活動です。その成功事例を体系化した<b>ベストプラクティス集（事実上の標準的な手引き）</b>が<span class="kw">ITIL</span>（Information Technology Infrastructure Library）です。「ITILとは何か」を問う問題では「ITサービスマネジメントのベストプラクティスをまとめたフレームワーク」が正解の軸になります。</p>

<h3 class="sec">2. SLAとSLM ── サービス品質を「約束」する</h3>
<p><span class="kw">SLA</span>（Service Level Agreement：サービスレベル合意書）は、サービスの提供者と利用者の間で、<b>品質の水準を数値で合意した文書</b>です。「稼働率99.9％以上」「障害時は2時間以内に一次回答」など、測定可能な指標で取り決めます。そして、合意したサービスレベルを維持・改善し続ける活動が<span class="kw">SLM</span>（Service Level Management：サービスレベル管理）です。</p>
<div class="why"><div class="why-t">なぜ？ ── サービス品質を「数値」で約束するのか</div>
「しっかり運用します」という言葉の「しっかり」は、提供者と利用者で思い描く水準が違います。利用者は「絶対止まらない」を期待し、提供者は「営業時間内なら」のつもりかもしれない——この<b>期待のズレが、障害が起きた瞬間に紛争へ変わる</b>のです。数値で合意しておけば、達成・未達成が客観的に判定でき、未達成時の対応（料金減額など）も事前に決められます。ストラテジ系で学んだ「非機能要件を数値で言語化する」のと同じ思想の運用版です。なお、稼働率99.9％でも年間約8.8時間は停止し得ます。<b>100％の保証は現実には不可能</b>なので、「SLA＝無停止の保証」という選択肢は誤りです。</div>
<p>サービスの信頼性を測る指標も頻出です。<span class="kw">MTBF</span>（Mean Time Between Failures：平均故障間隔）＝故障せずに動き続ける時間の平均、<span class="kw">MTTR</span>（Mean Time To Repair：平均修復時間）＝故障してから直るまでの時間の平均。そして<b>稼働率＝MTBF ÷（MTBF＋MTTR）</b>です。たとえばMTBF＝90時間、MTTR＝10時間なら、稼働率は90÷100＝90％。「MTBFを<b>長く</b>、MTTRを<b>短く</b>するほど稼働率が上がる」という関係ごと覚えれば、改善事例を選ぶ問題（令和5・7年度に出題）にも対応できます。</p>

<h3 class="sec">3. インシデント管理と問題管理 ── 「早く戻す」と「根本を断つ」</h3>
<p>運用管理のプロセスで最も問われるのが、この2つの区別です。</p>
<table class="tbl">

<tr><td><span class="kw">インシデント管理</span></td><td>サービスの中断や品質低下が起きたとき、<b>一刻も早くサービスを復旧</b>させる。</td><td>とりあえず代替プリンタに切り替えて業務を再開させる</td></tr>
<tr><td><span class="kw">問題管理</span></td><td>インシデントの<b>根本原因を究明</b>し、再発を防止する。</td><td>後日、故障の原因（部品の劣化）を特定し、点検計画を見直す</td></tr>

<div class="why"><div class="why-t">なぜ？ ── 「復旧」と「原因究明」を別のプロセスに分けるのか</div>
障害の真っ最中に原因の徹底調査を始めると、<b>その間ずっと利用者は業務が止まったまま</b>です。逆に、応急処置だけで済ませ続けると、同じ障害が何度も再発します。つまり「早く戻す」と「根本を断つ」は、必要な時間軸もスキルも違う別の仕事なのです。だからITILは、まず暫定対応でもよいから復旧を最優先し（インシデント管理）、落ち着いてから根本原因に取り組む（問題管理）と役割を分けました。試験では「インシデント管理の目的＝根本原因の究明」とすり替えた選択肢が定番のひっかけです。</div>
<p>関連プロセスとして、システムへの変更を安全に行うための<b>変更管理</b>、変更を本番環境へ展開する<b>リリース管理</b>も覚えておきましょう。</p>

<h3 class="sec">4. サービスデスク ── 利用者との単一窓口</h3>
<p><span class="kw">サービスデスク</span>は、利用者からの問い合わせを<b>一元的に受け付ける単一の窓口（SPOC：Single Point Of Contact）</b>です。よくある質問への自己解決を促すFAQやチャットボットを整備し、自分たちで解決できない案件は専門部署へ引き継ぎます（<span class="kw">エスカレーション</span>）。窓口を一本化することで、利用者は「どこに聞けばいいか」で迷わず、問い合わせの記録・分析も集約されます。</p>

<h3 class="sec">5. ファシリティマネジメント ── 設備でサービスを守る</h3>
<p>ITサービスは、電源や建物といった<b>物理的な基盤</b>の上に成り立っています。設備の維持管理が<span class="kw">ファシリティマネジメント</span>です。</p>

    { q:"設計書やソースコードを作成者と関係者が読み合わせ、誤りを早期に発見する活動はどれか。", c:["リファクタリング","レビュー","回帰テスト","ベンチマーク"], a:1, e:"レビューは人の目で成果物を確認し欠陥を早期に取り除く活動で、ウォークスルーやインスペクションがあります。下流で見つかるほど修正費用が高くなるため上流での発見が重要です。" },
    { q:"ソフトウェアを機能のまとまりごとに部品化して開発する利点として、最も適切なものはどれか。", c:["全体を一度に作るため計画が不要になる","部品ごとに分担・再利用でき保守もしやすい","テストが一切不要になる","必ず処理速度が向上する"], a:1, e:"モジュール化すると分担開発・再利用・部分的な修正がしやすく、保守性が高まります。テストが不要になったり速度が必ず上がったりするわけではありません。" },
    { q:"プログラムの内部構造（命令や分岐）に着目し、すべての処理が通るかを確認するテスト手法はどれか。", c:["ホワイトボックステスト","ブラックボックステスト","受入れテスト","負荷テスト"], a:0, e:"ホワイトボックステストは内部のロジックの通り道を網羅するように行うテストで、主に単体テストで使われます。内部を見ず入出力だけ確認するのがブラックボックステストです。" },
    { q:"システムを部分に分け、各部分で設計・開発・評価を繰り返しながららせん状に完成度を高める開発モデルはどれか。", c:["スパイラルモデル","ウォーターフォールモデル","RAD","リバースエンジニアリング"], a:0, e:"スパイラルモデルは独立性の高い部分ごとに開発を反復し、リスクを抑えながら段階的に完成させます。上流から一方向に進むのがウォーターフォール、既存ソフトから設計を取り出すのがリバースエンジニアリングです。" },
    { q:"先にテストコードを書いてから、それに通るように本体のプログラムを実装していく開発手法はどれか。", c:["テスト駆動開発（TDD）","ウォーターフォール開発","プロトタイピング","ペアプログラミング"], a:0, e:"テスト駆動開発はテストを先に書く→通す→改善（リファクタリング）を小さく繰り返す手法で、品質と設計の良さを保ちやすくなります。アジャイル開発でよく用いられます。" },
    { q:"オブジェクト指向の設計で、クラス図やユースケース図などを用いてシステムを表現する統一的な表記法はどれか。", c:["UML","DFD","E-R図","BPMN"], a:0, e:"UML（Unified Modeling Language）はクラス図・ユースケース図・シーケンス図などからなる統一モデリング言語です。DFDはデータの流れ、E-R図はデータ構造を表します。" },
    { q:"システム開発における外部設計の説明として、適切なものはどれか。", c:["利用者から見える画面や帳票などを設計する","プログラム内部のロジックやデータ構造を設計する","プログラムを実際にコーディングする","完成したシステムを検収する"], a:0, e:"外部設計は利用者の視点で画面・帳票・操作などインタフェースを決めます。内部設計は開発者の視点で内部のロジックやデータ構造を決めます。" },
    { q:"多数の利用者が同時にアクセスする状況を想定し、システムが性能を保てるかを確認するテストはどれか。", c:["負荷テスト","単体テスト","回帰テスト","受入れテスト"], a:0, e:"負荷テスト（性能テスト）はピーク時のアクセスや大量データでも応答時間などの性能要件を満たすかを確認します。非機能要件の検証として重要です。" },
    { q:"アジャイルソフトウェア開発宣言が重視する価値観として、適切なものはどれか。", c:["包括的なドキュメントより動くソフトウェアを重視する","顧客との協調より契約交渉を重視する","変化への対応より計画に従うことを重視する","個人と対話よりプロセスとツールを重視する"], a:0, e:"アジャイル開発宣言は、ドキュメントより動くソフトウェア、交渉より顧客との協調、計画遵守より変化への対応、プロセスより個人と対話を重視します。各対比の前者が重視する側です。" },
    { q:"プログラムをモジュール単位で個別に検証するテストはどれか。", c:["単体テスト","結合テスト","システムテスト","運用テスト"], a:0, e:"単体テストは最小単位のモジュールが正しく動くかを個別に確認します。次にモジュール間を結ぶ結合テスト、全体のシステムテスト、本番環境での運用テストへ進みます。" },
    { q:"システム開発における内部設計の説明として、適切なものはどれか。", c:["プログラム内部の処理手順やデータ構造を設計する","利用者向けの画面や帳票を設計する","利用者の要求を整理する","完成物を検収する"], a:0, e:"内部設計は開発者の視点で、外部設計で決めた機能をどう実現するか（処理手順・モジュール分割・データ構造）を決めます。利用者視点で画面などを決めるのは外部設計です。" },
    { q:"既存のソフトウェアを解析して、その設計や仕様を明らかにすることを何と呼ぶか。", c:["リバースエンジニアリング","フォワードエンジニアリング","リファクタリング","リエンジニアリング"], a:0, e:"リバースエンジニアリングは完成品から設計情報を取り出す手法で、仕様書のない既存システムの保守などに使われます。設計から実装へ進む通常の流れはフォワードエンジニアリングです。" },
    { q:"オブジェクト指向で、データとその操作を一つにまとめ、内部を隠ぺいする考え方はどれか。", c:["カプセル化","継承","多態性（ポリモーフィズム）","正規化"], a:0, e:"カプセル化はデータと手続きを一体にし外部から直接いじれないよう隠ぺいする仕組みで、安全性と保守性を高めます。継承は性質の引き継ぎ、多態性は同じ操作で異なる振る舞いをすることです。" },
    { q:"DevOpsの考え方を表す取り組みとして、最も適切なものはどれか。", c:["開発と運用が協力し、ツールで自動化して頻繁かつ安全にリリースする","開発と運用を完全に分離し互いに干渉しない","仕様凍結後は一切変更を受け付けない","テストを最後にまとめて手作業で行う"], a:0, e:"DevOpsは開発（Dev）と運用（Ops）が連携し、CI/CDなどの自動化で小さく速く安全にリリースを繰り返す文化・手法です。分離や変更拒否はむしろ対立を生みます。" },
    { q:"システム開発プロセスの順序として、適切なものはどれか。",
      c:["プログラミング → 要件定義 → システム設計 → テスト",
         "要件定義 → システム設計 → プログラミング → テスト",
         "システム設計 → 要件定義 → テスト → プログラミング",
         "要件定義 → テスト → システム設計 → プログラミング"],
      a:1,
      e:"上流から、要件定義（何を作るか）→設計（どう作るか）→プログラミング（作る）→テスト（確かめる）の順です。手戻りは下流ほど高くつくため、各工程の品質確認が重視されます。" },
    { q:"受入れテストの説明として、最も適切なものはどれか。",
      c:["開発者がモジュール単位で動作を確認するテスト",
         "開発者がモジュール間のデータの受け渡しを確認するテスト",
         "発注者側が、要求どおりにシステムが動作するかを確認するテスト",
         "プログラム修正後に、修正箇所以外に影響がないかを確認するテスト"],
      a:2,
      e:"受入れテストは発注者（利用者側）が実施して検収する点が最大の特徴です。モジュール単位は単体テスト、受け渡し確認は結合テスト、修正の影響確認は回帰テストです。" },
    { q:"プログラムを修正した際に、修正した箇所以外の部分に意図しない影響が出ていないかを確認するテストはどれか。",
      c:["単体テスト","回帰テスト","受入れテスト","負荷テスト"],
      a:1,
      e:"回帰テスト（リグレッションテスト）は「直したら別の場所が壊れた」を検出するためのテストです。修正は思わぬ副作用を生むため、修正のたびに既存機能の再確認が必要になります。" },
    { q:"プログラムの内部構造には着目せず、入力と出力の関係が仕様どおりかを確認するテストの方法はどれか。",
      c:["ホワイトボックステスト","ブラックボックステスト","リファクタリング","レビュー"],
      a:1,
      e:"内部を見ない（箱の中が黒くて見えない）のがブラックボックステスト、内部のロジックの通り道に着目するのがホワイトボックステストです。" },
    { q:"ファンクションポイント法の説明として、適切なものはどれか。",
      c:["プログラムの行数を基にシステムの規模を見積もる",
         "画面や帳票などの機能の数と複雑さを基にシステムの規模を見積もる",
         "過去の類似プロジェクトの実績を基に全体を見積もる",
         "開発者の人数と期間を掛け合わせて費用を見積もる"],
      a:1,
      e:"FP法は「外部から見た機能」の数と複雑さで測るため、プログラミング言語に依存せず、開発の早い段階で見積もれるのが特徴です。行数ベースはLOC法、類似実績ベースは類推見積りです。" },
    { q:"ウォーターフォールモデルの特徴として、最も適切なものはどれか。",
      c:["短い反復を繰り返しながら、動くソフトウェアを少しずつ成長させる",
         "工程を上流から下流へ順番に進め、原則として前の工程に戻らない",
         "試作品を早期に作成して、利用者と認識を合わせる",
         "開発と運用が連携し、リリースの自動化を進める"],
      a:1,
      e:"ウォーターフォール（滝）は上から下へ流れて戻らないイメージです。反復で成長させるのはアジャイル、試作品はプロトタイピング、開発と運用の連携はDevOpsです。" },
    { q:"アジャイル開発の特徴として、最も適切なものはどれか。",
      c:["最初にすべての要件を確定させ、変更を受け付けずに開発する",
         "短い期間の反復で動くソフトウェアを作り、変化に柔軟に対応する",
         "すべての工程の文書を完成させてから、プログラミングに着手する",
         "テストをすべて開発の最終段階にまとめて実施する"],
      a:1,
      e:"アジャイルは「要件は最初には固まらない」前提で、短い反復（イテレーション）と顧客のフィードバックにより変化へ対応します。文書や計画より「動くソフトウェア」と「変化への対応」を重視します。" },
    { q:"スクラムにおいて、開発を区切る固定期間の反復を表す用語はどれか。",
      c:["スプリント","マイルストーン","ワークパッケージ","エスカレーション"],
      a:0,
      e:"スクラムでは1〜4週間程度の固定期間「スプリント」を単位に開発を回し、毎日の短い会議（デイリースクラム）や、終了時のふりかえりを行います。" },
    { q:"外部から見たプログラムの動作を変えずに、保守しやすいように内部構造を改善することを表す用語はどれか。",
      c:["リバースエンジニアリング","リファクタリング","プロトタイピング","ペアプログラミング"],
      a:1,
      e:"リファクタリングは「動作はそのまま、中身をきれいに」する活動で、XPの実践の一つです。リバースエンジニアリングは既存ソフトから設計情報を取り出すこと、ペアプログラミングは2人1組での開発です。" },
    { q:"2人のプログラマが1台のコンピュータに向かい、対話しながら共同でプログラムを作成する手法はどれか。",
      c:["ペアプログラミング","テスト駆動開発","モブレビュー","ウォークスルー"],
      a:0,
      e:"ペアプログラミングはXPの実践の一つで、書き手と確認役が対話しながら開発することで、品質向上と知識共有を同時に実現します。" },
    { q:"開発担当と運用担当が密接に連携・協力し、自動化ツールも活用してリリースを迅速かつ安全に繰り返す考え方はどれか。",
      c:["DevOps","SLA","BPO","RFP"],
      a:0,
      e:"Development（開発）とOperations（運用）を組み合わせた言葉がDevOpsです。「新機能を出したい開発」と「安定を守りたい運用」の対立構造を、協調と自動化で解消します。" },
    { q:"開発の早い段階で試作品を作成し、利用者に確認してもらうことで要求とのずれを早期に解消する開発モデルはどれか。",
      c:["ウォーターフォールモデル","プロトタイピングモデル","スパイラルモデル","リバースエンジニアリング"],
      a:1,
      e:"プロトタイプ（試作品）で「思っていたのと違う」を早期に発見するのがプロトタイピングモデルです。スパイラルモデルは分割した部分ごとに設計と開発を繰り返す方式です。" }
  ],
  2: [
    { q:"アジャイル開発で、残作業量の推移を時間軸で表して進捗を把握するために使うグラフはどれか。", c:["バーンダウンチャート","パレート図","散布図","E-R図"], a:0, e:"バーンダウンチャートは縦軸に残作業量、横軸に時間をとり、右下がりの線で残量を可視化します。予定線とのズレで遅れを早期に察知できます。" },
    { q:"プロジェクトのステークホルダの説明として、最も適切なものはどれか。", c:["プロジェクトで使う開発ツールのこと","プロジェクトの成果や進行に利害・影響を持つ人や組織","作業経路のうち最も所要時間が長いもの","プロジェクトの予算の上限"], a:1, e:"ステークホルダは発注者・利用者・経営層・開発メンバーなど利害や影響を持つ人や組織です。期待や要求を早期に把握し合意形成することが成功の鍵になります。" },
    { q:"システム開発の請負契約の特徴として、適切なものはどれか。", c:["成果物の完成義務を負わず業務の遂行自体を目的とする","仕事の完成を約束し完成した成果物に責任を負う","発注者が受注者の社員へ直接指揮命令する","作業時間に応じて必ず支払う"], a:1, e:"請負契約は仕事の完成を約束し、受注者は成果物に責任（契約不適合責任）を負います。完成義務を負わず遂行自体を目的とするのは準委任契約です。発注者が直接指揮命令すると偽装請負になります。" },
    { q:"プロジェクトマネジメントの知識や手法を体系化した、世界的に広く参照されるガイドはどれか。", c:["PMBOK","ITIL","ISMS","UML"], a:0, e:"PMBOKはプロジェクトマネジメントの知識を体系化したガイドです。ITILはITサービス運用のベストプラクティス、ISMSは情報セキュリティ管理、UMLは設計の表記法です。" },
    { q:"作業の順序や依存関係を矢印と結合点で表し、日程計画やクリティカルパスの分析に使う図はどれか。", c:["アローダイアグラム","ガントチャート","パレート図","散布図"], a:0, e:"アローダイアグラム（PERT図）は作業の前後関係を矢印で表し、最長経路（クリティカルパス）を求めて日程を管理します。ガントチャートは各作業の期間・進捗の把握に向きます。" },
    { q:"リスク対応のうち「軽減（低減）」に該当するものはどれか。", c:["テストを強化して障害の発生確率を下げる","損害保険に加入する","リスクの大きい作業を取りやめる","影響が小さいので何もしない"], a:0, e:"軽減（低減）は発生確率や影響を小さくする対応です。保険は転嫁、作業の取りやめは回避、何もしないのは受容で、4分類の対応づけは頻出です。" },
    { q:"システム開発の準委任契約の特徴として、適切なものはどれか。", c:["成果物の完成義務を負い、完成に責任を持つ","善良な管理者の注意をもって業務を遂行することを約束する","発注者の従業員として労働する","成果物の著作権が必ず発注者に帰属する"], a:1, e:"準委任契約は仕事の完成ではなく、専門家として善良な管理者の注意（善管注意義務）をもって業務を遂行することを約束する契約です。完成義務を負うのは請負契約です。" },
    { q:"プロジェクトの立ち上げ時に、目的・概要・責任者の権限などを公式に定め、開始を承認する文書はどれか。", c:["プロジェクト憲章","WBS","ガントチャート","SLA"], a:0, e:"プロジェクト憲章はプロジェクトの目的・概要やプロジェクトマネージャの権限を公式に認める文書で、立ち上げの根拠になります。WBSは作業分解、SLAはサービス品質の合意です。" },
    { q:"過去に行った類似プロジェクトの実績を基に、全体の規模や工数を見積もる方法はどれか。", c:["類推見積法","ファンクションポイント法","プログラムステップ法","標準偏差法"], a:0, e:"類推見積法は過去の似たプロジェクトの実績から全体を概算する方法で、開発の早い段階でも使えます。FP法は機能の数と複雑さ、プログラムステップ法は行数を基に見積もります。" },
    { q:"アジャイル開発で、1回のスプリントでチームが完了できる作業量を表し、今後の計画に用いる指標はどれか。", c:["ベロシティ","クリティカルパス","マイルストーン","ファンクションポイント"], a:0, e:"ベロシティはスプリントごとの完了作業量（消化したストーリーポイントなど）で、過去の平均から、あと何回のスプリントで終わるかを予測できます。" },
    { q:"作業A（3日）の後にB（4日）とC（6日）が並行し、BとC両方の完了後にD（2日）を行う。最短完了日数は何日か。", c:["9日","11日","12日","15日"], a:1, e:"Dの開始は遅い方（A3＋C6＝9日）を待つので9＋D2＝11日です。経路A→C→D（11日）がクリティカルパスで、A→B→Dは9日と2日の余裕があります。" },
    { q:"30人月の作業を5人で行うとき、単純計算で必要な期間は何か月か。", c:["5か月","6か月","8か月","10か月"], a:1, e:"期間＝工数÷人数＝30人月÷5人＝6か月です。人月は人数×期間で表す工数の単位で、掛け算・割り算で解ける得点源です（実際は増員の連絡コストにも注意）。" },
    { q:"WBSで作業を分解する利点として、適切でないものはどれか。", c:["作業の抜け漏れを防ぎやすくなる","見積りや担当割当てがしやすくなる","進捗を管理しやすくなる","作業間の依存関係から最長経路を自動的に求められる"], a:3, e:"WBSは作業を階層的に分解する手法で、抜け漏れ防止・見積り・割当て・進捗管理に役立ちます。最長経路（クリティカルパス）を求めるのはアローダイアグラムの役割です。" },
    { q:"リスク対応のうち「受容」に該当するものはどれか。", c:["影響が小さいため、特別な対策をとらずに受け入れる","保険に加入して損失を移す","原因となる作業を取りやめる","予備機を用意して影響を抑える"], a:0, e:"受容は影響が小さい・対策費用が見合わないなどの理由で、あえて対策せず受け入れる対応です。移すのは転嫁、取りやめは回避、抑えるのは軽減です。" },
    { q:"プロジェクトで、管理されないまま要求や作業範囲が少しずつ膨らんでいく現象を何と呼ぶか。", c:["スコープクリープ","クリティカルパス","マイルストーン","ベースライン"], a:0, e:"スコープクリープは小さな追加要求の積み重ねで範囲が無秩序に拡大し、納期・予算を圧迫する現象です。変更管理で影響評価と承認を経て取り込むことで防ぎます。" },
    { q:"プロジェクトマネジメントで管理する三大要素「QCD」の組合せとして、適切なものはどれか。", c:["品質・コスト・納期","計画・実行・評価","人・物・金","強み・弱み・機会"], a:0, e:"QCDはQuality（品質）・Cost（費用）・Delivery（納期）で、互いにトレードオフの関係にあります。優先順位を関係者と合意してバランスをとるのが要点です。" },
    { q:"プロジェクトの特性として、最も適切なものはどれか。",
      c:["毎日繰り返し行われる定常的な業務である",
         "明確な開始と終了があり、独自の成果物を生み出す活動である",
         "終了の期限を定めずに、継続的に改善を続ける活動である",
         "組織の変更がない限り、恒久的に続く活動である"],
      a:1,
      e:"プロジェクトの2大特性は有期性（始まりと終わりがある）と独自性（同じものは二つとない）です。繰り返される定常業務との対比で問われます。" },
    { q:"WBSを作成する目的として、最も適切なものはどれか。",
      c:["プロジェクトの作業を階層的に分解し、見積りや分担が可能な単位に細分化する",
         "作業同士の依存関係から最長の経路を求める",
         "プロジェクトの予算と実際の支出を比較する",
         "リスクの発生確率と影響度を評価する"],
      a:0,
      e:"WBS（Work Breakdown Structure）は作業の階層的分解です。測れる大きさ（ワークパッケージ）まで割ることで、見積り・漏れ防止・責任割当てが可能になります。最長経路の分析はアローダイアグラムの役割です。" },
    { q:"縦軸に作業項目、横軸に時間をとり、各作業の期間と進捗を棒状に表した図はどれか。",
      c:["アローダイアグラム","ガントチャート","パレート図","特性要因図"],
      a:1,
      e:"ガントチャートは作業の期間・進捗の把握に優れた図です。作業間の依存関係やクリティカルパスの分析にはアローダイアグラムを使います。" },
    { q:"作業Aは5日、作業Bは3日かかり、AとBは同時に開始できる。両方が完了した後に作業C（2日）を行う。プロジェクト完了までの最短日数は何日か。",
      c:["5日","7日","8日","10日"],
      a:1,
      e:"Cの開始は遅いほうの作業（A：5日）の完了を待つ必要があるので、5日＋2日＝7日です。この最長経路（A→C）がクリティカルパスで、Aの遅れはそのまま全体の遅れになります。Bには2日の余裕があります。" },
    { q:"クリティカルパスの説明として、適切なものはどれか。",
      c:["プロジェクトの中で最も費用がかかる作業の集まり",
         "開始から終了までの経路のうち、所要時間が最も長い経路",
         "リスクが最も高い作業を集めた経路",
         "最も早く完了できる作業の経路"],
      a:1,
      e:"クリティカルパスは所要時間が最長の経路で、この経路上の作業には余裕（フロート）がなく、遅延がそのままプロジェクト全体の遅延になります。だから重点的な監視対象になります。" },
    { q:"プロジェクトの重要な節目となる時点を表す用語はどれか。",
      c:["マイルストーン","スプリント","ベースライン","ボトルネック"],
      a:0,
      e:"マイルストーン（一里塚）は中間レビューやリリース判定など、進捗を確認する重要な節目です。" },
    { q:"リスク対応のうち「転嫁」に該当するものはどれか。",
      c:["リスクの原因となる作業計画自体を取りやめる",
         "テストを強化して問題の発生確率を下げる",
         "損害保険に加入して損失の負担を第三者に移す",
         "影響が小さいため、対策をとらずに受け入れる"],
      a:2,
      e:"保険や外部委託のように、リスクの影響を第三者に移すのが転嫁（移転）です。取りやめは回避、確率を下げるのは軽減、受け入れは受容。4分類の対応づけは最頻出です。" },
    { q:"リスク対応のうち「回避」に該当するものはどれか。",
      c:["実績のない新技術の採用を中止し、実績のある技術に計画を変更する",
         "障害に備えて予備の機器を用意しておく",
         "保険に加入する",
         "発生してから対応を検討することにする"],
      a:0,
      e:"回避はリスクの原因そのものを取り除く対応です。計画を変えてリスクに近づかないのが典型。予備機の用意は影響を下げる軽減、保険は転嫁、何もしないのは受容にあたります。" },
    { q:"プロジェクトのスコープの説明として、適切なものはどれか。",
      c:["プロジェクトの予算の上限のことである",
         "プロジェクトで作成する成果物と、必要な作業の範囲のことである",
         "プロジェクトメンバーの人数のことである",
         "プロジェクトの納期のことである"],
      a:1,
      e:"スコープは「何を作り、何をやるか（そして何をやらないか）」という範囲の定義です。安易な機能追加で範囲が膨張する現象（スコープクリープ）は炎上の典型原因で、変更管理の手続きで統制します。" },
    { q:"プロジェクト実行中に利用部門から小さな機能追加の要望が次々と寄せられた。プロジェクトマネージャの対応として最も適切なものはどれか。",
      c:["利用部門との関係を保つため、すべての要望をその場で受け入れる",
         "変更管理の手続きに従い、納期や費用への影響を評価して関係者の承認を得てから対応を決める",
         "プロジェクトの混乱を避けるため、すべての要望を理由を示さず拒否する",
         "影響の評価は省略し、担当者の判断で対応できるものから実装する"],
      a:1,
      e:"変更は拒否でも無条件受け入れでもなく、「見える化して合意の上で取り込む」のが原則です。影響評価と承認を経ない追加の積み重ね（スコープクリープ）は、納期・予算崩壊の典型原因です。" },
    { q:"品質・コスト・納期の関係について、最も適切な記述はどれか。",
      c:["三つは互いに独立しており、同時にすべてを最大限高めることができる",
         "三つはトレードオフの関係にあり、優先順位に基づいてバランスをとる必要がある",
         "品質を高めれば、コストと納期は自動的に改善される",
         "納期さえ守れば、品質とコストは管理する必要がない"],
      a:1,
      e:"QCDは綱引きの関係です。品質向上には時間と費用がかかり、納期短縮は費用増か品質低下を招きがち。だからマネジメントの本質は、関係者と合意した優先順位でトレードオフを管理することです。" },
    { q:"遅れが生じているソフトウェア開発プロジェクトへの安易な要員追加が、かえって完了を遅らせることがある主な理由はどれか。",
      c:["新しい要員への教育やコミュニケーションの負担が増えるから",
         "要員が増えると使用できる開発ツールが減るから",
         "人件費の増加によりテスト費用が不足するから",
         "新しい要員は必ず経験が浅いから"],
      a:0,
      e:"人が増えるほど説明・引き継ぎ・連絡経路が増え、既存メンバーの時間が奪われます（ブルックスの法則）。「人月の神話」として知られる、ソフトウェア開発の有名な経験則です。" },
    { q:"全体の工数が24人月と見積もられた開発プロジェクトを6か月で完了させたい。単純計算で必要な要員は何人か。",
      c:["3人","4人","6人","8人"],
      a:1,
      e:"工数＝人数×期間なので、24人月÷6か月＝4人です。人月計算は掛け算・割り算だけで解ける得点源ですが、実際には増員すると連絡コストが増える（ブルックスの法則）点も意識しましょう。" }
  ],
  3: [
    { q:"ITサービスマネジメントで、テスト済みの変更を計画的・安全に本番環境へ反映する活動はどれか。", c:["インシデント管理","リリース及び展開管理","キャパシティ管理","事業継続管理"], a:1, e:"リリース及び展開管理はテスト済みの変更を計画的に本番へ移す活動です。インシデント管理は迅速な復旧、キャパシティ管理は能力確保、事業継続管理は災害時の継続を扱います。" },
    { q:"あるシステムは30日間（720時間）のうち合計7.2時間停止した。この期間の稼働率は約何%か。", c:["90%","95%","99%","99.9%"], a:2, e:"稼働率＝(全時間−停止時間)÷全時間＝(720−7.2)÷720＝712.8÷720≒0.99＝99%です。可用性の指標で、SLAでは「99%」のように合意します。" },
    { q:"フルバックアップの後、毎回「前回のバックアップ以降に変更された分」だけを取得する方式はどれか。", c:["差分バックアップ","増分バックアップ","フルバックアップ","ミラーリング"], a:1, e:"増分バックアップは前回バックアップ以降の変更分だけを保存するので取得は速い反面、復元には全ての増分が必要です。差分はフル以降の変更分を毎回取得し、復元はフル＋最新差分で済みます。" },
    { q:"将来の利用増加を予測し、必要なCPUやディスクなどの資源を過不足なく確保するITサービスマネジメントの活動はどれか。", c:["キャパシティ管理","インシデント管理","問題管理","変更管理"], a:0, e:"キャパシティ管理は需要を予測し性能・容量を計画的に確保する活動です。足りなければ遅延や停止、過剰ならコスト増になるためバランスが重要です。" },
    { q:"ITサービスを構成するハードウェア・ソフトウェア・文書などの情報を正確に把握し最新に保つ管理活動はどれか。", c:["構成管理","インシデント管理","問題管理","キャパシティ管理"], a:0, e:"構成管理は構成要素（CI）とその関係を構成管理データベース（CMDB）で管理し、変更やインシデント対応の土台にします。何がどう繋がっているか分かることで影響範囲を素早く把握できます。" },
    { q:"サービスデスクで解決できない問い合わせを、より専門的な担当部署へ引き継ぐことを何と呼ぶか。", c:["エスカレーション","ロールバック","アウトソーシング","リストア"], a:0, e:"エスカレーションは一次窓口で対応しきれない案件を上位者や専門部署へ引き継ぐことです。サービスデスクが単一窓口（SPOC）として受け、必要に応じてエスカレーションします。" },
    { q:"事業継続計画で用いられるRTO（目標復旧時間）の説明として、適切なものはどれか。", c:["災害発生後、いつまでに復旧させるかという目標時間","どの時点のデータまで復旧させるかという目標","平均故障間隔のこと","平均修復時間のこと"], a:0, e:"RTO（Recovery Time Objective）は、いつまでに復旧するかという時間の目標です。どの時点のデータまで戻すかはRPO（目標復旧時点）で、両者はセットで問われます。" },
    { q:"フルバックアップの後、毎回「フルバックアップ以降に変更された分すべて」を取得する方式はどれか。", c:["差分バックアップ","増分バックアップ","フルバックアップ","スナップショット"], a:0, e:"差分バックアップはフル以降の変更分を毎回まとめて取得するため、復元はフルと最新の差分の2つで済みます。増分は前回以降の変更分だけを取り、復元には全ての増分が必要です。" },
    { q:"災害に備えた予備拠点のうち、本番とほぼ同じ設備を常時稼働させ短時間で業務を引き継げるものはどれか。", c:["ホットサイト","コールドサイト","ウォームサイト","データセンター"], a:0, e:"ホットサイトは設備・データを常に最新に保ち即座に切り替えられる予備拠点で、復旧は速いが費用は高めです。コールドサイトは場所と最低限の設備のみで安価ですが復旧に時間がかかります。" },
    { q:"システムへの操作や処理の記録を時系列に残し、後から追跡・検証できるようにしたものを何と呼ぶか。", c:["監査証跡","ログイン","バックアップ","フェールセーフ"], a:0, e:"監査証跡（オーディットトレイル）は、いつ・誰が・何をしたかを追える記録で、不正やミスの発見・原因究明に使われ、システム監査では重要な監査証拠になります。" },
    { q:"MTBF（平均故障間隔）が475時間、MTTR（平均修復時間）が25時間のシステムの稼働率は何%か。", c:["90%","92%","95%","98%"], a:2, e:"稼働率＝MTBF÷(MTBF＋MTTR)＝475÷500＝0.95＝95%です。故障間隔を長く、修復時間を短くするほど稼働率が上がります。" },
    { q:"サーバ障害でサービスが停止した。インシデント管理として最初に優先すべき対応はどれか。", c:["代替手段などでサービスを早く復旧させる","障害の根本原因を時間をかけて究明する","再発防止のため手順書を全面改訂する","関係者の責任を明確にする"], a:0, e:"インシデント管理の目的はサービスの早期復旧で、暫定対応でもまず使える状態に戻すことを優先します。根本原因の究明と再発防止は問題管理の役割で時間軸が異なります。" },
    { q:"SLAに定める項目として、適切なものはどれか。", c:["サービスの稼働率や障害復旧時間などの数値目標","プログラムの内部アルゴリズム","従業員の人事評価基準","製品の製造原価"], a:0, e:"SLAは提供者と利用者が稼働率や復旧時間などサービス品質の水準を数値で合意する文書です。達成状況を測定・改善する活動がSLM（サービスレベル管理）です。" },
    { q:"システム監査人の独立性を保つうえで、不適切なものはどれか。", c:["自分が開発・運用している情報システムを自ら監査する","監査対象部門から独立した立場で評価する","客観性を保てる体制で実施する","利害関係のない第三者として点検する"], a:0, e:"監査の価値は客観性にあるため、自分が関与したシステムを自ら監査するのは独立性を損ない不適切です。監査対象から独立した立場での評価が最重要要件です。" },
    { q:"建物や設備、電源・空調などを最適な状態に保ち効率よく管理する活動を何と呼ぶか。", c:["ファシリティマネジメント","インシデント管理","プロジェクトマネジメント","ナレッジマネジメント"], a:0, e:"ファシリティマネジメントは施設・設備（電源・空調・防災・入退室など）を安全かつ効率的に維持・管理する活動です。UPSやフリーアクセスフロアなどが対象になります。" },
    { q:"内部統制の整備・運用に最終的な責任を負う者は誰か。", c:["経営者","一般の従業員","外部の監査人","システムの利用者"], a:0, e:"内部統制は業務の適正を確保する仕組みで、整備・運用の最終責任は経営者にあります。監査人は独立した立場で評価・助言する役割で、整備の責任は負いません。" },
    { q:"SLAの説明として、最も適切なものはどれか。",
      c:["サービスの提供者と利用者の間で、サービス品質の水準を合意した文書",
         "システム開発の請負契約における納期を定めた文書",
         "ITサービスマネジメントのベストプラクティスをまとめたフレームワーク",
         "ベンダーに提案書の提出を依頼する文書"],
      a:0,
      e:"SLA（サービスレベル合意書）は稼働率99.9％などの数値でサービス品質を合意する文書です。ベストプラクティス集はITIL、提案依頼書はRFPです。" },
    { q:"合意したサービスレベルを維持し、継続的に改善していく活動を表す用語はどれか。",
      c:["SLM","SFA","SOA","SaaS"],
      a:0,
      e:"SLM（サービスレベル管理）は、SLAで合意した水準を測定・報告し、維持・改善し続ける活動です。SLA（文書）とSLM（活動）はセットで覚えましょう。" },
    { q:"ITILの説明として、最も適切なものはどれか。",
      c:["ITサービスマネジメントのベストプラクティスを体系化したフレームワーク",
         "プログラムの内部構造に着目したテスト手法",
         "プロジェクトの作業を階層的に分解した図",
         "システム監査人が従うべき法律"],
      a:0,
      e:"ITILはITサービス運用の成功事例（ベストプラクティス）を体系化した事実上の標準的フレームワークです。" },
    { q:"インシデント管理の主な目的はどれか。",
      c:["障害の根本原因を究明し、再発を防止する",
         "中断したサービスを可能な限り迅速に復旧させる",
         "システムへの変更を安全に実施する",
         "サービスの品質水準を文書で合意する"],
      a:1,
      e:"インシデント管理の目的は「早く戻す」こと。暫定対応（代替手段への切替えなど）でもまず復旧を優先します。根本原因の究明は問題管理の役割で、このすり替えが定番のひっかけです。" },
    { q:"インシデントの根本原因を究明し、再発防止策を講じるプロセスはどれか。",
      c:["インシデント管理","問題管理","リリース管理","構成管理"],

/* 章末テスト結果を勉強計画シートへ自動送信（Google Apps Script経由） */
const LOG_ENDPOINT = "https://script.google.com/macros/s/AKfycbyU3cjoEquXGQicR87zm2Jfa8HrUYdO5uT3TVmbj9S952d8uOWHJYe2q-wd7z8cLFfMSQ/exec";
function sendLog(data){
  if(!LOG_ENDPOINT) return;
  try{
    const body = new URLSearchParams();
    for(const k in data) body.append(k, data[k]);
    fetch(LOG_ENDPOINT, { method:"POST", mode:"no-cors", body: body });
  }catch(e){}
}

===================================================== */
const $ = (id)=>document.getElementById(id);
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function shuffle(a){
  const r = a.slice();
  for(let i=r.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [r[i],r[j]]=[r[j],r[i]]; }
  return r;
}
function toast(msg){
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toast._tm);
  toast._tm = setTimeout(()=>t.classList.remove("show"), 2600);
}
function copyText(txt){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(
      ()=>toast("コピーしました。Claudeのチャットに貼り付けて質問してください"),
      ()=>fallbackCopy(txt)
    );
  }else{ fallbackCopy(txt); }
}
function fallbackCopy(txt){
  const ta = document.createElement("textarea");
  ta.value = txt; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); toast("コピーしました。Claudeのチャットに貼り付けて質問してください"); }
  catch(e){ toast("コピーできませんでした。質問文を手動で選択してコピーしてください"); }
  document.body.removeChild(ta);
}
function findUnit(uid){
  for(const ch of CHAPTERS){
    const u = ch.units.find(x=>x.id===uid);
    if(u) return { ...u, ch:ch.id, chName:ch.name };
  }
  return null;
}
function chapterDone(ch){ return ch.units.every(u=>P.done[u.id]); }
function doneCount(){ return CHAPTERS.reduce((n,c)=>n+c.units.filter(u=>P.done[u.id]).length,0); }
const TOTAL_UNITS = CHAPTERS.reduce((n,c)=>n+c.units.length,0);

/* =====================================================
   章末テスト
===================================================== */
function startTest(chId){
  const pool = QUESTIONS[chId];
  if(!pool || !pool.length){ toast("この章のテストは準備中です"); return; }
  const picked = shuffle(pool).slice(0, Math.min(5, pool.length));
  T = {
    ch: chId,
    main: picked,
    idx: 0,
    firstCorrect: 0,
    wrong: [],
    mode: "main",
    phase: "q",
    queue: [],
    lastJudge: null,
    order: null
  };
  prepareOrder(T.main[0]);
  go("test");
}
function prepareOrder(q){
  T.order = shuffle([0,1,2,3]);
}
function currentQ(){
  return T.mode === "main" ? T.main[T.idx] : T.queue[0];
}
function renderTest(){
  if(!T) return renderHome();
  const ch = CHAPTERS.find(c=>c.id===T.ch);
  let h = "";
  h += '<a class="backlink" data-go="home">‹ テストを中断してホームに戻る</a>';
  h += '<div class="card"><div class="test-pane">';

  if(T.phase === "result"){
    const pass = T.firstCorrect >= 3;
    h += '<div class="result-box">';
    h += '<div class="t-head">第' + T.ch + '章 ' + esc(ch.name) + '　章末テスト 結果</div>';
    h += '<div class="score">' + T.firstCorrect + ' <small>/ 5 問正解</small></div>';
    if(pass){
      h += '<div class="done-stamp-wrap"><span class="stamp big anim">合格</span></div>';
      h += '<p>合格ラインの6割を超えました。おめでとうございます。</p>';
    }else{
      h += '<p style="margin:10px 0;">合格ラインは3問（6割）です。間違えた問題を復習して、もう一度挑戦しましょう。</p>';
    }
    if(T.wrong.length){
      h += '<p style="font-size:14px;color:#7a7261;">間違えた ' + T.wrong.length + ' 問は、正解できるまで復習モードで再出題されます。</p>';
      h += '<div class="btn-row"><button class="btn" id="startReview">復習モードへ進む</button><button class="btn sub" data-go="home">ホームに戻る</button></div>';
    }else{
      h += '<div class="btn-row"><button class="btn" id="retryTest">新しい問題で再挑戦</button><button class="btn sub" data-go="home">ホームに戻る</button></div>';
    }
    h += '</div>';
    h += '</div></div>';
    return h;
  }

  if(T.phase === "reviewdone"){
    h += '<div class="result-box">';
    h += '<div class="t-head">復習モード 完了</div>';
    h += '<div class="done-stamp-wrap"><span class="stamp big anim">克服</span></div>';
    h += '<p>間違えた問題をすべて正解できました。この調子です。</p>';
    h += '<div class="btn-row"><button class="btn" id="retryTest">新しい問題で再挑戦</button><button class="btn sub" data-go="home">ホームに戻る</button></div>';
    h += '</div></div></div>';
    return h;
  }

  const q = currentQ();
  const total = T.mode === "main" ? T.main.length : null;
  h += '<div class="t-head">第' + T.ch + '章 ' + esc(ch.name) + '　章末テスト';
  if(T.mode === "main") h += '　第' + (T.idx+1) + '問 / ' + total + '問';
  else h += '<span class="rv-tag">復習モード　残り' + T.queue.length + '問</span>';
  h += '</div>';
  h += '<div class="t-q">' + q.q + '</div>';
  h += '<div class="choices">';
  const judged = (T.phase === "judged");
  for(let pos=0; pos<4; pos++){
    const ci = T.order[pos];
    let cls = "choice";
    if(judged){
      if(ci === q.a) cls += (T.lastJudge && T.lastJudge.pick === ci) ? " sel-ok" : " reveal";
      else if(T.lastJudge && T.lastJudge.pick === ci) cls += " sel-ng";
    }
    h += '<button class="' + cls + '" data-pick="' + ci + '" ' + (judged ? "disabled" : "") + '>';
    h += '<span class="cno">' + ["ア","イ","ウ","エ"][pos] + '</span>' + q.c[ci] + '</button>';
  }
  h += '</div>';
  if(judged){
    const ok = T.lastJudge.ok;
    h += '<div class="judge ' + (ok ? "ok" : "ng") + '">' + (ok ? "○ 正解！" : "× 不正解…") + '</div>';
    h += '<div class="expl"><b>解説：</b>' + q.e + '</div>';
    h += '<div class="btn-row" style="justify-content:flex-start"><button class="btn" id="nextQ">次へ</button></div>';
  }
  h += '</div></div>';
  return h;
}
function pickAnswer(ci){
  if(!T || T.phase !== "q") return;
  const q = currentQ();
  const ok = (ci === q.a);
  T.lastJudge = { pick: ci, ok: ok };
  T.phase = "judged";
  if(T.mode === "main"){
    if(ok) T.firstCorrect++;
    else T.wrong.push(q);
  }
  /* 復習モードでは、キューの操作は「次へ」を押したときに行う */
  render();
}
function nextQ(){
  if(!T) return;
  if(T.mode === "main"){
    T.idx++;
    if(T.idx >= T.main.length){
      /* 1周目終了：成績を保存 */
      const rec = P.tests[T.ch] || { best:0, passed:false, attempts:0 };
      rec.attempts = (rec.attempts||0) + 1;
      rec.best = Math.max(rec.best||0, T.firstCorrect);
      rec.passed = rec.passed || (T.firstCorrect >= 3);
      P.tests[T.ch] = rec;
      saveP();
      sendLog({ app:"マネジメント", label:"第" + T.ch + "章 章末テスト", score:T.firstCorrect, total:T.main.length });
      T.phase = "result";
      render();
      return;
    }
  }else{
    if(T.lastJudge && T.lastJudge.ok) T.queue.shift();
    else T.queue.push(T.queue.shift());
    if(T.queue.length === 0){
      T.phase = "reviewdone";
      render();
      return;
    }
  }
  T.phase = "q";
  prepareOrder(currentQ());
  render();
}
function startReview(){
  T.mode = "review";
  T.queue = shuffle(T.wrong);
  T.phase = "q";
  prepareOrder(currentQ());
  render();
}

    tmp.innerHTML = LECTURES[uid] || "";
    const plain = (tmp.textContent || "").slice(0, 6000);
    const prompt = "あなたはITパスポート試験の講師です。学習者は心理学系の大学院生でIT実務は未経験です。以下の講義内容を踏まえ、質問に日本語で簡潔に（300字程度で）答えてください。可能なら身近な企業の具体例を1つ添えてください。\n\n単元：" + u.title + "\n質問：" + txt;
    const r = await window.cowork.askClaude(prompt, [plain]);
    const ans = (typeof r === "string") ? r : (r && (r.text || r.content || JSON.stringify(r)));
    ansEl.innerHTML = '<div class="ai-ans"><b style="color:var(--blue)">講師AIの回答</b>\n' + esc(ans) + '</div>';
  }catch(e){
    ansEl.innerHTML = '<div class="ai-ans">うまく回答を取得できませんでした。「質問文をコピー」でチャットに貼り付けて質問してください。</div>';
  }
}

/* =====================================================
   イベント
===================================================== */
function bindEvents(){
  document.querySelectorAll("[data-go='home']").forEach(el=>{
    el.onclick = ()=>go("home");
  });
  document.querySelectorAll("[data-unit]").forEach(el=>{
    el.onclick = ()=>go("unit", el.getAttribute("data-unit"));
  });
  document.querySelectorAll("[data-test]").forEach(el=>{
    el.onclick = ()=>startTest(Number(el.getAttribute("data-test")));
  });
  document.querySelectorAll("[data-pick]").forEach(el=>{
    el.onclick = ()=>pickAnswer(Number(el.getAttribute("data-pick")));
  });
  const nq = $("nextQ"); if(nq) nq.onclick = nextQ;
  const sr = $("startReview"); if(sr) sr.onclick = startReview;
  const rt = $("retryTest"); if(rt) rt.onclick = ()=>startTest(T.ch);
  const db = $("doneBtn");
  if(db) db.onclick = ()=>{
    P.done[state.unit] = true; saveP();
    const w = $("stampWrap");
    if(w){ w.innerHTML = '<span class="stamp big anim">済</span>'; }
    db.style.display = "none";
    setTimeout(()=>render(), 900);
  };
  const ub = $("undoBtn");
  if(ub) ub.onclick = ()=>{ delete P.done[state.unit]; saveP(); render(); };
  const cb = $("copyBtn");
  if(cb) cb.onclick = ()=>{
    const t = buildQuestionText(state.unit);
    if(t) copyText(t);
  };
  const ab = $("askBtn");
  if(ab) ab.onclick = ()=>askAI(state.unit);
}

render();
/* マネジメント攻略ノート v1.0 - 全3章6単元 深掘り版 */
</script>
