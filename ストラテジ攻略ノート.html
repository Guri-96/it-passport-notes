<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ストラテジ攻略ノート｜ITパスポート</title>
<style>
:root{
  color-scheme: light;
  --ink:#2b3a42;
  --red:#b73a2e;
  --red-soft:#fbeeec;
  --blue:#3a6ea5;
  --paper:#fdfbf3;
  --grid:rgba(125,160,195,.22);
  --card:#fffefa;
  --line:#d9d2bf;
  --green:#3c7a4e;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{
  font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
  color:var(--ink);
  background-color:var(--paper);
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size:22px 22px;
  line-height:1.9;
  font-size:16px;
}
.wrap{max-width:820px;margin:0 auto;padding:18px 16px 80px;}
header.top{
  text-align:center;
  padding:18px 10px 14px;
  margin-bottom:18px;
  border-bottom:3px double var(--line);
}
h1.title{
  font-family:"Hiragino Mincho ProN","Yu Mincho","MS Mincho",serif;
  font-size:30px;
  letter-spacing:.18em;
  color:var(--ink);
}
.subtitle{font-size:13px;color:#7a7261;letter-spacing:.25em;margin-top:2px;}
.progressline{margin-top:10px;font-size:13px;color:#6b6253;}
.bar{height:8px;background:#eee7d6;border-radius:4px;overflow:hidden;max-width:360px;margin:6px auto 0;border:1px solid var(--line);}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,#c8553d,var(--red));width:0%;transition:width .5s;}
.banner{background:#fff4e0;border:1px solid #e0c890;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:10px;
  box-shadow:0 2px 6px rgba(90,80,50,.08);
  margin-bottom:20px;
  overflow:hidden;
}
.card-h{
  padding:12px 18px;
  border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,#faf6e9,#f5efdd);
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.card-h .ch-name{
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
  font-size:19px;font-weight:700;letter-spacing:.08em;
}
.card-h .ch-no{font-size:12px;color:#8a8268;display:block;letter-spacing:.2em;}
.unit-row{
  display:flex;align-items:center;gap:12px;
  padding:13px 18px;
  border-bottom:1px dashed #e3dcc8;
  cursor:pointer;
  transition:background .15s;
  -webkit-tap-highlight-color:rgba(183,58,46,.08);
}
.unit-row:hover{background:#faf5e6;}
.unit-row:last-child{border-bottom:none;}
.unit-no{
  flex:0 0 auto;width:30px;height:30px;border-radius:50%;
  background:#efe8d4;color:#6b6253;font-size:14px;
  display:flex;align-items:center;justify-content:center;font-weight:700;
}
.unit-name{flex:1 1 auto;font-size:15.5px;}
.unit-state{flex:0 0 auto;min-width:48px;text-align:center;}
.arrow{color:#b9b09a;font-size:14px;}
.locked{cursor:default;opacity:.55;}
.locked:hover{background:transparent;}
.soon{font-size:11px;color:#9a9078;border:1px solid #cfc6ad;border-radius:4px;padding:1px 7px;}
.testrow{background:#fbf7ec;}
.stamp{
  display:inline-flex;align-items:center;justify-content:center;
  width:40px;height:40px;border-radius:50%;
  border:2.5px solid rgba(183,58,46,.85);
  color:rgba(183,58,46,.92);
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
  font-weight:700;font-size:17px;
  transform:rotate(-12deg);
  background:radial-gradient(circle at 35% 30%, rgba(183,58,46,.10), rgba(183,58,46,.03));
  box-shadow:inset 0 0 0 1px rgba(183,58,46,.25);
  letter-spacing:0;
  user-select:none;
}
.stamp.big{width:84px;height:84px;font-size:30px;border-width:4px;}
.stamp.anim{animation:stampIn .45s cubic-bezier(.2,1.6,.4,1) both;}
@keyframes stampIn{
  0%{transform:rotate(-12deg) scale(2.4);opacity:0;}
  60%{transform:rotate(-12deg) scale(.92);opacity:1;}
  100%{transform:rotate(-12deg) scale(1);opacity:1;}
}
.btn{
  display:inline-block;border:none;cursor:pointer;
  font-family:inherit;font-size:15px;font-weight:700;
  padding:12px 26px;border-radius:8px;
  background:var(--red);color:#fff;
  box-shadow:0 2px 0 #8e2c22;
  transition:transform .08s, box-shadow .08s;
  -webkit-tap-highlight-color:transparent;
}
.btn:active{transform:translateY(2px);box-shadow:0 0 0 #8e2c22;}
.btn.sub{background:#fff;color:var(--ink);border:1.5px solid #c9c0a8;box-shadow:0 2px 0 #c9c0a8;}
.btn.blue{background:var(--blue);box-shadow:0 2px 0 #2a5078;}
.btn:disabled{opacity:.45;cursor:default;}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:18px 0 6px;}
.backlink{
  display:inline-block;margin-bottom:14px;font-size:14px;color:var(--blue);
  cursor:pointer;text-decoration:none;border-bottom:1px dashed var(--blue);
}
/* ---- 講義 ---- */
.lecture{padding:22px 22px 26px;}
.lec-head{margin-bottom:6px;}
.lec-ch{font-size:12.5px;color:#8a8268;letter-spacing:.15em;}
.lec-title{
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
  font-size:24px;font-weight:700;letter-spacing:.05em;
  border-bottom:3px double var(--line);padding-bottom:8px;margin-bottom:4px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.lec-meta{font-size:12.5px;color:#9a9078;margin-bottom:14px;}
.lecture h3.sec{
  font-size:17.5px;margin:30px 0 10px;
  padding:6px 12px;border-left:5px solid var(--red);
  background:linear-gradient(90deg,#f8f2e2,transparent);
  font-weight:700;letter-spacing:.04em;
}
.lecture p{margin:10px 0;}
.lecture ul,.lecture ol{margin:8px 0 12px 24px;}
.lecture li{margin:5px 0;}
.kw{color:var(--red);font-weight:700;}
.ex{
  background:#f3f7fb;border:1px solid #c9d8e6;border-radius:8px;
  padding:12px 16px;margin:14px 0;font-size:15px;
}
.ex-t{font-weight:700;color:var(--blue);font-size:13.5px;margin-bottom:4px;letter-spacing:.08em;}
.pt{
  background:var(--red-soft);border:1px solid #e3b9b2;border-radius:8px;
  padding:12px 16px;margin:14px 0;font-size:15px;
}
.pt-t{font-weight:700;color:var(--red);font-size:13.5px;margin-bottom:4px;letter-spacing:.08em;}
.why{
  background:#eef5ef;border:1px solid #b5cdb8;border-left:5px solid var(--green);border-radius:8px;
  padding:12px 16px;margin:14px 0;font-size:15px;
}
.why-t{font-weight:700;color:var(--green);font-size:13.5px;margin-bottom:4px;letter-spacing:.08em;}
.tbl{border-collapse:collapse;width:100%;margin:12px 0;font-size:14.5px;background:#fff;}
.tbl th,.tbl td{border:1px solid #cfc6ad;padding:7px 10px;text-align:left;vertical-align:top;}
.tbl th{background:#f5efdd;font-weight:700;white-space:nowrap;}
/* ---- 質問コーナー ---- */
.qa{
  margin-top:34px;padding:16px 18px;
  border:1.5px dashed #b9ab84;border-radius:10px;background:#fbf8ee;
}
.qa-t{font-weight:700;margin-bottom:6px;font-size:15.5px;}
.qa-note{font-size:13px;color:#7a7261;margin-bottom:10px;}
.qa textarea{
  width:100%;min-height:74px;border:1px solid #c9c0a8;border-radius:8px;
  padding:10px;font-family:inherit;font-size:15px;background:#fff;resize:vertical;
}
.qa .btn{margin-top:10px;}
.ai-ans{
  margin-top:14px;padding:12px 16px;background:#fff;border:1px solid #c9d8e6;
  border-radius:8px;font-size:15px;white-space:pre-wrap;
}
.done-area{text-align:center;margin-top:30px;padding-top:18px;border-top:1px solid var(--line);}
.done-stamp-wrap{min-height:96px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;}
.undo{font-size:12.5px;color:#9a9078;cursor:pointer;text-decoration:underline;}
/* ---- テスト ---- */
.test-pane{padding:24px 22px 28px;}
.t-head{font-size:13px;color:#8a8268;letter-spacing:.1em;margin-bottom:4px;}
.t-q{font-size:16.5px;font-weight:700;margin:10px 0 18px;line-height:1.8;}
.choices{display:flex;flex-direction:column;gap:10px;}
.choice{
  text-align:left;background:#fff;border:1.5px solid #c9c0a8;border-radius:8px;
  padding:12px 14px;font-size:15px;font-family:inherit;cursor:pointer;line-height:1.7;
  transition:background .12s,border-color .12s;
}
.choice:hover{background:#faf5e6;}
.choice .cno{font-weight:700;color:var(--blue);margin-right:8px;}
.choice.sel-ok{border-color:var(--green);background:#eef7f0;}
.choice.sel-ng{border-color:var(--red);background:var(--red-soft);}
.choice.reveal{border-color:var(--green);background:#eef7f0;}
.choice:disabled{cursor:default;}
.judge{font-size:20px;font-weight:700;margin:16px 0 6px;}
.judge.ok{color:var(--green);}
.judge.ng{color:var(--red);}
.expl{
  background:#f8f4e8;border:1px solid var(--line);border-radius:8px;
  padding:12px 16px;font-size:14.5px;margin:10px 0 16px;
}
.expl b{color:var(--red);}
.result-box{text-align:center;padding:10px 0;}
.score{font-size:42px;font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-weight:700;margin:8px 0;}
.score small{font-size:18px;}
.rv-tag{display:inline-block;font-size:12px;color:#fff;background:var(--blue);border-radius:4px;padding:2px 8px;margin-left:8px;vertical-align:middle;}
/* ---- toast ---- */
#toast{
  position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
  background:rgba(43,58,66,.95);color:#fff;padding:10px 20px;border-radius:8px;
  font-size:14px;opacity:0;pointer-events:none;transition:all .25s;max-width:90%;
  z-index:50;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
footer{margin-top:30px;text-align:center;font-size:12px;color:#a89e84;}
@media (max-width:480px){
  body{font-size:15px;}
  h1.title{font-size:24px;}
  .lecture{padding:18px 14px 22px;}
  .test-pane{padding:18px 14px 22px;}
}
/* ===== ダークモード（切替対応・初期ダーク） ===== */
:root[data-theme=dark]{
  color-scheme:dark;
  --ink:#e7e1d3; --paper:#1b1f25; --card:#242a31; --line:#3a424d;
  --grid:rgba(130,160,190,.05); --red:#ec7d72; --red-soft:#3a2622;
  --blue:#84b3e6; --green:#85c997;
}
:root[data-theme=dark] .subtitle{color:#a89e84;}
:root[data-theme=dark] .progressline{color:#b4ab95;}
:root[data-theme=dark] .bar{background:#33373f;}
:root[data-theme=dark] .banner{background:#2c2a1c;border-color:#5c5430;color:var(--ink);}
:root[data-theme=dark] .card-h{background:linear-gradient(180deg,#2b323b,#242a31);}
:root[data-theme=dark] .card-h .ch-no{color:#a59c87;}
:root[data-theme=dark] .unit-no{background:#333a44;color:#d2cab7;}
:root[data-theme=dark] .unit-row{border-bottom-color:#343b45;}
:root[data-theme=dark] .unit-row:hover{background:#2b323b;}
:root[data-theme=dark] .arrow{color:#8d8676;}
:root[data-theme=dark] .soon{color:#a89e84;border-color:#4a525c;}
:root[data-theme=dark] .testrow{background:#222831;}
:root[data-theme=dark] .btn.sub{background:#242a31;color:var(--ink);border-color:#4a525c;box-shadow:0 2px 0 #11151a;}
:root[data-theme=dark] .lec-ch{color:#a59c87;}
:root[data-theme=dark] .lec-meta{color:#b0a78f;}
:root[data-theme=dark] .lecture h3.sec{background:linear-gradient(90deg,#322a22,transparent);}
:root[data-theme=dark] .ex{background:#212d38;border-color:#36506b;}
:root[data-theme=dark] .pt{background:var(--red-soft);border-color:#7a4036;}
:root[data-theme=dark] .why{background:#1f2c24;border-color:#3a5a44;}
:root[data-theme=dark] .tbl{background:#222831;}
:root[data-theme=dark] .tbl th,:root[data-theme=dark] .tbl td{border-color:#3f4751;}
:root[data-theme=dark] .tbl th{background:#2c333c;}
:root[data-theme=dark] .qa{background:#23272f;border-color:#5a5238;}
:root[data-theme=dark] .qa-note{color:#a59c87;}
:root[data-theme=dark] .qa textarea{background:#1b1f25;border-color:#4a525c;color:var(--ink);}
:root[data-theme=dark] .ai-ans{background:#222831;border-color:#36506b;}
:root[data-theme=dark] .undo{color:#b0a78f;}
:root[data-theme=dark] .t-head{color:#a59c87;}
:root[data-theme=dark] .choice{background:#242a31;border-color:#4a525c;}
:root[data-theme=dark] .choice:hover{background:#2b323b;}
:root[data-theme=dark] .choice.sel-ok,:root[data-theme=dark] .choice.reveal{background:#203026;border-color:var(--green);}
:root[data-theme=dark] .choice.sel-ng{background:var(--red-soft);border-color:var(--red);}
:root[data-theme=dark] .expl{background:#262219;border-color:var(--line);}
:root[data-theme=dark] footer{color:#8d8676;}
#themeBtn{position:fixed;top:10px;right:10px;z-index:999;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:18px;padding:5px 12px;font-size:12.5px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.18);font-family:inherit;line-height:1.4;}
#themeBtn:active{transform:translateY(1px);}
</style>
</head>

<script>

const CHAPTERS = [
  { id:1, name:"企業と法務", ready:true, units:[
    { id:"u11", no:"①", title:"企業活動と経営組織" },
    { id:"u12", no:"②", title:"業務分析とデータ利活用" },
    { id:"u13", no:"③", title:"会計・財務" },

    { id:"u17", no:"⑦", title:"補講：その他の法律と技術者倫理" }
  ]},
  { id:2, name:"経営戦略", ready:true, units:[
    { id:"u21", no:"①", title:"経営戦略マネジメント" },
    { id:"u22", no:"②", title:"マーケティング" },
    { id:"u23", no:"③", title:"ビジネス戦略と目標・評価" },
    { id:"u24", no:"④", title:"技術戦略マネジメント" },
    { id:"u25", no:"⑤", title:"ビジネスインダストリ" },
    { id:"u26", no:"⑥", title:"補講：成長戦略・生産システム・AI活用" }
  ]},
  { id:3, name:"システム戦略", ready:true, units:[
    { id:"u31", no:"①", title:"情報システム戦略とDX" },
    { id:"u32", no:"②", title:"業務プロセスの改善" },
    { id:"u33", no:"③", title:"ソリューションビジネス" },
    { id:"u34", no:"④", title:"システム企画と調達" },
    { id:"u35", no:"⑤", title:"補講：システム活用促進と評価" }
  ]}
];

const LECTURES = {
  u11: `
<p>最初の単元は「そもそも企業とは何をする組織なのか」という話です。抽象的に聞こえますが、ITパスポートでは毎回のように出題される定番分野。身近な会社を思い浮かべながら読めば、暗記ではなく「そりゃそうだよね」という納得で覚えられます。</p>

<h3 class="sec">1. 企業活動の目的 ── 利益だけではない</h3>
<p>企業の第一の目的は、製品やサービスを提供して<span class="kw">利益</span>を上げ、事業を継続することです。ただし現代の企業は「儲かれば何でもよい」とは考えません。企業が何のために存在するのかを示した基本方針を<span class="kw">経営理念</span>と呼びます。近年はこれを<span class="kw">MVV</span>という3点セットで掲げる企業が増えています。<b>ミッション</b>（果たすべき使命・存在意義）、<b>ビジョン</b>（目指す将来の姿）、<b>バリュー</b>（大切にする価値観・行動指針）の頭文字で、令和7年度の本試験では「ビジョンとして示すものはどれか」という形で出題されました。「使命→姿→価値観」の対応で覚えましょう。</p>
<div class="ex"><div class="ex-t">具体例</div>無印良品（良品計画）の「役に立つ」、トヨタの「幸せを量産する」など、多くの企業がウェブサイトの会社概要に経営理念を掲げています。就職活動で企業研究をしたときに見た「企業理念」「ミッション」がまさにこれです。</div>
<p>企業を取り巻く利害関係者を<span class="kw">ステークホルダー</span>といいます。株主だけでなく、顧客、従業員、取引先、地域社会まで含む広い概念です。試験では「株主だけを指す」という誤りの選択肢がよく出ます。</p>
<p>そして、企業が利益追求だけでなく環境や社会へ配慮し、説明責任を果たすべきだという考え方が<span class="kw">CSR</span>（Corporate Social Responsibility：企業の社会的責任）です。関連して次の用語もセットで覚えましょう。</p>
<ul>
<li><span class="kw">SDGs</span>（Sustainable Development Goals）：国連が定めた2030年までの「持続可能な開発目標」。17のゴールから成り、企業活動でも重視されます。</li>
<li><span class="kw">ESG投資</span>：環境（Environment）・社会（Social）・ガバナンス（Governance）に配慮する企業を選んで投資すること。投資家側から企業に良い行動を促す仕組みです。</li>
<li><span class="kw">グリーンIT</span>：IT機器の省エネ化や、ITを使った社会の省エネ（ペーパーレス、テレビ会議による移動削減など）。</li>
</ul>
<div class="why"><div class="why-t">なぜ？ ── 企業はなぜ利益以外まで求められるのか</div>
企業は、従業員（社会が育てた人材）、道路や電力（社会のインフラ）、自然環境といった<b>社会の資源を借りて</b>活動しています。だから「儲けたが、環境を壊し、人を使い捨てた」では社会からの信頼を失い、長期的には顧客も人材も離れて存続できなくなります。さらに近年は<b>ESG投資</b>の普及で「社会に配慮しない企業にはお金が集まらない」という資金面の仕組みまでできました。つまりCSRは「余裕があればやる慈善活動」ではなく、<b>企業が長く存続するための条件</b>になっているのです。試験で「CSR＝利益を増やすための宣伝活動」「法律で義務づけられた範囲だけ守ればよい」といった選択肢が出たら、この理屈から誤りと判断できます。</div>
<p>また、企業経営を健全に保つ仕組みとして<span class="kw">コーポレートガバナンス</span>（企業統治）があります。経営者が暴走したり不正をしたりしないよう、株主や社外取締役が経営を監視する仕組みです。法令や規則を守って活動することは<span class="kw">コンプライアンス</span>（法令遵守）、経営状況などの情報を外部へ公開することは<span class="kw">ディスクロージャー</span>（情報開示）といいます。</p>
<div class="why"><div class="why-t">なぜ？ ── 経営者を「監視」する仕組みがいるのか</div>
鍵は<b>「所有と経営の分離」</b>です。株式会社では、会社の持ち主（株主）と、実際に経営する人（経営者）が別人です。経営者は他人のお金を預かって運用する立場なので、放っておくと自分の報酬や保身を優先したり、不正会計で失敗を隠したりする誘惑が生じます（経済学では「依頼人と代理人の利害のズレ」として有名な構造で、心理学でいえば監督者がいないと手を抜きやすい、という話に近い）。そこで、社外取締役や監査役といった<b>外部の目</b>で経営をチェックする仕組み＝コーポレートガバナンスが必要になるのです。ディスクロージャーが大切なのも同じ理由で、<b>情報を公開しなければ株主は監視のしようがない</b>からです。ガバナンス（監視の仕組み）・コンプライアンス（守ること）・ディスクロージャー（見せること）は、三点セットで「経営者の暴走を防ぐ装置」と理解してください。</div>
<div class="pt"><div class="pt-t">試験のポイント</div>「ガバナンス＝経営を<b>監視する仕組み</b>」「コンプライアンス＝<b>法令遵守</b>」「ディスクロージャー＝<b>情報開示</b>」。カタカナ語の意味の取り違えを狙った問題が頻出です。</div>

<h3 class="sec">2. 経営資源 ── ヒト・モノ・カネ・情報</h3>
<p>企業が活動に使う資源を<span class="kw">経営資源</span>と呼び、伝統的に「ヒト・モノ・カネ」、そして現代ではこれに<span class="kw">情報</span>を加えた4つで説明されます。ITパスポートが「情報」を扱う試験である以上、4つ目の資源としての情報の重要性はこの試験全体のテーマでもあります。</p>
<div class="ex"><div class="ex-t">具体例</div>セブン-イレブンの強さは、店舗（モノ）や店員（ヒト）だけでなく、「どの店で・何が・いつ売れたか」というPOSデータ（情報）を発注に活かしてきた点にあります。情報が他の3資源と並ぶ武器になる典型例です。</div>

<h3 class="sec">3. 経営管理のサイクル ── PDCAとOODA</h3>

</div>
<p>経営や業務を改善し続けるための代表的な枠組みが<span class="kw">PDCA</span>サイクルです。<b>Plan（計画）→ Do（実行）→ Check（評価）→ Act（改善）</b>を繰り返します。順番を入れ替えた誤りの選択肢が定番なので、「計画してから動き、結果を確かめて、直す」という流れを体で覚えてください。</p>
<p>変化が速い状況向けの意思決定モデルとして<span class="kw">OODAループ</span>（ウーダ）も出題されます。<b>Observe（観察）→ Orient（状況判断）→ Decide（意思決定）→ Act（行動）</b>の繰り返しで、もともとは戦闘機パイロットの意思決定理論です。PDCAが「じっくり計画して改善」なのに対し、OODAは「まず現場を観察して素早く動く」イメージです。</p>

</div>
<div class="why"><div class="why-t">なぜ？ ── PDCAがあるのにOODAが生まれたのか</div>
PDCAの弱点は<b>「Planに時間をかけている間に状況が変わってしまう」</b>ことです。工場の品質改善のように環境が安定している仕事ではPDCAが強力ですが、競合の動きやSNSの反応が日単位で変わる市場では、年間計画を立てて検証する頃には前提が崩れています。そこで「綿密な計画」を「現在の観察」に置き換えたのがOODAです。つまり2つは優劣ではなく<b>環境の変化スピードによる使い分け</b>。また、PDCAが機能しない典型は「D（実行）ばかりでC（評価）をやらない」パターンだということも、運用上の急所として覚えておくと事例問題で役立ちます。</div>

<h3 class="sec">4. ヒトを育てる・活かす ── 人材管理</h3>
<p>経営資源「ヒト」に関する用語群です。研修制度の話は、来年からの新人研修で実際に体験することになります。</p>
<table class="tbl">
<tr><th>用語</th><th>意味</th></tr>
<tr><td><span class="kw">OJT</span></td><td>On the Job Training。実際の仕事を通じて、職場の先輩が指導する教育。配属後の「先輩について学ぶ」やつです。</td></tr>
<tr><td><span class="kw">Off-JT</span></td><td>職場を離れて行う教育。集合研修や外部セミナーなど。入社直後の新人研修はこちら。</td></tr>
<tr><td><span class="kw">e-ラーニング</span></td><td>コンピュータやネットワークを使った学習。時間や場所を選ばないのが利点。</td></tr>
<tr><td><span class="kw">アダプティブラーニング</span></td><td>学習者一人ひとりの理解度に合わせて、内容や難易度を変える学習方法。</td></tr>
<tr><td><span class="kw">タレントマネジメント</span></td><td>従業員のスキルや経験を一元管理し、配置や育成に戦略的に活かすこと。</td></tr>
<tr><td><span class="kw">HRテック</span></td><td>HR（人事）×テクノロジー。AIによる採用支援や勤怠管理クラウドなど、人事業務へのIT活用全般。</td></tr>
<tr><td><span class="kw">CDP</span></td><td>キャリアディベロップメントプログラム。長期的な視点で従業員のキャリア形成を支援する計画。</td></tr>
</table>
<p>もうひとつ重要なのが<span class="kw">MBO</span>（Management by Objectives：目標による管理）です。上司が一方的にノルマを課すのではなく、<b>従業員が自ら目標を設定し、その達成度で評価する</b>手法です。経営学者ドラッカーが提唱しました。自分で決めた目標のほうが動機づけが高まる――心理学でいう内発的動機づけに通じる発想で、ぐりさんには腑に落ちやすい考え方だと思います。</p>

<h3 class="sec">5. 多様な働き方</h3>
<ul>
<li><span class="kw">ワークライフバランス</span>：仕事と生活の調和。</li>
<li><span class="kw">ダイバーシティ</span>：性別・年齢・国籍・障がいの有無などの多様性を受け入れ、活かすこと。「インクルージョン（包摂）」とセットで使われます。</li>
<li><span class="kw">テレワーク</span>：ITを活用した、場所や時間にとらわれない働き方。在宅勤務、モバイルワーク、<span class="kw">サテライトオフィス</span>勤務を含みます。</li>
<li><span class="kw">ワークシェアリング</span>：仕事を複数人で分け合い、一人あたりの労働時間を減らして雇用を維持・創出すること。</li>
</ul>

<h3 class="sec">6. 経営組織の形態 ── 会社の「かたち」</h3>
<p>ここがこの単元のヤマ場です。組織の形ごとに特徴を整理しましょう。</p>
<table class="tbl">
<tr><th>組織形態</th><th>特徴</th></tr>
<tr><td><span class="kw">職能別組織</span></td><td>営業部・製造部・経理部など、仕事の種類（機能）ごとに分ける最も基本的な形。専門性は高まるが、部門間の壁ができやすい。</td></tr>
<tr><td><span class="kw">事業部制組織</span></td><td>製品別・地域別・顧客別などの「事業部」ごとに分け、各事業部が開発から販売まで（利益責任を含めて）を持つ。</td></tr>
<tr><td><span class="kw">マトリックス組織</span></td><td>職能と事業（またはプロジェクト）の2軸を組み合わせ、社員が2つの系統に同時に属する形。柔軟だが、上司が2人になり指揮命令が混乱しやすい。</td></tr>
<tr><td><span class="kw">プロジェクト組織</span></td><td>特定の課題のために各部門から人を集め、達成したら解散する一時的な組織。</td></tr>
<tr><td><span class="kw">カンパニ制</span></td><td>事業部制をさらに進め、各事業をあたかも独立した会社（カンパニー）のように扱う形。</td></tr>
<tr><td><span class="kw">持株会社</span></td><td>自らは事業を行わず、グループ各社の株式を保有して支配する会社。「〜ホールディングス」という社名が目印。</td></tr>
<tr><td><span class="kw">社内ベンチャー</span></td><td>新規事業のために、社内に独立した小組織を作る仕組み。</td></tr>
</table>
<div class="why"><div class="why-t">なぜ？ ── 組織の形がいくつもあるのか</div>
組織形態の歴史は<b>「専門性」と「市場対応の速さ」のトレードオフ</b>との戦いです。職能別組織は同じ専門家を集めるので技術は磨かれますが、「この製品を売り切る責任者」が誰もいなくなる。そこで製品ごとに開発から販売まで持たせる事業部制が生まれましたが、今度は各事業部に経理や人事が重複してコストが増え、事業部同士がライバル化して全社最適が崩れる。両方の良いとこ取りを狙ったマトリックス組織は、引き換えに「上司2人」という指揮の混乱を抱える――。つまり<b>完璧な組織はなく、何を取り何を捨てるかの選択</b>なのです。持株会社が事業再編に強い理由も構造から説明できます。事業が「別会社」になっているので、不調な事業の売却や他社買収を<b>会社単位で付け替えるだけ</b>で実行でき、ある事業の失敗が他事業に波及しにくいのです。この「形→得失」の因果をつかむと、「市場の変化に素早く対応したい企業に適した組織は？」型の応用問題が解けるようになります。</div>
<div class="ex"><div class="ex-t">具体例</div>「セブン&アイ・ホールディングス」はセブン-イレブンやイトーヨーカ堂などの株式を持つ<b>持株会社</b>です。ソニーグループは事業ごとに会社を分ける<b>カンパニ制→分社化</b>の代表例。家電のパナソニックは<b>事業部制</b>を日本で最初期に導入した企業として有名です。社名やニュースと結びつけると忘れません。</div>
<div class="pt"><div class="pt-t">試験のポイント</div>頻出は「<b>マトリックス組織＝2系統に同時所属</b>」「<b>持株会社＝自らは事業をせず株式保有で支配</b>」「<b>プロジェクト組織＝期間限定で解散する</b>」の3つ。特徴の文章から組織名を選ばせる形式がほとんどです。</div>

<h3 class="sec">7. 経営層の役職 ── CxO</h3>
<p>経営責任者の呼び名はまとめて「CxO」と呼ばれます。試験では略語の意味を問われます。</p>
<table class="tbl">
<tr><th>略語</th><th>名称</th><th>担当</th></tr>
<tr><td><span class="kw">CEO</span></td><td>最高経営責任者</td><td>経営全体のトップ</td></tr>
<tr><td><span class="kw">COO</span></td><td>最高執行責任者</td><td>事業運営（執行）の責任者</td></tr>
<tr><td><span class="kw">CFO</span></td><td>最高財務責任者</td><td>財務・経理</td></tr>
<tr><td><span class="kw">CIO</span></td><td>最高情報責任者</td><td>情報システム・情報戦略</td></tr>
<tr><td><span class="kw">CTO</span></td><td>最高技術責任者</td><td>技術開発</td></tr>
<tr><td><span class="kw">CISO</span></td><td>最高情報セキュリティ責任者</td><td>情報セキュリティ</td></tr>
</table>
<p>いずれも「Chief ◯◯ Officer（最高◯◯責任者）」の略で、覚え方は真ん中の文字です。E＝Executive（経営）、O＝Operating（執行）、F＝Financial（財務）、I＝Information（情報）、T＝Technology（技術）、IS＝Information Security（情報セキュリティ）。<b>情報システム戦略の責任者はCIO</b>という出題が特に多いので、ITエンジニアの卵としてここだけは即答できるようにしましょう。</p>

<h3 class="sec">8. もしもに備える ── BCPとBCM</h3>
<p>地震や水害、システム障害、感染症などの緊急事態でも、重要な事業を止めない・早く復旧させるための計画が<span class="kw">BCP</span>（Business Continuity Plan：事業継続計画）です。そしてBCPを策定し、訓練や見直しを続ける経営管理の活動全体を<span class="kw">BCM</span>（Business Continuity Management：事業継続管理）と呼びます。</p>
<div class="ex"><div class="ex-t">具体例</div>東日本大震災のとき、いち早く店舗を再開したコンビニ各社や、工場が被災しても代替生産網で供給をつないだトヨタの対応はBCPの教科書的な例です。「計画そのものがBCP、運用し続ける活動がBCM」と区別してください。</div>
<div class="why"><div class="why-t">なぜ？ ── BCPは「全部を守る計画」ではないのか</div>
災害時には人員も電力も通信も足りなくなるため、<b>すべての業務を平常通り続けることは物理的に不可能</b>です。そこでBCPの本質は「守るものを選ぶこと」になります。中核事業（コンビニなら店舗の営業、銀行なら決済）を特定し、「どの業務を、どれくらいの時間内に、どの水準まで復旧させるか」という優先順位をあらかじめ決めておく。これが決まっていないと、緊急時に貴重な資源が重要でない業務に分散してしまいます。試験で「BCPの目的＝全業務を通常通り維持すること」という選択肢が出たら誤り。「<b>重要業務を中断させない・中断しても早期復旧させる</b>」が正しい目的です。</div>

<h3 class="sec">まとめ</h3>
<ul>
<li>企業は<span class="kw">経営理念</span>のもと利益を追求しつつ、<span class="kw">CSR</span>・<span class="kw">SDGs</span>・<span class="kw">ESG</span>など社会への責任も負う。</li>
<li>経営資源は<b>ヒト・モノ・カネ・情報</b>。管理のサイクルは<span class="kw">PDCA</span>（と素早い<span class="kw">OODA</span>）。</li>
<li>人材育成は<span class="kw">OJT</span>／<span class="kw">Off-JT</span>、評価は<span class="kw">MBO</span>。働き方は<span class="kw">ダイバーシティ</span>・<span class="kw">テレワーク</span>など。</li>
<li>組織形態は<span class="kw">事業部制</span>・<span class="kw">マトリックス</span>・<span class="kw">持株会社</span>あたりが頻出。役職は<span class="kw">CIO</span>＝情報担当。</li>
<li>緊急時に事業を続ける計画が<span class="kw">BCP</span>、その運用が<span class="kw">BCM</span>。</li>
</ul>

<p>この単元は、問題を整理する技法と、データを読み解く技法を学びます。実はここ、<b>心理学系のぐりさんにとっては最大の得意分野</b>です。平均・分散・相関・標本調査……心理統計で鍛えた知識がそのまま得点になります。「知ってる話がITパスポート用語ではこう呼ばれる」という対応づけを意識して読んでください。</p>

<h3 class="sec">1. アイデアを出し、整理する技法</h3>
<p>会議でアイデアを集める代表的な手法が<span class="kw">ブレーンストーミング</span>です。4つのルール――<b>批判禁止・自由奔放・質より量・結合便乗の歓迎</b>――が問われます。「他人の案を批判してより良い案に磨き上げる」という選択肢は誤りです（批判禁止に反する）。</p>
<p>出てきた大量のアイデアをカードに書き、似たもの同士をグループ化して整理する手法が<span class="kw">KJ法</span>（親和図法）です。考案者は文化人類学者の川喜田二郎。フィールドワークのデータ整理から生まれた手法で、質的研究に触れたことがあれば「ああ、あの作業か」とピンとくるはずです。</p>
<div class="why"><div class="why-t">なぜ？ ── ブレーンストーミングは「批判禁止」なのか</div>
これは心理学的に説明するのが一番わかりやすい論点です。人は批判される可能性を感じると<b>評価懸念</b>が働き、無難な発言しかしなくなります。しかし革新的なアイデアは、最初は突拍子もない形で出てくるもの。だから「出す段階」と「評価する段階」を意図的に切り離し、出す段階では心理的安全性を最大化する――これがブレーンストーミングの設計思想です。「質より量」も同じ理屈で、量を出せば玉石混交でも玉が混ざる確率が上がる。4原則はバラバラの規則ではなく、<b>すべて「発想の抑制を外す」という1つの目的</b>から導かれています。こう理解すれば、どんな形で原則を問われても判断できます。</div>
<p>そのほか、選択肢と結果を樹形図で整理して期待値などを比較する<span class="kw">デシジョンツリー</span>（決定木）も覚えておきましょう。</p>

<h3 class="sec">2. データを「見える化」する図 ── QC七つ道具など</h3>
<p>製造業の品質管理（QC）で磨かれた図表群は、試験の常連です。<b>図の名前と「何がわかるか」</b>の対応を押さえます。</p>
<table class="tbl">
<tr><th>図</th><th>何がわかるか</th></tr>
<tr><td><span class="kw">パレート図</span></td><td>項目を件数の多い順に棒グラフで並べ、累積比率を折れ線で重ねた図。「上位の少数項目が全体の大部分を占める」ことを見つけ、重点管理する（<span class="kw">ABC分析</span>に使う）。</td></tr>
<tr><td><span class="kw">特性要因図</span></td><td>結果（特性）に影響する原因（要因）を魚の骨のような形に整理した図。フィッシュボーンチャートとも。原因の洗い出しに使う。</td></tr>
<tr><td><span class="kw">ヒストグラム</span></td><td>データの分布（ばらつき）を柱状で表す。心理統計の度数分布図そのもの。</td></tr>
<tr><td><span class="kw">散布図</span></td><td>2つの量の関係（相関）を点で表す。右上がりなら<b>正の相関</b>、右下がりなら<b>負の相関</b>。</td></tr>
<tr><td><span class="kw">管理図</span></td><td>時系列データが管理限界線の内に収まっているかを見て、工程の異常を発見する。</td></tr>
<tr><td><span class="kw">レーダーチャート</span></td><td>複数項目のバランスをクモの巣状に表す。成績表や性格検査のプロフィール表示でおなじみ。</td></tr>
<tr><td><span class="kw">箱ひげ図</span></td><td>中央値・四分位数・最大最小を1つの箱で表す。複数グループの分布比較に便利。</td></tr>
<tr><td><span class="kw">ヒートマップ</span></td><td>数値の大小を色の濃淡で表す。ウェブページのどこが見られているかの分析などに使う。</td></tr>
</table>
<div class="ex"><div class="ex-t">具体例</div>コンビニの本部が「クレーム件数をパレート図にしたら、上位2種類（接客・品切れ）で全体の8割だった。まずこの2つを重点対策しよう」――これがパレート図とABC分析の典型的な使い方です。</div>
<div class="why"><div class="why-t">なぜ？ ── 「上位だけ」を重点管理するのが合理的なのか</div>
背景にあるのは「結果の8割は、原因の2割から生まれる」という経験則（<b>パレートの法則</b>、80:20の法則）です。売上の大部分は一部の売れ筋商品から、クレームの大部分は一部の原因から生まれる――多くの現場でこの偏りが観察されます。管理にはコストがかかるので、全項目に同じ手間をかけるのは資源のムダ。<b>影響の大きい少数（A群）に手厚く、影響の小さい多数（C群)は簡素に</b>管理するのが、限られた資源で最大の効果を出す方法です。パレート図はこの「偏り」を一目で見せるための道具であり、ABC分析はその偏りに応じて管理の濃淡をつける手法、という関係です。</div>
<div class="pt"><div class="pt-t">試験のポイント</div>図の<b>説明文から名前を選ぶ</b>問題がほとんど。「原因と結果の関係を魚の骨状に＝特性要因図」「件数順＋累積比率＝パレート図」は反射で答えられるように。</div>

<h3 class="sec">3. 統計の基礎 ── 心理統計の貯金で得点する</h3>
<p>データの中心を表す代表値は<span class="kw">平均値</span>・<span class="kw">中央値</span>（メジアン）・<span class="kw">最頻値</span>（モード）。ばらつきを表すのが<span class="kw">分散</span>と<span class="kw">標準偏差</span>です。左右対称の釣鐘型の分布が<span class="kw">正規分布</span>で、「平均±標準偏差1つ分に約68％が入る」という性質まで出題されることがあります。このあたりは心理統計の最初の授業の内容そのままですね。</p>
<p>もうひとつ、心理統計組へのボーナス論点が<span class="kw">尺度水準</span>です。<b>名義尺度</b>（血液型・性別：区別のみ）、<b>順序尺度</b>（順位・満足度の5段階：大小はあるが間隔は不定）、<b>間隔尺度</b>（摂氏温度・偏差値：間隔は等しいがゼロが絶対でない）、<b>比率尺度</b>（身長・金額：ゼロが絶対）。令和7年度に「間隔尺度に該当するものはどれか」がそのまま出題されました。計量心理学の授業の貯金で即答できる問題です。</p>
<p>2変数の関係の強さは<span class="kw">相関係数</span>（−1から+1）で表します。試験で注意したいのは<b>「相関があっても因果があるとは限らない」</b>という論点で、見かけ上の相関である<span class="kw">擬似相関</span>（例：アイスの売上と水難事故――背後に「気温」という第3の変数）はITパスポートでも問われます。卒論の考察で散々書いた話がそのまま出る、おいしい論点です。</p>
<div class="why"><div class="why-t">なぜ？ ── 相関があっても因果といえないのか（3つの可能性）</div>
AとBに相関が見つかったとき、考えられる説明は1つではありません。（1）本当にAがBの原因（因果）、（2）<b>逆にBがAの原因</b>（逆の因果：「売れている店ほど広告費が多い」のは広告の効果か、儲かったから広告を増やせたのか）、（3）<b>第3の変数CがAとB両方の原因</b>（擬似相関：気温がアイスの売上と水難事故の両方を増やす）、そして（4）単なる偶然。データだけからは（1）〜（4）を区別できないからこそ、「相関＝因果」と断定する選択肢は誤りになります。ビジネスの文脈では、この区別を怠ると「広告を増やせば必ず売れる」のような誤った意思決定につながる――これがデータリテラシーとして問われる理由です。</div>
<p>調査の方法では、全員を調べる<span class="kw">全数調査</span>と、一部を抜き出して全体を推測する<span class="kw">標本調査</span>（母集団からのサンプリング）の区別が出ます。また、ウェブサービスで2つの案を実際に見せ比べて効果を測る<span class="kw">A/Bテスト</span>、データに基づいて仮説の正しさを確かめる<span class="kw">仮説検定</span>という用語も近年のシラバスで追加されました。実験計画法と統計的検定を学んだ身には、もはやサービス問題です。</p>
<div class="why"><div class="why-t">なぜ？ ── 一部を調べただけで全体がわかるのか</div>
鍵は<b>無作為抽出（ランダムサンプリング）</b>です。母集団から偏りなく標本を選べば、標本の性質は確率的に母集団の縮図になります（味噌汁の味見が一杯すくうだけで済むのは、よくかき混ぜてあるから、という比喩が有名です）。逆に言えば、<b>抽出に偏りがあれば標本がいくら大きくても結論は歪みます</b>。「自社アプリの利用者だけにアンケートして『若者全体の意見』と結論づける」のが典型的な失敗例。全数調査をしないのは、コストと時間の問題に加え、調査自体が対象を壊す場合（電球の寿命試験など）があるからです。この理屈はA/Bテストの設計（ユーザーをランダムに2群に分けるから比較できる）にもそのままつながっています。</div>

<h3 class="sec">4. データ利活用 ── ビッグデータの時代</h3>
<p>蓄積したデータを経営に活かすためのキーワード群です。</p>
<ul>
<li><span class="kw">ビッグデータ</span>：量が膨大で、種類が多様（文章・画像・位置情報など）で、発生速度が速いデータ群。従来の方法では処理しきれないデータを指します。</li>
<li><span class="kw">BI</span>（Business Intelligence：ビジネスインテリジェンス）：企業内の大量データを分析・加工して、経営の意思決定に役立てる仕組みやツール。</li>
<li><span class="kw">データマイニング</span>：大量データから、統計やAIを使って<b>これまで知られていなかった規則性や関係</b>を掘り出す（マイニング＝採掘）こと。</li>
<li><span class="kw">テキストマイニング</span>：文章データ（アンケート自由記述、SNS投稿など）を分析して傾向を取り出すこと。</li>
<li><span class="kw">データサイエンティスト</span>：統計やITのスキルでデータ分析を行い、ビジネスに活かす専門人材。</li>
<li><span class="kw">データ駆動型経営</span>：勘や経験だけでなく、データ分析の結果に基づいて意思決定する経営スタイル。</li>
</ul>
<div class="why"><div class="why-t">なぜ？ ── BIとデータマイニングは何が本質的に違うのか</div>
どちらも「データを分析する」話なので混同しやすいのですが、役割が違います。<b>BIは「人間が見て判断するための集計・可視化」</b>です。売上をダッシュボードに表示し、人間が「先月より落ちたな」と気づく。問いを立てるのは人間です。一方<b>データマイニングは「機械に規則性を発見させる」</b>営みで、人間が思いつかなかった「おむつとビール」のような組合せを統計やAIが掘り出します。試験では「BIの説明」と「データマイニングの説明」を入れ替えた選択肢が出ます。「<b>可視化して意思決定を支援＝BI／未知の規則性の発見＝マイニング</b>」と軸で区別してください。なお、分析の前にはデータの形式をそろえ、誤記や欠損を直す前処理（データクレンジング）が必要になる、という点も実務感覚として持っておくと選択肢が切りやすくなります。</div>
<div class="ex"><div class="ex-t">具体例</div>「おむつを買う人はビールも一緒に買いがち」という小売データ分析の逸話はデータマイニングの定番例です。日本なら、Tポイントやポンタ、楽天ポイントなどのポイントカード事業は、購買データを集めて分析する仕組みそのものです。</div>
<p>データの集め方・性質に関する用語も整理しておきます。自分で調査して集めるデータが<span class="kw">1次データ</span>、官公庁の統計など他者が集めたものを利用するのが<span class="kw">2次データ</span>。国や自治体が誰でも使える形で公開するデータを<span class="kw">オープンデータ</span>、個人の行動・購買履歴など個人に関するデータを<span class="kw">パーソナルデータ</span>と呼びます。心理学の調査法でいう一次資料・二次資料と同じ発想です。</p>

<h3 class="sec">5. 業務を分析して改善につなげる</h3>
<p>業務分析の出発点は、仕事の流れを図にして「見える化」することです。誰が・何を・どの順でやるかを図示し、ムダや滞留を見つけます。また、在庫管理では、在庫が一定量を下回ったら発注する<span class="kw">定量発注方式</span>と、決まった時期に必要量を発注する<span class="kw">定期発注方式</span>という2つの方式が知られています。発注のタイミングを決める基準在庫量を<b>発注点</b>と呼ぶことも、計算問題の前提として登場します。</p>
<div class="why"><div class="why-t">なぜ？ ── 発注方式が2つあるのか</div>
在庫管理の悩みは「在庫が多すぎると保管費と廃棄ロスがかさみ、少なすぎると品切れで販売機会を失う」という綱引きです。<b>定量発注方式</b>は「減ったら頼む」仕組みなので管理の手間が小さく、<b>需要が安定した安価な品</b>（ネジ、コピー用紙）に向きます。<b>定期発注方式</b>は毎回需要を予測して発注量を計算する手間がかかる分、需要の変動に細かく対応できるので、<b>高価で需要が変動する品</b>（季節商品、生鮮品）に向きます。「手間をかける価値がある商品かどうか」で方式を選んでいる、と理解すれば、どちらの方式が適切かを問う事例問題に対応できます。</div>
<div class="pt"><div class="pt-t">試験のポイント</div>この単元の計算問題は「平均・中央値を求める」「散布図から相関を読む」「パレート図からA群を選ぶ」程度の素直なものが中心。心理統計を経験したぐりさんなら、計算問題はむしろ得点源にできます。</div>

<h3 class="sec">まとめ</h3>
<ul>
<li>アイデア出しは<span class="kw">ブレーンストーミング</span>（批判禁止）、整理は<span class="kw">KJ法</span>。</li>
<li>図表は「説明→名前」を即答できるように。<span class="kw">パレート図</span>・<span class="kw">特性要因図</span>・<span class="kw">散布図</span>が三大頻出。</li>
<li>統計は心理統計の貯金で勝てる。<span class="kw">擬似相関</span>・<span class="kw">標本調査</span>・<span class="kw">A/Bテスト</span>に注意。</li>
<li>データ活用は<span class="kw">BI</span>・<span class="kw">データマイニング</span>・<span class="kw">ビッグデータ</span>。「知られていなかった規則性の発見＝マイニング」。</li>
</ul>

</div>
<p>会社の成績表である損益計算書では、売上からいろいろな費用を引きながら、段階的に利益を計算します。</p>
<table class="tbl">
<tr><th>段階</th><th>計算</th><th>意味</th></tr>
<tr><td><span class="kw">売上総利益</span></td><td>売上高 − 売上原価</td><td>いわゆる「粗利（あらり）」。商品そのものの儲け。</td></tr>
<tr><td><span class="kw">営業利益</span></td><td>売上総利益 − 販売費及び一般管理費</td><td><b>本業での儲け</b>。人件費・家賃・広告費などを引いた後。</td></tr>
<tr><td><span class="kw">経常利益</span></td><td>営業利益 ± 営業外損益</td><td>本業以外（利息の受け取り・支払いなど）も含めた、毎期の経営活動全体の儲け。</td></tr>
<tr><td><span class="kw">当期純利益</span></td><td>経常利益 ± 特別損益 − 税金</td><td>最終的に会社に残る利益。</td></tr>
</table>
<div class="ex"><div class="ex-t">具体例</div>カフェで500円のコーヒーを売るとします。豆・ミルク・カップ代が200円なら、売上総利益（粗利）は300円。ここから店員さんの給料や家賃を引いた残りが営業利益です。ニュースで「本業の儲けを示す営業利益は……」という言い回しを聞いたら、この階段を思い出してください。</div>
<div class="why"><div class="why-t">なぜ？ ── 利益をわざわざ段階に分けるのか</div>
最終利益の1つの数字だけでは、<b>「どこで儲かり、どこで損したのか」が見えない</b>からです。段階に分けると会社の診断ができます。たとえば「営業利益は赤字なのに経常利益は黒字」の会社は、本業が不調で、資産運用の利息や配当で食いつないでいる状態。逆に「営業利益は黒字なのに当期純利益が大赤字」なら、本業は健全だが、災害損失や事業売却損のような一時的な特別損失が出たと読めます。後者なら来期は回復が見込める――このように、<b>段階ごとの利益は「原因の切り分け装置」</b>なのです。これが分かると、利益の名前と計算式の対応も自然に頭に残ります。</div>
<p>売上原価の計算も頻出です。<span class="kw">売上原価</span>＝<b>期首棚卸高＋当期仕入高−期末棚卸高</b>。「仕入れた分」ではなく「<b>実際に売れた分</b>」だけを費用にするための式で、売れ残り（期末在庫）を引くのがポイントです。たとえば期首在庫100万円、当期仕入800万円、期末在庫200万円なら、売上原価は 100＋800−200＝700万円。令和7年度にもこの計算が出題されています。</p>
<div class="pt"><div class="pt-t">試験のポイント</div>「<b>本業の儲け＝営業利益</b>」が最頻出。売上総利益と営業利益の計算式を入れ替えた選択肢に注意。</div>

<h3 class="sec">2. 損益分岐点 ── 何個売れば赤字を脱出？</h3>
<div style="margin:16px auto;padding:14px 12px 10px;background:var(--card);border:1px solid var(--line);border-radius:10px;">

</div>
<p>費用は2種類に分けられます。売上の増減に関係なく一定額かかる<span class="kw">固定費</span>（家賃、正社員の人件費など）と、売上に比例して増える<span class="kw">変動費</span>（材料費など）です。利益がちょうどゼロになる売上高を<span class="kw">損益分岐点</span>（損益分岐点売上高）と呼びます。</p>
<p>計算の考え方はこうです。1個売るごとに「販売価格 − 変動費」のぶんだけ固定費を回収できます（これを限界利益と呼びます）。固定費を回収しきった瞬間が損益分岐点です。</p>
<div class="ex"><div class="ex-t">具体例で計算</div>コーヒー1杯500円、変動費は1杯200円、家賃や人件費などの固定費が月60万円のカフェを考えます。1杯売るごとに 500−200＝300円 を固定費の回収に充てられるので、60万円 ÷ 300円 ＝ <b>2,000杯</b>が損益分岐点。売上高でいえば 500円 × 2,000杯 ＝ <b>100万円</b>です。月2,000杯を超えた分から、やっと利益が出始めます。</div>
<p>公式の形では「損益分岐点売上高 ＝ 固定費 ÷（1 − 変動費率）」と書かれます（変動費率＝変動費÷売上高）。公式を丸暗記するより、上の「1個あたりいくら固定費を回収できるか」という考え方を覚えるほうが応用が利きます。</p>
<div class="why"><div class="why-t">なぜ？ ── 公式「固定費÷（1−変動費率）」はこうして導かれる</div>
損益分岐点は「売上＝費用」になる点です。売上高をS、変動費率をv、固定費をFとすると、費用は「固定費＋変動費」なので、<b>S ＝ F ＋ vS</b> が成り立ちます。これを解くと、S − vS ＝ F、つまり S(1 − v) ＝ F、よって <b>S ＝ F ÷ (1 − v)</b>。これが公式の正体です。ここで（1 − v）は「売上1円のうち固定費回収と利益に回せる割合」（限界利益率）を意味します。さらにこの式から重要な性質が読み取れます。<b>固定費Fが大きいほど損益分岐点は高くなり（赤字になりやすい）、変動費率vが低いほど分岐点を超えた後の利益が伸びやすい</b>。鉄道会社やSaaS企業のような「固定費が大きく変動費が小さい」ビジネスが、軌道に乗るまで苦しいのに乗った途端に高収益になるのは、まさにこの構造です。式の意味まで理解しておくと、数値を変えたあらゆる出題に対応できます。</div>
<p>応用形として「目標利益を達成するための販売数」も出ます。考え方は同じで、回収すべき金額が「固定費＋目標利益」に変わるだけ。<b>販売数＝（固定費＋目標利益）÷1個あたりの限界利益</b>です。先ほどのカフェで月20万円の利益が欲しいなら、（60万＋20万）÷300円≒2,667杯となります。</p>
<div class="pt"><div class="pt-t">試験のポイント</div>損益分岐点は<b>計算問題の定番</b>。「固定費が増えると損益分岐点は上がる」「変動費率が下がると損益分岐点は下がる」という方向の理解も問われます。</div>

<h3 class="sec">3. 財務諸表 ── 会社の健康診断書</h3>
<p>会社の状態を外部に報告する書類が<span class="kw">財務諸表</span>で、主役は次の3つです。</p>
<table class="tbl">
<tr><th>書類</th><th>表すもの</th></tr>
<tr><td><span class="kw">貸借対照表</span>（B/S：Balance Sheet）</td><td><b>ある時点</b>の財政状態。左側に資産、右側に負債と純資産が並び、「資産 ＝ 負債 ＋ 純資産」が必ず成り立つ（バランスシート）。</td></tr>
<tr><td><span class="kw">損益計算書</span>（P/L：Profit and Loss statement）</td><td><b>一定期間</b>の経営成績。売上と費用、そして先ほどの5つの利益。</td></tr>
<tr><td><span class="kw">キャッシュフロー計算書</span></td><td>一定期間の<b>現金の出入り</b>。営業活動・投資活動・財務活動の3区分で表す。</td></tr>
</table>
<div style="margin:16px auto;padding:14px 12px 10px;background:var(--card);border:1px solid var(--line);border-radius:10px;">

<text x="325" y="236" text-anchor="middle" font-size="13" font-weight="700" fill="#57a673">純資産 1,000万円</text>

<text x="230" y="172" text-anchor="middle" font-size="20" font-weight="700" fill="currentColor">＝</text>
<text x="135" y="300" text-anchor="middle" font-size="11" fill="currentColor" fill-opacity="0.7">お金の使い道（何で持っているか）</text>
<text x="325" y="300" text-anchor="middle" font-size="11" fill="currentColor" fill-opacity="0.7">お金の集め方（どう調達したか）</text>
<text x="230" y="326" text-anchor="middle" font-size="12.5" font-weight="700" fill="currentColor">資産 ＝ 負債 ＋ 純資産（左右は必ず一致）</text>
</svg>

</div>
<div class="ex"><div class="ex-t">具体例</div>貸借対照表のイメージは「家計の財産目録」です。持ち家3,000万円（資産）のうち、住宅ローン2,000万円（負債）を引いた1,000万円が本当の自分の取り分（純資産）。会社版がB/Sです。</div>
<div class="why"><div class="why-t">なぜ？ ── 貸借対照表の左右は必ず一致するのか</div>
B/Sの右側（負債・純資産）は「お金を<b>どう集めたか</b>」、左側（資産）は「集めたお金を<b>何に変えて持っているか</b>」を表しています。会社が持っているすべての資産は、必ず誰かから調達したお金（借りたか、株主に出してもらったか、自分で稼いだか）で手に入れたものです。つまり左右は<b>同じお金を「入口」と「使い道」の2つの面から見ているだけ</b>なので、一致しないことが論理的にあり得ないのです。この見方ができると、「自己資本比率＝右側のうち返さなくてよいお金の割合」「流動比率＝1年以内に出ていくお金を1年以内に現金化できる資産でまかなえるか」と、財務指標の意味も芋づる式に理解できます。</div>
<p>キャッシュフロー（CF）の3区分は、<b>営業CF＝本業で稼いだ現金</b>、<b>投資CF＝設備投資などへの支出（成長中の企業はマイナスが普通）</b>、<b>財務CF＝借入や返済、増資など資金調達の出入り</b>、と覚えます。利益が出ていても現金が尽きれば会社は倒産します（いわゆる黒字倒産）。だから現金の流れを別途チェックするのです。</p>

</div>
<div class="why"><div class="why-t">なぜ？ ── 黒字なのに倒産することがあるのか</div>
会計の利益は「商品を引き渡した時点」で計上されますが、企業間取引では代金の支払いは数か月後（掛け取引）が普通です。つまり<b>帳簿上は売上と利益が立っているのに、現金はまだ入ってきていない</b>状態が起こります。この間にも仕入代金や給料の支払いはやってくる。手元の現金が尽きて支払いができなくなれば、損益計算書が黒字でも会社は倒産します。急成長中の会社ほど、仕入が先行して現金が出ていくので危ない――だからこそ、利益（P/L）とは別に現金の流れ（キャッシュフロー計算書）を見る必要があるのです。「<b>利益は意見、キャッシュは事実</b>」という有名な格言ごと覚えてしまいましょう。</div>

<h3 class="sec">3.5 売掛金と買掛金 ── 「ツケ」の帳簿ルール</h3>
<p>いま出てきた掛け取引を、用語と計算で固めましょう。商品を引き渡したのに、代金をまだ受け取っていない——この「あとで受け取れる権利」が<span class="kw">売掛金</span>です（受け取れるお金なので、貸借対照表では流動資産）。逆に、仕入れたのにまだ払っていない「あとで払う義務」が<span class="kw">買掛金</span>（負債）です。</p>
<p>売掛金が動くタイミングのルールは3つだけです。</p>
<ul>
<li><b>受注しただけ</b>では、売上も売掛金も発生しない（まだ商品を渡していない＝注文の約束だけ）。</li>
<li><b>売上計上（商品の引き渡し）</b>の時点で、売掛金が<b>増える</b>。</li>
<li><b>現金回収</b>の時点で、売掛金が<b>減る</b>。</li>
</ul>

<div class="ex"><div class="ex-t">具体例で計算（本試験の頻出パターン）</div>ある取引先と、4〜5月に次の取引があったとします（4月1日時点の売掛金はゼロ）。取引A：4月に売上計上800万円→4月末に回収済み。取引B：5月に売上計上1,300万円→回収は6月末予定。取引C：5月に売上計上1,000万円→回収日未定。取引D：5月に受注400万円（売上計上はまだ）。さて、5月31日時点の売掛金は？<br><br>考え方：<b>「売上計上済み」かつ「未回収」のものだけ</b>を数えます。Aは回収済みなのでゼロ。BとCは売上計上済み・未回収なので 1,300＋1,000＝<b>2,300万円</b>。Dは受注だけなので対象外。回収「予定日」がいつかは関係なく、5月31日までに実際に回収されたかどうかだけで判定するのがポイントです。令和7年度の本試験でも、ほぼこの形の問題が出題されています。</div>
<div class="why"><div class="why-t">なぜ？ ── 受注した時点では売上にならないのか</div>
注文は約束にすぎず、キャンセルされるかもしれないからです。会計には「収益は、商品やサービスを<b>実際に引き渡した時点</b>で計上する」という原則があり（実現主義）、確実になっていない儲けを帳簿に載せることを許しません。もし受注の瞬間に売上にできたら、期末に大量の架空注文を計上して業績をよく見せる粉飾が簡単にできてしまいます。そして、売掛金は「回収できて初めて現金」です。売掛金が積み上がったまま回収が遅れると、黒字倒産（前節）への道が始まる——だから企業は取引先ごとに与信管理（掛けで売ってよい上限の管理）を行うのです。受注→売上計上→回収という3つの時点の区別は、この一連の理屈ごと覚えてください。</div>
<h3 class="sec">4. 財務指標 ── 数字で会社を比べる</h3>

<tr><td><span class="kw">自己資本比率</span></td><td>自己資本 ÷ 総資本</td><td>高いほど借金に頼らない安定経営。</td></tr>
<tr><td><span class="kw">流動比率</span></td><td>流動資産 ÷ 流動負債</td><td>短期の支払い能力。100％を大きく超えていれば安心。</td></tr>
</table>
<div class="ex"><div class="ex-t">具体例</div>任天堂は自己資本比率が約8割と非常に高く、「借金に頼らず自分のお金で経営する」堅実型の代表例としてよく挙げられます。一方、銀行からの借入で大型設備に投資する鉄道会社や電力会社は自己資本比率が低め。業種によって「普通の数字」が違うのもポイントです。</div>
<div class="why"><div class="why-t">なぜ？ ── 「安全な会社」と「ROEが高い会社」は別物なのか</div>
直感に反しますが、<b>借金はROEを高めます</b>。自己資本100万円だけで10万円稼ぐとROEは10％ですが、さらに900万円借りて事業を10倍にし、利息を払っても50万円稼げれば、ROEは50％に跳ね上がります（てこ＝レバレッジの効果）。つまりROEの高さは「効率の良さ」と同時に「借金による嵩上げ」の可能性も含んでいます。だから投資家はROE単独ではなく、<b>自己資本比率（安全性）とセットで</b>会社を評価します。「ROEが高い＝無条件に優良企業」という選択肢は、この理屈を知っていれば切れます。指標は1つで判断せず組み合わせる――これが財務分析の基本姿勢です。</div>

<h3 class="sec">5. 減価償却 ── 高い買い物は分割で費用にする</h3>
<p>パソコンや機械のように長く使う資産は、買った年に全額を費用にせず、<b>使う年数（耐用年数）に分けて少しずつ費用化</b>します。これが<span class="kw">減価償却</span>です。毎年同じ額ずつ償却する<span class="kw">定額法</span>と、残った帳簿価額に毎年同じ率を掛けて償却する（最初ほど多く償却される）<span class="kw">定率法</span>があります。</p>
<div class="ex"><div class="ex-t">具体例</div>会社が120万円のサーバを買って6年使うなら、定額法では毎年20万円ずつ費用に計上します。「今年の費用」と「現金の支出」がずれる、というのが会計の面白いところです。</div>
<div class="why"><div class="why-t">なぜ？ ── 買った年に全額を費用にしてはいけないのか</div>
サーバは6年間にわたって売上に貢献するのに、初年度に120万円全額を費用にすると、<b>初年度だけ大赤字・残り5年は費用ゼロで荒稼ぎ</b>という歪んだ成績表になります。これでは年度ごとの経営成績を正しく比較できません。会計には「費用は、それが生み出す収益と同じ期間に対応させる」という大原則（費用収益対応の原則）があり、減価償却はこの原則を実現する仕組みです。<b>「資産が働く期間に費用を割り振る」</b>という目的から考えれば、定額法（毎年均等に働く想定）と定率法（新しいうちほど価値が大きく落ちる想定）という2つの方法があることも自然に納得できるはずです。</div>

<h3 class="sec">6. 資金調達 ── お金はどこから来る？</h3>
<p>企業がお金を集める方法は大きく2つに分かれます。投資家から直接集める<span class="kw">直接金融</span>（<span class="kw">株式</span>や<span class="kw">社債</span>の発行）と、銀行を仲介して借りる<span class="kw">間接金融</span>（融資）です。株式は返済不要だが経営への発言権を渡す、社債・融資は返済義務と利息がある、という違いを押さえましょう。近年は、インターネットで不特定多数から少額ずつ資金を集める<span class="kw">クラウドファンディング</span>も定番用語になりました。また、未公開だった自社の株式を証券取引所に上場して一般に公開することを<span class="kw">IPO</span>（Initial Public Offering：株式公開）といいます（令和5年度に出題）。大規模な直接金融への入口です。</p>

<h3 class="sec">まとめ</h3>
<ul>
<li>利益の階段：粗利 →（販管費を引いて）<span class="kw">営業利益</span>＝本業の儲け → 経常利益 → 当期純利益。</li>
<li><span class="kw">損益分岐点</span>＝固定費 ÷（1−変動費率）。「1個あたりの限界利益で固定費を割る」と考える。</li>
<li>財務三表：時点の<span class="kw">B/S</span>、期間の<span class="kw">P/L</span>、現金の<span class="kw">キャッシュフロー計算書</span>。</li>
<li>指標は<span class="kw">ROE</span>・<span class="kw">自己資本比率</span>、費用化の仕組みは<span class="kw">減価償却</span>（定額法・定率法）。</li>
<li><span class="kw">売掛金</span>＝売上計上済みで未回収のお金。<b>受注では発生せず、売上計上で増え、回収で減る</b>。</li>
<li>資金調達は<span class="kw">直接金融</span>（株式・社債）と<span class="kw">間接金融</span>（融資）。</li>
</ul>

<p>人間の知的な創作活動の成果を守る権利を総称して<span class="kw">知的財産権</span>と呼びます。大きく分けると、文化的な創作を守る<span class="kw">著作権</span>と、産業上のアイデアを守る<span class="kw">産業財産権</span>（特許権・実用新案権・意匠権・商標権の4つ、特許庁に出願して登録）、そして営業秘密などその他の権利があります。「<b>著作権は登録不要、産業財産権は出願が必要</b>」という対比が最初の急所です。</p>
<div class="why"><div class="why-t">なぜ？ ── 著作権は自動発生で、産業財産権は出願制なのか</div>
守っている対象の性質が違うからです。小説や曲のような<b>表現は事実上無限のバリエーション</b>があり、別の人が偶然まったく同じ小説を書くことはほぼありません。だから「作った人のもの」と自動的に認めても混乱が起きにくい。一方、<b>技術的なアイデアは複数の人が同時期に同じ結論へたどり着くことが頻繁に起こります</b>（発明の歴史は同時発明だらけです）。誰の権利か争いになるので、特許庁への出願で「早い者勝ち」を公的に記録し、権利の範囲を文書で確定させる必要があるのです。先願主義（先に出願した者が勝つ）も、「先に発明した」の証明が困難である以上、出願日という客観的な記録で決めるしかない、という実務的な理由から来ています。</div>

<h3 class="sec">2. 著作権 ── 創った瞬間に生まれる権利</h3>
<p>小説、音楽、絵画、写真、映画、そして<b>プログラム</b>。こうした表現を守るのが著作権です。最大の特徴は、<b>創作した時点で自動的に発生する</b>こと（無方式主義）。出願も登録もいりません。</p>
<p>著作権は2つの束でできています。</p>
<ul>
<li><span class="kw">著作者人格権</span>：公表するか決める権利、名前を表示する権利、勝手に改変されない権利。著作者本人だけのもので、<b>譲渡できません</b>。</li>
<li><span class="kw">著作財産権</span>（狭い意味の著作権）：複製権・公衆送信権など、経済的に利用する権利。こちらは<b>譲渡や相続ができます</b>。</li>
</ul>
<p>保護期間は原則として<b>著作者の死後70年</b>（法人名義の著作物は公表後70年）です。</p>

<tr><td>プログラム（ソースコード）、データベース（構成に創作性があるもの）、マニュアル、ウェブページのデザイン</td><td><span class="kw">アルゴリズム</span>（解法）、<span class="kw">プログラム言語</span>そのもの、規約（プロトコル）、単なるデータやアイデア</td></tr>

<div class="pt"><div class="pt-t">試験のポイント</div>「<b>プログラムは保護されるが、アルゴリズムとプログラム言語は保護されない</b>」は超頻出。「アイデアではなく表現を守る」のが著作権、と理解すると整理できます。</div>
<div class="why"><div class="why-t">なぜ？ ── アルゴリズムを著作権で守ってはいけないのか</div>
もし「並べ替えの効率的な手順」のようなアルゴリズムを最初に考えた人が著作権で独占できたら、<b>世界中の後続のプログラマが同じ解法を使えなくなり、ソフトウェア開発全体が止まってしまいます</b>。プログラム言語や規約（プロトコル）も同じで、これらは表現のための「道具」なので、独占させると文化の発展という著作権法のそもそもの目的に反するのです。だから著作権の保護は「同じアルゴリズムでも、自分で書き上げたコード（表現）はそれぞれ守る」という線引きになっています。ではアイデアはまったく守れないのかというと、そうではなく、<b>高度で新規性のある技術的アイデアは特許権の出番</b>です。「表現＝著作権、技術的アイデア＝特許」という役割分担で知財の全体像をつかんでください。</div>
<p>もうひとつ実務直結なのが<span class="kw">職務著作</span>です。会社の業務として従業員が作成し、会社名義で公表するプログラムなどの著作者は、契約に別段の定めがない限り<b>会社</b>になります。来年ぐりさんが仕事で書くコードの著作権は、原則として勤務先に帰属するということです。</p>
<div class="why"><div class="why-t">なぜ？ ── 仕事で書いたコードは会社のものなのか</div>
理由は2つあります。第一に<b>投資の回収</b>。会社は給料・設備・教育に投資して開発環境を整えており、その成果物の権利が個々の従業員に散らばると、投資する企業がいなくなってしまいます。第二に<b>取引の安定</b>。ソフトウェアは大勢の共同作業で作られるので、退職した元社員の一人ひとりが「自分の書いた部分の権利」を主張できたら、製品の販売も改修もできなくなります。だから法律は「法人名義で公表する職務上の著作物は、最初から法人を著作者とする」と割り切ったのです。同じ理屈の延長で、<b>従業員の発明（職務発明）の特許を会社に帰属させる場合、会社は従業員に相当の利益（報奨）を与える</b>こととされている、という論点もあわせて覚えておくと安心です。</div>
<div class="ex"><div class="ex-t">具体例</div>ゲーム実況動画や「歌ってみた」が公式に黙認・許諾されているのは、本来は複製権や公衆送信権に触れ得る行為だからです。任天堂が「ガイドラインの範囲なら投稿OK」と明示しているのは、著作権者による利用許諾の例です。</div>

<h3 class="sec">3. 産業財産権 ── 特許庁に出願する4きょうだい</h3>
<table class="tbl">
<tr><th>権利</th><th>守る対象</th><th>期間</th></tr>
<tr><td><span class="kw">特許権</span></td><td>発明（高度な技術的アイデア）</td><td>出願から20年</td></tr>
<tr><td><span class="kw">実用新案権</span></td><td>考案（物の形状・構造の小さな工夫）</td><td>出願から10年</td></tr>
<tr><td><span class="kw">意匠権</span></td><td>物品などのデザイン</td><td>出願から25年</td></tr>
<tr><td><span class="kw">商標権</span></td><td>商品やサービスの名前・マーク（ロゴ）。商品につけるものを<b>トレードマーク</b>、サービス（運送、飲食など形のない役務）につけるものを<b>サービスマーク</b>と呼ぶ</td><td>登録から10年（<b>何度でも更新可</b>）</td></tr>
</table>
<p>覚え方のコツは対象のレベル感です。<b>大発明＝特許、ちょっとした工夫＝実用新案、見た目＝意匠、名前とロゴ＝商標</b>。そして商標だけが「更新すれば半永久的に持てる」点が独特です（ブランド名がコロコロ失効したら困りますよね）。</p>
<div class="why"><div class="why-t">なぜ？ ── 特許は20年で切れるのに、商標は更新できるのか</div>
特許制度の本質は<b>「公開と独占の交換取引」</b>です。発明を秘密にされると社会は技術を学べないので、国は「発明の中身を公開してくれたら、20年間だけ独占させてあげる」という取引を持ちかけます。期限後は誰でも使える社会の共有財産になり、それを土台に次の発明が生まれる。つまり期限切れは欠陥ではなく、<b>イノベーションを循環させるための設計</b>です（ジェネリック医薬品が安いのは特許切れの薬だからです）。一方、商標の目的は発明の促進ではなく<b>「この名前の商品はあの会社のものだ」という消費者の信頼を守ること</b>。ブランドは長く使うほど信頼が蓄積するので、期限で消滅させたらかえって消費者が混乱します。保護の目的が違うから、期間の設計も違う――この理屈で4つの権利の性格がすっきり整理できます。</div>
<p>特許には2つの重要な原則があります。同じ発明なら先に<b>出願</b>した者が勝つ<span class="kw">先願主義</span>（先に発明した者ではありません）。そして、コンピュータやネットワークを使った新しいビジネスの仕組みも<span class="kw">ビジネスモデル特許</span>として特許になり得ることです。</p>
<div class="ex"><div class="ex-t">具体例</div>「カップヌードル」というネーミングやロゴは商標権、容器の独特な形は意匠権、麺を油で揚げて乾燥させる製法は（出願当時なら）特許権——と、1つの商品に複数の知財が重なっています。Amazonの「1-Click注文」は有名なビジネスモデル特許の例です。</div>

<h3 class="sec">4. 不正競争防止法 ── 営業秘密を守る</h3>
<p>顧客リストや製造ノウハウのように、特許として公開したくない企業秘密を守るのが<span class="kw">不正競争防止法</span>です。保護される<span class="kw">営業秘密</span>と認められるには3つの要件が必要です。</p>
<ul>
<li><span class="kw">秘密管理性</span>：「マル秘」表示やアクセス制限など、秘密として管理されていること</li>
<li><span class="kw">有用性</span>：事業に役立つ情報であること</li>
<li><span class="kw">非公知性</span>：公然と知られていないこと</li>
</ul>
<p>このほか、他社の有名ブランドと紛らわしい表示を使う行為や、商品の形態を真似たデッドコピーなども、この法律が禁止しています。ID・パスワードなどを使って限定的に提供されるデータ（<span class="kw">限定提供データ</span>）の不正取得も規制対象です。</p>
<div class="pt"><div class="pt-t">試験のポイント</div>営業秘密の<b>3要件（秘密管理性・有用性・非公知性）</b>はそのまま出ます。「社内で誰でも見られる状態だった顧客リスト」は秘密管理性を欠くため営業秘密にあたらない、という事例判断も定番。</div>
<div class="why"><div class="why-t">なぜ？ ── 特許を取らずに、あえて秘密にする企業があるのか</div>
特許は強力ですが、<b>出願すると発明の中身が世界に公開され、20年で誰でも使えるようになる</b>という代償があります。コカ・コーラの原液レシピが100年以上守られているのは、特許を取らず営業秘密として隠し通しているからだと言われます。つまり企業には2つの戦略があるのです。リバースエンジニアリング（分解調査）で他社にすぐ見破られる技術なら、<b>公開してでも特許で20年の独占を取る</b>。製法のように外から見破りにくい技術なら、<b>営業秘密として無期限に隠す</b>（ただし漏えいしたら独占は終わり）。営業秘密の3要件のうち「秘密管理性」が最初に問われるのは、この戦略を選んだ以上、企業自身が秘密として扱う努力をしていなければ法律も守りようがない、という理屈です。</div>

<h3 class="sec">5. ライセンス ── 権利を「使わせてもらう」仕組み</h3>
<p>ソフトウェアを購入しても、買っているのは多くの場合「使う権利」です。その契約が<span class="kw">使用許諾契約</span>（ライセンス契約）。関連用語を押さえましょう。</p>
<ul>
<li><span class="kw">クロスライセンス</span>：企業同士が互いの特許などを使い合えるよう許諾し合う契約。</li>
<li><span class="kw">パブリックドメイン</span>：保護期間が切れるなどして、誰でも自由に使える状態になった著作物。</li>
<li><span class="kw">シュリンクラップ契約</span>：パッケージソフトの包装フィルムを開封した時点で、使用許諾契約に同意したとみなす契約形態（ダウンロード時にクリックで同意するのはクリックラップ契約）。令和4年度に出題。</li>
<li><span class="kw">クリエイティブ・コモンズ（CC）ライセンス</span>：「出典を表示すれば使ってよい」など、作者が利用条件をあらかじめ示す仕組み。</li>
<li><span class="kw">OSS</span>（Open Source Software：オープンソースソフトウェア）：ソースコードが公開され、ライセンスの条件下で誰でも利用・改変・再配布できるソフトウェア。LinuxやPythonの世界で必ず出会います。</li>
</ul>

<h3 class="sec">まとめ</h3>
<ul>
<li><span class="kw">著作権</span>は創作と同時に発生（無方式主義）。<b>プログラムは保護、アルゴリズム・言語は対象外</b>。仕事で書いたコードは<span class="kw">職務著作</span>で原則会社のもの。</li>
<li>産業財産権4つ：<b>特許（発明・20年）／実用新案（考案・10年）／意匠（デザイン・25年）／商標（名前ロゴ・10年で更新可）</b>。特許は<span class="kw">先願主義</span>。</li>
<li><span class="kw">営業秘密</span>の3要件＝秘密管理性・有用性・非公知性（不正競争防止法）。</li>
<li>ライセンスは「使う権利」の契約。<span class="kw">クロスライセンス</span>・<span class="kw">CCライセンス</span>・<span class="kw">OSS</span>。</li>
</ul>

<h3 class="sec">2. 個人情報保護法 ── 心理系出身者の得意エリア</h3>
<p>研究倫理で個人情報の扱いに慣れているぐりさんには、なじみ深い法律のはずです。<span class="kw">個人情報</span>とは、生存する個人に関する情報で、氏名や生年月日などにより<b>特定の個人を識別できるもの</b>。他の情報と容易に照合して識別できるものも含みます。マイナンバーや指紋データ、運転免許証番号のような<span class="kw">個人識別符号</span>も個人情報です。</p>
<ul>
<li><span class="kw">要配慮個人情報</span>：人種、信条、病歴、犯罪歴など、差別や不利益につながりやすい情報。<b>取得には本人の同意が必要</b>で、特に厳格に扱われます。</li>
<li><span class="kw">匿名加工情報</span>：特定の個人を識別できないよう加工し、<b>復元できないように</b>した情報。一定のルールの下で本人の同意なく利活用できます（ビッグデータ活用の道を開くための仕組み）。</li>
<li><span class="kw">個人情報保護委員会</span>：個人情報の扱いを監督する国の機関。</li>
<li><span class="kw">オプトアウト</span>：本人の求めがあれば第三者提供を停止することを条件に、あらかじめ同意を得ずに個人データを第三者へ提供できる仕組み（届出が必要。要配慮個人情報には使えない）。令和4年度に出題。</li>
<li><span class="kw">GDPR</span>（General Data Protection Regulation）：EUの一般データ保護規則。EU域内の個人データを保護する法律で、<b>EU外の企業でもEU居住者のデータを扱えば適用される</b>点が特徴。令和5年度に出題。</li>
</ul>
<div class="ex"><div class="ex-t">具体例</div>ポイントカードの購買履歴を「30代・関東在住の女性が化粧品を購入」のように個人を特定できない形へ加工して企業間で分析に使う——これが匿名加工情報の活用イメージです。心理学の研究で参加者データをID化して個人名と切り離す作業と、発想は同じです。</div>
<div class="why"><div class="why-t">なぜ？ ── 要配慮情報は厳しく、匿名加工情報は緩いのか</div>
個人情報保護法の根っこにあるのは「<b>本人に降りかかるリスクの大きさに応じて、規制の強さを変える</b>」という原則です。病歴や犯罪歴は、漏れたときに差別や社会的排除という取り返しのつかない不利益につながる歴史があったため、取得の段階から本人同意を要求します（リスク最大→規制最強）。逆に、匿名加工して<b>誰のデータか復元できなくすれば、本人に不利益が及ぶ経路そのものが断たれる</b>ので、同意なしの利活用を認めます（リスク小→規制緩和）。この法律は「個人の権利保護」と「データ利活用による社会の発展」の<b>両立</b>を目的に掲げており、保護一辺倒ではない点が重要です。規制の強弱をリスクの大小と対応づけて覚えると、細かい規定を忘れても方向で正解できます。</div>
<p>マイナンバー（個人番号）の利用範囲を税・社会保障・災害対策に限定するのが<span class="kw">マイナンバー法</span>です。「会社が社員のマイナンバーを成績管理に使う」のような目的外利用は違法、という形で出題されます。</p>

<h3 class="sec">3. 労働の法律 ── 派遣と請負の三角関係</h3>
<p>まず基本となるのが<span class="kw">労働基準法</span>。労働条件の最低基準を定めた法律で、法定労働時間は<b>1日8時間・週40時間</b>。これを超える残業をさせるには、労使協定（いわゆる<span class="kw">36協定</span>・サブロク協定）の締結が必要です。</p>
<div class="why"><div class="why-t">なぜ？ ── 労働条件を当事者の自由な契約に任せないのか</div>
民法の原則は「契約は当事者の自由」ですが、労働契約だけは国が最低基準を強制します。理由は<b>交渉力の圧倒的な差</b>です。生活がかかっている個人は、「嫌なら辞めろ」と言われれば不利な条件でも受け入れざるを得ません。自由競争に任せると労働条件は際限なく切り下がる──この歴史的経験から、労働基準法は「これを下回る契約は、当事者が合意していても無効」という強行法規になっています。36協定が「個人の同意」ではなく「労働組合など労働者の<b>過半数代表との協定</b>」を要求するのも、個人では会社と対等に交渉できないため、集団の力で対等性を回復させる仕組みなのです。</div>
<p>そしてIT業界の試験対策として最重要なのが、<b>派遣と請負の違い</b>です。どちらも「他社の仕事をする」形ですが、命令系統がまったく違います。</p>
<table class="tbl">
<tr><th></th><th><span class="kw">労働者派遣</span></th><th><span class="kw">請負</span></th></tr>
<tr><td>雇用関係</td><td>派遣<b>元</b>と労働者</td><td>請負会社と労働者</td></tr>
<tr><td>指揮命令</td><td>派遣<b>先</b>が出す</td><td>請負会社が出す（注文主は出せない）</td></tr>
<tr><td>責任</td><td>労働力の提供</td><td>仕事の<b>完成責任</b>を負う</td></tr>
</table>
<p>派遣は「雇い主は派遣元、指示を出すのは派遣先」というねじれた三角関係がポイント。一方、請負では注文主が請負会社の労働者に直接指示を出してはいけません。請負契約なのに実態は注文主が直接指揮命令している状態は<span class="kw">偽装請負</span>と呼ばれる違法状態です。また、派遣されてきた人をさらに別の会社へ派遣する<b>二重派遣</b>も禁止です。</p>
<div class="why"><div class="why-t">なぜ？ ── 偽装請負や二重派遣は、何がそんなに悪いのか</div>
一言でいえば<b>「労働者を守る責任者が消える」</b>からです。派遣という働き方は、雇い主（給料・社会保険の責任）と指示を出す者（現場の安全・労働時間管理の責任）が分かれる特殊な形なので、労働者派遣法が両者の責任分担を細かく定めて初めて成立しています。ところが請負を装って実態は派遣（偽装請負）にすると、この法律の網の外で「指示はするが責任は取らない」会社が生まれ、長時間労働や労災が起きても誰も責任を負いません。二重派遣も同様に、間に入る会社が増えるほど中間搾取で賃金が削られ、責任の所在が曖昧になります。<b>「誰が雇用主か」「誰が指揮命令するか」を常に一対一で明確にする</b>──これが労働法規の根本思想で、試験の事例問題もこの軸で判定すれば解けます。</div>
<div class="ex"><div class="ex-t">具体例</div>IT業界では、システム開発を大手が受注し、一部を協力会社に発注する多重構造が珍しくありません。客先に常駐して働く形態（いわゆるSES：準委任契約の一種）もあります。準委任は「仕事の完成」ではなく「業務の遂行」に責任を負う契約で、指揮命令は請負と同様に自社側にあります。就職後に自分の契約形態を理解するうえでも大切な知識です。</div>
<p>柔軟な働き方の制度として、実際の労働時間に関係なく労使で定めた時間だけ働いたとみなす<span class="kw">裁量労働制</span>と、コアタイムを除き出退勤時刻を労働者が決められる<span class="kw">フレックスタイム制</span>も覚えておきましょう。</p>
<div class="pt"><div class="pt-t">試験のポイント</div>「派遣労働者に指揮命令するのは誰か？→<b>派遣先</b>」「請負で注文主は労働者に直接指示できるか？→<b>できない</b>」。この2問だけで派遣・請負問題の大半は解けます。</div>

<h3 class="sec">4. 取引を公正にする法律</h3>
<table class="tbl">
<tr><th>法律</th><th>ポイント</th></tr>
<tr><td><span class="kw">独占禁止法</span></td><td>公正な競争を守る法律。<b>カルテル</b>（価格協定）や入札の<b>談合</b>を禁止。運用機関は<b>公正取引委員会</b>。</td></tr>
<tr><td><span class="kw">中小受託取引適正化法（取適法）</span></td><td>発注側の企業が、受託する中小企業をいじめる行為（支払い遅延、不当な値引き・やり直し要求など）を禁止。ソフトウェア開発の委託も対象。<b>旧・下請法</b>が2026年1月に強化・改称されたもの（シラバス6.5で置換え）。「下請」という呼び方をやめ、手形払いの禁止などで保護を強化。</td></tr>
<tr><td><span class="kw">PL法</span>（Product Liability：製造物責任法）</td><td>製造物の<b>欠陥</b>で生命・身体・財産に損害が出たら、過失の証明がなくても製造業者が賠償責任を負う。<b>ソフトウェア単体は対象外</b>だが、ソフトを組み込んだ機器（家電など）は対象。</td></tr>
<tr><td><span class="kw">特定商取引法</span></td><td>訪問販売や通信販売などのトラブルから消費者を守る。一定期間内なら無条件で契約解除できる<span class="kw">クーリングオフ</span>制度が有名（通信販売にはクーリングオフはない点に注意）。</td></tr>
</table>
<div class="ex"><div class="ex-t">具体例</div>「炊飯器の制御プログラムの欠陥で発火しケガをした」→組み込んだ製品の欠陥なのでPL法の対象。「ダウンロード購入した会計ソフトのバグで計算を誤った」→ソフト単体なのでPL法の対象外（契約責任の話になる）。この対比はよく出ます。</div>
<p>取引の前段でもう1つ重要なのが<span class="kw">NDA</span>（Non-Disclosure Agreement：秘密保持契約）です。業務委託の検討などで自社の営業秘密を相手に開示する<b>前に</b>、目的外利用や第三者への漏えいを禁じる契約を結びます。令和4年度に出題されました。営業秘密（単元④）の「秘密管理性」を取引の場面で守る道具です。</p>
<div class="why"><div class="why-t">なぜ？ ── PL法は「過失がなくても」賠償させるのか</div>
通常の損害賠償では、被害者が「相手に過失があった」ことを証明しなければなりません。しかし、テレビが発火したとき、一般消費者がメーカーの設計図や製造工程を調べて過失を立証するのは事実上不可能です。<b>製品の中身を知り尽くしているのはメーカー側だけ</b>という圧倒的な情報格差がある。そこでPL法は発想を転換し、「欠陥があって損害が出た」ことさえ示せば、過失の証明なしに賠償責任を負わせることにしました（無過失責任）。立証の負担を弱い側から強い側へ移したのです。また、対象が「製造物＝形のある動産」に限られ<b>ソフトウェア単体が対象外</b>なのは、法律上ソフトは形のない情報であって「製造された物」ではないから。ただしソフトを組み込んだ機器として流通すれば「物」になる――この線引きの理屈まで押さえれば、応用事例も判定できます。</div>

<h3 class="sec">まとめ</h3>
<ul>
<li>事例→法律の対応：無断ログイン＝<span class="kw">不正アクセス禁止法</span>、ウイルス作成＝<span class="kw">刑法</span>、広告メールは同意済みの人だけ＝<span class="kw">特定電子メール法</span>（オプトイン）。</li>
<li><span class="kw">個人情報保護法</span>：要配慮個人情報は同意が必要、<span class="kw">匿名加工情報</span>は復元不能なら同意なく利活用可。</li>
<li>労働時間の最低基準は<span class="kw">労働基準法</span>（1日8時間・週40時間、残業には36協定）。</li>
<li><b>派遣＝指揮命令は派遣先／請負＝指揮命令は請負会社・完成責任あり</b>。偽装請負と二重派遣は違法。</li>
<li>取引の公正：<span class="kw">独占禁止法</span>（カルテル禁止）、<span class="kw">中小受託取引適正化法（取適法）</span>（旧・下請法）、<span class="kw">PL法</span>（ソフト単体は対象外）。</li>
</ul>

  u16: `
<p>第1章のラストは「標準化」。地味に見えて、私たちの生活は標準化の恩恵だらけです。どのメーカーの乾電池でもリモコンに入るのも、どのコンビニでもバーコードが読めるのも、すべて「規格をそろえた」おかげ。出題は用語の対応問題が中心で、短時間で得点源にできる単元です。</p>

<h3 class="sec">1. 標準化とは ── 「そろえる」ことの価値</h3>
<p><span class="kw">標準化</span>とは、製品やサービスの仕様・手順などを統一し、規格として定めることです。互換性が生まれ、利用者はメーカーをまたいで製品を組み合わせられるようになり、市場全体が広がります。一方で、決まるまでに時間がかかったり、技術の多様性が失われたりする側面もあります。</p>
<div class="ex"><div class="ex-t">具体例</div>スマホの充電端子がUSB Type-Cに統一されてきた流れを思い出してください。ケーブルを共有できる便利さ（互換性）こそ標準化の価値です。EUが法律で統一を後押ししたように、標準化は産業政策の道具にもなります。</div>
<div class="why"><div class="why-t">なぜ？ ── 「事実上の標準」が自然に生まれてしまうのか</div>
鍵は<b>ネットワーク外部性</b>という性質です。これは「使う人が増えるほど、その製品・規格自体の価値が上がる」現象のこと。LINEが便利なのは友達がみんな使っているからで、性能が多少優れた別アプリが出ても乗り換えは起きにくい。規格の世界では、少しでも優勢になった規格に周辺機器・ソフト・人材が集まり、それがさらに利用者を呼ぶ……という雪だるま式の循環が起き、最終的に<b>勝者総取り</b>になります。こうして公的機関が決めなくても「事実上の標準」＝デファクトスタンダードが自然発生するのです。かつてのビデオ規格競争（VHS対ベータ）が古典的な例で、技術的な優劣よりも「仲間（陣営）をどれだけ集めるか」が勝敗を決めました。この力学を知っていると、企業がなぜ規格争いに必死になるのかが腑に落ちます。</div>

<h3 class="sec">2. 標準の3つの生まれ方</h3>
<table class="tbl">
<tr><th>種類</th><th>意味</th><th>例</th></tr>
<tr><td><span class="kw">デジュレスタンダード</span></td><td>ISOなどの<b>公的な標準化機関が正式に定めた</b>標準</td><td>ISO規格、JIS規格</td></tr>
<tr><td><span class="kw">デファクトスタンダード</span></td><td>市場競争の結果、<b>事実上の標準</b>になったもの（機関の認定ではない）</td><td>Windows、QWERTYキーボード配列</td></tr>
<tr><td><span class="kw">フォーラム標準</span></td><td>関心のある<b>企業が集まって団体（フォーラム）を作り</b>定めた標準</td><td>USB、Bluetooth、DVD</td></tr>
</table>
<div class="pt"><div class="pt-t">試験のポイント</div>「市場で広く使われて事実上の標準＝<b>デファクト</b>」「公的機関が制定＝<b>デジュレ</b>」「企業連合が制定＝<b>フォーラム標準</b>」。3つの区別がそのまま出ます。デファクトの例としてWindowsが選択肢に並ぶのが定番。</div>

<h3 class="sec">3. 標準化団体 ── アルファベットの軍団を整理する</h3>
<table class="tbl">
<tr><th>団体</th><th>守備範囲</th></tr>
<tr><td><span class="kw">ISO</span>（International Organization for Standardization：国際標準化機構）</td><td>工業・技術全般の国際規格（電気以外ほぼ全部）</td></tr>
<tr><td><span class="kw">IEC</span>（International Electrotechnical Commission：国際電気標準会議）</td><td>電気・電子分野の国際規格</td></tr>
<tr><td><span class="kw">ITU</span>（International Telecommunication Union：国際電気通信連合）</td><td>電気通信（通信方式・周波数など）の国際標準</td></tr>
<tr><td><span class="kw">IEEE</span>（Institute of Electrical and Electronics Engineers：米国電気電子学会）</td><td>電気電子・情報分野の標準。無線LANのIEEE 802.11が有名</td></tr>
<tr><td><span class="kw">W3C</span>（World Wide Web Consortium）</td><td>ウェブ技術（HTMLなど）の標準化団体</td></tr>
<tr><td><span class="kw">IETF</span>（Internet Engineering Task Force）</td><td>インターネット技術（TCP/IPなど）の標準化。仕様書はRFCとして公開</td></tr>
<tr><td><span class="kw">JIS</span>／JISC</td><td>日本産業規格／それを調査・審議する日本の組織</td></tr>
</table>
<p>全部を丸暗記する必要はありません。<b>ISO＝国際規格の総本山、IEC＝電気、ITU＝通信、IEEE＝無線LANの802.11、W3C＝ウェブ</b>、この対応だけ押さえれば十分戦えます。</p>

<h3 class="sec">4. 覚えるべきISO規格 ── 番号と中身の対応</h3>
<table class="tbl">
<tr><th>規格</th><th>テーマ</th></tr>
<tr><td><span class="kw">ISO 9001</span></td><td><b>品質</b>マネジメントシステム（QMS）</td></tr>
<tr><td><span class="kw">ISO 14001</span></td><td><b>環境</b>マネジメントシステム（EMS）</td></tr>
<tr><td><span class="kw">ISO/IEC 27001</span></td><td><b>情報セキュリティ</b>マネジメントシステム（<span class="kw">ISMS</span>：Information Security Management System）</td></tr>
<tr><td><span class="kw">ISO/IEC 27017</span></td><td><b>クラウドサービス</b>に特化した情報セキュリティの規格。これに基づく認証がISMSクラウドセキュリティ認証（令和5・7年度に出題）</td></tr>
<tr><td><span class="kw">JIS Q 15001</span></td><td><b>個人情報保護</b>マネジメントシステム。適合した事業者の目印が<span class="kw">プライバシーマーク</span>（Pマーク）</td></tr>
</table>
<div class="ex"><div class="ex-t">具体例</div>企業のウェブサイトの下部に「ISO27001認証取得」「プライバシーマーク」のロゴが並んでいるのを見たことはありませんか？ 「うちはセキュリティ管理・個人情報管理の国際的なお墨付きがあります」というアピールです。IT企業では、ISMS認証は顧客への信頼の証としてよく取得されています。</div>
<div class="why"><div class="why-t">なぜ？ ── 企業はお金と手間をかけてまで「認証」を取るのか</div>
取引相手のセキュリティ管理が信頼できるかどうかを、外部から直接確かめる方法はありません（情報の非対称性）。本来なら取引のたびに監査が必要ですが、それでは双方のコストが膨大です。そこで<b>第三者機関が一定基準を審査して「お墨付き」を与える</b>ことで、信頼の確認を一回の認証に集約する――これが認証制度の経済的な機能です。発注側から見れば「ISMS認証あり」を条件にするだけで取引先を絞り込め、実際、官公庁や大企業の入札ではISMS認証やPマークが参加条件になることも珍しくありません。つまり認証は企業にとって<b>「信頼を伝えるシグナル」であり、取引の入場券</b>でもあるのです。心理学で学ぶシグナリングの考え方が、そのままビジネスの制度になっている例といえます。</div>
<div class="pt"><div class="pt-t">試験のポイント</div>「<b>9001＝品質、14001＝環境、27001＝情報セキュリティ</b>」の番号対応は確実に出ます。自分なりの語呂合わせで刷り込んでしまいましょう。</div>

<h3 class="sec">5. 身近なコードの標準 ── バーコードとQRコード</h3>
<ul>
<li><span class="kw">JANコード</span>（Japanese Article Number）：商品につく一次元バーコード。国コード・メーカーコード・商品コードなどで構成され、レジのPOSシステムで読み取られます。</li>
<li><span class="kw">QRコード</span>：縦横2方向に情報を持つ<b>二次元コード</b>。バーコードより大容量で、誤り訂正機能により一部が汚れても読み取れます。日本のデンソーウェーブが開発し、特許権を行使しないと宣言したことで世界中に普及しました（標準を広めるオープン戦略の好例）。</li>
<li><span class="kw">ISBN</span>（International Standard Book Number）：書籍を識別する国際的な番号。</li>
</ul>
<div class="why"><div class="why-t">なぜ？ ── デンソーウェーブはQRコードの特許を無償開放したのか</div>
一見「儲け損ない」に見えますが、これは先ほどのネットワーク外部性を<b>意図的に起こす</b>戦略です。コードの規格で使用料を取れば、誰も採用せず規格自体が死んでしまう。逆に無償開放すれば、世界中が採用して「二次元コードといえばQR」という巨大な生態系ができあがります。そして規格が普及するほど、読み取り機器や関連システムといった<b>周辺ビジネスの市場が拡大し、技術の本家として優位に立てる</b>。つまり「規格でただ儲ける」のではなく「規格を土俵にして、土俵の上のビジネスで儲ける」発想です。同じ構造は、GoogleがAndroidを無償提供して広告・アプリ市場で収益を上げるモデルにも見られます。オープン戦略は試験でも「なぜ無償公開するのか」という趣旨の問題として出題されることがあります。</div>

<h3 class="sec">まとめ</h3>
<ul>
<li>標準化＝仕様をそろえて<b>互換性</b>を生むこと。</li>
<li>標準の3類型：公的機関の<span class="kw">デジュレ</span>／市場が決めた<span class="kw">デファクト</span>／企業連合の<span class="kw">フォーラム標準</span>。</li>
<li>団体は「ISO＝全般、IEC＝電気、ITU＝通信、IEEE＝802.11、W3C＝ウェブ」。</li>
<li>規格番号は「<b>9001品質・14001環境・27001情報セキュリティ</b>」、個人情報は<span class="kw">プライバシーマーク</span>。</li>
<li><span class="kw">JANコード</span>は一次元、<span class="kw">QRコード</span>は二次元で誤り訂正つき。</li>
</ul>
<p>これで第1章「企業と法務」の講義は完走です。おつかれさまでした。ホームに戻って章末テストに挑戦し、合格の朱印を勝ち取りましょう。</p>

<p>第2章は「会社はどう戦うか」の話です。この単元では戦略の基本概念と分析ツール、他社との組み方、そして全社の情報を束ねる経営管理システムまでを扱います。用語は多いですが、すべて「<b>限られた資源を、どこに集中させるか</b>」という1つの問いから生まれた道具です。</p>

<h3 class="sec">1. 経営戦略とは ── 「どこで戦うか」を選ぶこと</h3>
<p><span class="kw">経営戦略</span>とは、競争優位を築くための中長期の方針です。重要なのは、戦略の本質が「がんばる」ことではなく<b>「選ぶ」こと</b>だという点。すべての市場で、すべての顧客に、すべての商品を売ることはできないので、勝てる場所と武器を選びます。</p>
<p>その武器の核になるのが<span class="kw">コアコンピタンス</span>です。他社には<b>真似できない、その会社の中核となる強み</b>のことで、（1）顧客に価値をもたらす、（2）競合が模倣しにくい、（3）他の事業にも応用できる、という3条件で説明されます。</p>
<div class="ex"><div class="ex-t">具体例</div>ホンダのエンジン技術はバイク・車・船外機・発電機へ展開され、模倣も困難——コアコンピタンスの教科書例です。トヨタの「カイゼン」を含む生産方式も、仕組みごと真似するのが極めて難しい強みです。</div>
<p>自社の経営資源を体系的に分析する手法としては<span class="kw">VRIO分析</span>が知られています。資源を<b>経済価値（Value）・希少性（Rarity）・模倣困難性（Imitability）・組織（Organization：活かす体制があるか）</b>の4つの問いで評価し、持続的な競争優位の源泉かどうかを判定します。令和7年度に「自社のもつ資源を分析する手法」として出題されました。コアコンピタンスの3条件と発想がつながっていることに気づくと、どちらも忘れません。</p>
<div class="why"><div class="why-t">なぜ？ ── 差別化しないと、何が起きるのか</div>
どの会社の商品も同じに見えるとき、顧客が比べられる基準は<b>価格だけ</b>になります。すると全員が値下げ合戦に巻き込まれ、業界全体が儲からない消耗戦に陥る。これが同質化競争の恐ろしさです。だから戦略論は一貫して「他社と違うこと（差別化）」か「他社より圧倒的に安く作れること（コストリーダーシップ）」か、あるいは「大手が来ない隙間市場（<span class="kw">ニッチ戦略</span>）」かの選択を迫ります。なお、あえて競争のない新市場を切り開く考え方は<span class="kw">ブルーオーシャン戦略</span>と呼ばれます（競争の激しい既存市場は血の海＝レッドオーシャン）。任天堂のWiiが「ゲーマー同士の性能競争」を降りて「家族で遊ぶ」市場を作ったのが好例です。</div>

<h3 class="sec">2. 分析ツール ── SWOTとPPM</h3>
<p>戦略を立てるには、まず自社と環境を分析します。代表ツールが2つ。</p>
<p><span class="kw">SWOT分析</span>は、自社の内部環境を<b>強み（Strength）・弱み（Weakness）</b>、外部環境を<b>機会（Opportunity）・脅威（Threat）</b>の4象限で整理する手法です。「強み・弱みは社内の話、機会・脅威は世の中の話」という内外の区別が試験の急所です（円安や法改正は自社では変えられない＝外部環境）。</p>

<p><span class="kw">PPM</span>（プロダクトポートフォリオマネジメント）は、複数の事業を<b>市場成長率</b>と<b>市場占有率（シェア）</b>の2軸で4つに分類し、資源配分を決めるツールです。</p>

<div class="why"><div class="why-t">なぜ？ ── シェアが高いと「稼げる」と言い切れるのか</div>
PPMの背後には2つの経験則があります。1つは<b>規模の経済</b>（たくさん作るほど1個あたりの固定費が薄まり安く作れる）。もう1つは<b>経験曲線効果</b>（累積生産量が増えるほど、習熟により単位コストが一定割合で下がっていく）。シェア1位の会社は誰よりも多く作ってきたので、同じ価格でも一番利益が出る構造になる――だからシェアを収益力の代理指標に使えるのです。そしてPPMの本質は<b>「金のなる木で稼いだ現金を、問題児に注いで次の花形を育てる」という資金の循環設計</b>にあります。「負け犬だから即撤退」と機械的に決めるものではない、という注意点も覚えておきましょう。</div>
<p>他社の優れたやり方と比較して自社を改善する手法は<span class="kw">ベンチマーキング</span>といいます。</p>

<h3 class="sec">3. 他社との組み方 ── 自前か、買うか、組むか</h3>
<table class="tbl">
<tr><th>手段</th><th>意味</th></tr>
<tr><td><span class="kw">M&A</span></td><td>Mergers and Acquisitions（合併・買収）。他社を丸ごと取り込む。</td></tr>
<tr><td><span class="kw">アライアンス</span></td><td>資本関係を結ばない（または緩やかな）業務提携。</td></tr>
<tr><td><span class="kw">ジョイントベンチャー</span></td><td>複数社が出資して合弁会社を新設する。</td></tr>
<tr><td><span class="kw">OEM</span></td><td>Original Equipment Manufacturing。相手先ブランドでの生産を受託すること。</td></tr>
<tr><td><span class="kw">ファブレス</span></td><td>自社では工場（fab）を持たず、製造を外部に委託する形態。</td></tr>
<tr><td><span class="kw">アウトソーシング</span></td><td>業務の外部委託。</td></tr>
</table>
<div class="ex"><div class="ex-t">具体例</div>任天堂やAppleは<b>ファブレス</b>の代表で、製造は台湾の受託企業などに任せ、自社は企画・設計に集中します。コンビニのPB商品（セブンプレミアムなど）は大手食品メーカーによる<b>OEM</b>。一方、ユニクロのように企画から販売まで一気通貫で握る方式（SPA）は<b>垂直統合</b>の例です。</div>
<div class="why"><div class="why-t">なぜ？ ── M&Aは「時間を買う」と言われるのか</div>
新規事業を自前で育てると、技術開発・人材育成・顧客開拓に何年もかかり、成功する保証もありません。M&Aなら、<b>すでに完成した技術・人材・顧客基盤を一括で手に入れられる</b>。つまり支払う買収額は「時間の短縮」への対価です。逆にリスクは、高値づかみと、企業文化の衝突で人材が流出すること。アライアンスはその中間で、「結婚（M&A）まではせず、まず付き合ってみる（提携）」という関係です。拘束が弱いぶん裏切りもあり得る——結びつきの強さとリスクのトレードオフで3つの手段を整理すると、事例問題で迷いません。</div>

<h3 class="sec">4. 経営管理システム ── 全社の情報を1つにつなぐ</h3>
<p>戦略の実行を支えるITの仕組みも、この分野の頻出用語です。</p>
<table class="tbl">
<tr><th>システム</th><th>何を管理する？</th></tr>
<tr><td><span class="kw">CRM</span></td><td>Customer Relationship Management（顧客関係管理）。顧客情報や購買履歴を一元化し、長期的な関係を築いて<b>顧客生涯価値</b>を高める。</td></tr>
<tr><td><span class="kw">SFA</span></td><td>Sales Force Automation（営業支援）。商談の進捗や営業活動の情報を共有し、営業の生産性を上げる。</td></tr>
<tr><td><span class="kw">SCM</span></td><td>Supply Chain Management（供給連鎖管理）。<b>調達→製造→物流→販売</b>の流れを企業をまたいで最適化し、在庫と納期のムダをなくす。</td></tr>
<tr><td><span class="kw">ERP</span></td><td>Enterprise Resource Planning（企業資源計画）。会計・人事・生産・販売など<b>基幹業務のデータを統合パッケージで一元管理</b>する。</td></tr>
</table>
<div class="why"><div class="why-t">なぜ？ ── 部門ごとのシステムではダメで、「統合」が必要なのか</div>
各部門が別々のシステムで動くと、それぞれは正しくても全体ではムダが生まれます。典型が在庫です。営業は欠品を恐れて多めに発注し、工場は効率重視でまとめて生産し、倉庫には誰も把握していない在庫の山ができる――<b>部分最適の合計は全体最適にならない</b>のです。ERPやSCMは、全部門・取引先までデータを一気通貫でつなぐことで「いま何がどこにいくつあるか」を共有し、この構造問題を解きます。セブン-イレブンが1日に何度も配送網を回せるのも、販売データが瞬時に工場・物流まで届くSCMの力です。「CRM＝顧客」「SCM＝モノの流れ」「ERP＝社内の基幹業務」と守備範囲で区別してください。</div>

<h3 class="sec">まとめ</h3>
<ul>
<li>戦略の本質は<b>選択と集中</b>。武器は<span class="kw">コアコンピタンス</span>（模倣困難・顧客価値・応用可能）。</li>
<li><span class="kw">SWOT</span>＝内部（強み弱み）×外部（機会脅威）。<span class="kw">PPM</span>＝金のなる木の資金で問題児を花形に育てる資金循環。</li>
<li>外部活用は結びつきの強い順に<b>M&A→ジョイントベンチャー→アライアンス</b>。製造を持たないのが<span class="kw">ファブレス</span>、受託生産が<span class="kw">OEM</span>。</li>
<li>経営管理システムは<span class="kw">CRM</span>（顧客）・<span class="kw">SFA</span>（営業）・<span class="kw">SCM</span>（モノの流れ）・<span class="kw">ERP</span>（基幹統合）。</li>
</ul>

<p>マーケティングの出発点は「全員に売ろうとしない」ことです。手順は3ステップで、頭文字から<span class="kw">STP</span>と呼ばれます。</p>
<ul>
<li><span class="kw">セグメンテーション</span>：市場を年齢・地域・ライフスタイルなどの軸で<b>同質なグループに分割</b>する。</li>
<li><span class="kw">ターゲティング</span>：分けたセグメントの中から、<b>狙う市場を選ぶ</b>。</li>
<li><span class="kw">ポジショニング</span>：選んだ顧客の頭の中に、競合と差別化された<b>自社の立ち位置を築く</b>。</li>
</ul>
<div class="ex"><div class="ex-t">具体例</div>同じコーヒーでも、スターバックスは「ゆったり過ごせる第三の場所」を求める層に、缶コーヒーのBOSSは「働く人の相棒」として現場で働く層に狙いを定めています。商品スペックではなく「顧客の頭の中の椅子」を取り合っているのがポジショニングです。</div>
<div class="why"><div class="why-t">なぜ？ ── 全員に売ろうとしてはいけないのか</div>
理由は2つあります。第一に資源の限界。広告費も営業人員も有限なので、全方位に薄くまくより、買ってくれる確率の高い層に集中するほうが投資効率が高い。第二に<b>メッセージの希釈</b>です。「誰にでも合う」と訴える商品は、心理的には「自分のための商品ではない」と知覚され、誰の心にも刺さりません。万人向けのラブレターが誰も口説けないのと同じ理屈です。「絞るからこそ刺さる」――STPはこの認知の性質を仕組み化したものです。</div>

<h3 class="sec">3. 価格のつけ方 ── 高く始めるか、安く始めるか</h3>
<table class="tbl">
<tr><th>戦略</th><th>やり方</th><th>向く条件</th></tr>
<tr><td><span class="kw">スキミングプライシング</span></td><td>発売直後に<b>高価格</b>をつけ、新しもの好きの層から利益を回収（上澄み吸収）</td><td>技術が独自で模倣されにくい、ブランド力がある</td></tr>
<tr><td><span class="kw">ペネトレーションプライシング</span></td><td>あえて<b>低価格</b>で出し、一気に市場シェアを獲得（市場浸透）</td><td>規模の経済が効く、シェア自体が価値を生む</td></tr>
</table>
<div class="why"><div class="why-t">なぜ？ ── 赤字覚悟の低価格が「戦略」になり得るのか</div>
ペネトレーションは一見ただの安売りですが、計算があります。第一に、シェアを取れば<b>経験曲線効果</b>でコストが下がり、後から利益がついてくる。第二に、ゲーム機や動画配信のように<b>利用者が増えるほど価値が上がる商品</b>（ネットワーク外部性）では、最初にシェアを取った者が勝者総取りになるため、初期の赤字は「市場を買う」投資になるのです。プリンタ本体を安く売ってインクで稼ぐ、ゲーム機を原価割れで売ってソフトのライセンス料で回収する――この「本体安・消耗品高」モデルも、同じ発想の応用です。逆に模倣されやすい商品で安売りすると、ただの消耗戦になります。条件とセットで覚えるのが800点への道です。</div>

<p>商品は<span class="kw">導入期→成長期→成熟期→衰退期</span>という一生をたどり、段階ごとに打ち手が変わります。</p>
<table class="tbl">
<tr><th>段階</th><th>特徴と打ち手</th></tr>
<tr><td>導入期</td><td>認知度が低く赤字気味。知名度向上への投資が中心。</td></tr>
<tr><td>成長期</td><td>売上が急拡大し、競合が参入してくる。シェア獲得と生産能力の増強。</td></tr>
<tr><td>成熟期</td><td>市場の伸びが止まり、<b>価格競争と差別化</b>の勝負に。利益はここが最大になりやすい。</td></tr>
<tr><td>衰退期</td><td>市場が縮小。撤退時期の見極めか、残存者利益の確保。</td></tr>
</table>
<div class="why"><div class="why-t">なぜ？ ── 普及には「壁」があるのか（イノベーター理論）</div>
新商品の買い手は、早い順に<b>イノベーター（革新者）→アーリーアダプター（初期採用者）→アーリーマジョリティ→レイトマジョリティ→ラガード</b>の5タイプに分かれます。重要なのは、新しさ自体を好む少数の前半層と、「みんなが使って安心だから買う」多数の後半層では<b>購買の動機がまったく違う</b>こと。だから前半で売れた商品が、そのままでは大衆に広がらない断絶（<span class="kw">キャズム</span>と呼ばれる溝）が生じます。アーリーアダプターは後続への影響力が大きい<b>オピニオンリーダー</b>として特に重視される――SNSのインフルエンサーマーケティングは、まさにこの理論の現代版です。同調や社会的証明といった心理学の知見が、そのまま市場分析に使われている例ですね。</div>

<h3 class="sec">5. 顧客データを活かす ── 分析とデジタル手法</h3>
<ul>
<li><span class="kw">RFM分析</span>：顧客を<b>Recency（最終購買日）・Frequency（購買頻度）・Monetary（購買金額）</b>の3軸で評価し、優良顧客を見つけて施策を変える手法。</li>
<li><span class="kw">ワントゥワンマーケティング</span>：顧客一人ひとりの好みに合わせて個別にアプローチすること。ECサイトの「あなたへのおすすめ」が典型。</li>
<li><span class="kw">SEO</span>（Search Engine Optimization）：検索エンジン最適化。検索結果の上位に自社サイトが表示されるよう工夫すること。</li>
<li><span class="kw">リスティング広告</span>：検索キーワードに連動して表示される広告。</li>
<li><span class="kw">アフィリエイト</span>：成果報酬型広告。ブログ等の紹介経由で商品が売れたら紹介者に報酬を払う仕組み。</li>
<li><span class="kw">オムニチャネル</span>：実店舗・EC・アプリなど、あらゆる接点を統合して一貫した購買体験を提供すること（ネットで注文して店舗で受け取るユニクロが好例）。</li>
</ul>

<h3 class="sec">まとめ</h3>
<ul>
<li><span class="kw">STP</span>＝分けて、選んで、頭の中に位置づける。絞るからこそ刺さる。</li>
<li><span class="kw">4P</span>（製品・価格・流通・販促）は買い手視点の4Cと対応させて理解。</li>
<li>価格は<span class="kw">スキミング</span>（高く始める・模倣困難が条件）と<span class="kw">ペネトレーション</span>（安く始めてシェア確保・規模の経済が条件）。</li>
<li><span class="kw">プロダクトライフサイクル</span>は導入→成長→成熟→衰退。普及の壁は<span class="kw">キャズム</span>。</li>
<li>顧客分析は<span class="kw">RFM</span>の3指標（最近・頻度・金額）が頻出。</li>
</ul>

<h3 class="sec">1. バランススコアカード（BSC） ── 財務だけ見ない成績表</h3>

<p><span class="kw">バランススコアカード（BSC：Balanced Scorecard）</span>は、企業の業績を<b>4つの視点</b>で評価する経営管理手法です。</p>
<table class="tbl">
<tr><th>視点</th><th>問い</th><th>指標の例</th></tr>
<tr><td><span class="kw">財務の視点</span></td><td>株主にどう応えるか</td><td>売上高、利益率</td></tr>
<tr><td><span class="kw">顧客の視点</span></td><td>顧客にどう見られたいか</td><td>顧客満足度、リピート率</td></tr>
<tr><td><span class="kw">業務プロセスの視点</span></td><td>どの業務に秀でるべきか</td><td>納期、不良率</td></tr>
<tr><td><span class="kw">学習と成長の視点</span></td><td>組織と人材をどう成長させるか</td><td>研修時間、資格取得数、従業員満足度</td></tr>
</table>
<div class="why"><div class="why-t">なぜ？ ── 財務指標だけで経営を評価してはいけないのか</div>
財務の数字は<b>「過去の活動の結果」しか映さない遅行指標</b>だからです。利益だけを追うと、研修や設備投資のような「いま費用がかかり、効果は将来出る」活動が真っ先に削られ、短期の数字は良くなっても会社の体力は痩せ細っていきます。BSCの4視点は実は因果の鎖になっています。<b>人材が育つ（学習と成長）→業務の質が上がる（プロセス）→顧客が満足する（顧客）→最終的に儲かる（財務）</b>。つまり下流の財務だけでなく、上流の先行指標まで同時に測ることで、「将来の利益の種」を枯らさずに経営する仕組みなのです。テストで4視点を選ばせる問題では「競合の視点」「環境の視点」などの偽選択肢が混ざるので、この因果の鎖ごと覚えてください。</div>

<p>戦略の達成度を測る指標群は、3層で整理します。</p>
<ul>
<li><span class="kw">KGI</span>（Key Goal Indicator：重要目標達成指標）：最終ゴールの指標。「年間売上10億円」「合格」など。</li>
<li><span class="kw">CSF</span>（Critical Success Factor：重要成功要因）：ゴール達成の鍵を握る要因。「何が決め手か」。</li>
<li><span class="kw">KPI</span>（Key Performance Indicator：重要業績評価指標）：CSFがうまくいっているかを<b>日々測れる中間指標</b>。</li>
</ul>
<div class="ex"><div class="ex-t">具体例</div>スポーツジムなら、KGI＝年間売上目標。分析の結果「退会率の低さが売上を決める」とわかれば、CSF＝会員の継続。KPI＝月間退会率や週1回以上の来店率。ぐりさんの勉強に当てはめると、KGI＝ITパスポート800点、CSF＝苦手分野を作らないこと、KPI＝週あたりの学習単元数と章末テストの正答率、という構造です。</div>
<div class="why"><div class="why-t">なぜ？ ── 最終目標（KGI）だけでは人は動けないのか</div>
KGIは結果が出るまで何か月もかかるうえ、日々の行動と距離が遠すぎて「今日何をすべきか」を教えてくれません。心理学の目標設定理論が示すとおり、人を動かすのは<b>具体的で、フィードバックが早い目標</b>です。KPIはまさにそれで、毎週・毎日測れるから軌道修正が早くなり、達成の手応えが動機づけになります。もうひとつ重要なのは<b>KPIを測れば早期警報になる</b>こと。売上（KGI）が落ちてから気づくのではなく、来店率（KPI）の低下の時点で手を打てる。KGI＝目的地、CSF＝勝ち筋、KPI＝計器盤、という比喩で覚えましょう。</div>

<h3 class="sec">3. 価値を測るもうひとつの目 ── バリューエンジニアリング</h3>
<p><span class="kw">バリューエンジニアリング（VE）</span>は、製品やサービスの価値を「<b>価値 ＝ 機能 ÷ コスト</b>」と定義し、価値を最大化する体系的な手法です。この式が示す改善の道は2つ：同じコストで機能を高めるか、同じ機能をより低コストで実現するか。「価値＝高級さ」ではなく「果たす機能とコストの比」と捉えるのがポイントで、100円ショップの商品は機能を絞ってコストを極小化した「高価値」の例といえます。</p>

<h3 class="sec">4. ナレッジマネジメント ── 個人の知恵を組織の力に</h3>
<p>ベテランの勘やコツのような言語化されていない知識（暗黙知）を、文書やマニュアルのような形式知に変換して組織で共有する取り組みを<span class="kw">ナレッジマネジメント</span>といいます。暗黙知と形式知の相互変換のサイクルは<span class="kw">SECIモデル</span>（共同化→表出化→連結化→内面化）として整理されています。属人化した知識は本人の退職とともに消えてしまう——だからこそ知識を組織の資産に変える仕組みが戦略レベルで重視されるのです。</p>

<h3 class="sec">まとめ</h3>
<ul>
<li><span class="kw">BSC</span>の4視点＝<b>財務・顧客・業務プロセス・学習と成長</b>。下から上への因果の鎖で、先行指標まで測る。</li>
<li>指標の3層構造：<span class="kw">KGI</span>（最終目標）←<span class="kw">CSF</span>（成功の鍵）←<span class="kw">KPI</span>（日々の計器盤）。</li>
<li><span class="kw">VE</span>は「価値＝機能÷コスト」。<span class="kw">ナレッジマネジメント</span>は暗黙知を形式知へ。</li>
</ul>

<p><span class="kw">MOT</span>（Management of Technology：技術経営）とは、技術を理解した上で、それを<b>事業の利益に結びつける</b>経営のことです。研究室の成果がそのままお金になるわけではなく、間には製品化・量産化・市場開拓という長い道のりがあります。その道のりに潜む3つの関門が、試験の定番です。</p>

<h3 class="sec">2. イノベーション ── 2つの軸で整理する</h3>
<p><span class="kw">イノベーション</span>は「技術革新」と訳されがちですが、本来は新しい価値の創造全般を指します。試験では2つの分類軸を押さえます。</p>
<p>第一の軸は「何を」革新するか。<b>製品そのもの</b>を革新する<span class="kw">プロダクトイノベーション</span>（例：スマートフォンの登場）と、<b>作り方・届け方</b>を革新する<span class="kw">プロセスイノベーション</span>（例：トヨタ生産方式、回転寿司のレーン）です。</p>
<p>第二の軸は「どう」市場に効くか。既存製品の性能を着実に高める<span class="kw">持続的イノベーション</span>と、最初は低性能でも別の価値（安い・小さい・手軽）で市場を塗り替える<span class="kw">破壊的イノベーション</span>です。</p>
<div class="why"><div class="why-t">なぜ？ ── 優良企業ほど破壊的イノベーションに負けるのか（イノベーションのジレンマ）</div>
不思議なことに、敗因は「経営の怠慢」ではなく<b>「正しい経営をしたこと」</b>にあります。優良企業は主要顧客の声を聞き、利益率の高い改良に投資します。一方、出始めの破壊的技術（初期のデジカメ、格安スマホ）は性能が低く、利益も薄く、既存顧客は欲しがらない――合理的に判断すれば「投資しない」が正解に見えるのです。ところが新技術は別の市場で力を蓄え、性能が主流の要求水準を超えた瞬間、一気に市場を奪う。フィルムカメラの巨人コダックがデジカメに（自社で発明していたのに）飲み込まれたのが象徴例です。なお同じフィルム業界でも、富士フイルムはフィルム技術を化粧品や医療に転用して生き残りました──コアコンピタンスの応用展開（単元①）とつながる好対照です。</div>

<tr><td><span class="kw">デザイン思考</span></td><td>利用者の観察と共感から出発し、試作と検証を繰り返して課題を解決する発想法。</td></tr>

<tr><td><span class="kw">PoC</span>（Proof of Concept：概念実証）</td><td>新しいアイデアや技術が実現可能か、本格投資の前に<b>小規模に検証</b>すること。</td></tr>
<tr><td><span class="kw">技術ロードマップ</span></td><td>技術の進展と製品化の道筋を時間軸で示した計画図。</td></tr>
<tr><td><span class="kw">APIエコノミー</span></td><td>自社サービスの機能をAPI（Application Programming Interface：外部から機能を呼び出すための接続口）として公開し、他社サービスと連携して生まれる経済圏。地図アプリの機能が飲食店アプリに組み込まれる、など。</td></tr>

</ul>

<p>この単元は、ITが各業界（インダストリ）でどんなビジネスを生んでいるかのカタログです。用語数は多めですが、ニュースで聞いたことのある話ばかりなので、「あのサービスのことか」と結びつけながら整理しましょう。</p>

<h3 class="sec">1. 電子商取引（EC） ── 誰が誰に売るか</h3>
<p>取引の当事者の組合せで分類します。<span class="kw">BtoB</span>（Business to Business＝企業間：部品調達など）、<span class="kw">BtoC</span>（Business to Consumer＝企業→消費者：Amazonや楽天）、<span class="kw">CtoC</span>（Consumer to Consumer＝消費者同士：メルカリ、ヤフオク）。行政（G）が絡むGtoCなどもあります。</p>
<div class="why"><div class="why-t">なぜ？ ── 素人同士の取引（CtoC）が成立するのか</div>
知らない人同士の売買には「お金を払ったのに商品が来ない」「商品を送ったのに支払われない」という相互不信がつきまといます。これを解いたのが2つの仕組みです。1つは<span class="kw">エスクロー</span>：運営会社が代金を一時的に預かり、買い手が商品を受け取ってから出品者に支払う仲介の仕組み（メルカリの方式）。もう1つは<b>相互評価システム</b>：過去の取引相手からの評価を蓄積して見えるようにすることで、「評判」が信頼の担保として機能します。技術が新しいというより、<b>心理的な信頼問題を制度設計で解決した</b>のがCtoC市場の本質です。</div>
<p>ECの戦略として有名なのが<span class="kw">ロングテール</span>です。販売数の少ないニッチ商品（しっぽ＝テール）でも、品揃えを膨大にすれば合計では大きな売上になる、というネット通販特有の現象を指します。</p>
<div class="why"><div class="why-t">なぜ？ ── リアル店舗では死に筋の商品が、ネットでは儲かるのか</div>
理由は<b>棚のコスト構造の違い</b>です。実店舗の棚は有限で、家賃という固定費がかかるため、売れ筋（月に何個も売れる商品）しか置けません。年に1個しか売れない商品は棚の無駄です。ところがECの「棚」はデータベース上の商品ページなので、追加コストがほぼゼロ。年1個の商品を100万種類並べれば、それだけで年100万個の売上になります。<b>物理的制約が消えたことで「2割の売れ筋が8割を稼ぐ」パレートの法則の外側が収益化できるようになった</b>――単元②で学んだABC分析の「C群切り捨て」が、ネットでは逆転するのです。</div>
<p>ITサービスの収益モデルも頻出です。<span class="kw">フリーミアム</span>は、基本サービスを無料で提供して多くの利用者を集め、高機能版や追加機能を有料にして一部の利用者から収益を得るモデル（無料ゲームのアイテム課金、無料プランつきのクラウドサービスなど。令和5年度に出題）。<span class="kw">サブスクリプション</span>は、買い切りではなく定額料金で利用し続ける方式です（動画・音楽配信の月額制）。</p>
<p>ネットと実店舗の連携では、ネットから実店舗へ顧客を誘導する<span class="kw">O2O</span>（Online to Offline：アプリのクーポンで来店を促すなど）と、すべての販売チャネルを統合して一貫した体験を作る<span class="kw">オムニチャネル</span>を区別しておきましょう。</p>

<h3 class="sec">2. フィンテック ── 金融×IT</h3>
<ul>
