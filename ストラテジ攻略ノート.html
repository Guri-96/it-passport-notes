<h3 class="sec">3. IoTと製造業 ── モノがネットにつながる</h3>
<p><span class="kw">IoT</span>（Internet of Things）は、家電・車・工場の機械など、あらゆるモノがインターネットにつながること。センサーでデータを集め、分析し、機器を制御するという循環が生まれます。</p>
<table class="tbl">
<tr><th>用語</th><th>意味</th></tr>
<tr><td><span class="kw">スマートファクトリー</span></td><td>IoTやAIで設備・生産状況をデータ化し、最適化した工場。</td></tr>
<tr><td><span class="kw">インダストリー4.0</span></td><td>ドイツ発の「第4次産業革命」構想。製造業のデジタル化を指す。</td></tr>
<tr><td><span class="kw">組込みシステム</span></td><td>家電や機器の内部に組み込まれた専用のコンピュータシステム。炊飯器もエレベーターも中身はコンピュータ。</td></tr>
<tr><td><span class="kw">トレーサビリティ</span></td><td>生産から消費までの履歴を<b>追跡できる</b>こと。食品の産地偽装防止や、不具合発生時のリコール範囲特定に効く。</td></tr>
<tr><td><span class="kw">MaaS</span></td><td>Mobility as a Service。電車・バス・タクシー・シェアサイクルなどの移動手段を、1つのサービスとして検索・予約・決済まで統合すること。</td></tr>
<tr><td><span class="kw">エッジコンピューティング</span></td><td>データをクラウドへ送らず、発生源に近い端末・機器側で処理する方式。<b>通信の遅延とデータ量を減らせる</b>ため、自動運転や工場制御など即時性が必要な場面で使われる（令和5年度に出題）。</td></tr>
<tr><td><span class="kw">自動運転のレベル</span></td><td>レベル0〜5の6段階。<b>レベル3から運転の主体がシステム側</b>になり（条件つき自動運転）、レベル4は限定領域で完全自動、レベル5は無条件の完全自動（令和7年度に出題）。</td></tr>
<tr><td><span class="kw">VR／AR</span></td><td>VR（Virtual Reality）＝仮想現実（ヘッドセットで仮想空間に没入）、AR（Augmented Reality）＝拡張現実（現実の風景にデジタル情報を重ねる。スマホゲームや家具の試し置き）。活用事例を選ぶ形で出題される。</td></tr>
</table>
<div class="ex"><div class="ex-t">具体例</div>コマツの建設機械は位置・稼働状況を常時送信し、故障予兆の検知や盗難防止に活かされています（IoTの先駆例）。回転寿司チェーンでは皿のICタグで鮮度と売れ行きを管理――トレーサビリティと需要予測の身近な実例です。</div>

<h3 class="sec">4. シェアリングエコノミー ── 「持つ」から「共有する」へ</h3>
<p><span class="kw">シェアリングエコノミー</span>は、個人や企業が持つ遊休資産（空き部屋、使っていない車、空き時間やスキル）を、ネットのプラットフォーム経由で貸し借り・共有する経済の形です。民泊（Airbnb）、ライドシェア、カーシェア、スキルのマッチングなどが該当します。</p>
<div class="why"><div class="why-t">なぜ？ ── 昔からあった「貸し借り」が、今になって巨大産業になったのか</div>
貸したい人と借りたい人を見つけ合う<b>探索コスト</b>と、相手が信頼できるか確かめる<b>信頼コスト</b>が、かつては高すぎたからです。見知らぬ人に自宅を貸すなど、以前は考えられませんでした。スマホの普及で「いつでも・位置情報つきで」マッチングできるようになり、相互評価システムが信頼を肩代わりし、オンライン決済が金銭トラブルを減らした――3つのコストが同時に激減したことで、眠っていた遊休資産が一気に市場に出てきたのです。プラットフォーム企業自身は資産を持たず、<b>マッチングの場の提供で手数料を得る</b>のがビジネスモデルの核という点も出題ポイントです。</div>

<h3 class="sec">5. 社会全体の構想 ── Society 5.0</h3>
<p>日本政府が掲げる<span class="kw">Society 5.0</span>は、狩猟社会・農耕社会・工業社会・情報社会に続く5番目の社会像で、<b>サイバー空間（仮想）とフィジカル空間（現実）を高度に融合</b>させ、経済発展と社会課題の解決を両立する社会を指します。IoTでデータを集め、AIが分析し、現実世界へフィードバックする――この単元で学んだ技術群の総決算のような構想です。AIの利活用が広がる中で、人間中心の利用を求める「人間中心のAI社会原則」のようなガイドラインも整備されています。</p>

<h3 class="sec">まとめ</h3>
<ul>
<li>ECは当事者で分類：<span class="kw">BtoB／BtoC／CtoC</span>。CtoCを支えるのは<span class="kw">エスクロー</span>と相互評価。</li>
<li><span class="kw">ロングテール</span>＝棚の制約が消え、死に筋の合計が収益化。<span class="kw">O2O</span>はネット→実店舗への誘導。</li>
<li><span class="kw">IoT</span>はモノのネット接続。<span class="kw">トレーサビリティ</span>＝履歴の追跡可能性。</li>
<li><span class="kw">シェアリングエコノミー</span>＝遊休資産×マッチング×相互評価。</li>
<li><span class="kw">Society 5.0</span>＝サイバーとフィジカルの融合で課題解決。</li>
</ul>
`,
  u31: `
<p>第3章は「企業はITをどう導入し、活かすか」。エンジニアとして働くぐりさんが、まさに当事者になる章です。最初の単元は、システム導入の羅針盤となる「情報システム戦略」と、いま日本企業の最重要課題である「DX」を扱います。</p>

<h3 class="sec">1. 情報システム戦略 ── 行き当たりばったりを防ぐ羅針盤</h3>
<p><span class="kw">情報システム戦略</span>とは、<b>経営戦略に基づいて</b>、情報システムをどう整備・活用するかを定めた全社レベルの方針です。策定の責任者は<span class="kw">CIO</span>（最高情報責任者）。「経営戦略との整合性」という言葉が最大のキーワードで、試験では「現場部門の要望だけを集めて策定する」「最新技術の導入自体を目的とする」といった選択肢が誤りになります。</p>
<div class="why"><div class="why-t">なぜ？ ── 全社の戦略なしにシステムを作ると、何が起きるのか</div>
各部門がバラバラに「便利だから」とシステムを導入していくと、同じ顧客データが営業・経理・サポートに別々に存在して食い違い、システム同士はつながらず、手作業での転記が発生します（この分断状態を<b>サイロ化</b>と呼びます。サイロ＝穀物を別々に貯める塔）。さらに場当たり的な改修を重ねたシステムは、中身を知る担当者の退職とともにブラックボックス化し、<b>レガシーシステム</b>（時代遅れだが捨てられない古いシステム）として会社の足かせになります。経済産業省はこの問題を放置すると2025年以降に大きな経済損失が生じると警告しました（いわゆる「2025年の崖」）。情報システム戦略は、この「個別最適の積み重ねによる全体崩壊」を防ぐために、<b>全体最適の設計図を先に描く</b>営みなのです。</div>
<p>その「全体最適の設計図」を体系的に描く手法が<span class="kw">EA</span>（エンタープライズアーキテクチャ）です。組織全体の業務とシステムを、ビジネス・データ・アプリケーション・テクノロジの4つの体系で整理し、現状（As-Is）とあるべき姿（To-Be）のギャップを明らかにして移行計画を立てます。</p>

<h3 class="sec">2. DX ── デジタルで「ビジネスそのもの」を変える</h3>
<p><span class="kw">DX</span>（デジタルトランスフォーメーション）とは、データとデジタル技術を活用して、製品・サービス・ビジネスモデル、さらには業務や組織・企業文化までを<b>変革し、競争上の優位性を確立する</b>ことです。重要なのは、DXが「IT導入」と同義ではないこと。変革の深さによって3段階に整理されます。</p>
<table class="tbl">
<tr><th>段階</th><th>意味</th><th>例（書店の場合）</th></tr>
<tr><td><span class="kw">デジタイゼーション</span></td><td>アナログ情報の<b>デジタル化</b></td><td>紙の台帳をExcelにする</td></tr>
<tr><td><span class="kw">デジタライゼーション</span></td><td>個別の<b>業務プロセスのデジタル化</b></td><td>在庫管理と発注を自動化する</td></tr>
<tr><td><span class="kw">DX</span></td><td><b>ビジネスモデル・組織の変革</b></td><td>電子書籍の定額読み放題サービスを始める</td></tr>
</table>
<div class="ex"><div class="ex-t">具体例</div>ネットフリックスはDVDの郵送レンタル業から出発し、配信へ移行（ビジネスモデルの変革）、さらに視聴データを分析してオリジナル作品の制作まで手がけるようになりました（データ駆動の意思決定）。「同じ事業のIT化」を超えて「事業の中身が変わる」――これがDXのスケール感です。</div>
<div class="why"><div class="why-t">なぜ？ ── 「最新ITを導入すること」はDXと呼べないのか</div>
DXの定義の核心は、手段（デジタル技術）ではなく<b>目的（競争優位の確立）と変革の対象（ビジネスモデル・組織文化）</b>にあるからです。FAXをメールに変えても、紙の稟議をPDFにしても、仕事のやり方と稼ぎ方が同じなら、それは効率化（デジタイゼーション／デジタライゼーション）にとどまります。試験では「業務の一部を電子化した」事例と「データ活用で新しい価値・ビジネスを生み出した」事例を区別させる問題が出ます。<b>「稼ぎ方・価値の出し方が変わったか？」</b>を判定基準にしてください。また、DX推進の前提として、レガシーシステムの刷新と、データを経営に活かす人材・組織づくりが必要になる、という文脈も併せて問われます。</div>

<h3 class="sec">3. IT投資の判断 ── 効果をどう測るか</h3>
<p>システムは導入がゴールではなく、投資に見合う効果が出てこそ意味があります。IT投資の評価では、システム化の<b>目的を定量的な指標で定義</b>しておくことが重要です（例：問い合わせ応答時間を50％短縮）。投資判断の材料として、導入費用だけでなく運用・保守まで含めた総コスト（<span class="kw">TCO</span>＝Total Cost of Ownership：総所有費用）で考えること、効果（<span class="kw">ROI</span>＝Return On Investment：投資利益率）を事後に検証することが問われます。「初期費用が安いシステム＝安い」とは限らない――クラウドとオンプレミスの比較（単元③で詳述）でも、この視点が軸になります。</p>

<h3 class="sec">4. 戦略を実現する組織と人</h3>
<p>情報システム戦略を絵に描いた餅にしないために、推進体制も問われます。経営層では<span class="kw">CIO</span>が戦略を率い、データ活用の専門家（データサイエンティスト）や、業務とITの橋渡しをする人材が必要になります。また、全社でデータに基づいて判断する<span class="kw">データ駆動型経営</span>（第1章②で学習）は、DXの土台でもあります。システムの導入が「目的」ではなく、経営の目標を達成する「手段」である――この主従関係は、この章のすべての単元を貫く考え方です。</p>

<h3 class="sec">まとめ</h3>
<ul>
<li><span class="kw">情報システム戦略</span>は<b>経営戦略と整合</b>させ、<span class="kw">CIO</span>が責任を持つ。場当たり導入はサイロ化と<b>レガシーシステム</b>を生む。</li>
<li><span class="kw">EA</span>＝全体最適の設計図（As-IsとTo-Beのギャップ分析）。</li>
<li><span class="kw">DX</span>の3段階：デジタイゼーション（情報の電子化）→デジタライゼーション（業務の電子化）→DX（<b>ビジネスモデルの変革</b>）。判定基準は「稼ぎ方が変わったか」。</li>
<li>IT投資は<span class="kw">TCO</span>（運用保守まで含めた総コスト）と効果検証で判断。</li>
</ul>
`,
  u32: `
<p>システムを入れる前に、まず仕事の流れ（業務プロセス）そのものを見直す——これがこの単元のテーマです。「今のやり方をそのままIT化すると、ムダまで自動化される」という警句を軸に、見える化の道具と改善の手法を学びます。</p>

<h3 class="sec">1. 業務の見える化 ── 3つの図解ツール</h3>
<p>業務を改善するには、まず現状を正確に共有する必要があります。試験では図の名前と「何を表すか」の対応が問われます。</p>
<table class="tbl">
<tr><th>図</th><th>何を表す？</th></tr>
<tr><td><span class="kw">E-R図</span></td><td>データの構造。<b>実体（Entity）と実体同士の関連（Relationship）</b>を表す。「顧客」と「注文」の関係（1人の顧客が複数の注文を持つ）など。データベース設計の土台。</td></tr>
<tr><td><span class="kw">DFD</span>（Data Flow Diagram）</td><td>業務における<b>データの流れ</b>。処理・データの源泉と吸収・データストア・データフローの4記号で描く。</td></tr>
<tr><td><span class="kw">BPMN</span>（Business Process Model and Notation）</td><td>業務プロセスを、誰が・どの順で・どう判断するかの<b>流れ図として標準記法で</b>表したもの。</td></tr>
</table>
<div class="why"><div class="why-t">なぜ？ ── わざわざ図にするのか</div>
業務の手順は多くの場合、ベテランの頭の中にしかない暗黙知です。言葉で聞くと「わかったつもり」になりますが、図に描いた瞬間、<b>人によって理解が違っていたこと、誰も全体を把握していなかったことが露呈します</b>。また「この承認、誰も中身を見ていないのでは？」のようなムダは、流れを一望できて初めて見つかります。図解は分析の道具であると同時に、<b>関係者の認識を揃える合意形成の道具</b>でもある――システム開発の現場で要件のズレが事故につながることを考えると、エンジニアにとって最初に身につける価値のあるスキルです。</div>

<h3 class="sec">2. BPRとBPM ── 抜本的に壊すか、継続的に磨くか</h3>
<p>業務プロセス改善の2大用語です。混同しやすいので対比で覚えます。</p>
<table class="tbl">
<tr><th></th><th><span class="kw">BPR</span></th><th><span class="kw">BPM</span></th></tr>
<tr><td>意味</td><td>Business Process Reengineering。業務プロセスを<b>ゼロから抜本的に再設計</b>する</td><td>Business Process Management。業務プロセスを<b>継続的に分析・改善し続ける</b>管理活動</td></tr>
<tr><td>イメージ</td><td>一度きりの大手術</td><td>日々の健康管理（PDCA）</td></tr>
</table>
<div class="why"><div class="why-t">なぜ？ ── 「カイゼン」ではなく「破壊」が必要なときがあるのか</div>
継続的改善は既存のやり方を前提に磨き込むため、<b>前提そのものが時代遅れになったときには無力</b>だからです。たとえば「申請書に5つのハンコをもらう」業務は、ハンコの順序を最適化しても速くなりません。「そもそも5人の承認は必要か？　システムで自動チェックすれば承認は1人でよいのでは？」と<b>前提から問い直す</b>のがBPRです。ただし大手術にはリスクと痛みが伴うので、普段はBPMで磨き続け、構造的な限界が来たらBPRで作り直す、という補完関係で理解してください。</div>

<h3 class="sec">3. 業務を支えるITツール</h3>
<table class="tbl">
<tr><th>ツール</th><th>役割</th></tr>
<tr><td><span class="kw">ワークフローシステム</span></td><td>申請・承認の流れを電子化。書類の回覧・押印をシステム上で行う。</td></tr>
<tr><td><span class="kw">グループウェア</span></td><td>スケジュール共有、設備予約、掲示板、文書共有など、組織内の協働を支える統合ツール。</td></tr>
<tr><td><span class="kw">RPA</span></td><td>Robotic Process Automation。人がPC上で行う<b>定型的な事務作業を、ソフトウェアのロボットに代行</b>させる仕組み。</td></tr>
<tr><td><span class="kw">チャット・Web会議</span></td><td>テレワークを支えるコミュニケーション基盤。</td></tr>
</table>
<p>関連する新しめの用語として<span class="kw">プロセスマイニング</span>も押さえましょう。業務システムに残った操作ログを分析して、<b>業務プロセスの実態の流れを可視化</b>する手法です（令和7年度に出題）。「マニュアル上の業務」と「実際の業務」のズレや滞留箇所をデータから発見できるため、BPRやRPA導入の前段の分析に使われます。データマイニングの業務プロセス版、と覚えると整理しやすいはずです。</p>
<div class="ex"><div class="ex-t">具体例</div>RPAの典型は「毎朝、複数の銀行サイトにログインして残高をExcelに転記する」「受注メールの内容を基幹システムに入力する」といった作業の自動化です。自治体や銀行では、RPAで年間数千〜数万時間の事務作業を削減した事例が多数報告されています。</div>
<div class="why"><div class="why-t">なぜ？ ── RPAは「何でも自動化できる魔法」ではないのか</div>
RPAは「画面上の操作手順を真似るロボット」なので、得意なのは<b>ルールが明確で、繰り返しが多く、例外が少ない</b>定型作業です。逆に、判断基準が曖昧な業務、例外だらけの業務、頻繁に画面が変わるシステムが相手だと、誤動作と修正コストで逆に高くつきます。試験では「RPAは非定型の創造的業務に最適」という選択肢が誤りの定番。また、導入前に業務を棚卸しして「そもそも不要な作業はやめる」のが先決です（ムダな作業を高速化しても、それは高速なムダです）。判断を伴う部分はAI、定型操作はRPA、という役割分担も問われます。</div>

<h3 class="sec">4. 働き方を変える仕組み</h3>
<p>業務プロセスの改善は、働き方の柔軟化ともつながっています。<span class="kw">テレワーク</span>（第1章①で学習）を支えるのが上記のコミュニケーションツール群です。関連して、従業員の私物端末を業務に使う<span class="kw">BYOD</span>（Bring Your Own Device）という形態も登場します。利便性とコスト削減の半面、私物端末からの情報漏えいというセキュリティリスクが高まるため、ルール整備とセットで導入する必要がある——メリットとリスクの両面で出題されます。</p>

<h3 class="sec">まとめ</h3>
<ul>
<li>見える化の図：<span class="kw">E-R図</span>＝データの構造（実体と関連）、<span class="kw">DFD</span>＝データの流れ、<span class="kw">BPMN</span>＝業務の流れの標準記法。</li>
<li><span class="kw">BPR</span>＝前提から問い直す抜本的再設計、<span class="kw">BPM</span>＝継続的な改善活動。</li>
<li><span class="kw">RPA</span>＝定型・反復・ルール明確な事務作業の自動化。非定型業務は苦手。</li>
<li><span class="kw">ワークフロー</span>＝申請承認の電子化、<span class="kw">BYOD</span>＝私物端末の業務利用（漏えいリスクとセット）。</li>
</ul>
`,
  u33: `
<p>企業がITを手に入れる方法は「自分で作って持つ」だけではありません。借りる、任せる、サービスとして使う——この単元は、IT調達の選択肢のカタログです。クラウドの3層（IaaS/PaaS/SaaS）は試験でもエンジニアの実務でも必須知識なので、ここでしっかり固めましょう。</p>

<h3 class="sec">1. クラウドコンピューティング ── 所有から利用へ</h3>
<p><span class="kw">クラウドコンピューティング</span>とは、サーバやソフトウェアを自社で保有せず、<b>インターネット経由でサービスとして利用する</b>形態です。自社の建物内に機器を設置して運用する従来型は<span class="kw">オンプレミス</span>と呼びます。クラウドは「どの層まで借りるか」で3段階に分かれます。</p>
<table class="tbl">
<tr><th>形態</th><th>借りるもの</th><th>例</th></tr>
<tr><td><span class="kw">IaaS</span>（Infrastructure as a Service）</td><td>サーバ・ストレージなどの<b>インフラ</b>。OSから上は自分で用意。</td><td>仮想サーバの時間貸し</td></tr>
<tr><td><span class="kw">PaaS</span>（Platform as a Service）</td><td>インフラ＋OS＋開発環境などの<b>プラットフォーム</b>。アプリは自分で作る。</td><td>アプリ開発・実行基盤</td></tr>
<tr><td><span class="kw">SaaS</span>（Software as a Service）</td><td><b>ソフトウェア（アプリ）そのもの</b>。ブラウザ等からすぐ使う。</td><td>Gmail、Microsoft 365、Zoom</td></tr>
</table>
<div class="ex"><div class="ex-t">具体例（食事のたとえ）</div>料理にたとえると、<b>IaaS＝キッチンだけ借りる</b>（食材も調理も自分）、<b>PaaS＝調理器具と食材つきのキッチンを借りる</b>（レシピと調理は自分）、<b>SaaS＝レストランで食べる</b>（全部おまかせ）。「どこまで自分でやるか」のグラデーションです。自由度はIaaSが最も高く、手軽さはSaaSが最も高い——このトレードオフが選択の軸になります。</div>
<div class="why"><div class="why-t">なぜ？ ── 企業はこぞってクラウドに移行したのか（そしてなぜ全部は移行しないのか）</div>
オンプレミスでは、サーバ購入に多額の<b>初期投資</b>が必要で、しかも繁忙期に合わせた容量を買うと普段は遊んでしまいます。クラウドなら初期投資ほぼゼロの<b>従量課金</b>で、需要の増減に応じて即座に増強・縮小できる（スケーラビリティ）。さらに機器の保守・更新という重荷も手放せます。会計的には、資産を持つ（減価償却する固定資産）から経費で使う（費用）への転換でもあります。一方で、機密性の極めて高いデータや、ミリ秒単位の応答が必要なシステム、独自カスタマイズが必須の基幹システムでは、統制とカスタマイズの自由が利くオンプレミスを選ぶ企業も残ります。「クラウドが常に正解」ではなく<b>要件次第で使い分ける</b>——この判断軸ごと覚えるのが800点向けです。</div>
<p>なお、SaaSとほぼ同じ意味の旧来語として<span class="kw">ASP</span>（アプリケーションサービスプロバイダ）という用語も選択肢に登場します。</p>

<h3 class="sec">2. データセンターのサービス ── ハウジングとホスティング</h3>
<p>クラウド以前からある「借り方」も出題されます。紛らわしい2語を対比で。</p>
<table class="tbl">
<tr><th>サービス</th><th>機器の持ち主</th><th>意味</th></tr>
<tr><td><span class="kw">ハウジング</span></td><td><b>顧客</b></td><td>顧客が所有するサーバを、事業者のデータセンターの場所（ラック・電源・回線）に設置させてもらう。</td></tr>
<tr><td><span class="kw">ホスティング</span></td><td><b>事業者</b></td><td>事業者が所有するサーバを借りて利用する（レンタルサーバ）。</td></tr>
</table>
<p>覚え方：<b>ハウジングは「house（家＝場所）を借りる」、ホスティングは「host（持ち主）の機械を借りる」</b>。機器の所有者がどちらかを問うのが定番です。</p>

<h3 class="sec">3. 任せる選択 ── アウトソーシングの仲間たち</h3>
<table class="tbl">
<tr><th>用語</th><th>意味</th></tr>
<tr><td><span class="kw">SI</span>（システムインテグレーション）</td><td>システムの企画・設計・開発・運用までを一括して請け負うサービス。担う企業がSIer（エスアイヤー）。</td></tr>
<tr><td><span class="kw">アウトソーシング</span></td><td>業務の外部委託全般。</td></tr>
<tr><td><span class="kw">BPO</span>（Business Process Outsourcing）</td><td>経理・コールセンターなど、<b>業務プロセスを丸ごと</b>継続的に外部委託すること。</td></tr>
<tr><td><span class="kw">オフショアアウトソーシング</span></td><td>人件費の安い<b>海外</b>へ開発や業務を委託すること。</td></tr>
</table>
<div class="why"><div class="why-t">なぜ？ ── 「丸ごと任せる」ビジネスが成立するのか</div>
発注側の理屈は<b>コア業務への集中</b>です。経理事務やヘルプデスクは必要だが、競争力の源泉（コアコンピタンス）ではない。ならば、その道のプロに任せて、自社の人材は本業に集中させるほうが合理的です。受託側の理屈は<b>規模の経済と専門性</b>。100社分のコールセンターを集約すれば、1社あたりのコストは自前運用より安くでき、ノウハウも蓄積する。双方に利益があるから市場が成立するのです。ただし、委託しすぎると社内にノウハウが残らず、委託先を替えられなくなる（ロックイン）リスクがある——「何を任せ、何を残すか」の線引きが経営判断になります。ぐりさんの就職先がSI業界なら、この構造の「受託側」を内側から見ることになりますね。</div>

<h3 class="sec">4. サービスの組み合わせ方 ── SOA</h3>
<p><span class="kw">SOA</span>（Service Oriented Architecture：サービス指向アーキテクチャ）は、ソフトウェアの機能を「サービス」という部品単位で作り、それらを<b>組み合わせてシステムを構築する</b>設計思想です。「在庫照会」「決済」「認証」といった部品を組み替えれば、新しい業務にも素早く対応できる——レゴブロックのような考え方で、第2章で学んだAPIエコノミーの土台にもなっています。</p>

<h3 class="sec">まとめ</h3>
<ul>
<li>クラウドの3層：<span class="kw">IaaS</span>（インフラ）／<span class="kw">PaaS</span>（開発基盤）／<span class="kw">SaaS</span>（アプリ）。キッチン・調理場つき・レストランのたとえで。</li>
<li>クラウドの利点＝初期投資不要・従量課金・スケーラビリティ。対義語は<span class="kw">オンプレミス</span>。</li>
<li><span class="kw">ハウジング</span>＝場所貸し（機器は顧客の物）、<span class="kw">ホスティング</span>＝機器貸し。</li>
<li><span class="kw">BPO</span>＝業務プロセス丸ごと委託、<span class="kw">オフショア</span>＝海外委託。狙いはコア業務への集中。</li>
</ul>

  u34: `
<p>ストラテジ系の最終単元は、システムを「買う側」の物語です。何を作るか決め（企画・要件定義）、誰に頼むか選ぶ（調達）。RFI・RFPという略語の行列が出てきますが、流れを物語として理解すれば一本道です。エンジニアになるぐりさんは、この流れの「選ばれる側」に立つことになります。</p>

<h3 class="sec">1. システム化の流れ ── 企画から調達まで</h3>
<p>システム開発は、いきなりプログラミングから始まりません。大まかな流れは次のとおりです。</p>
<p><b>システム化構想（経営課題の整理）→ システム化計画（対象範囲・概算費用・スケジュール・体制の立案）→ 要件定義（システムに求めることの明確化）→ 調達（依頼先の選定・契約）→ 開発へ</b></p>
<p>このうち企画段階（構想・計画）で大切なのは、第3章①で学んだとおり<b>経営戦略・情報システム戦略との整合性</b>を確認し、投資効果とリスクを分析しておくことです。</p>

<h3 class="sec">2. 要件定義 ── 「求めること」を言葉にする</h3>
<p><span class="kw">要件定義</span>では、システムの利用者となる部門も参加して、必要な機能や性能を明確にします。要件は2種類に大別されます。</p>
<table class="tbl">
<tr><th>種類</th><th>意味</th><th>例</th></tr>
<tr><td><span class="kw">機能要件</span></td><td>システムが<b>何をするか</b></td><td>商品を検索できる、領収書を発行できる</td></tr>
<tr><td><span class="kw">非機能要件</span></td><td>機能以外の<b>品質・制約</b></td><td>3秒以内に応答する、24時間止まらない、同時に1万人が使える、セキュリティ基準を満たす</td></tr>
</table>
<div class="why"><div class="why-t">なぜ？ ── システム開発の失敗は「非機能要件」で起きやすいのか</div>
機能の要望は利用者が自覚しているので口に出ます（「検索したい」「印刷したい」）。ところが性能や可用性は<b>「当たり前すぎて誰も言わない暗黙の期待」</b>になりがちです。発注側は「すぐ表示されるのが当然」と思い込み、開発側は「仕様書にないから普通の性能でよい」と解釈する——完成後に「画面が出るまで10秒もかかる！」と発覚しても、作り直しには莫大な費用がかかります。コミュニケーション心理学でいう「了解の錯覚」がそのまま大事故につながる世界です。だから要件定義では、暗黙の期待をあえて数値で言語化する（応答3秒以内、稼働率99.9％など）ことが鉄則になります。試験では「非機能要件はどれか」と具体例を選ばせる問題が頻出です。</div>

<h3 class="sec">3. 調達 ── RFIからRFPへ、選定の物語</h3>
<p>頼む相手（ベンダー）を選ぶプロセスは、書類のリレーで進みます。</p>
<table class="tbl">
<tr><th>順番</th><th>書類</th><th>意味</th></tr>
<tr><td>1</td><td><span class="kw">RFI</span>（Request For Information：情報提供依頼書）</td><td>発注側がベンダー各社に「どんな技術・製品・実績がありますか？」と<b>情報の提供を依頼</b>する。市場調査の段階。</td></tr>
<tr><td>2</td><td><span class="kw">RFP</span>（Request For Proposal：提案依頼書）</td><td>発注側がシステムの目的・要件・予算・納期を示し、「実現する<b>提案書を出してください</b>」と依頼する。</td></tr>
<tr><td>3</td><td>提案書・見積書</td><td>ベンダー側が提出。発注側はこれを比較・評価して調達先を選定し、契約へ。</td></tr>
</table>
<p>覚え方は<b>I（Information）が先、P（Proposal）が後</b>。「情報収集してから、提案を求める」という自然な順序です。</p>
<div class="why"><div class="why-t">なぜ？ ── RFPの出来が、プロジェクトの成否を左右するのか</div>
RFPが曖昧だと、各社の提案が<b>バラバラの前提で書かれて比較不能</b>になります。安い提案は範囲を狭く解釈しただけかもしれず、価格の差が「能力の差」なのか「解釈の差」なのか判別できません。さらに契約後、「それは提案に含まれていません」という追加費用の争いの火種にもなります。逆に要件・評価基準・予算を明確にしたRFPは、各社が同じ土俵で競う公正な競争を生み、提案の質も上がります。また、選定を公正な競争で行うことは、特定ベンダーへの依存（<b>ベンダーロックイン</b>）や癒着を防ぐ統制の意味も持ちます。官公庁の調達で入札・RFPが厳格なのはこのためです。</div>
<div class="ex"><div class="ex-t">具体例</div>たとえば市役所が「住民票のコンビニ交付システム」を作るとき：まずRFIで各社の実績や技術情報を集めて相場観をつかみ、次にRFPで「全国のコンビニ端末で交付、住基ネットと連携、年中無休、予算◯億円」と明示して提案を募り、提案書と見積書を評価して契約先を決める——この一連の流れが調達です。</div>

<h3 class="sec">4. 調達の社会的責任</h3>
<p>調達では価格と品質だけでなく、社会への配慮も問われるようになっています。環境負荷の小さい製品・サービスを優先して選ぶ<span class="kw">グリーン調達</span>、人権や労働環境にも配慮した<span class="kw">CSR調達</span>という言葉を押さえておきましょう。第1章①で学んだCSR・SDGsの考え方が、調達の場面に具体化したものです。また、AIやデータを扱う調達・契約では、国が示す契約ガイドラインを参考に、データの権利関係や責任分担を取り決めることも重要になっています。</p>

<h3 class="sec">まとめ ── そして全15単元の完走へ</h3>
<ul>
<li>流れ：<b>システム化構想→計画→要件定義→調達</b>。企画段階で経営戦略との整合を確認。</li>
<li><span class="kw">機能要件</span>＝何をするか、<span class="kw">非機能要件</span>＝性能・可用性などの品質。事故は暗黙の期待（非機能）で起きる。</li>
<li>調達のリレー：<span class="kw">RFI</span>（情報ください）→<span class="kw">RFP</span>（提案ください）→提案書・見積書→選定。<b>Iが先、Pが後</b>。</li>
<li>RFPの明確さが、公正な比較とプロジェクトの成功を決める。</li>
</ul>
<p>これでストラテジ系・全3章15単元の講義は完走です。本当におつかれさまでした。各章の章末テストで知識を定着させ、3つの「合格」朱印を揃えましょう。ここまで理解を積み上げたぐりさんなら、ストラテジ系は得点源にできます。</p>
`,
  u17: `
<p>この補講は、単元⑤で扱いきれなかった「その他の法律」と、近年出題が増えている「情報倫理・技術者倫理」を拾う回です。800点を狙うなら、こうした端の1問を確実に取れるかが差になります。</p>

<h3 class="sec">1. 会社法 ── 会社の運営ルール</h3>
<p><span class="kw">会社法</span>は、会社の設立・組織・運営の基本ルールを定めた法律です。株式会社の機関として、<b>最高意思決定機関である<span class="kw">株主総会</span></b>、業務執行の意思決定を行う<span class="kw">取締役会</span>、取締役の職務を監査する<span class="kw">監査役</span>を押さえましょう。また、大会社には業務の適正を確保する体制＝<span class="kw">内部統制システム</span>の整備が求められます。</p>
<div class="why"><div class="why-t">なぜ？ ── 内部統制が「法律の義務」にまでなったのか</div>
背景には、経営者や従業員による粉飾決算・不正会計が、株主や取引先を巻き込む大事件に発展した歴史があります（米国のエンロン事件、日本でも大手企業の粉飾が相次ぎました）。不正は「個人の良心」だけでは防げない――そこで、承認なしには支払いができない、記録が必ず残る、<b>1人に権限を集中させない（職務の分離）</b>といった「仕組みで防ぐ」発想が制度化されました。これが内部統制です。上場企業にはさらに<span class="kw">金融商品取引法</span>が財務報告の内部統制報告（いわゆるJ-SOX）を義務づけています。「人を疑う」のではなく「誰がやっても不正が起きにくい構造を作る」——心理学的にも合理的な設計思想です。</div>
<p>金融商品取引法ではもうひとつ、未公開の内部情報を利用して株を売買する<span class="kw">インサイダー取引</span>の禁止が頻出です。エンジニアも、仕事で知った取引先の未公開情報で株取引をすれば処罰対象になります。</p>
<p>デジタル化を推進する法律も近年の出題テーマです。<span class="kw">官民データ活用推進基本法</span>は、国・自治体・民間が持つデータの活用を推進するための基本法で、行政手続きのオンライン化やオープンデータの推進を掲げています（令和7年度に出題）。デジタル社会形成基本法、デジタル庁の設置と合わせて「国を挙げてデータ活用を進める法制度」として押さえておきましょう。</p>

<h3 class="sec">2. その他の取引・社会の法律</h3>
<table class="tbl">
<tr><th>法律</th><th>ポイント</th></tr>
<tr><td><span class="kw">資金決済法</span></td><td>プリペイドカードなどの前払式支払手段や、<b>暗号資産交換業（登録制）</b>のルールを定める。</td></tr>
<tr><td><span class="kw">リサイクル法関連</span></td><td>家電リサイクル法（テレビ・エアコン・冷蔵庫・洗濯機の4品目）、資源有効利用促進法（PCのメーカー回収）など。循環型社会のための法律群。</td></tr>
<tr><td><span class="kw">公益通報者保護法</span></td><td>組織の不正を通報した労働者を、<b>解雇などの不利益な扱いから保護</b>する。</td></tr>
</table>
<div class="why"><div class="why-t">なぜ？ ── 「内部告発者」をわざわざ法律で守るのか</div>
組織ぐるみの不正（産地偽装、検査データ改ざん、リコール隠し）は、外部からはまず見えません。<b>発見できるのは内部の人間だけ</b>です。ところが通報者が報復人事や解雇のリスクを負うなら、誰も声を上げず、不正は社会に被害が及ぶまで温存されます。実際、日本の大型企業不祥事の多くは内部告発が発覚の端緒でした。通報者の保護は「組織の自浄作用を社会の側から担保する仕組み」なのです。試験では「通報を理由とする解雇は無効」という方向で出題されます。</div>

<h3 class="sec">3. 情報倫理・技術者倫理 ── 法律の手前にあるもの</h3>
<p>法律に違反しなくても、社会の信頼を損なう行為はあります。企業や技術者に求められる行動規範がこの領域です。</p>
<ul>
<li><span class="kw">情報倫理</span>：SNSでの誹謗中傷をしない、他人のプライバシーを侵害しない、出所不明の情報を拡散しないなど、情報社会での倫理。</li>
<li><span class="kw">ソーシャルメディアガイドライン</span>（SNS利用規程）：従業員のSNS利用について企業が定めるルール。機密情報の投稿禁止、私的見解と会社見解の区別など。いわゆる「バイトテロ」や炎上の予防策。</li>
<li><span class="kw">フェイクニュース</span>：虚偽の情報。生成AIの普及で精巧な偽情報（ディープフェイク）が作りやすくなり、真偽の確認（ファクトチェック）の重要性が増しています。</li>
<li><span class="kw">フィルターバブル</span>：検索履歴などに基づく情報の最適化により、<b>自分の好みに合う情報ばかりに包まれる</b>現象。</li>
<li><span class="kw">エコーチェンバー</span>：SNSで同じ意見の人同士がつながり、<b>同じ主張が反響し合って増幅される</b>現象。</li>
</ul>
<div class="why"><div class="why-t">なぜ？ ── フィルターバブルは「便利な機能」の副作用なのか</div>
レコメンド機能は「あなたが見たいものを見せる」ことで満足度を最大化しようとします。その最適化が完璧に働くほど、<b>反対意見や興味の外側の情報が視界から消えていく</b>——つまりバブルは故障ではなく、パーソナライズの宿命的な副作用です。エコーチェンバーと組み合わさると、自分の意見が「世間の多数派」に見えてしまい、社会の分断を加速させます。確証バイアス（自説に都合のよい情報ばかり集める傾向）という心理学の古典的知見が、アルゴリズムによって構造化された現象と言えます。ぐりさんには「ああ、あれか」とすぐ腑に落ちるはずです。</div>
<p>また、AIの利活用については、人間の尊厳や公平性を重んじる<span class="kw">人間中心のAI社会原則</span>などのガイドラインが国から示されています。AIの判断の偏り（バイアス）や説明可能性への配慮が、開発・利用の両面で求められる時代です。</p>

<h3 class="sec">まとめ</h3>
<ul>
<li><span class="kw">会社法</span>：株主総会＝最高意思決定機関、内部統制の整備。<span class="kw">金融商品取引法</span>：J-SOXと<span class="kw">インサイダー取引</span>禁止。</li>
<li><span class="kw">公益通報者保護法</span>＝内部告発者を不利益から守る（組織の自浄作用の担保）。</li>
<li>倫理系の頻出語：<span class="kw">フェイクニュース</span>・<span class="kw">フィルターバブル</span>（最適化の副作用）・<span class="kw">エコーチェンバー</span>（同意見の増幅）。</li>
<li>AIは<span class="kw">人間中心のAI社会原則</span>。法律の手前の「信頼」を守るのが倫理とガイドライン。</li>
</ul>

  u26: `
<p>第2章の補講では、本編で扱いきれなかった戦略フレームワークの残り、製造業を支えるエンジニアリングシステム、街じゅうにあるビジネスシステム、そしてAI活用の用語を拾います。どれも「1問だけポンと出る」タイプの論点です。</p>

<h3 class="sec">1. アンゾフの成長マトリクス ── 会社はどの方向に成長するか</h3>
<p><span class="kw">アンゾフの成長マトリクス</span>は、成長戦略を「<b>製品（既存／新規）×市場（既存／新規）</b>」の2軸4象限で整理するフレームワークです。</p>
<table class="tbl">
<tr><th></th><th>既存製品</th><th>新規製品</th></tr>
<tr><th>既存市場</th><td><span class="kw">市場浸透</span>：今の客に今の商品をもっと売る（広告強化、ポイント制度）</td><td><span class="kw">新製品開発</span>：今の客に新商品を売る（飲料メーカーの新フレーバー）</td></tr>
<tr><th>新規市場</th><td><span class="kw">新市場開拓</span>：今の商品を新しい客層・地域へ（海外進出、シニア向け展開）</td><td><span class="kw">多角化</span>：新しい客に新しい商品を売る</td></tr>
</table>
<div class="why"><div class="why-t">なぜ？ ── 多角化は「最もリスクが高い」と言われるのか</div>
他の3象限は、製品か市場の<b>どちらか一方には自社の経験</b>があります。市場浸透なら両方知っている、新市場開拓なら製品は知り尽くしている。ところが多角化だけは<b>製品も市場も未知</b>——既存の知識という足場が一つもない状態で戦うことになるからです。それでも企業が多角化するのは、既存事業の成熟・衰退（プロダクトライフサイクル）に備えてリスクを分散するため。その際、富士フイルム（フィルム技術→化粧品）のように<b>コアコンピタンスを足場にした多角化</b>は成功率が上がります。単元①・④の知識がここでつながりますね。</div>
<p>あわせて、市場分析の基本枠組み<span class="kw">3C分析</span>（顧客 Customer・競合 Competitor・自社 Company の3視点）も押さえておきましょう。</p>

<h3 class="sec">2. エンジニアリングシステム ── 工場を支えるIT</h3>
<table class="tbl">
<tr><th>用語</th><th>意味</th></tr>
<tr><td><span class="kw">CAD／CAM</span></td><td>コンピュータによる設計（CAD：Computer Aided Design）と、設計データを使った製造（CAM：Computer Aided Manufacturing）。</td></tr>
<tr><td><span class="kw">FA</span></td><td>Factory Automation（ファクトリーオートメーション）。工場の生産工程の自動化。</td></tr>
<tr><td><span class="kw">CIM</span></td><td>Computer Integrated Manufacturing。生産情報を統合管理し、設計から製造までをコンピュータで一元化する仕組み。</td></tr>
<tr><td><span class="kw">MRP</span>（Material Requirements Planning：資材所要量計画）</td><td>生産計画と部品表から、<b>必要な資材の量と時期を計算</b>して調達する生産管理手法。</td></tr>
<tr><td><span class="kw">コンカレントエンジニアリング</span></td><td>設計・生産準備などの工程を<b>同時並行で</b>進めて開発期間を短縮する手法。</td></tr>
<tr><td><span class="kw">JIT（Just In Time：ジャストインタイム）</span></td><td>「必要な物を、必要な時に、必要な量だけ」生産する方式。トヨタの「かんばん方式」が代表。中間在庫を極小化する。</td></tr>
<tr><td><span class="kw">FMS</span></td><td>フレキシブル生産システム。多品種少量生産に柔軟に対応できるよう、加工・搬送などを自動化した生産システム（令和7年度に出題）。</td></tr>
</table>
<div class="why"><div class="why-t">なぜ？ ── MRPやJITが「経営の武器」になるのか</div>
製造業の利益を静かに食いつぶすのは<b>在庫</b>です。部品を多めに買えば安心ですが、在庫は保管費がかかり、現金を寝かせ（キャッシュフロー悪化——第1章③の論点）、設計変更で一瞬で死蔵品になります。MRPは「計画から逆算して必要量だけ買う」、JITは「後工程が使う分だけ前工程が作る」ことで、このムダを構造的に排除します。つまり生産管理システムは現場の道具であると同時に、<b>財務体質を変える経営戦略</b>でもあるのです。「かんばん方式＝JITを実現する仕組み」という対応も頻出です。</div>

<h3 class="sec">3. ビジネスシステム ── 街にあるITの仕組み</h3>
<ul>
<li><span class="kw">POSシステム</span>（Point Of Sale：販売時点情報管理）：「いつ・どこで・何が・いくつ」売れたかを単品単位で記録（第1章で学んだセブン-イレブンの武器）。</li>
<li><span class="kw">GPS／GIS</span>：全地球測位システム（Global Positioning System）／地理情報システム（Geographic Information System）。カーナビ、配送ルート最適化、出店計画の商圏分析など。</li>
<li><span class="kw">ETC</span>（Electronic Toll Collection）：高速道路の自動料金収受システム。</li>
<li><span class="kw">RFID（ICタグ）</span>（Radio Frequency IDentification）：電波で読み取る小さなタグ。<b>かざさなくても複数を一括読取り</b>できるのがバーコードとの違い。ユニクロのセルフレジ（カゴごと置くと一瞬で合計が出る）が体感できる好例。</li>
<li><span class="kw">スマートグリッド</span>：ITで電力の需給を最適制御する次世代送電網。</li>
<li><span class="kw">デジタルサイネージ</span>：駅や店頭の電子看板。時間帯や客層で表示を切り替えられる。</li>
<li><span class="kw">マイナポータル</span>などの行政システム：行政手続きのオンライン化（デジタルガバメント）。</li>
</ul>

<h3 class="sec">4. AIの業務活用 ── 道具としてのAIを正しく知る</h3>
<p>AI関連はシラバス改訂で出題が増え続けている領域です。ビジネス利用の文脈で押さえましょう。</p>
<ul>
<li><span class="kw">機械学習</span>：データからコンピュータ自身がパターンを学ぶ技術。その一種で、人間の脳を模した多層のネットワーク（ニューラルネットワーク）を使うのが<span class="kw">ディープラーニング</span>。</li>
<li>学習の3方式：<span class="kw">教師あり学習</span>（正解ラベルつきデータで学ぶ。売上予測、写真の犬猫分類など）／<span class="kw">教師なし学習</span>（正解なしのデータから構造を見つける。顧客のグループ分けなど）／<span class="kw">強化学習</span>（試行錯誤と報酬で良い行動を学ぶ。囲碁AIやロボット制御）。「事例→方式」の対応問題が令和4年度から繰り返し出ています。</li>
<li><span class="kw">基盤モデル</span>：広範囲かつ大量のデータで訓練され、さまざまなタスクに適応できるAIモデル。生成AIの土台で、令和7年度に出題された新しい用語です。</li>
<li><span class="kw">生成AI</span>：文章・画像・音声などを<b>新たに生成する</b>AI。指示文は<span class="kw">プロンプト</span>と呼ばれます。</li>
<li><span class="kw">ハルシネーション</span>：生成AIが、<b>事実と異なる内容をもっともらしく出力</b>する現象。</li>
<li>活用例：チャットボット（問い合わせ対応）、需要予測、画像認識による検品・医療画像診断支援、文書要約・翻訳。</li>
</ul>
<div class="why"><div class="why-t">なぜ？ ── 生成AIの出力を、そのまま業務に使ってはいけないのか</div>
生成AIは「正しい知識を検索する装置」ではなく、<b>「もっともらしい続きを確率的に生成する装置」</b>だからです。だから存在しない判例や文献を自信満々に出力することがあります（ハルシネーション）。また、学習データに偏りがあれば出力にも偏り（バイアス）が再生産され、入力した機密情報が学習に使われるリスク、生成物が他者の著作物に似てしまう権利リスクもあります。業務利用の原則は、<b>人間による事実確認（ファクトチェック）と最終判断を組み込み、機密情報を不用意に入力しない</b>こと。試験でも「生成AIの出力は常に正確なので検証不要」という選択肢は確実に誤りです。</div>

<h3 class="sec">5. シラバス6.3〜6.5の新用語 ── 「時事ワード」を一網打尽</h3>
<p>シラバス6.3（2024年10月適用）では、生成AIのほかにも社会のトレンドを映した用語が130語以上まとめて追加されました。試験を作る側の心理として<b>追加した用語は出したい</b>もので、実際に近年の公開問題では新用語の出題が目立ちます。ここでは本編でまだ扱っていないものを一気に押さえます。<b>定義を一言で言えれば十分</b>です。</p>
<table class="tbl">
<tr><th>用語</th><th>一言でいうと</th></tr>
<tr><td><span class="kw">GX（グリーントランスフォーメーション）</span></td><td>脱炭素社会への移行と経済成長を両立させる産業・社会の変革。<b>DXの環境版</b>と覚える。</td></tr>
<tr><td><span class="kw">カーボンニュートラル</span></td><td>温室効果ガスの排出量と吸収量を釣り合わせて<b>実質ゼロ</b>にすること。製品の一生分のCO2排出量を見える化した指標が<span class="kw">カーボンフットプリント</span>。</td></tr>
<tr><td><span class="kw">インボイス制度</span></td><td>消費税の仕入税額控除を受けるために、登録番号入りの<b>適格請求書（インボイス）</b>の保存を求める制度。</td></tr>
<tr><td><span class="kw">パーパス経営</span></td><td>企業の<b>存在意義（パーパス）</b>を軸に据える経営。MVVの「ミッション」を深めた考え方。</td></tr>
<tr><td><span class="kw">人的資本経営</span></td><td>人材を「コスト」ではなく<b>投資すべき資本</b>と捉え、価値を高める経営。リスキリングへの投資・情報開示とセットで語られる。</td></tr>
<tr><td><span class="kw">プロンプトエンジニアリング</span></td><td>生成AIへの指示文（プロンプト）を工夫して、<b>望む出力を引き出す</b>技術。</td></tr>
<tr><td><span class="kw">XAI（説明可能なAI）</span></td><td>AIが<b>なぜその判断をしたか</b>を人間に理解できる形で示す技術。AIのブラックボックス問題への答え。</td></tr>
<tr><td><span class="kw">NFT（非代替性トークン）</span></td><td>ブロックチェーンでデジタルデータに<b>「本物・唯一」の証明</b>を与える仕組み。デジタルアートの所有証明など。</td></tr>
<tr><td><span class="kw">メタバース</span></td><td>アバターで交流や経済活動を行う、ネット上の<b>3次元仮想空間</b>。</td></tr>
<tr><td><span class="kw">Web3</span></td><td>ブロックチェーンを土台に、<b>特定の管理者に頼らない分散型</b>のインターネットを目指す考え方。</td></tr>
</table>
<p>法律の新用語2つ——<span class="kw">中小受託取引適正化法（取適法）</span>（6.5・旧下請法）と<span class="kw">情報流通プラットフォーム対処法</span>（6.4・旧プロバイダ責任制限法）は第1章の法律の単元で学習済み。セキュリティ系の<span class="kw">ゼロトラスト</span>と<span class="kw">サイバーキルチェーン</span>はテクノロジ攻略ノート第3章で扱います。</p>
<div class="why"><div class="why-t">なぜ？ ── 新用語はどう出題されるのか</div>
新用語の出題は<b>「定義を一言で言えるか」を試す素直な問題</b>がほとんどです。ひねった応用問題は過去問の蓄積がある古参用語の役目で、新用語はまず「GXの説明はどれか」という形で登場します。そして選択肢には必ず<b>同じジャンルの仲間</b>（GXならDX・SDGs・カーボンニュートラル）が並びます。つまり対策は「隣の用語との違いを一言で言える」こと。単語確認ページにも追加してあるので、フラッシュカードで仕上げてください。</div>

<h3 class="sec">まとめ</h3>
<ul>
<li><span class="kw">成長マトリクス</span>＝製品×市場の4象限。<b>多角化（新×新）が最もハイリスク</b>。</li>
<li>シラバス6.3新用語：<span class="kw">GX</span>（脱炭素×変革）、<span class="kw">パーパス経営</span>（存在意義）、<span class="kw">人的資本経営</span>（人材＝資本）、<span class="kw">プロンプトエンジニアリング</span>（AIへの指示術）は定義を一言で。</li>
<li>生産系：<span class="kw">MRP</span>＝必要量と時期の計算、<span class="kw">JIT</span>＝必要な分だけ（かんばん方式）、<span class="kw">コンカレントエンジニアリング</span>＝同時並行で期間短縮。</li>
<li><span class="kw">RFID</span>＝複数一括読取り（バーコードとの違い）、<span class="kw">POS</span>＝販売時点の単品管理。</li>
<li>生成AIは<span class="kw">ハルシネーション</span>前提で、人間の検証と機密管理をセットに。</li>
</ul>
`,

<p>最後の補講は「作ったシステムを、ちゃんと使ってもらい、効果を出す」ための論点です。システムは導入した瞬間ではなく、<b>組織に根づいて初めて</b>価値を生みます。地味ですが、シラバスの「システム活用促進・評価」という独立した項目から毎回のように1問出ます。</p>

<h3 class="sec">1. 使えない人を取り残さない ── デジタルディバイド</h3>
<p><span class="kw">デジタルディバイド</span>（情報格差）とは、ITを<b>利用できる人とできない人の間に生じる、経済的・社会的な格差</b>のことです。年齢、収入、地域（通信環境）、障がいの有無などが要因になります。対になる概念が<span class="kw">情報リテラシー</span>——情報を適切に収集・判断・活用する基礎能力です。</p>
<div class="why"><div class="why-t">なぜ？ ── 「使えない人がいる」が社会問題にまでなるのか</div>
行政手続き、銀行、チケット購入、災害情報——社会のサービスがデジタル前提になるほど、<b>使えないことの不利益が「便利さの差」から「生活基盤の差」に変わる</b>からです。紙の窓口が縮小されれば、デジタルを使えない高齢者は行政サービスそのものから遠ざかります。だからデジタル化を進める側には、講習などの利用支援、誰でも使える画面設計（アクセシビリティへの配慮）、複数チャネルの維持といった対策の責任が生じます。DXの推進（第3章①）とデジタルディバイド対策は、アクセルとシートベルトの関係だと理解してください。</div>

<h3 class="sec">2. 楽しさで行動を変える ── ゲーミフィケーション</h3>
<p><span class="kw">ゲーミフィケーション</span>とは、ポイント、バッジ、レベル、ランキングといった<b>ゲームの要素を、ゲーム以外の分野に応用</b>して、人の意欲や行動を引き出す手法です。歩数アプリの達成バッジ、語学アプリの連続学習記録、ポイントカードのランク制度などが典型例です。</p>
<div class="why"><div class="why-t">なぜ？ ── ただのポイント付与で人が動くのか</div>
ゲーミフィケーションは心理学の動機づけ研究の応用そのものです。即時のフィードバック（押した瞬間ポイントが付く）、達成可能な小目標の連鎖（あと10歩でバッジ）、進捗の可視化（プログレスバー）、社会的比較（ランキング）——これらはどれも行動を強化し、内発的な「続けたい」を引き出す仕掛けです。実はこのアプリの<b>朱印「済」も、修了をスタンプで可視化するゲーミフィケーション</b>です。ぐりさんがいま「3つの合格朱印を揃えたい」と感じているなら、仕掛けが機能している証拠ですね。</div>

<h3 class="sec">3. システムの種類と評価 ── SoR・SoEとIT投資の物差し</h3>
<p>システムの性格を表す分類として、<span class="kw">SoR</span>（System of Record：会計や受発注など<b>正確な記録</b>を重視する基幹系システム）と、<span class="kw">SoE</span>（System of Engagement：顧客との<b>つながりや体験</b>を重視するシステム。アプリやSNS連携など）という対比があります。SoRは安定性・正確性を最優先に慎重に、SoEは試行錯誤しながら素早く改善——と、求められる開発・運用のスタイルまで変わります。</p>
<p>IT投資の評価では、第3章①で学んだ<span class="kw">TCO</span>（導入費＋運用・保守費の総額）と<span class="kw">ROI</span>（投資利益率）に加えて、投資額を何年で回収できるかという回収期間の考え方、そして<b>導入後の効果測定（事後評価）</b>までがワンセットです。「導入して終わり」ではなく、狙った効果（KPI——第2章③）が出ているかを確認し、出ていなければ改善する。ここでもPDCAが回っています。</p>

<h3 class="sec">4. 人と組織を育てる ── 活用促進の仕上げ</h3>
<ul>
<li><span class="kw">デジタル人材の育成</span>：データ分析やAI活用を担う人材の育成・確保。社員の学び直し（リスキリング）も含む。</li>
<li><span class="kw">ノーコード／ローコード開発</span>：プログラミングなし（または最小限）でアプリを作れるツール。現場の非エンジニアが自ら業務アプリを作る「市民開発」を可能にし、IT部門の渋滞を緩和する。</li>
<li>利用マニュアル整備・研修・ヘルプデスクなどの<b>定着化施策</b>：使い方がわからないシステムは存在しないのと同じ。</li>
</ul>
<div class="why"><div class="why-t">なぜ？ ── 高機能なシステムほど「使われない」リスクがあるのか</div>
人は現状維持を好み、新しい道具への切り替えには学習コストという心理的な壁があります（現状維持バイアス）。機能が多いほど画面は複雑になり、最初の壁は高くなる。そこで導入時には、研修やマニュアルで壁を下げ、まず一部の部署で成功例を作って横展開するなどの<b>定着戦略</b>が必要になります。システムの成否は技術力だけでなく、人と組織の側の設計——まさに心理学の出番——で決まるのです。</div>

<h3 class="sec">まとめ ── これでストラテジ系・完全版</h3>
<ul>
<li><span class="kw">デジタルディバイド</span>＝ITを使える／使えないが生む社会的格差。デジタル化推進とセットで対策する責任。</li>
<li><span class="kw">ゲーミフィケーション</span>＝ゲーム要素で行動を促す（このアプリの朱印もその実例）。</li>
<li><span class="kw">SoR</span>＝記録の正確さ重視、<span class="kw">SoE</span>＝顧客とのつながり重視。</li>
<li>IT投資は<span class="kw">TCO</span>・<span class="kw">ROI</span>・回収期間で評価し、導入後の効果測定まで行う。</li>
<li>定着の鍵は人と組織：研修・<span class="kw">ノーコード／ローコード</span>・リスキリング。</li>
</ul>
<p>補講を含む全18単元、これでシラバスのストラテジ系を隅まで網羅しました。あとは章末テストの反復で固めれば、本番のストラテジ系は安心して臨めます。</p>

    { q:"勤務先の組織的な不正を行政機関などに通報した労働者を、解雇などの不利益な取扱いから保護する法律はどれか。",
      c:["労働者派遣法","公益通報者保護法","個人情報保護法","不正競争防止法"],
      a:1,
      e:"公益通報者保護法は内部告発者を保護する法律です。組織内の不正は内部の人間にしか見えないことが多く、通報者を守ることが社会の自浄作用を支えます。" },
    { q:"検索履歴や閲覧履歴に基づく情報の最適化によって、利用者が自分の興味・関心に合う情報ばかりに囲まれてしまう現象を表す用語はどれか。",
      c:["エコーチェンバー","フィルターバブル","デジタルディバイド","ハルシネーション"],
      a:1,
      e:"パーソナライズの「泡」に包まれるのがフィルターバブルです。SNSで同じ意見同士が反響し合うのはエコーチェンバー。両者はセットで出題されるので、「アルゴリズムによる泡」と「同意見の反響室」で区別しましょう。" },
    { q:"ある取引先との取引で、4月に売上計上した600万円は4月末に現金回収された。5月に売上計上した900万円と700万円は月末時点で未回収であり、ほかに5月中に300万円の受注（売上計上は未了）がある。5月31日時点の売掛金は何万円か。",
      c:["1,600万円","1,900万円","2,200万円","2,500万円"],
      a:0,
      e:"売掛金は「売上計上済みで未回収」のものだけです。900＋700＝1,600万円。回収済みの600万円は売掛金から消えており、受注だけの300万円は商品を引き渡していないので売掛金になりません。受注→売上計上→回収の3時点の区別が急所です。" },
    { q:"企業が掲げるMVVのうち、「ビジョン」が示すものとして最も適切なものはどれか。",
      c:["企業が果たすべき使命や存在意義","企業が目指す将来のあるべき姿","従業員が共有すべき価値観や行動指針","年度ごとの具体的な売上目標"],
      a:1,
      e:"MVVはミッション（使命・存在意義）、ビジョン（目指す将来の姿）、バリュー（価値観・行動指針）の3点セットです。「使命→姿→価値観」の対応で覚えましょう。令和7年度に出題された論点です。" },
    { q:"期首商品棚卸高100万円、当期商品仕入高800万円、期末商品棚卸高200万円のとき、売上原価は何万円か。",
      c:["500万円","700万円","900万円","1,100万円"],
      a:1,
      e:"売上原価＝期首棚卸高＋当期仕入高−期末棚卸高＝100＋800−200＝700万円。「実際に売れた分」だけを費用にするため、売れ残り（期末在庫）を差し引きます。" },
    { q:"貸借対照表において、資産の合計が2,000万円、負債の合計が1,200万円であるとき、純資産は何万円か。",
      c:["800万円","1,200万円","2,000万円","3,200万円"],
      a:0,
      e:"貸借対照表では「資産＝負債＋純資産」が必ず成り立ちます。純資産＝2,000−1,200＝800万円です。右側は「お金の集め方」（借りた1,200万＋自分のもの800万）、左側は「その使い道」なので、左右は必ず一致します。" },
    { q:"キャッシュフロー計算書の3区分のうち、商品の販売など本業の活動によって得た現金の増減を表すものはどれか。",
      c:["営業活動によるキャッシュフロー","投資活動によるキャッシュフロー","財務活動によるキャッシュフロー","特別活動によるキャッシュフロー"],
      a:0,
      e:"本業で稼いだ現金は営業CFで、ここがプラスであることが健全経営の基本です。投資CFは設備投資など（成長中の企業はマイナスが普通）、財務CFは借入・返済・増資など資金調達の出入り。「特別活動」という区分はありません。" },
    { q:"取得価額120万円、耐用年数6年のサーバを定額法（残存価額ゼロ）で減価償却するとき、1年あたりの減価償却費は何万円か。",
      c:["10万円","20万円","24万円","120万円"],
      a:1,
      e:"定額法は毎年同じ額を費用にする方法で、120万円÷6年＝20万円です。長く使う資産は「働く期間に費用を割り振る」（費用収益対応の原則）ため、買った年に全額を費用にせず分割して計上します。" },
    { q:"総資本1,000万円のうち自己資本が400万円である企業の自己資本比率は何%か。",
      c:["25%","40%","60%","250%"],
      a:1,
      e:"自己資本比率＝自己資本÷総資本＝400÷1,000＝40%です。「返さなくてよいお金」の割合なので、高いほど借金に頼らない安定経営といえます。業種によって標準的な水準が違う点にも注意しましょう。" },
    { q:"損益計算書上は黒字である企業が倒産する、いわゆる黒字倒産の直接の原因として最も適切なものはどれか。",
      c:["売掛金の回収が遅れ、支払いに必要な現金が不足した",
         "当期純利益が営業利益を上回った",
         "減価償却費を定額法で計上した",
         "自己資本比率が高くなりすぎた"],
      a:0,
      e:"利益は商品の引き渡し時点で計上されますが、現金の入金は後（掛け取引）です。売掛金の回収が遅れる間にも給料や仕入代金の支払いは続くため、帳簿が黒字でも現金が尽きれば倒産します。「利益は意見、キャッシュは事実」——だからP/Lとは別にキャッシュフロー計算書で現金の流れを確認するのです。" }
  ],
  2: [
    { q:"ファイブフォース分析で扱う「5つの競争要因」に含まれないものはどれか。", c:["新規参入の脅威","代替品の脅威","売り手の交渉力","自社の財務体質"], a:3, e:"ファイブフォースは新規参入・代替品・買い手の交渉力・売り手の交渉力・既存企業間の競争で業界の収益性を分析します。自社の財務体質は内部要因でこの枠組みには含まれません。" },
    { q:"CRM（顧客関係管理）の目的として、最も適切なものはどれか。", c:["部品の所要量を計算して在庫を最適化する","顧客との関係を維持・強化し、長期的な利益につなげる","供給網全体の物流を最適化する","会計データを一元管理する"], a:1, e:"CRMは顧客情報を一元管理し、満足度やロイヤルティを高めて長期的な収益を狙います。部品所要量はMRP、供給網最適化はSCM、基幹業務の統合はERPです。" },
    { q:"原材料の調達から生産・物流・販売までの、複数企業にまたがる流れ全体を最適化する管理手法はどれか。", c:["SCM","CRM","SFA","CSR"], a:0, e:"SCM（Supply Chain Management）は供給連鎖全体で在庫や物流を最適化し、欠品や過剰在庫を防ぎます。SFAは営業支援、CSRは企業の社会的責任です。" },
    { q:"自社の事業を、原材料の調達など川上の工程へ拡大していく戦略を何と呼ぶか。", c:["水平統合","垂直統合","多角化","アウトソーシング"], a:1, e:"垂直統合は調達・生産・販売という供給の流れに沿って事業範囲を広げる戦略です。同業他社との統合は水平統合、異分野への進出は多角化です。" },
    { q:"ポーターの競争戦略のうち、他社にない独自の価値で高くても選ばれることを目指す戦略はどれか。", c:["コストリーダーシップ戦略","差別化戦略","集中戦略","同質化戦略"], a:1, e:"差別化戦略は品質・ブランド・サービスなど独自の価値で競合と差をつけ、価格競争を避ける戦略です。コストリーダーシップは低コストで優位に立ち、集中戦略は特定の狭い市場に絞ります。" },
    { q:"会計・人事・生産・販売などの基幹業務の情報を一元管理し、経営資源を最適化する考え方やシステムはどれか。", c:["ERP","CRM","SCM","SFA"], a:0, e:"ERP（Enterprise Resource Planning）は社内の基幹業務を統合し情報を一元管理して経営資源を有効活用します。CRMは顧客管理、SCMは供給連鎖、SFAは営業支援です。" },
    { q:"自社の製品や業務プロセスを、優れた他社の事例と比較・分析して改善につなげる手法はどれか。", c:["ベンチマーキング","ブレーンストーミング","アウトソーシング","カニバリゼーション"], a:0, e:"ベンチマーキングは業界の優良企業（ベストプラクティス）と自社を比較し差を明らかにして改善します。アウトソーシングは外部委託、カニバリゼーションは自社製品同士が顧客を奪い合う現象です。" },
    { q:"競争の激しい既存市場ではなく、競争相手のいない新しい市場を切り開く戦略を何と呼ぶか。", c:["ブルーオーシャン戦略","レッドオーシャン戦略","ニッチ戦略","プッシュ戦略"], a:0, e:"ブルーオーシャン戦略は競争のない未開拓市場を新たに創り出す戦略です。血みどろの競争市場はレッドオーシャン。価値を高めつつコストも下げる発想が特徴です。" },
    { q:"実店舗・ネット通販・アプリなど複数の販売チャネルを連携させ、顧客がどこからでも同じように購入できる仕組みはどれか。", c:["オムニチャネル","ロングテール","フランチャイズ","ドロップシッピング"], a:0, e:"オムニチャネルは店舗・EC・アプリなどを統合し、在庫や顧客情報を共有して切れ目のない購買体験を提供します。ネットで注文し店舗で受け取るなどが例です。" },
    { q:"企業の活動を購買・製造・出荷・販売・サービスの連なりとして捉え、どこで付加価値が生まれるかを分析する考え方はどれか。", c:["バリューチェーン分析","PPM","SWOT分析","RFM分析"], a:0, e:"バリューチェーン（価値連鎖）分析は主活動と支援活動に分け、どの工程が付加価値や競争力の源泉かを明らかにします。PPMは事業の選択、SWOTは環境分析、RFMは顧客分析です。" },
    { q:"PPMで「花形」に分類される事業の特徴はどれか。", c:["市場成長率が高く、市場占有率も高い","市場成長率が低く、占有率が高い","市場成長率が高く、占有率が低い","市場成長率も占有率も低い"], a:0, e:"花形は高成長・高シェアで、シェア維持に投資が必要ですが将来の収益源です。低成長・高シェアは金のなる木、高成長・低シェアは問題児、両方低いと負け犬です。" },
    { q:"SWOT分析で「強み（Strength）」に分類されるものはどれか。", c:["自社の高い技術力","競合の新規参入","為替の変動","法規制の緩和"], a:0, e:"強みは自社内部のプラス要因で高い技術力やブランドが該当します。新規参入は脅威、為替や法規制は外部環境（機会または脅威）です。まず内部か外部かで切り分けます。" },
    { q:"マーケティングミックスの4Pのうち、広告や販売員活動など顧客への働きかけを指すものはどれか。", c:["製品（Product）","価格（Price）","流通（Place）","販売促進（Promotion）"], a:3, e:"販売促進（Promotion）は広告・PR・販売員活動など製品を知らせ購入を促す活動です。4Pは製品・価格・流通・販売促進で、買い手視点の4Cと対応づけて覚えます。" },
    { q:"新製品の発売当初に高めの価格を設定し、開発費を早期に回収する価格戦略はどれか。", c:["スキミングプライシング","ペネトレーションプライシング","ダイナミックプライシング","フリーミアム"], a:0, e:"スキミング（上澄み吸収）プライシングは価格に敏感でない層へ高価格で売り早期回収を狙います。逆に低価格で一気にシェアを取るのがペネトレーションです。" },
    { q:"企業が利益追求だけでなく、環境保護や社会貢献など社会的責任を果たすべきとする考え方はどれか。", c:["CSR","CRM","CSF","CTO"], a:0, e:"CSR（Corporate Social Responsibility）は企業の社会的責任で、環境・人権・地域貢献などへの配慮を指します。近年はSDGsやESG投資とも結びついて重視されています。" },
    { q:"他社のブランド名で販売される製品を、相手先の仕様で製造することを表す用語はどれか。", c:["OEM","M&A","ジョイントベンチャー","フランチャイズ"], a:0, e:"OEM（Original Equipment Manufacturer）は相手先ブランドでの製造で、製造側は設備を活かし、販売側は開発負担なく品ぞろえを増やせます。合弁会社の設立はジョイントベンチャーです。" },
    { q:"SWOT分析において、外部環境に分類される組合せはどれか。",
      c:["強みと弱み","強みと機会","機会と脅威","弱みと脅威"],
      a:2,
      e:"機会（Opportunity）と脅威（Threat）は市場や法規制など自社では変えられない外部環境、強み・弱みは自社内部の話です。「円安」「法改正」は外部、「技術力」「財務体質」は内部と判定します。" },
    { q:"PPMにおいて、市場成長率が低く、市場占有率が高い事業の分類はどれか。",
      c:["花形","金のなる木","問題児","負け犬"],
      a:1,
      e:"成長が止まった市場で高シェア＝追加投資が少なくて済み、安定して現金を稼ぐ「金のなる木」です。ここで得た資金を問題児（高成長・低シェア）に投資して花形に育てるのがPPMの資金循環です。" },
    { q:"他社が容易に模倣できない、企業の中核となる独自の強みを表す用語はどれか。",
      c:["コアコンピタンス","ベンチマーキング","アウトソーシング","セグメンテーション"],
      a:0,
      e:"コアコンピタンスは「顧客に価値をもたらし、模倣されにくく、他事業へ応用できる」中核的な強みです。ベンチマーキングは他社の優良事例と比較して自社を改善する手法です。" },
    { q:"複数の企業が共同出資して新しい会社を設立する形態はどれか。",
      c:["M&A","ジョイントベンチャー","OEM","ファブレス"],
      a:1,
      e:"共同出資による合弁会社の設立がジョイントベンチャーです。M&Aは合併・買収、OEMは相手先ブランドでの受託生産、ファブレスは自社工場を持たない形態です。" },
    { q:"マーケティングミックスの4Pに含まれないものはどれか。",
      c:["製品（Product）","価格（Price）","流通（Place）","プロセス（Process）"],
      a:3,
      e:"4Pは製品・価格・流通・販売促進（Promotion）です。プロセスは含まれません。買い手視点の4C（顧客価値・顧客コスト・利便性・コミュニケーション）との対応も整理しておきましょう。" },
    { q:"市場を顧客の年齢、地域、ライフスタイルなどの基準で同質なグループに細分化することを何と呼ぶか。",
      c:["ポジショニング","ターゲティング","セグメンテーション","プロモーション"],
      a:2,
      e:"細分化＝セグメンテーション、その中から狙う市場を選ぶのがターゲティング、顧客の頭の中に自社の立ち位置を築くのがポジショニング。S→T→Pの順序ごと覚えましょう。" },
    { q:"RFM分析で顧客の評価に用いる3つの指標の組合せとして、適切なものはどれか。",
      c:["最終購買日、購買頻度、購買金額",
         "年齢、性別、居住地域",
         "認知度、好感度、購入意向",
         "売上高、利益率、市場占有率"],
      a:0,
      e:"RFMはRecency（最終購買日）・Frequency（購買頻度）・Monetary（購買金額）の頭文字。優良顧客を特定して施策を変えるための顧客分析手法です。" },
    { q:"新製品の発売時に低価格を設定し、早期に市場シェアの獲得を狙う価格戦略はどれか。",
      c:["スキミングプライシング","ペネトレーションプライシング","ダイナミックプライシング","プレステージプライシング"],
      a:1,
      e:"ペネトレーション（浸透）プライシングは低価格で一気に市場へ浸透する戦略。規模の経済やネットワーク外部性が効く商品で有効です。逆に高価格で早期回収を狙うのがスキミングです。" },
    { q:"プロダクトライフサイクルにおいて、市場の成長が鈍化し、競合との価格競争や差別化が中心となる段階はどれか。",
      c:["導入期","成長期","成熟期","衰退期"],
      a:2,
      e:"成熟期は市場の伸びが止まり、シェアの奪い合いになる段階です。導入期は認知度向上、成長期は生産能力増強とシェア獲得、衰退期は撤退判断が主な課題になります。" },
    { q:"バランススコアカード（BSC）の4つの視点の組合せとして、適切なものはどれか。",
      c:["財務、顧客、業務プロセス、学習と成長",
         "財務、競合、製品、組織",
         "売上、利益、コスト、品質",
         "強み、弱み、機会、脅威"],
      a:0,
      e:"BSCは財務・顧客・（内部）業務プロセス・学習と成長の4視点。人材が育つ→業務が良くなる→顧客が満足する→儲かる、という因果の鎖で覚えましょう。強み弱み機会脅威はSWOT分析です。" },
    { q:"KGIとKPIの関係の説明として、最も適切なものはどれか。",
      c:["KGIは日々の活動の指標であり、KPIは最終目標の指標である",
         "KGIは最終目標の達成度を測る指標であり、KPIはその達成過程を測る中間指標である",
         "KGIとKPIは同じ指標の別名である",
         "KPIは財務指標に限定され、KGIは非財務指標に限定される"],
      a:1,
      e:"KGI（重要目標達成指標）がゴール、KPI（重要業績評価指標）が過程の計器盤です。ジムなら売上（KGI）に対する週1回以上の来店率（KPI）。逆にした選択肢が定番のひっかけです。" },
    { q:"目標達成の鍵を握る要因を明らかにするために用いられる「重要成功要因」を表す略語はどれか。",
      c:["CSF","ROE","TOB","CSR"],
      a:0,
      e:"CSF（Critical Success Factor）＝重要成功要因。KGI（目標）を達成するための決め手となる要因で、CSFの進捗を測る指標がKPIです。CSRは企業の社会的責任なので混同注意。" },
    { q:"技術経営において、研究開発の成果を事業化につなげる際に直面する、資金や人材が不足する障壁を表す用語はどれか。",
      c:["魔の川","死の谷","ダーウィンの海","キャズム"],
      a:1,
      e:"開発から事業化（量産・販売）の間の障壁が「死の谷」。研究→開発の間が「魔の川」、事業化→産業化（市場での生存競争）が「ダーウィンの海」。川→谷→海の順番ごと覚えましょう。" },
    { q:"インターネット販売において、販売機会の少ないニッチな商品でも品揃えを充実させることで、全体として大きな売上を得る考え方はどれか。",
      c:["ロングテール","オムニチャネル","フランチャイズ","プッシュ戦略"],
      a:0,
      e:"販売数の少ない商品（しっぽ＝テール）の合計で稼ぐのがロングテール。ECは棚の物理的制約と追加コストがほぼないため成立します。実店舗の「売れ筋に絞る」発想の逆です。" },
    { q:"個人が保有する住宅や自動車などの遊休資産を、インターネットのプラットフォームを介して他者と共有・貸借する仕組みを表す用語はどれか。",
      c:["シェアリングエコノミー","アウトソーシング","トレーサビリティ","クラウドファンディング"],
      a:0,
      e:"遊休資産×マッチング＝シェアリングエコノミー（民泊、カーシェアなど）。スマホでの即時マッチングと相互評価による信頼の仕組みが普及を支えました。クラウドファンディングは資金集めの仕組みです。" },
    { q:"アンゾフの成長マトリクスにおいて、新規市場に新規製品を投入する成長戦略はどれか。",
      c:["市場浸透","新市場開拓","新製品開発","多角化"],
      a:3,
      e:"製品×市場の両方が新規＝多角化です。製品と市場のどちらにも既存の知識という足場がないため、4象限の中で最もリスクが高い戦略とされます。" },
    { q:"生産計画と部品表を基に、生産に必要な資材の量と調達時期を計算する生産管理の手法はどれか。",
      c:["MRP","CRM","POS","RFM"],
      a:0,
      e:"MRP（資材所要量計画）は「何が・いつ・いくつ必要か」を計画から逆算する手法で、過剰在庫と欠品を防ぎます。CRMは顧客関係管理、POSは販売時点情報管理、RFMは顧客分析の手法です。" },
    { q:"生成AIを業務で利用する際の留意点として、最も適切なものはどれか。",
      c:["生成AIの出力は常に正確であるため、検証せずにそのまま利用する",
         "出力に事実と異なる内容が含まれ得ることを前提に、人間が内容を検証して利用する",
         "機密情報を入力するほど出力の精度が上がるため、積極的に入力する",
         "生成物には著作権の問題が生じないため、自由に公開できる"],
      a:1,
      e:"生成AIには、もっともらしい誤りを出力するハルシネーションがあります。人間による事実確認と最終判断を組み込み、機密情報の入力を避け、権利侵害にも注意するのが業務利用の原則です。" },
    { q:"基本的なサービスを無料で提供して利用者を集め、高度な機能や追加サービスを有料で提供することで収益を得るビジネスモデルはどれか。",
      c:["フリーミアム","ボリュームライセンス","フランチャイズ","エスクロー"],
      a:0,
      e:"フリー（無料）＋プレミアム（割増）でフリーミアムです。無料ゲームのアイテム課金や、無料プランつきクラウドサービスが典型例。令和5年度に事例選択の形で出題されました。" },
    { q:"機械学習のうち「教師あり学習」の事例として、最も適切なものはどれか。",
      c:["正解を与えずに、顧客データを似た者同士のグループに分ける",
         "過去の気象データと売上実績の組を学習させ、売上を予測する",
         "試行錯誤と報酬によって、ロボットに歩行動作を獲得させる",
         "プログラムであらかじめ定めたルールどおりに事務処理を実行する"],
      a:1,
      e:"正解（売上実績）つきのデータで学ぶのが教師あり学習です。正解なしのグループ分けは教師なし学習、報酬による試行錯誤は強化学習、ルール実行はRPAでありそもそも学習しません。" },
    { q:"脱炭素社会の実現と経済成長を両立させるために、産業構造や社会システムを変革していく取組を表す用語はどれか。",
      c:["DX","GX","BPR","CSR"],
      a:1,
      e:"GX（グリーントランスフォーメーション）は化石燃料中心の経済から脱炭素へ移行しつつ、それを成長の機会に変える変革です。DXはデジタル技術による変革、BPRは業務プロセスの再設計、CSRは企業の社会的責任で、それぞれ「変革の対象」が違います。シラバス6.3の新用語です。" },
    { q:"企業の存在意義を明確に定義し、それを軸として経営戦略の策定や事業活動を行う経営の考え方はどれか。",
      c:["成果主義","アウトソーシング","パーパス経営","コンプライアンス"],
      a:2,
      e:"パーパス経営は「自社は何のために存在するのか」という存在意義（パーパス）を経営の中心に据える考え方です。シラバス6.3の新用語で、MVV（ミッション・ビジョン・バリュー）や人的資本経営とセットで押さえましょう。" },
    { q:"消費税の仕入税額控除を受けるために、登録番号や適用税率などを記載した適格請求書の保存を求める制度はどれか。",
      c:["電子帳簿保存法","マイナンバー制度","ワンストップ特例制度","インボイス制度"],
      a:3,
      e:"インボイス制度（適格請求書等保存方式）では、売り手が発行する登録番号つきの請求書（インボイス）がないと、買い手は消費税の仕入税額控除を受けられません。シラバス6.3で追加された会計まわりの新用語です。" },
    { q:"生成AIに与える指示文を工夫して、意図した出力を引き出す技術を何と呼ぶか。",
      c:["プロンプトエンジニアリング","リバースエンジニアリング","ソーシャルエンジニアリング","コンカレントエンジニアリング"],
      a:0,
      e:"プロンプトエンジニアリングは、生成AIへの指示（プロンプト）に役割・条件・例示などを盛り込んで出力の質を高める技術です。リバース＝完成品の解析、ソーシャル＝人の心理を突く攻撃、コンカレント＝工程の同時並行。「〇〇エンジニアリング」仲間の区別が狙われます。" }
  ],
  3: [
    { q:"IoTの説明として、最も適切なものはどれか。", c:["人工知能が自ら学習して判断する技術","さまざまなモノをインターネットに接続し情報をやり取りする仕組み","仮想空間で現実のような体験を提供する技術","複数企業が共同で標準を定める活動"], a:1, e:"IoT（Internet of Things）は家電やセンサーなどあらゆるモノをネットにつなぎ、データ収集や遠隔制御を可能にします。集めたデータの分析にAIが使われることも多いですが、AIそのものではありません。" },
    { q:"国や自治体が、誰もが二次利用できる形で無償公開するデータを何と呼ぶか。", c:["オープンデータ","ビッグデータ","メタデータ","パーソナルデータ"], a:0, e:"オープンデータは機械判読に適した形式で許諾不要に再利用できるよう公開されたデータで、行政の透明性向上や新サービス創出を狙います。メタデータはデータを説明する情報です。" },
    { q:"新しい技術やアイデアが実現可能かを、本格開発の前に小規模に検証することを表す用語はどれか。", c:["PoC","SLA","RFP","BPR"], a:0, e:"PoC（Proof of Concept＝概念実証）は試作や小規模実験で実現性・効果を確かめる活動で、失敗のコストを抑えられます。SLAは品質合意、RFPは提案依頼書、BPRは業務の抜本的再設計です。" },
    { q:"製品を売り切るのではなく、一定期間の利用権に対して継続的に料金を得るビジネスモデルはどれか。", c:["サブスクリプション","フランチャイズ","クラウドファンディング","オープンソース"], a:0, e:"サブスクリプションは月額・年額などの継続課金方式で、安定収益と顧客との継続的関係が利点です。解約率（チャーン）の管理が重要になります。" },
    { q:"クラウドサービスのうち、サーバやストレージ、ネットワークなどのインフラだけを提供する形態はどれか。", c:["IaaS","PaaS","SaaS","BPO"], a:0, e:"IaaS（Infrastructure as a Service）はインフラを貸す形態で、OSやアプリは利用者が用意します。借りる範囲はIaaS（インフラ）→PaaS（開発環境）→SaaS（アプリ）の順に広がります。" },
    { q:"企業に蓄積された大量のデータを分析・可視化し、経営の意思決定に役立てる仕組みや手法はどれか。", c:["BI（ビジネスインテリジェンス）","EA","RPA","CRM"], a:0, e:"BI（Business Intelligence）は社内データを集計・分析しダッシュボードなどで可視化して、データに基づく意思決定を支援します。EAは全体最適の設計、RPAは定型業務の自動化です。" },
    { q:"スマートフォンのカメラ映像などの現実の風景に、デジタル情報を重ねて表示する技術はどれか。", c:["AR（拡張現実）","VR（仮想現実）","IoT","RPA"], a:0, e:"AR（Augmented Reality）は現実の映像にCGや情報を重ねる技術で、家具を部屋に試し置きするアプリなどが例です。VRは現実とは別の仮想空間に没入する技術で、区別が問われます。" },
    { q:"従業員が個人で所有するスマートフォンやPCを業務に利用することを表す用語はどれか。", c:["BYOD","BPO","BPR","SaaS"], a:0, e:"BYOD（Bring Your Own Device）は私物端末の業務利用で、コスト削減や利便性の一方、情報漏えいや管理の難しさという課題があり、利用ルールやMDMでの管理が重要です。" },
    { q:"現実の設備や製品の状態をセンサーで集め、仮想空間に同じものを再現してシミュレーションする技術はどれか。", c:["デジタルツイン","ディープラーニング","ブロックチェーン","デジタルディバイド"], a:0, e:"デジタルツインは現実の双子を仮想空間に作り、リアルタイムのデータで再現して故障予測や最適化のシミュレーションを行います。製造業や都市計画で活用が進みます。" },
    { q:"統計や情報技術を用いて大量のデータを分析し、ビジネスに役立つ知見を導く専門人材を何と呼ぶか。", c:["データサイエンティスト","システムアーキテクト","プロダクトオーナー","ストラテジスト"], a:0, e:"データサイエンティストは統計学・プログラミング・業務知識を組み合わせてデータから価値ある知見を引き出す専門人材で、ビッグデータやAIの普及で需要が高まっています。" },
    { q:"SaaSの利用例として、最も適切なものはどれか。", c:["Webブラウザで使うクラウド型のメールや表計算サービス","自社で購入しサーバ室に設置した業務サーバ","アプリを動かす実行基盤だけを借りる","回線だけを借りてデータを送る"], a:0, e:"SaaSは完成したアプリをサービスとして使う形態で、ブラウザで使うクラウドメールやオフィスソフトが典型例です。実行基盤を借りるのはPaaS、自社設置はオンプレミスです。" },
    { q:"RPAの導入が最も効果を発揮する業務はどれか。", c:["毎日決まった手順で大量に行う定型的なデータ入力","正解のない創造的な企画立案","高度な経営判断","顧客との対面交渉"], a:0, e:"RPAはルールが明確で反復的な定型業務の自動化に向きます。判断や創造性を要する業務や対人折衝は不得意で、適用業務の見極めが効果を左右します。" },
    { q:"システム開発の上流で、利用者の要求を整理して「何を実現するか」を明確にする工程はどれか。", c:["要件定義","プログラミング","運用テスト","保守"], a:0, e:"要件定義は利用者の要求を分析・整理して実現すべき機能や性能を明確にする工程です。ここでの誤りは下流に大きく響くため、利用者との合意形成が重要です。" },
    { q:"機械学習のうち「教師なし学習」の例として、適切なものはどれか。", c:["正解ラベルのない顧客データを似た者同士のグループに自動で分ける","過去の正解付きデータから売上を予測する","報酬を手がかりに最適な行動を学習する","人が定めたルール通りに処理する"], a:0, e:"教師なし学習は正解を与えず、データの構造から似たもの同士をまとめる（クラスタリング）などを行います。正解付きで学ぶのが教師あり学習、報酬で試行錯誤するのが強化学習です。" },
    { q:"生成AIの活用例として、最も適切なものはどれか。", c:["入力した条件をもとに文章や画像の案を作成する","ネットワーク機器に電力を供給する","ディスクの断片化を解消する","通信を物理的に暗号化する"], a:0, e:"生成AIは学習したパターンから文章・画像・プログラムなどを新たに生成します。下書きや要約に役立ちますが、誤り（ハルシネーション）を含むため人による確認が必要です。" },
    { q:"駅や店舗のディスプレイに広告や案内を表示する電子看板の仕組みを何と呼ぶか。", c:["デジタルサイネージ","デジタルディバイド","デジタルフォレンジックス","デジタルツイン"], a:0, e:"デジタルサイネージはディスプレイで情報・広告を配信する電子看板で、内容を遠隔から更新できます。デジタルディバイドは情報格差で、紛らわしいので区別しましょう。" },
    { q:"情報システム戦略の策定に関する説明として、最も適切なものはどれか。",
      c:["現場部門それぞれの要望を集約し、部門ごとに個別最適なシステムを整備する方針を定める",
         "経営戦略との整合性を確保し、全社的な視点でシステムの整備・活用方針を定める",
         "最新技術の導入そのものを目的として、技術動向だけを基準に策定する",
         "システム部門の予算の範囲内で実現可能な改修案だけをまとめる"],
      a:1,
      e:"情報システム戦略の最重要キーワードは「経営戦略との整合性」と「全体最適」です。部門ごとの個別最適はサイロ化とレガシー化を招きます。策定の責任者はCIOです。" },
    { q:"DX（デジタルトランスフォーメーション）の説明として、最も適切なものはどれか。",
      c:["紙の書類をスキャンして電子ファイルとして保存すること",
         "既存業務の一部をITで自動化して効率を高めること",
         "データとデジタル技術を活用して、製品・サービスやビジネスモデルを変革し、競争上の優位性を確立すること",
         "最新のIT機器を定期的に導入して設備を更新すること"],
      a:2,
      e:"DXの核心は「ビジネスモデルや組織の変革」と「競争優位の確立」です。紙の電子化はデジタイゼーション、業務の自動化はデジタライゼーションで、DXには至りません。「稼ぎ方が変わったか」が判定基準です。" },
    { q:"組織全体の業務とシステムを、ビジネス・データ・アプリケーション・テクノロジの4つの体系で整理し、現状とあるべき姿のギャップから全体最適を図る手法はどれか。",
      c:["EA（エンタープライズアーキテクチャ）","BPR","RPA","SOA"],
      a:0,
      e:"全体最適の設計図を描く手法がEAです。現状（As-Is）とあるべき姿（To-Be）を比較して移行計画を立てます。BPRは業務プロセスの抜本的再設計、RPAは定型作業の自動化です。" },
    { q:"業務プロセスを前提から見直し、抜本的に再設計することを表す用語はどれか。",
      c:["BPR","BPM","BPO","BYOD"],
      a:0,
      e:"Reengineering（再設計）のRが目印で、BPRは一度きりの抜本的な再設計。BPMは継続的な改善活動、BPOは業務プロセスの外部委託、BYODは私物端末の業務利用です。Bで始まる略語の区別は頻出です。" },
    { q:"人がPC上で行う定型的な事務作業を、ソフトウェアのロボットによって自動化する仕組みはどれか。",
      c:["RPA","CAD","SFA","OCR"],
      a:0,
      e:"RPA（Robotic Process Automation）は、ルールが明確で反復的な定型作業の自動化に向きます。判断を伴う非定型業務は苦手で、「創造的な業務に最適」という選択肢は誤りです。" },
    { q:"データベース設計などで用いられ、実体（エンティティ）と実体間の関連（リレーションシップ）を表現する図はどれか。",
      c:["DFD","E-R図","ガントチャート","パレート図"],
      a:1,
      e:"Entity（実体）とRelationship（関連）でE-R図です。「顧客」と「注文」の関係などデータの構造を表します。DFDはデータの流れ、ガントチャートは日程管理の図です。" },
    { q:"業務で扱うデータの流れに着目し、処理、データストア、データフローなどの記号で業務を可視化する図はどれか。",
      c:["E-R図","組織図","DFD","レーダーチャート"],
      a:2,
      e:"DFD（Data Flow Diagram）は「データの流れ」を表す図です。E-R図が「データの構造（実体と関連）」を表すのと対で覚えましょう。" },
    { q:"インターネット経由で、アプリケーションソフトウェアの機能をサービスとして利用する形態はどれか。",
      c:["IaaS","PaaS","SaaS","オンプレミス"],
      a:2,
      e:"Software as a Service＝SaaSで、Gmailのようにアプリそのものをサービスとして使う形態です。IaaSはサーバなどのインフラ、PaaSは開発・実行基盤までを借りる形態、オンプレミスは自社保有・自社運用です。" },
    { q:"クラウドサービスのうち、アプリケーションの開発・実行環境（プラットフォーム）までを提供し、利用者が自らアプリケーションを開発・稼働させる形態はどれか。",
      c:["SaaS","PaaS","IaaS","BPO"],
      a:1,
      e:"Platform as a Service＝PaaS。インフラ＋OS＋開発環境までが提供され、アプリは利用者が作ります。「どの層まで借りるか」でIaaS（インフラのみ）→PaaS→SaaS（アプリまで）と段階的に整理しましょう。" },
    { q:"オンプレミスと比較した場合の、クラウドサービス利用の一般的な利点はどれか。",
      c:["初期投資を抑え、需要に応じて利用規模を柔軟に変更できる",
         "自社の建物内に機器を設置するため、ハードウェアを自由に改造できる",
         "通信障害の影響を一切受けずに利用できる",

const LOG_ENDPOINT = "https://script.google.com/macros/s/AKfycbyU3cjoEquXGQicR87zm2Jfa8HrUYdO5uT3TVmbj9S952d8uOWHJYe2q-wd7z8cLFfMSQ/exec";

  try{
    const body = new URLSearchParams();

const $ = (id)=>document.getElementById(id);
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function shuffle(a){
  const r = a.slice();
  for(let i=r.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [r[i],r[j]]=[r[j],r[i]]; }
  return r;
}
function toast(msg){
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toast._tm);
  toast._tm = setTimeout(()=>t.classList.remove("show"), 2600);
}
function copyText(txt){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(
      ()=>toast("コピーしました。Claudeのチャットに貼り付けて質問してください"),
      ()=>fallbackCopy(txt)
    );
  }else{ fallbackCopy(txt); }
}
function fallbackCopy(txt){
  const ta = document.createElement("textarea");
  ta.value = txt; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); toast("コピーしました。Claudeのチャットに貼り付けて質問してください"); }
  catch(e){ toast("コピーできませんでした。質問文を手動で選択してコピーしてください"); }
  document.body.removeChild(ta);
}
function findUnit(uid){
  for(const ch of CHAPTERS){
    const u = ch.units.find(x=>x.id===uid);
    if(u) return { ...u, ch:ch.id, chName:ch.name };
  }
  return null;
}
function chapterDone(ch){ return ch.units.every(u=>P.done[u.id]); }
function doneCount(){ return CHAPTERS.reduce((n,c)=>n+c.units.filter(u=>P.done[u.id]).length,0); }

/* =====================================================
   章末テスト
===================================================== */
function startTest(chId){
  const pool = QUESTIONS[chId];
  if(!pool || !pool.length){ toast("この章のテストは準備中です"); return; }
  const picked = shuffle(pool).slice(0, Math.min(5, pool.length));
  T = {
    ch: chId,
    main: picked,
    idx: 0,
    firstCorrect: 0,
    wrong: [],
    mode: "main",       // main | review
    phase: "q",         // q | judged | result | reviewdone
    queue: [],
    lastJudge: null,
    order: null
  };
  prepareOrder(T.main[0]);
  go("test");
}
function prepareOrder(q){
  T.order = shuffle([0,1,2,3]);
}
function currentQ(){
  return T.mode === "main" ? T.main[T.idx] : T.queue[0];
}
function renderTest(){
  if(!T) return renderHome();
  const ch = CHAPTERS.find(c=>c.id===T.ch);
  let h = "";
  h += '<a class="backlink" data-go="home">‹ テストを中断してホームに戻る</a>';
  h += '<div class="card"><div class="test-pane">';

  if(T.phase === "result"){
    const pass = T.firstCorrect >= 3;
    h += '<div class="result-box">';
    h += '<div class="t-head">第' + T.ch + '章 ' + esc(ch.name) + '　章末テスト 結果</div>';
    h += '<div class="score">' + T.firstCorrect + ' <small>/ 5 問正解</small></div>';
    if(pass){
      h += '<div class="done-stamp-wrap"><span class="stamp big anim">合格</span></div>';
      h += '<p>合格ラインの6割を超えました。おめでとうございます。</p>';
    }else{
      h += '<p style="margin:10px 0;">合格ラインは3問（6割）です。間違えた問題を復習して、もう一度挑戦しましょう。</p>';
    }
    if(T.wrong.length){
      h += '<p style="font-size:14px;color:#7a7261;">間違えた ' + T.wrong.length + ' 問は、正解できるまで復習モードで再出題されます。</p>';
      h += '<div class="btn-row"><button class="btn" id="startReview">復習モードへ進む</button><button class="btn sub" data-go="home">ホームに戻る</button></div>';
    }else{
      h += '<div class="btn-row"><button class="btn" id="retryTest">新しい問題で再挑戦</button><button class="btn sub" data-go="home">ホームに戻る</button></div>';
    }
    h += '</div>';
    h += '</div></div>';
    return h;
  }

  if(T.phase === "reviewdone"){
    h += '<div class="result-box">';
    h += '<div class="t-head">復習モード 完了</div>';
    h += '<div class="done-stamp-wrap"><span class="stamp big anim">克服</span></div>';
    h += '<p>間違えた問題をすべて正解できました。この調子です。</p>';
    h += '<div class="btn-row"><button class="btn" id="retryTest">新しい問題で再挑戦</button><button class="btn sub" data-go="home">ホームに戻る</button></div>';
    h += '</div></div></div>';
    return h;
  }

  const q = currentQ();
  const total = T.mode === "main" ? T.main.length : null;
  h += '<div class="t-head">第' + T.ch + '章 ' + esc(ch.name) + '　章末テスト';
  if(T.mode === "main") h += '　第' + (T.idx+1) + '問 / ' + total + '問';
  else h += '<span class="rv-tag">復習モード　残り' + T.queue.length + '問</span>';
  h += '</div>';
  h += '<div class="t-q">' + q.q + '</div>';
  h += '<div class="choices">';
  const judged = (T.phase === "judged");
  for(let pos=0; pos<4; pos++){
    const ci = T.order[pos];
    let cls = "choice";
    if(judged){
      if(ci === q.a) cls += (T.lastJudge && T.lastJudge.pick === ci) ? " sel-ok" : " reveal";
      else if(T.lastJudge && T.lastJudge.pick === ci) cls += " sel-ng";
    }
    h += '<button class="' + cls + '" data-pick="' + ci + '" ' + (judged ? "disabled" : "") + '>';
    h += '<span class="cno">' + ["ア","イ","ウ","エ"][pos] + '</span>' + q.c[ci] + '</button>';
  }
  h += '</div>';
  if(judged){
    const ok = T.lastJudge.ok;
    h += '<div class="judge ' + (ok ? "ok" : "ng") + '">' + (ok ? "○ 正解！" : "× 不正解…") + '</div>';
    h += '<div class="expl"><b>解説：</b>' + q.e + '</div>';
    h += '<div class="btn-row" style="justify-content:flex-start"><button class="btn" id="nextQ">次へ</button></div>';
  }
  h += '</div></div>';
  return h;
}
function pickAnswer(ci){
  if(!T || T.phase !== "q") return;
  const q = currentQ();
  const ok = (ci === q.a);
  T.lastJudge = { pick: ci, ok: ok };
  T.phase = "judged";
  if(T.mode === "main"){
    if(ok) T.firstCorrect++;
    else T.wrong.push(q);
  }
  /* 復習モードでは、キューの操作は「次へ」を押したときに行う */
  render();
}
function nextQ(){
  if(!T) return;
  if(T.mode === "main"){
    T.idx++;
    if(T.idx >= T.main.length){
      /* 1周目終了：成績を保存 */
      const rec = P.tests[T.ch] || { best:0, passed:false, attempts:0 };
      rec.attempts = (rec.attempts||0) + 1;
      rec.best = Math.max(rec.best||0, T.firstCorrect);
      rec.passed = rec.passed || (T.firstCorrect >= 3);
      P.tests[T.ch] = rec;
      saveP();
      sendLog({ app:"ストラテジ", label:"第" + T.ch + "章 章末テスト", score:T.firstCorrect, total:T.main.length });
      T.phase = "result";
      render();
      return;
    }
  }else{
    if(T.lastJudge && T.lastJudge.ok) T.queue.shift();
    else T.queue.push(T.queue.shift());
    if(T.queue.length === 0){
      T.phase = "reviewdone";
      render();
      return;
    }
  }
  T.phase = "q";
  prepareOrder(currentQ());
  render();
}
function startReview(){
  T.mode = "review";
  T.queue = shuffle(T.wrong);
  T.phase = "q";
  prepareOrder(currentQ());
  render();
}

  const u = findUnit(uid);
  const box = $("qbox");
  const txt = box ? box.value.trim() : "";
  if(!txt){ toast("質問を入力してください"); return; }
  const ansEl = $("aiAns");
  ansEl.innerHTML = '<div class="ai-ans">講師AIが考えています…</div>';
  try{
    const tmp = document.createElement("div");
    tmp.innerHTML = LECTURES[uid] || "";
    const plain = (tmp.textContent || "").slice(0, 6000);
    const prompt = "あなたはITパスポート試験の講師です。学習者は心理学系の大学院生でIT実務は未経験です。以下の講義内容を踏まえ、質問に日本語で簡潔に（300字程度で）答えてください。可能なら身近な企業の具体例を1つ添えてください。\n\n単元：" + u.title + "\n質問：" + txt;
    const r = await window.cowork.askClaude(prompt, [plain]);
    const ans = (typeof r === "string") ? r : (r && (r.text || r.content || JSON.stringify(r)));
    ansEl.innerHTML = '<div class="ai-ans"><b style="color:var(--blue)">講師AIの回答</b>\n' + esc(ans) + '</div>';
  }catch(e){
    ansEl.innerHTML = '<div class="ai-ans">うまく回答を取得できませんでした。「質問文をコピー」でチャットに貼り付けて質問してください。</div>';
  }
}

/* =====================================================
   イベント
===================================================== */
function bindEvents(){
  document.querySelectorAll("[data-go='home']").forEach(el=>{
    el.onclick = ()=>go("home");
  });
  document.querySelectorAll("[data-unit]").forEach(el=>{
    el.onclick = ()=>go("unit", el.getAttribute("data-unit"));
  });
  document.querySelectorAll("[data-test]").forEach(el=>{
    el.onclick = ()=>startTest(Number(el.getAttribute("data-test")));
  });
  document.querySelectorAll("[data-pick]").forEach(el=>{
    el.onclick = ()=>pickAnswer(Number(el.getAttribute("data-pick")));
  });
  const nq = $("nextQ"); if(nq) nq.onclick = nextQ;
  const sr = $("startReview"); if(sr) sr.onclick = startReview;
  const rt = $("retryTest"); if(rt) rt.onclick = ()=>startTest(T.ch);
  const db = $("doneBtn");
  if(db) db.onclick = ()=>{
    P.done[state.unit] = true; saveP();
    const w = $("stampWrap");
    if(w){ w.innerHTML = '<span class="stamp big anim">済</span>'; }
    db.style.display = "none";
    setTimeout(()=>render(), 900);
  };
  const ub = $("undoBtn");
  if(ub) ub.onclick = ()=>{ delete P.done[state.unit]; saveP(); render(); };
  const cb = $("copyBtn");
  if(cb) cb.onclick = ()=>{
    const t = buildQuestionText(state.unit);
    if(t) copyText(t);
  };
  const ab = $("askBtn");
  if(ab) ab.onclick = ()=>askAI(state.unit);
}

render();
/* ストラテジ攻略ノート v2.1 - 全3章18単元（補講3単元・問題54問収録） */
